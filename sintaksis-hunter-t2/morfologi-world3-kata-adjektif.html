<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi Hunter W3 Kata Adjektif</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1000px;margin:auto;padding:18px}.card{background:#101d31;border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.stats,.answers,.avatars{display:grid;gap:10px}.stats{grid-template-columns:repeat(4,1fr)}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.stat,.avatar,.answer{background:#0a1728;border:1px solid var(--line);border-radius:14px;padding:13px;color:white}.avatar,.answer,.btn{cursor:pointer}.avatar{text-align:center}.avatar.active{border:2px solid var(--accent)}.avatar span{display:block;font-size:34px}.btn{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800}.secondary{background:#1d314c}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:7px 0 14px}.monster{height:140px;display:grid;place-items:center;font-size:70px;background:#0a1728;border:1px solid var(--line);border-radius:18px;margin:12px 0}.bar{height:13px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad)}.feedback,.formula,.trap{padding:12px;border-radius:12px;margin-top:10px}.feedback{background:#0a1728;border:1px solid var(--line)}.formula{background:#111d30;border-left:4px solid var(--gold)}.trap{background:#25151d;border-left:4px solid var(--bad)}.cn{color:#65c7ff}@media(max-width:700px){.stats,.answers{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:480px){.avatars{grid-template-columns:1fr 1fr}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 3</span><h1>Kata Adjektif Hunter</h1><p class="muted">15 cabaran • sifat, warna, ukuran, bentuk, waktu, jarak, cara, perasaan dan pancaindera</p><label>Nama murid<input id="name" maxlength="30"></label><div id="avatars" class="avatars"></div><p><button id="enter" class="btn">Masuk</button> <button class="btn secondary" onclick="location.href='morfologi-hub.html'">Peta</button></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 3 • KATA ADJEKTIF</span><h1 id="player"></h1></div><button class="btn secondary" onclick="location.href='morfologi-hub.html'">Peta</button></div><div class="stats" style="margin:14px 0"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="accuracy">0%</b></div><div class="stat">Soalan<br><b id="progress">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">🦎</div><div id="meta" class="muted"></div><h2 id="question"></h2><p id="instruction" class="muted"></p><div id="answers" class="answers"></div><div id="feedback" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><span class="tag">WORLD SELESAI</span><h1>Keputusan World 3</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <button class="btn secondary" onclick="location.href='morfologi-hub.html'">Peta</button></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KA-001',skill:'Sifatan',difficulty:'Mudah',q:'Murid itu sangat _____ ketika menjawab soalan guru.',i:'Pilih kata adjektif sifatan yang tepat.',a:['rajin','berlari','sekolah','mereka'],c:0,e:'“Rajin” menerangkan sifat murid.',cn:'rajin说明学生的性质，属于形容词。',formula:'Kata adjektif menerangkan sifat atau keadaan kata nama.',mnemonic:'能回答“怎样的”，通常是形容词。',trap:'Jangan pilih kata kerja seperti “berlari”.'},
{id:'KA-002',skill:'Warna',difficulty:'Mudah',q:'Ibu membeli sehelai tudung berwarna _____.',i:'Pilih kata adjektif warna.',a:['biru','bulat','pahit','lambat'],c:0,e:'“Biru” ialah kata adjektif warna.',cn:'biru是颜色形容词。',formula:'Warna: merah, biru, hijau, putih dan sebagainya.',mnemonic:'看到颜色，就归入 warna。',trap:'“Bulat” ialah bentuk, bukan warna.'},
{id:'KA-003',skill:'Ukuran',difficulty:'Sederhana',q:'Pokok itu sangat _____ sehingga mencecah bumbung rumah.',i:'Pilih kata adjektif ukuran.',a:['tinggi','nyaring','masin','awal'],c:0,e:'“Tinggi” menerangkan ukuran ketinggian.',cn:'tinggi表示高度，属于 ukuran。',formula:'Ukuran menerangkan besar, kecil, tinggi, rendah, panjang atau pendek.',mnemonic:'能量大小长短高低，就是 ukuran。',trap:'“Nyaring” berkaitan bunyi.'},
{id:'KA-004',skill:'Bentuk',difficulty:'Sederhana',q:'Meja itu berbentuk _____.',i:'Pilih kata adjektif bentuk.',a:['bulat','jauh','manis','cepat'],c:0,e:'“Bulat” menerangkan bentuk meja.',cn:'bulat说明形状。',formula:'Bentuk: bulat, bujur, leper, bengkok, lurus.',mnemonic:'看外形，找 bentuk。',trap:'“Jauh” ialah jarak.'},
{id:'KA-005',skill:'Waktu',difficulty:'Sederhana',q:'Mereka tiba _____ daripada waktu yang dijadualkan.',i:'Pilih kata adjektif waktu.',a:['awal','dekat','kasar','merah'],c:0,e:'“Awal” menerangkan waktu ketibaan.',cn:'awal说明时间早。',formula:'Waktu: awal, lewat, baharu, lama, segera.',mnemonic:'问“什么时候/早晚”，看 waktu。',trap:'“Dekat” menerangkan jarak.'},
{id:'KA-006',skill:'Jarak',difficulty:'Mudah',q:'Rumah datuk tidak _____ dari sekolah.',i:'Pilih kata adjektif jarak.',a:['jauh','masam','cemas','nipis'],c:0,e:'“Jauh” menerangkan jarak antara rumah dan sekolah.',cn:'jauh表示距离远。',formula:'Jarak: jauh, dekat, hampir.',mnemonic:'远近就是 jarak。',trap:'Jangan keliru “hampir” sebagai kata kerja dalam konteks jarak.'},
{id:'KA-007',skill:'Cara',difficulty:'Sederhana',q:'Kereta itu bergerak sangat _____ di lebuh raya.',i:'Pilih kata adjektif cara.',a:['laju','kuning','sempit','gembira'],c:0,e:'“Laju” menerangkan cara kereta bergerak.',cn:'laju说明动作进行得快，属于 cara。',formula:'Cara: cepat, lambat, laju, deras, perlahan.',mnemonic:'动作怎样进行，看 cara。',trap:'“Sempit” ialah ukuran.'},
{id:'KA-008',skill:'Perasaan',difficulty:'Mudah',q:'Aina berasa _____ setelah memenangi pertandingan itu.',i:'Pilih kata adjektif perasaan.',a:['gembira','pahit','tinggi','bulat'],c:0,e:'“Gembira” menerangkan perasaan Aina.',cn:'gembira表示开心，是感受形容词。',formula:'Perasaan: gembira, sedih, takut, marah, rindu.',mnemonic:'心里怎样，就是 perasaan。',trap:'“Pahit” berkaitan deria rasa.'},
{id:'KA-009',skill:'Pancaindera rasa',difficulty:'Sederhana',q:'Ubat itu sangat _____ walaupun sudah dicampur madu.',i:'Pilih kata adjektif pancaindera.',a:['pahit','luas','lambat','takut'],c:0,e:'“Pahit” dikesan melalui deria rasa.',cn:'pahit通过味觉感受到。',formula:'Pancaindera: manis, masin, masam, pahit, harum, busuk, kasar, halus, nyaring.',mnemonic:'眼耳鼻舌皮肤感到的，属于 pancaindera。',trap:'Jangan keliru rasa pada lidah dengan perasaan hati.'},
{id:'KA-010',skill:'Pancaindera bau',difficulty:'Sederhana',q:'Bunga melur itu berbau sangat _____.',i:'Pilih kata adjektif yang tepat.',a:['harum','bengkok','lewat','dekat'],c:0,e:'“Harum” menerangkan bau yang dikesan oleh hidung.',cn:'harum说明香味。',formula:'Bau → harum, wangi, busuk, hapak.',mnemonic:'鼻子闻到的，看 bau。',trap:'“Wangi” dan “harum” ialah adjektif, bukan kata kerja.'},
{id:'KA-011',skill:'Kata penguat',difficulty:'Sukar',q:'Pemandangan di puncak gunung itu _____ indah.',i:'Pilih penggunaan kata penguat yang gramatis.',a:['amat','paling sekali','terlalu sekali','sungguh paling'],c:0,e:'“Amat indah” ialah binaan gramatis.',cn:'amat indah是正确搭配。',formula:'Penguat hadapan: terlalu, paling, agak; penguat bebas: amat, sangat, sungguh.',mnemonic:'不要把两个最高程度词叠在一起。',trap:'“Paling sekali” dan “terlalu sekali” tidak gramatis.'},
{id:'KA-012',skill:'Darjah penghabisan',difficulty:'Sukar',q:'Antara semua peserta, Faridlah yang _____ tinggi.',i:'Pilih bentuk darjah penghabisan yang betul.',a:['paling','sangat sekali','amat paling','terlalu paling'],c:0,e:'“Paling tinggi” menunjukkan darjah tertinggi dalam kumpulan.',cn:'paling tinggi表示一群中最高。',formula:'Darjah penghabisan → paling + adjektif / ter- + adjektif.',mnemonic:'比较全场第一，用 paling 或 ter-。',trap:'Jangan gabungkan “amat” dengan “paling”.'},
{id:'KA-013',skill:'Kata adjektif dengan imbuhan',difficulty:'Sukar',q:'Pilih kata adjektif berimbuhan yang betul.',i:'Kenal pasti perkataan yang masih berfungsi sebagai kata adjektif.',a:['kemerah-merahan','berlari-lari','makanan','pelukis'],c:0,e:'“Kemerah-merahan” menerangkan warna yang agak merah.',cn:'kemerah-merahan表示有点红，仍是形容词。',formula:'ke-...-an boleh membentuk adjektif yang bermaksud agak atau menyerupai.',mnemonic:'ke-...-an 表示“有点像”。',trap:'Tidak semua kata berimbuhan ialah kata adjektif.'},
{id:'KA-014',skill:'Analisis konteks',difficulty:'Sukar',q:'Jalan itu sempit tetapi permukaannya sangat _____.',i:'Pilih kata adjektif pancaindera sentuh yang sesuai.',a:['kasar','awal','jauh','cemas'],c:0,e:'“Kasar” menerangkan keadaan permukaan melalui sentuhan.',cn:'kasar通过触觉判断表面粗糙。',formula:'Sentuhan → kasar, halus, licin, kesat.',mnemonic:'手摸到的感觉，看 sentuhan。',trap:'“Sempit” sudah menerangkan ukuran jalan; tempat kosong menerangkan permukaan.'},
{id:'KA-015',skill:'Final Boss kata adjektif',difficulty:'Boss',q:'Pilih ayat yang menggunakan kata adjektif dengan tepat.',i:'Analisis makna dan binaan ayat.',a:['Suara penyanyi itu sungguh merdu.','Adik merdu lagu itu setiap malam.','Mereka kemerduan ke sekolah.','Buku itu paling sekali tebal.'],c:0,e:'“Merdu” menerangkan suara dan digunakan dengan kata penguat “sungguh” secara gramatis.',cn:'merdu说明声音悦耳，sungguh merdu搭配正确。',formula:'Semak dua perkara: perkataan menerangkan sifat dan binaan ayat gramatis.',mnemonic:'先看是不是性质，再看搭配对不对。',trap:'Kata adjektif tidak boleh digunakan sesuka hati sebagai kata kerja.'}
];const $=id=>document.getElementById(id);let selected=0,player='',run=null;function show(id){['login','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function renderAv(){$('avatars').innerHTML=AV.map((a,i)=>`<button class="avatar ${i===selected?'active':''}" data-a="${i}"><span>${a[1]}</span>${a[0]}</button>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{selected=+b.dataset.a;renderAv()})}function start(){player=$('name').value.trim()||player;if(!player)return alert('Masukkan nama murid.');run={idx:0,score:0,correct:0,answered:0,combo:0,locked:false};$('player').textContent=`${AV[selected][1]} ${player}`;show('game');renderQ()}function renderQ(){run.locked=false;const q=Q[run.idx];$('meta').textContent=`${q.id} • ${q.skill} • ${q.difficulty}`;$('question').textContent=q.q;$('instruction').textContent=q.i;$('progress').textContent=`${run.idx+1}/15`;$('hp').style.width=`${100-run.idx/15*100}%`;$('answers').innerHTML='';q.a.forEach((x,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=x;b.onclick=()=>answer(i);$('answers').appendChild(b)});$('feedback').classList.add('hidden');$('next').classList.add('hidden');stats()}function answer(n){if(run.locked)return;run.locked=true;const q=Q[run.idx],ok=n===q.c;run.answered++;if(ok){run.correct++;run.combo++;run.score+=100+run.combo*10}else run.combo=0;$('feedback').innerHTML=`<b style="color:${ok?'var(--good)':'var(--bad)'}">${ok?'Tepat!':'Belum tepat'}</b>${ok?'':`<p><b>Jawapan betul:</b> ${q.a[q.c]}</p>`}<p><b>Penjelasan BM:</b> ${q.e}</p><p class="cn"><b>华语讲解：</b> ${q.cn}</p><div class="formula"><b>Formula:</b> ${q.formula}<br><span class="cn"><b>口诀：</b> ${q.mnemonic}</span></div><div class="trap"><b>Perangkap / 常见陷阱：</b><br>${q.trap}</div>`;$('feedback').classList.remove('hidden');$('next').classList.remove('hidden');[...$('answers').children].forEach((b,i)=>{b.disabled=true;if(i===q.c)b.style.borderColor='var(--good)';if(i===n&&!ok)b.style.borderColor='var(--bad)'});stats()}function stats(){$('score').textContent=run.score;$('combo').textContent=`x${run.combo}`;$('accuracy').textContent=run.answered?Math.round(run.correct/run.answered*100)+'%':'0%'}function next(){run.idx++;run.idx>=Q.length?finish():renderQ()}function finish(){const acc=Math.round(run.correct/Q.length*100);$('summary').innerHTML=`<div class="stats"><div class="stat">Betul<br><b>${run.correct}/15</b></div><div class="stat">Ketepatan<br><b>${acc}%</b></div><div class="stat">Skor<br><b>${run.score}</b></div><div class="stat">Status<br><b>${acc>=70?'Lulus':'Ulang Kaji'}</b></div></div>`;show('finish')}renderAv();$('enter').onclick=start;$('retry').onclick=start;$('next').onclick=next;</script></body></html>
