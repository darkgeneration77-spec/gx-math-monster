<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Ejaan Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Ejaan Hunter</h1><p class="muted">15 cabaran • ejaan, imbuhan, kata majmuk, kata ganda, huruf besar dan tanda baca</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="index.html">Portal</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">KESALAHAN EJAAN</span><h1 id="player"></h1></div><a class="btn" href="index.html">Portal</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="monster">✍️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>Latihan Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="index.html">Portal</a></p></section></div><script>const Q=[{id:'EJ-001',s:'di- dan di',q:'Pilih ejaan yang betul.',i:'Fokus pada kata sendi nama dan imbuhan.',a:['Buku itu disimpan di dalam almari.','Buku itu di simpan didalam almari.','Buku itu disimpan didalam almari.','Buku itu di simpan di dalam almari.'],c:0,e:'“disimpan” ialah kata kerja berimbuhan dan ditulis rapat. “di dalam” ialah kata sendi nama dan ditulis terpisah.',cn:'disimpan 是前缀，连写；di dalam 是介词，分开写。',f:'di- + kata kerja = rapat; di + tempat = terpisah.',m:'动作连写，地点分开。',t:'Jangan anggap semua “di” ditulis dengan cara yang sama.'},{id:'EJ-002',s:'ke- dan ke',q:'Pilih ayat yang betul.',i:'Perhatikan arah dan imbuhan.',a:['Mereka pergi kepasar.','Mereka pergi ke pasar.','Mereka kepergian pasar.','Mereka pergi ke-pasar.'],c:1,e:'“Ke” sebagai kata sendi arah ditulis terpisah daripada kata nama.',cn:'ke 表示方向时与地点分开写。',f:'ke + tempat = terpisah.',m:'去哪里，ke 分开。',t:'“kepasar” ialah ejaan yang salah.'},{id:'EJ-003',s:'Kata ganda',q:'Pilih ejaan yang betul.',i:'Gunakan tanda sempang.',a:['murid murid','murid-murid','murid2','murid–murid'],c:1,e:'Kata ganda penuh ditulis menggunakan tanda sempang.',cn:'完全重叠词要使用连字号。',f:'kata + tanda sempang + kata.',m:'重复词，中间一横。',t:'Jangan gunakan angka 2 dalam penulisan rasmi.'},{id:'EJ-004',s:'Kata majmuk',q:'Pilih ejaan yang betul.',i:'Bezakan kata majmuk biasa dan mantap.',a:['keretaapi','kereta api','kereta-api','kereta  api'],c:1,e:'“Kereta api” ialah kata majmuk biasa dan ditulis terpisah.',cn:'kereta api 是普通复合词，要分开写。',f:'Kata majmuk biasa = terpisah.',m:'普通复合词，两个词分开。',t:'Jangan rapatkan semua kata majmuk.'},{id:'EJ-005',s:'Kata majmuk mantap',q:'Pilih ejaan yang betul.',i:'Cari bentuk yang telah mantap.',a:['antarabangsa','antara bangsa','antara-bangsa','antar bangsa'],c:0,e:'“Antarabangsa” ialah kata majmuk mantap dan ditulis rapat.',cn:'antarabangsa 属于固定复合词，连写。',f:'Kata majmuk mantap = rapat.',m:'固定搭配，连成一个词。',t:'Bukan semua kata majmuk perlu dipisahkan.'},{id:'EJ-006',s:'Huruf besar',q:'Pilih ayat yang betul.',i:'Perhatikan nama khas.',a:['Kami melawat pulau pinang.','Kami melawat Pulau Pinang.','Kami melawat pulau Pinang.','Kami melawat Pulau pinang.'],c:1,e:'Nama negeri ialah nama khas dan setiap unsur utamanya bermula dengan huruf besar.',cn:'州名属于专有名词，每个主要词首字母大写。',f:'Nama khas = huruf besar.',m:'人名地名校名，开头大写。',t:'Jangan gunakan huruf kecil untuk nama khas.'},{id:'EJ-007',s:'Kata pinjaman',q:'Pilih ejaan baku.',i:'Pilih bentuk bahasa Melayu standard.',a:['aktiviti','aktivitas','aktivity','aktiviti-'],c:0,e:'Ejaan baku bahasa Melayu ialah “aktiviti”.',cn:'马来文标准拼写是 aktiviti。',f:'Gunakan ejaan baku DBP.',m:'activity 变 aktiviti。',t:'Jangan menyalin terus ejaan bahasa Inggeris.'},{id:'EJ-008',s:'Imbuhan meN-',q:'Pilih ejaan yang betul.',i:'Fokus pada bentuk berimbuhan.',a:['menyapu','mensapu','men sapu','men-sapu'],c:0,e:'Kata dasar “sapu” menerima imbuhan meN- lalu menjadi “menyapu”.',cn:'sapu 加 meN- 后变成 menyapu。',f:'meN- + sapu → menyapu.',m:'s 变 ny。',t:'Jangan kekalkan huruf s dalam bentuk ini.'},{id:'EJ-009',s:'Imbuhan peN-',q:'Pilih ejaan yang betul.',i:'Pilih kata nama terbitan.',a:['penyanyi','pensanyi','pen nyanyi','penyanyi-'],c:0,e:'Kata dasar “nyanyi” menerima peN- dan menjadi “penyanyi”.',cn:'nyanyi 加 peN- 后是 penyanyi。',f:'peN- + nyanyi → penyanyi.',m:'唱歌的人 = penyanyi。',t:'Jangan tulis “pensanyi”.'},{id:'EJ-010',s:'Tanda koma',q:'Pilih ayat yang menggunakan koma dengan betul.',i:'Perhatikan kata seru.',a:['Wah cantiknya bunga itu!','Wah, cantiknya bunga itu!','Wah; cantiknya bunga itu!','Wah: cantiknya bunga itu!'],c:1,e:'Kata seru pada awal ayat diikuti tanda koma.',cn:'句首感叹词后使用逗号。',f:'Kata seru + koma.',m:'Wah 后面放逗号。',t:'Jangan terus sambung tanpa tanda baca.'},{id:'EJ-011',s:'Tanda petik',q:'Pilih ayat yang betul.',i:'Perhatikan cakap ajuk.',a:['Ibu berkata, “Belajarlah dengan tekun.”','Ibu berkata “Belajarlah dengan tekun”.','Ibu berkata: Belajarlah dengan tekun.','Ibu berkata, Belajarlah dengan tekun.'],c:0,e:'Cakap ajuk perlu diapit tanda petik dan tanda baca diletakkan dengan betul.',cn:'直接引语需要使用引号。',f:'kata pengiring + koma + tanda petik.',m:'别人原话，放进引号。',t:'Jangan buang tanda petik bagi cakap ajuk.'},{id:'EJ-012',s:'Singkatan',q:'Pilih ejaan singkatan yang betul.',i:'Pilih bentuk rasmi.',a:['dll.','d.l.l','DLL','dll'],c:0,e:'Singkatan “dan lain-lain” ditulis sebagai “dll.”',cn:'dan lain-lain 的缩写是 dll.。',f:'Singkatan tertentu diakhiri noktah.',m:'dll 后有一点。',t:'Jangan gunakan huruf besar tanpa sebab.'},{id:'EJ-013',s:'Kata sendi nama',q:'Pilih ejaan yang betul.',i:'Perhatikan “daripada”.',a:['dari pada ibu','daripada ibu','dari-pada ibu','daripadaibu'],c:1,e:'“Daripada” dieja sebagai satu perkataan.',cn:'daripada 是一个完整词，要连写。',f:'daripada = satu perkataan.',m:'daripada 连成一个。',t:'Jangan pisahkan “dari pada”.'},{id:'EJ-014',s:'Keselarasan vokal',q:'Pilih ejaan baku.',i:'Pilih bentuk standard.',a:['boleh','bulih','bole','boleeh'],c:0,e:'Ejaan baku ialah “boleh”.',cn:'标准拼写是 boleh。',f:'Gunakan pola vokal baku.',m:'记住：bo-leh。',t:'Jangan menulis mengikut sebutan dialek.'},{id:'EJ-015',s:'Final Boss',q:'Pilih ayat yang bebas daripada kesalahan ejaan.',i:'Semak imbuhan, kata sendi, huruf besar dan tanda baca.',a:['Pada hari Isnin, kami pergi ke Kuala Lumpur untuk menyertai aktiviti sekolah.','Pada Hari isnin kami pergi kekuala lumpur untuk menyertai aktiviti sekolah.','Pada hari Isnin kami pergi ke kuala lumpur untuk menyertai aktivity sekolah.','Pada hari isnin, kami pergi ke Kuala lumpur untuk menyertai aktiviti sekolah.'],c:0,e:'Ayat pertama menggunakan huruf besar, kata sendi, ejaan pinjaman dan koma dengan betul.',cn:'第一句的星期、地点、介词、外来词和标点都正确。',f:'Semak 4 perkara: huruf besar, jarak, imbuhan, tanda baca.',m:'大写、空格、词缀、标点四步查。',t:'Final Boss menggabungkan beberapa jenis kesalahan.'}];let idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);$('enter').onclick=()=>{$('player').textContent=$('name').value.trim()||'Murid';$('login').classList.add('hidden');$('game').classList.remove('hidden');render()};function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('summary').innerHTML='<p>Skor: <b>'+score+'</b></p><p>Betul: <b>'+correct+'/15</b></p><p>Ketepatan: <b>'+Math.round(correct/15*100)+'%</b></p>'}$('retry').onclick=()=>location.reload();</script></body></html>
