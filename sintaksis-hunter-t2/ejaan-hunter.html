];let pool=[],idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);const shuffle=a=>[...a].sort(()=>Math.random()-.5);$('enter').onclick=()=>{pool=shuffle(Q).slice(0,15);$('player').textContent=$('name').value.trim()||'Murid';$('login').classList.add('hidden');$('game').classList.remove('hidden');render()};function render(){locked=false;const x=pool[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=pool[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<pool.length?render():finish()};function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('summary').innerHTML='<p>Skor: <b>'+score+'</b></p><p>Betul: <b>'+correct+'/15</b></p><p>Ketepatan: <b>'+Math.round(correct/15*100)+'%</b></p><p>Bank soalan: <b>50</b></p>'}$('retry').onclick=()=>location.reload();</script></body></html>
