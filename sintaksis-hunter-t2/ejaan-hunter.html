<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Ejaan Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.world{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.world{background:#0a1728;border:1px solid var(--good);text-align:left}.grid{display:grid;gap:10px}.worlds{grid-template-columns:repeat(2,1fr)}.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(5,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.battle{position:relative;min-height:230px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#132a47,#08111f 68%);overflow:hidden;display:grid;grid-template-columns:1fr 1fr;align-items:end;padding:20px}.fighter{position:relative;z-index:2;text-align:center}.pet{font-size:74px;display:inline-block;transform-origin:50% 100%;filter:drop-shadow(0 8px 8px rgba(0,0,0,.35));animation:idle 1.6s ease-in-out infinite}.enemy{font-size:82px;display:inline-block;animation:enemyIdle 1.3s ease-in-out infinite}.petName,.enemyName{font-weight:800;margin-top:5px}.xpbar{height:10px;background:#050d18;border-radius:99px;overflow:hidden;margin:8px auto 0;max-width:180px}.xpfill{height:100%;background:linear-gradient(90deg,#29c875,#ffc94a)}.hit-good{animation:attack .55s ease}.hit-bad{animation:shrinkHit .6s ease}.enemy-hit{animation:enemyHit .55s ease}.shake{animation:shake .45s ease}.particle{position:absolute;z-index:5;font-size:24px;pointer-events:none;animation:burst .85s ease-out forwards}@keyframes idle{0%,100%{transform:translateY(0) scale(var(--petScale,1))}50%{transform:translateY(-8px) scale(var(--petScale,1))}}@keyframes enemyIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes attack{0%{transform:translateX(0) scale(var(--petScale,1))}45%{transform:translateX(80px) scale(calc(var(--petScale,1)*1.12))}100%{transform:translateX(0) scale(var(--petScale,1))}}@keyframes shrinkHit{0%{transform:scale(var(--petScale,1))}45%{transform:scale(calc(var(--petScale,1)*.65)) rotate(-8deg)}100%{transform:scale(var(--petScale,1))}}@keyframes enemyHit{0%{transform:translateX(0)}35%{transform:translateX(18px) rotate(8deg) scale(.88)}100%{transform:translateX(0)}}@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}@keyframes burst{0%{opacity:1;transform:translate(0,0) scale(.7)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.4)}}a{color:white;text-decoration:none}@media(max-width:700px){.worlds,.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.battle{min-height:210px}.pet,.enemy{font-size:58px}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Ejaan Hunter</h1><p class="muted">20 World • 300 soalan unik • pet battle system</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Lihat Peta</button> <a class="btn" href="index.html">Portal</a></p></section><section id="map" class="hidden"><div class="top"><div><span class="tag">MODULE C</span><h1>Pilih World Ejaan</h1><p class="muted">Setiap soalan mempunyai empat pilihan unik.</p></div><a class="btn" href="index.html">Portal</a></div><div id="petCard" class="card" style="margin:14px 0"></div><div id="worlds" class="grid worlds"></div></section><main id="game" class="hidden"><div class="top"><div><span id="worldTag" class="tag"></span><h1 id="player"></h1></div><button id="backMap" class="btn">Peta</button></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div><div class="stat">Pet XP<br><b id="petXp">0</b></div></div><section class="card"><div id="battle" class="battle"><div class="fighter"><div id="pet" class="pet">🥚</div><div id="petName" class="petName"></div><div class="xpbar"><div id="xpfill" class="xpfill"></div></div></div><div class="fighter"><div id="enemy" class="enemy">👾</div><div class="enemyName">Ejaan Monster</div></div></div><div id="meta" class="muted" style="margin-top:14px"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <button id="finishMap" class="btn">Peta</button></p></section></div><script>const W=['di- dan di','ke- dan ke','Kata Ganda','Kata Majmuk','Kata Majmuk Mantap','Imbuhan meN-','Imbuhan peN-','Imbuhan Apitan','Kata Pinjaman','Huruf Besar','Huruf Kecil','Tanda Baca','Akronim','Singkatan','Keselarasan Vokal','Boss Ejaan 1','Boss Ejaan 2','Boss Ejaan 3','Boss Ejaan 4','Final Ejaan'];const sets=[['disimpan di dalam almari','ditulis di papan putih','dibawa ke sekolah','diletakkan di atas meja','dijumpai di dalam beg','dibaca di perpustakaan','ditanam di belakang rumah','dihantar ke pejabat','dimasukkan ke dalam kotak','digantung di dinding','dibeli di kedai','dicuci di bilik air','dipamerkan di dewan','disusun di rak','ditutup di dalam kabinet'],['pergi ke pasar','masuk ke kelas','berjalan ke kantin','bertolak ke Johor','kembali ke rumah','naik ke pentas','berpindah ke bandar','datang ke sekolah','menuju ke utara','terjun ke sungai','masuk ke dalam bilik','keluar ke halaman','berlari ke padang','naik ke tingkat dua','pergi ke perpustakaan'],['murid-murid','buku-buku','rumah-rumah','sayur-mayur','lauk-pauk','gunung-ganang','saudara-mara','kuih-muih','ulang-alik','mundar-mandir','lelaki-lelaki','kanak-kanak','huru-hara','gotong-royong','warna-warni'],['kereta api','alat tulis','jalan raya','meja tulis','kapal terbang','jam tangan','guru besar','ibu bapa','mata pelajaran','rumah sakit','bandar raya','tengah hari','surat khabar','balai raya','kertas kerja'],['antarabangsa','tanggungjawab','warganegara','kerjasama','olahraga','pesuruhjaya','setiausaha','bumiputera','jawatankuasa','sukarela','kakitangan','matahari','kerjaya','beritahu','tandatangan'],['menyapu','menulis','membaca','memukul','mengira','mengecat','menjahit','menggosok','mencuci','membawa','memotong','menyusun','mengelap','mengangkat','menanam'],['penyanyi','penulis','pembaca','pemukul','pengira','pengecat','penjahit','penggosok','pencuci','pembawa','pemotong','penyusun','pengelap','pengangkat','penanam'],['kebersihan','keselamatan','keindahan','pembangunan','pendidikan','permainan','perjalanan','pelaksanaan','penggunaan','pembelajaran','kesihatan','kemudahan','keamanan','pengetahuan','perubahan'],['aktiviti','komunikasi','teknologi','strategi','kategori','universiti','kualiti','industri','praktikal','objektif','subjek','projek','sistem','format','program'],['Pulau Pinang','Kuala Lumpur','Sekolah Menengah Seri Murni','Encik Rahman','Bahasa Melayu','Hari Kebangsaan','Jalan Merdeka','Universiti Malaya','Sungai Pahang','Gunung Kinabalu','Perdana Menteri Malaysia','Muzium Negara','Taman Negara','Dewan Bahasa dan Pustaka','Negeri Sembilan'],['bahasa Melayu','orang Melayu','kerajaan Malaysia','rakyat Malaysia','sekolah kebangsaan','guru bahasa Melayu','bulan Ramadan','hari Isnin','negeri Johor','negara Malaysia','suku kaum Iban','agama Islam','laut China Selatan','bahasa Inggeris','masyarakat Cina'],['Wah, cantiknya!','Aduh, sakitnya!','Siapakah nama kamu?','Ibu berkata, “Belajarlah.”','Bawa buku, pensel dan pembaris.','Mesyuarat bermula pada pukul 8.00 pagi.','Ali; Abu; dan Siti hadir.','Tujuan program: membantu murid.','Dia bertanya, “Kamu sudah makan?”','Amboi, rajinnya kamu!','Jangan berlari!','Rumah itu besar, bersih dan selesa.','Tarikh: 12 Ogos 2026','Saya membeli dua barang: buku dan pen.','Mereka datang lewat; namun, guru masih menunggu.'],['MARA','PERKESO','FELDA','BERNAMA','TABIKA','TADIKA','PUSPANITA','INTAN','IKIM','PETRONAS','UPSR','SPM','MRSM','UMNO','ABIM'],['dll.','dsb.','spt.','hlm.','Prof.','Dr.','En.','Pn.','Sdn. Bhd.','No.','kg','cm','RM','Feb.','Sept.'],['boleh','telur','goreng','burung','gunung','kecil','pohon','sorong','gelung','betul','lurus','hidup','putih','tutup','sisir'],['Pada hari Isnin, kami pergi ke Kuala Lumpur.','Buku itu disimpan di dalam almari.','Murid-murid menyertai aktiviti sekolah.','Encik Rahman berkata, “Belajarlah.”','Ibu membeli alat tulis di kedai.','Kami menaiki kereta api ke Johor.','Mereka bekerjasama membersihkan kelas.','Program antarabangsa itu berjaya.','Guru menulis di papan putih.','Kanak-kanak bermain di padang.','Aktiviti itu bermula pada pukul 8.00 pagi.','Sekolah Menengah Seri Murni mengadakan gotong-royong.','Ayah membeli surat khabar.','MARA menawarkan program pendidikan.','Dia berkata, “Saya akan datang esok.”'],['Buku-buku itu disusun di rak.','Kami pergi ke Pulau Pinang pada hari Isnin.','Ibu membeli sayur-mayur di pasar.','Encik Lim mengajar Bahasa Melayu.','Aktiviti teknologi itu sangat menarik.','Penulis itu berasal dari Johor.','Mereka menaiki kapal terbang ke Sabah.','Guru besar merasmikan program sekolah.','Murid-murid membaca di perpustakaan.','Aduh, sakitnya kakiku!','PUSPANITA menganjurkan program tersebut.','Pembangunan sekolah sedang dijalankan.','Kakitangan pejabat menghadiri mesyuarat.','Kami membeli jam tangan baharu.','Bahasa Inggeris diajar pada hari Selasa.'],['Pada hari Isnin, murid-murid pergi ke Pulau Pinang.','Buku itu diletakkan di atas meja.','Kuala Lumpur ialah ibu negara Malaysia.','Mereka menjalankan gotong-royong.','Dia membeli alat tulis di kedai.','Universiti Malaya menawarkan program baharu.','Wah, indahnya pemandangan itu!','Guru berkata, “Sila duduk.”','PERKESO membantu para pekerja.','Kami menaiki kereta api.','Kebersihan kelas perlu dijaga.','Penjahit itu sedang bekerja.','Teknologi komunikasi berkembang pesat.','Surat khabar itu dibaca oleh ayah.','Tanggungjawab murid ialah belajar.'],['Encik Rahman membawa murid-murid ke Muzium Negara.','Aktiviti itu diadakan pada hari Rabu.','Kami membeli kuih-muih di pasar malam.','FELDA membantu masyarakat luar bandar.','Dia berkata, “Jangan bising!”','Murid-murid menulis di papan putih.','Program komunikasi itu dianjurkan oleh universiti.','Ayah membeli jam tangan baharu.','Guru besar merasmikan Hari Kebangsaan.','Mereka bekerjasama menjaga kebersihan.','Penulis itu menyiapkan laporan.','Sungai Pahang ialah sungai yang panjang.','Kanak-kanak berlari ke padang.','TABIKA itu terletak di Johor.','Ibu berkata, “Tolong tutup pintu.”'],['Pada hari Isnin, murid-murid pergi ke Pulau Pinang untuk menyertai aktiviti.','Buku-buku itu disusun di dalam almari oleh guru.','Encik Rahman berkata, “Belajarlah dengan tekun.”','MARA menganjurkan program pendidikan antarabangsa.','Kami menaiki kereta api ke Kuala Lumpur.','Pembangunan sekolah dijalankan pada bulan Ogos.','Kanak-kanak bermain gotong-royong di padang.','Guru bahasa Melayu mengajar pada hari Selasa.','Mereka membeli alat tulis di kedai.','Teknologi komunikasi berkembang dengan pesat.','Universiti Malaya menawarkan program baharu.','Aduh, sakitnya kakiku!','Kakitangan pejabat menghadiri mesyuarat.','PUSPANITA membantu masyarakat setempat.','Dia bertanya, “Bilakah kamu akan datang?”']];function wrongs(correct,w,i){const v=[];const push=x=>{x=String(x).trim();if(x&&x!==correct&&!v.includes(x))v.push(x)};if(w===0){push(correct.replace(/^di/,'di '));push(correct.replace(/ di /g,' di'));push(correct.replace(/di dalam/g,'didalam'))}else if(w===1){push(correct.replace(/ ke /g,'ke'));push(correct.replace(/^ke/,'ke-'));push(correct.replace(/ ke /g,' ke-'))}else if(w===2){push(correct.replace(/-/g,' '));push(correct.replace(/-/g,''));push(correct.replace(/-/g,'2'))}else if(w===3){push(correct.replace(/ /g,''));push(correct.replace(/ /g,'-'));push(correct.toUpperCase())}else if(w===4){const mid=Math.max(1,Math.floor(correct.length/2));push(correct.slice(0,mid)+' '+correct.slice(mid));push(correct.replace(/a/g,'e'));push(correct+'-')}else if(w===5||w===6||w===7){push(correct.replace(/^meny/,'mens').replace(/^mem/,'me').replace(/^peng/,'pen').replace(/^peny/,'pens').replace(/^ke/,'ke ').replace(/^pem/,'pen'));push(correct.replace(/^./,correct[0]+'-'));push(correct+' an')}else if(w===8||w===14){push(correct.replace(/i/g,'y'));push(correct.replace(/o/g,'u').replace(/e/g,'i'));push(correct+'-')}else if(w===9||w===10){push(correct.toLowerCase());push(correct.toUpperCase());push(correct.replace(/\b\w/g,m=>m.toLowerCase()))}else if(w===11){push(correct.replace(/[,;:!?“”.]/g,''));push(correct.replace(/,/g,';').replace(/!/g,'.'));push(correct.replace(/“|”/g,''))}else if(w===12){push(correct.split('').join('.'));push(correct.toLowerCase());push(correct+' .')}else if(w===13){push(correct.replace(/\./g,''));push(correct.toUpperCase());push(correct.split('').join('.'))}else{push(correct.toLowerCase());push(correct.replace(/ /g,''));push(correct.replace(/-/g,' '))}let n=1;while(v.length<3){push(correct+' '+n);n++}return v.slice(0,3)}function bank(w){return sets[w].map((correct,i)=>{const pos=i%4,opts=wrongs(correct,w,i);opts.splice(pos,0,correct);return{id:`EJ-${String(w+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`,s:W[w],q:`Pilih bentuk yang betul bagi item ${i+1}.`,i:'Semak semua empat pilihan. Hanya satu jawapan betul.',a:opts,c:pos,e:`Bentuk baku ialah “${correct}”.`,cn:`正确形式是：${correct}。`,f:'Bandingkan ejaan, jarak, huruf besar dan tanda baca.',m:'四个答案都不同；先找规则，再选答案。',t:'Jangan pilih berdasarkan kedudukan A, B, C atau D.'}})}let name='',world=0,Q=[],idx=0,score=0,combo=0,correctCount=0,locked=false,petData=null;const $=x=>document.getElementById(x);const pkey=n=>'sbh-pet-'+n.toLowerCase().replace(/\s+/g,'-');function loadPet(){petData=JSON.parse(localStorage.getItem(pkey(name)))||{xp:0,correct:0,wrong:0,games:0};savePet()}function savePet(){localStorage.setItem(pkey(name),JSON.stringify(petData))}function stage(xp){if(xp>=160)return['🐉','Naga'];if(xp>=100)return['🦊','Rubah'];if(xp>=60)return['🐱','Kucing'];if(xp>=30)return['🐥','Anak'];if(xp>=10)return['🐣','Menetas'];return['🥚','Telur']}function show(id){['login','map','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function renderPet(){const s=stage(petData.xp),scale=Math.min(1.38,.84+petData.xp/300);$('pet').textContent=s[0];$('pet').style.setProperty('--petScale',scale);$('petName').textContent=`${name} • ${s[1]}`;$('petXp').textContent=petData.xp;$('xpfill').style.width=Math.min(100,petData.xp%50*2)+'%'}function renderPetCard(){const s=stage(petData.xp);$('petCard').innerHTML=`<div style="display:flex;align-items:center;gap:16px"><div style="font-size:64px">${s[0]}</div><div><h2 style="margin:0">${name} 的宠物：${s[1]}</h2><p>XP: <b>${petData.xp}</b> • Betul: ${petData.correct} • Salah: ${petData.wrong} • Permainan: ${petData.games}</p></div></div>`}$('enter').onclick=()=>{name=$('name').value.trim()||'Murid';loadPet();show('map');renderMap()};function renderMap(){renderPetCard();$('worlds').innerHTML=W.map((x,i)=>`<button class="world" data-w="${i}"><span class="tag">WORLD ${i+1}</span><h3>${x}</h3><p>15 soalan • pilihan unik</p></button>`).join('');document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>start(+b.dataset.w))}function start(w){world=w;Q=bank(w);idx=score=combo=correctCount=0;show('game');$('player').textContent=name;$('worldTag').textContent=`WORLD ${w+1} • ${W[w]}`;renderPet();render()}function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function particles(ok){const battle=$('battle');for(let i=0;i<7;i++){const p=document.createElement('span');p.className='particle';p.textContent=ok?'✨':'💥';p.style.left=(ok?62:25)+Math.random()*12+'%';p.style.top=38+Math.random()*20+'%';p.style.setProperty('--dx',(Math.random()*120-60)+'px');p.style.setProperty('--dy',(-40-Math.random()*90)+'px');battle.appendChild(p);setTimeout(()=>p.remove(),900)}}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correctCount++;petData.xp+=2;petData.correct++;b.style.borderColor='var(--good)';$('pet').classList.add('hit-good');$('enemy').classList.add('enemy-hit')}else{combo=0;petData.xp=Math.max(0,petData.xp-1);petData.wrong++;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)';$('pet').classList.add('hit-bad');$('battle').classList.add('shake')}savePet();renderPet();particles(ok);setTimeout(()=>{$('pet').classList.remove('hit-good','hit-bad');$('enemy').classList.remove('enemy-hit');$('battle').classList.remove('shake')},650);$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correctCount/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){petData.games++;savePet();show('finish');$('summary').innerHTML=`<p>World: <b>${world+1} - ${W[world]}</b></p><p>Skor: <b>${score}</b></p><p>Betul: <b>${correctCount}/15</b></p><p>Ketepatan: <b>${Math.round(correctCount/15*100)}%</b></p><p>Pet XP: <b>${petData.xp}</b></p>`}$('retry').onclick=()=>start(world);$('backMap').onclick=()=>{show('map');renderMap()};$('finishMap').onclick=()=>{show('map');renderMap()};</script></body></html>
