<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 9</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.avatar{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.avatar{background:#0b1930;border:1px solid var(--line)}.avatar.active{border:2px solid var(--accent)}.avatar span{display:block;font-size:32px}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad)}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 9</span><h1>Kata Tugas</h1><p class="muted">15 cabaran • sendi, hubung, nafi, pemeri, seru dan tugas lain</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 9 • KATA TUGAS</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">🧠</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World 9 Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KTG-001',s:'Kata sendi nama',d:'Mudah',q:'Ayah pergi ___ pejabat pada pukul 8 pagi.',i:'Pilih kata sendi nama yang betul.',a:['di','ke','dari','daripada'],c:1,e:'“Ke” digunakan untuk arah atau tempat yang dituju.',cn:'ke 表示前往的方向或地点。',f:'ke + tempat/arah.',m:'Pergi ke mana?',t:'“Di” menunjukkan tempat berada, bukan arah.'},
{id:'KTG-002',s:'Kata sendi nama',d:'Mudah',q:'Buku itu terletak ___ atas meja.',i:'Pilih jawapan.',a:['ke','dari','di','daripada'],c:2,e:'“Di” digunakan untuk menunjukkan tempat.',cn:'di 表示所在地点。',f:'di + tempat.',m:'Berada di mana?',t:'Jangan tulis “dimeja”; kata sendi nama ditulis terpisah.'},
{id:'KTG-003',s:'Dari dan daripada',d:'Sederhana',q:'Hadiah ini saya terima ___ ibu.',i:'Pilih kata sendi nama yang tepat.',a:['dari','daripada','ke','pada'],c:1,e:'“Daripada” digunakan untuk manusia atau sumber.',cn:'来自人或来源使用 daripada。',f:'daripada + manusia/sumber.',m:'人和来源，用 daripada。',t:'“Dari” digunakan untuk tempat, arah dan masa.'},
{id:'KTG-004',s:'Kata hubung',d:'Mudah',q:'Aina membaca buku ___ adiknya menonton televisyen.',i:'Pilih kata hubung.',a:['kerana','manakala','supaya','hingga'],c:1,e:'“Manakala” menghubungkan dua perbuatan yang berbeza.',cn:'manakala 连接两个对比或同时发生的动作。',f:'Ayat 1 + manakala + ayat 2.',m:'一个这样，另一个那样。',t:'Jangan pilih “kerana” jika tiada sebab.'},
{id:'KTG-005',s:'Kata nafi',d:'Sederhana',q:'Rumah itu ___ besar.',i:'Pilih kata nafi yang betul.',a:['bukan','tidak','jangan','belum'],c:1,e:'“Tidak” menafikan kata adjektif “besar”.',cn:'否定形容词 besar 使用 tidak。',f:'tidak + kata kerja/kata adjektif.',m:'不是动作或性质，用 tidak。',t:'“Bukan” menafikan frasa nama atau frasa sendi.'},
{id:'KTG-006',s:'Kata nafi',d:'Sederhana',q:'Itu ___ beg saya.',i:'Pilih jawapan.',a:['tidak','bukan','belum','jangan'],c:1,e:'“Bukan” menafikan frasa nama “beg saya”.',cn:'否定名词短语使用 bukan。',f:'bukan + frasa nama.',m:'不是某个东西，用 bukan。',t:'Jangan gunakan “tidak beg saya”.'},
{id:'KTG-007',s:'Kata pemeri',d:'Sukar',q:'Tujuan utama program itu ___ untuk membantu murid lemah.',i:'Pilih kata pemeri.',a:['ialah','adalah','bukan','tidak'],c:1,e:'“Adalah” hadir sebelum frasa sendi “untuk membantu...”.',cn:'adalah 用在介词短语前。',f:'adalah + frasa adjektif/frasa sendi.',m:'后面有 untuk，常用 adalah。',t:'“Ialah” biasanya sebelum frasa nama.'},
{id:'KTG-008',s:'Kata pemeri',d:'Sukar',q:'Encik Rahman ___ guru kelas kami.',i:'Pilih jawapan.',a:['adalah','ialah','tidak','bukan'],c:1,e:'“Ialah” hadir sebelum frasa nama “guru kelas kami”.',cn:'ialah 用在名词短语前。',f:'ialah + frasa nama.',m:'A ialah B，两边都是名词。',t:'Jangan guna “adalah guru”.'},
{id:'KTG-009',s:'Kata seru',d:'Mudah',q:'___, cantiknya pemandangan ini!',i:'Pilih kata seru yang sesuai.',a:['Wah','Aduh','Syabas','Nah'],c:0,e:'“Wah” menyatakan rasa kagum.',cn:'Wah 表示惊叹。',f:'Wah + rasa kagum.',m:'看到很美，喊 Wah。',t:'“Aduh” menyatakan sakit.'},
{id:'KTG-010',s:'Kata perintah',d:'Sederhana',q:'___ masuk ke bilik ini tanpa kebenaran.',i:'Pilih kata perintah.',a:['Sila','Tolong','Jangan','Harap'],c:2,e:'“Jangan” digunakan untuk larangan.',cn:'Jangan 用来表示禁止。',f:'jangan + kata kerja.',m:'不可以做，用 jangan。',t:'“Sila” ialah permintaan sopan, bukan larangan.'},
{id:'KTG-011',s:'Kata tanya',d:'Mudah',q:'___ nama ketua kelas kamu?',i:'Pilih kata tanya.',a:['Siapa','Apa','Mana','Bila'],c:1,e:'“Apa” digunakan untuk menanyakan nama atau benda.',cn:'询问名字或事物使用 apa。',f:'Apa + benda/nama.',m:'问名字，用 apa。',t:'“Siapa” menanyakan orang, bukan nama orang.'},
{id:'KTG-012',s:'Kata penegas',d:'Sederhana',q:'Dialah yang membantu saya semalam.',i:'Apakah kata penegas dalam ayat ini?',a:['Dia','-lah','yang','semalam'],c:1,e:'Partikel “-lah” menegaskan perkataan “dia”.',cn:'-lah 加强 dia 的语气。',f:'kata + -lah = penegasan.',m:'看到 -lah，先想 penegas。',t:'Jangan pilih “yang”; itu kata hubung pancangan relatif.'},
{id:'KTG-013',s:'Kata penguat',d:'Sederhana',q:'Udara di kawasan itu sangat nyaman.',i:'Pilih kata penguat.',a:['udara','sangat','nyaman','kawasan'],c:1,e:'“Sangat” menguatkan kata adjektif “nyaman”.',cn:'sangat 加强形容词 nyaman。',f:'kata penguat + kata adjektif.',m:'很、非常，就是 penguat。',t:'Kata penguat bukan kata adjektif.'},
{id:'KTG-014',s:'Kata bilangan',d:'Boss',q:'___ orang murid dipilih menyertai pertandingan itu.',i:'Pilih kata bilangan yang tepat.',a:['Setengah','Beberapa','Setiap','Segala'],c:1,e:'“Beberapa” menunjukkan bilangan yang tidak tentu dan lebih daripada satu.',cn:'beberapa 表示几个，不确定但超过一个。',f:'beberapa + penjodoh bilangan/kata nama.',m:'几个 = beberapa。',t:'“Setiap” bermaksud tiap-tiap, bukan beberapa.'},
{id:'KTG-015',s:'Analisis lengkap',d:'Final Boss',q:'Pilih analisis yang tepat bagi ayat “Wah, mereka masih belum tiba kerana hujan sangat lebat.”',i:'Tentukan jenis kata tugas.',a:['Wah kata seru; masih dan belum kata bantu; kerana kata hubung; sangat kata penguat.','Wah kata tanya; masih kata nafi; kerana kata sendi; sangat kata adjektif.','Wah kata perintah; belum kata hubung; kerana kata seru; sangat kata bantu.','Semua perkataan itu ialah kata nama.'],c:0,e:'Ayat ini mengandungi beberapa jenis kata tugas yang berbeza.',cn:'句子中同时出现感叹词、助动词、连词和加强词。',f:'Kenal fungsi setiap perkataan dalam konteks.',m:'不要只看词形，要看功能。',t:'“Belum” dalam konteks ini ialah kata bantu aspek.'}
];let ai=0,idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);AV.forEach((v,i)=>{const b=document.createElement('button');b.className='avatar';b.innerHTML='<span>'+v[1]+'</span>'+v[0];b.onclick=()=>{ai=i;document.querySelectorAll('.avatar').forEach(x=>x.classList.remove('active'));b.classList.add('active')};$('avatars').appendChild(b)});document.querySelector('.avatar').classList.add('active');$('enter').onclick=()=>{const n=$('name').value.trim()||'Murid';$('player').textContent=AV[ai][1]+' '+n;$('login').classList.add('hidden');$('game').classList.remove('hidden');render()};function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s+' • '+x.d;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('hp').style.width=((15-idx)/15*100)+'%';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}function next(){idx++;if(idx<Q.length)render();else finish()}$('next').onclick=next;function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('summary').innerHTML='<h2>Skor: '+score+'</h2><p>Betul: '+correct+'/15</p><p>Ketepatan: '+Math.round(correct/15*100)+'%</p>'}$('retry').onclick=()=>location.reload();</script></body></html>
