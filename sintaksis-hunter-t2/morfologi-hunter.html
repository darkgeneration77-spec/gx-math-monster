<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Morfologi Hunter T2</title>
<style>
:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.grid{display:grid;gap:12px}.worlds{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(4,1fr)}.stat,.world{background:#0a1728;border:1px solid var(--line);border-radius:15px;padding:14px}.world{color:white;text-align:left;cursor:pointer}.world.locked{opacity:.42;cursor:not-allowed}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b;color:#d6e2f1;font-size:.8rem}.btn{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}.secondary{background:#1d314c}.gold{background:#9b7313}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:6px 0 14px}.avatars{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.avatar,.answer{border:1px solid var(--line);border-radius:13px;background:#0b1930;color:white;padding:13px;cursor:pointer}.avatar{text-align:center}.avatar.active{border:2px solid var(--accent);background:#172947}.avatar span{display:block;font-size:34px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer{text-align:left}.answer:disabled{cursor:default;opacity:.9}.feedback{margin-top:13px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.formula{border-left:4px solid var(--gold);padding:10px 12px;background:#111d30;border-radius:10px;margin-top:10px}.cn{color:#65c7ff}.trap{border-left:4px solid var(--bad);padding:10px 12px;background:#25151d;border-radius:10px;margin-top:10px}.bar{height:13px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad);transition:.3s}.monster{height:140px;display:grid;place-items:center;font-size:70px;background:#0a1728;border:1px solid var(--line);border-radius:18px;margin:12px 0}@media(max-width:720px){.worlds,.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:480px){.avatars{grid-template-columns:1fr 1fr}}
</style>
</head>
<body><div class="wrap">
<section id="login" class="card" style="max-width:620px;margin:24px auto"><span class="tag">KSSM TINGKATAN 2</span><h1>Morfologi Hunter</h1><p class="muted">World 1: Kata Ganti Nama • 15 cabaran</p><label>Nama murid<input id="name" maxlength="30" placeholder="Nama"></label><label>Pilih watak</label><div id="avatars" class="avatars"></div><button id="enter" class="btn" style="margin-top:14px">Masuk Permainan</button> <a class="btn secondary" href="sistem-bahasa-hub.html">Kembali</a></section>
<section id="map" class="hidden"><div class="top"><div><span class="tag">PETA MORFOLOGI</span><h1 id="greet"></h1><p class="muted">World lain akan dibuka selepas pembinaan题库完成。</p></div><a class="btn secondary" href="sistem-bahasa-hub.html">Sistem Bahasa Hub</a></div><div id="worldGrid" class="grid worlds" style="margin-top:15px"></div></section>
<main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 1 • KATA GANTI NAMA</span><h1 id="playerTitle"></h1></div><button id="backMap" class="btn secondary">Peta</button></div><div class="grid stats" style="margin:14px 0"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="accuracy">0%</b></div><div class="stat">Soalan<br><b id="progress">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div id="monster" class="monster">👤</div><div id="meta" class="muted"></div><h2 id="question"></h2><p id="instruction" class="muted"></p><div id="answers" class="answers"></div><div id="feedback" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main>
<section id="finish" class="card hidden"><span class="tag">WORLD SELESAI</span><h1>Keputusan World 1</h1><div id="summary"></div><div style="margin-top:14px"><button id="retry" class="btn">Main Semula</button> <button id="finishMap" class="btn secondary">Peta</button></div></section>
</div>
<script>
const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];
const WORLDS=['Kata Ganti Nama','Akronim','Kata Adjektif','Kata Kerja Transitif','Kata Ganda','Kata Terbitan','Kata Majmuk','Kata Bantu','Kata Tugas','Final Morfologi'];
const Q=[
{id:'KGN-001',skill:'Kata ganti nama diri pertama',difficulty:'Mudah',q:'“_____ akan menghantar buku ini kepada cikgu petang nanti,” kata Amir.',i:'Pilih kata ganti nama yang paling tepat.',a:['Saya','Kami','Mereka','Beliau'],c:0,e:'Amir bercakap tentang dirinya sendiri. Oleh itu, kata ganti nama diri pertama “saya” digunakan.',cn:'Amir在说自己，所以用第一人称“saya（我）”。',formula:'Orang bercakap tentang diri sendiri → saya / aku.',mnemonic:'自己说自己，用 saya。',trap:'“Kami” bermaksud saya bersama orang lain tetapi tidak termasuk pendengar.'},
{id:'KGN-002',skill:'Kami dan kita',difficulty:'Sederhana',q:'“_____ perlu menjaga kebersihan kelas bersama-sama,” kata ketua kelas kepada semua murid.',i:'Pilih jawapan yang melibatkan penutur dan pendengar.',a:['Kami','Kita','Mereka','Baginda'],c:1,e:'“Kita” merangkumi penutur dan pendengar. Ketua kelas turut mengajak semua murid.',cn:'“kita”包括说话者和听的人，班长也一起参与。',formula:'Kita = saya + kamu; kami = saya + orang lain, bukan kamu.',mnemonic:'有你有我用 kita；有我没你用 kami。',trap:'Ramai murid memilih “kami” walaupun pendengar turut terlibat.'},
{id:'KGN-003',skill:'Kami dan kita',difficulty:'Sukar',q:'“_____ telah menyiapkan projek itu. Cikgu boleh memeriksanya sekarang,” kata wakil kumpulan kepada gurunya.',i:'Pilih kata ganti nama yang tepat.',a:['Kita','Kami','Kalian','Mereka'],c:1,e:'Wakil bercakap bagi pihak kumpulannya, tetapi guru tidak termasuk dalam kumpulan tersebut. Jadi, “kami” digunakan.',cn:'代表说的是“我们这一组”，老师不包括在内，所以用 kami。',formula:'Penutur + kumpulannya, pendengar tidak termasuk → kami.',mnemonic:'我们做，老师没做，用 kami。',trap:'Jangan guna “kita” apabila pendengar tidak terlibat.'},
{id:'KGN-004',skill:'Kata ganti nama diri kedua',difficulty:'Mudah',q:'Cikgu berkata kepada Farid, “_____ mesti menyerahkan latihan ini esok.”',i:'Pilih kata ganti nama diri kedua yang sesuai.',a:['Dia','Kamu','Saya','Kami'],c:1,e:'Cikgu bercakap terus kepada Farid. “Kamu” merujuk orang yang dilawan bercakap.',cn:'老师直接对Farid说话，所以用第二人称 kamu（你）。',formula:'Orang yang sedang dilawan bercakap → kamu / anda / awak.',mnemonic:'面对谁说话，谁就是“你”。',trap:'“Dia” digunakan untuk orang yang tidak sedang dilawan bercakap.'},
{id:'KGN-005',skill:'Anda dalam situasi rasmi',difficulty:'Sederhana',q:'“Sila masukkan nombor kad pengenalan _____,” demikian arahan pada laman permohonan itu.',i:'Pilih kata ganti nama paling sesuai dalam konteks rasmi.',a:['engkau','anda','aku','beta'],c:1,e:'“Anda” sesuai digunakan dalam urusan rasmi atau umum dengan bahasa yang sopan.',cn:'正式网页或公共指示通常使用礼貌的 anda（您）。',formula:'Situasi rasmi / umum → anda.',mnemonic:'正式场合，用 anda。',trap:'“Engkau” lebih mesra atau tidak rasmi dan tidak sesuai untuk arahan rasmi.'},
{id:'KGN-006',skill:'Beliau dan dia',difficulty:'Sederhana',q:'Puan Salmah ialah pengetua sekolah kami. _____ sangat prihatin terhadap kebajikan murid.',i:'Pilih kata ganti nama yang paling santun.',a:['Ia','Beliau','Baginda','Kita'],c:1,e:'“Beliau” digunakan untuk orang yang dihormati seperti guru, pengetua atau pemimpin.',cn:'对于受尊敬的人，如校长、老师，用 beliau。',formula:'Manusia yang dihormati → beliau.',mnemonic:'尊敬的人，用 beliau。',trap:'“Baginda” khusus untuk raja atau sultan.'},
{id:'KGN-007',skill:'Ia dan dia',difficulty:'Sederhana Tinggi',q:'Kucing itu kelihatan lapar. _____ mengiau di hadapan pintu dapur.',i:'Pilih kata ganti nama yang tepat.',a:['Beliau','Baginda','Ia','Anda'],c:2,e:'“Ia” boleh digunakan untuk haiwan atau benda dalam konteks ini. “Beliau” untuk manusia yang dihormati.',cn:'这里指猫，可以用 ia；beliau只用于受尊敬的人。',formula:'Haiwan / benda yang telah disebut → ia.',mnemonic:'不是尊敬的人，别乱用 beliau。',trap:'Jangan gunakan “beliau” untuk haiwan.'},
{id:'KGN-008',skill:'Baginda',difficulty:'Mudah',q:'Sultan itu berangkat ke majlis rasmi. _____ disambut oleh para pembesar negeri.',i:'Pilih kata ganti nama khas untuk raja.',a:['Beliau','Baginda','Dia','Mereka'],c:1,e:'“Baginda” ialah kata ganti nama diri ketiga khusus untuk raja atau sultan.',cn:'Baginda专门用于国王或苏丹。',formula:'Raja / sultan → baginda.',mnemonic:'看见 Sultan，优先 Baginda。',trap:'“Beliau” sopan tetapi bukan bentuk khusus diraja.'},
{id:'KGN-009',skill:'Kata ganti nama tunjuk umum',difficulty:'Mudah',q:'“_____ ialah hadiah yang saya terima semalam,” kata Mei Ling sambil memegang sebuah jam.',i:'Pilih kata ganti nama tunjuk yang tepat.',a:['Sini','Itu','Begitu','Siapa'],c:1,e:'“Itu” digunakan untuk menunjuk benda yang agak jauh atau yang sedang dirujuk.',cn:'“itu”用于指示那个东西。',formula:'Menunjuk benda → ini / itu.',mnemonic:'这个 ini，那个 itu。',trap:'“Sini” menunjukkan tempat, bukan benda.'},
{id:'KGN-010',skill:'Kata ganti nama tunjuk tempat',difficulty:'Sederhana',q:'“Letakkan kotak itu di _____,” kata pekerja sambil menunjuk ruang berhampiran pintu.',i:'Pilih kata tunjuk tempat yang sesuai.',a:['situ','itu','ini','begini'],c:0,e:'“Situ” menunjukkan tempat yang tidak terlalu jauh daripada penutur.',cn:'situ表示“那里”，用于指地点。',formula:'Tempat → sini / situ / sana.',mnemonic:'地点三兄弟：sini、situ、sana。',trap:'“Itu” biasanya menunjuk benda, bukan mengisi frasa “di ____” untuk tempat.'},
{id:'KGN-011',skill:'Kata ganti nama tanya orang',difficulty:'Mudah',q:'“_____ yang mengetuai pasukan bola jaring sekolah?” tanya ibu.',i:'Pilih kata ganti nama tanya yang tepat.',a:['Apa','Mana','Siapa','Bila'],c:2,e:'“Siapa” digunakan untuk menanyakan orang.',cn:'询问“谁”时用 siapa。',formula:'Orang → siapa.',mnemonic:'问人 siapa，问东西 apa。',trap:'“Apa” digunakan untuk benda atau perkara.'},
{id:'KGN-012',skill:'Kata ganti nama tanya benda/perkara',difficulty:'Mudah',q:'“_____ yang terdapat di dalam bungkusan itu?” tanya adik.',i:'Pilih kata ganti nama tanya yang tepat.',a:['Siapa','Apa','Berapa','Mengapa'],c:1,e:'“Apa” digunakan untuk menanyakan benda atau perkara.',cn:'询问物品或事情用 apa。',formula:'Benda / perkara → apa.',mnemonic:'问东西，直接 apa。',trap:'Jangan guna “siapa” kerana bungkusan mengandungi benda, bukan semestinya orang.'},
{id:'KGN-013',skill:'Kata ganti nama tak tentu',difficulty:'Sederhana Tinggi',q:'_____ dibenarkan menyertai pertandingan itu asalkan memenuhi syarat yang ditetapkan.',i:'Pilih kata ganti nama tak tentu yang tepat.',a:['Apa-apa','Sesiapa','Mana-mana','Bila-bila'],c:1,e:'“Sesiapa” merujuk mana-mana orang tanpa menentukan identitinya.',cn:'sesiapa表示“任何人”，身份不特定。',formula:'Orang tidak tentu → sesiapa.',mnemonic:'任何人 sesiapa；任何东西 apa-apa。',trap:'“Mana-mana” biasanya memilih daripada tempat atau pilihan tertentu.'},
{id:'KGN-014',skill:'Kata ganti nama tak tentu benda',difficulty:'Sederhana',q:'Jangan sentuh _____ di atas meja itu tanpa kebenaran guru.',i:'Pilih kata ganti nama tak tentu yang sesuai.',a:['sesiapa','apa-apa','siapa-siapa','mana'],c:1,e:'“Apa-apa” merujuk sebarang benda atau perkara yang tidak ditentukan.',cn:'apa-apa表示“任何东西／任何事情”。',formula:'Benda tidak tentu → apa-apa.',mnemonic:'人用 sesiapa，物用 apa-apa。',trap:'“Sesiapa” hanya merujuk orang.'},
{id:'KGN-015',skill:'Analisis kata ganti nama',difficulty:'Boss',q:'“_____ akan menunggu di sini, manakala _____ boleh masuk ke dewan bersama cikgu,” kata Amir kepada rakan-rakannya.',i:'Pilih pasangan yang paling tepat. Amir tidak masuk; rakan-rakannya masuk bersama cikgu.',a:['Kami ... kita','Saya ... kamu','Kita ... mereka','Dia ... kalian'],c:1,e:'Amir merujuk dirinya dengan “saya” dan bercakap kepada rakan-rakannya menggunakan “kamu”.',cn:'Amir说自己留下，用 saya；对朋友们说“你们可以进去”，这里用 kamu。',formula:'Kenal pasti penutur dahulu, kemudian tentukan siapa pendengar.',mnemonic:'先找谁在说，再找他说给谁听。',trap:'Jangan memilih “kita” kerana Amir tidak turut masuk ke dewan.'}
];
const $=id=>document.getElementById(id);let selected=0,player='',run=null;
function show(id){['login','map','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
function renderAv(){$('avatars').innerHTML=AV.map((a,i)=>`<button class="avatar ${i===selected?'active':''}" data-a="${i}"><span>${a[1]}</span>${a[0]}</button>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{selected=+b.dataset.a;renderAv()})}
function enter(){player=$('name').value.trim();if(!player)return alert('Masukkan nama murid.');$('greet').textContent=`${AV[selected][1]} ${player}`;renderMap();show('map')}
function renderMap(){$('worldGrid').innerHTML=WORLDS.map((x,i)=>`<button class="world ${i>0?'locked':''}" data-w="${i}"><span class="tag">WORLD ${i+1}</span><h2>${i===0?'👥':'🔒'} ${x}</h2><p>${i===0?'15 soalan rasmi':'Akan dibina'}</p></button>`).join('');document.querySelector('[data-w="0"]').onclick=start}
function start(){run={idx:0,score:0,correct:0,answered:0,combo:0,locked:false};$('playerTitle').textContent=`${AV[selected][1]} ${player}`;show('game');renderQ()}
function renderQ(){run.locked=false;const q=Q[run.idx];$('meta').textContent=`${q.id} • ${q.skill} • ${q.difficulty}`;$('question').textContent=q.q;$('instruction').textContent=q.i;$('progress').textContent=`${run.idx+1}/15`;$('hp').style.width=`${100-(run.idx/15*100)}%`;$('answers').innerHTML='';q.a.forEach((text,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=text;b.addEventListener('click',()=>answer(i));$('answers').appendChild(b)});$('feedback').classList.add('hidden');$('next').classList.add('hidden');updateStats()}
function answer(n){if(run.locked)return;run.locked=true;const q=Q[run.idx],ok=n===q.c;run.answered++;if(ok){run.correct++;run.combo++;run.score+=100+run.combo*10}else run.combo=0;$('feedback').innerHTML=`<b style="color:${ok?'var(--good)':'var(--bad)'}">${ok?'Tepat!':'Belum tepat'}</b>${ok?'':`<p><b>Jawapan betul:</b> ${q.a[q.c]}</p>`}<p><b>Penjelasan BM:</b> ${q.e}</p><p class="cn"><b>华语讲解：</b> ${q.cn}</p><div class="formula"><b>Formula:</b> ${q.formula}<br><span class="cn"><b>口诀：</b> ${q.mnemonic}</span></div><div class="trap"><b>Perangkap / 常见陷阱：</b><br>${q.trap}</div>`;$('feedback').classList.remove('hidden');$('next').classList.remove('hidden');[...$('answers').children].forEach((b,i)=>{b.disabled=true;if(i===q.c)b.style.borderColor='var(--good)';if(i===n&&!ok)b.style.borderColor='var(--bad)'});updateStats()}
function updateStats(){$('score').textContent=run.score;$('combo').textContent=`x${run.combo}`;$('accuracy').textContent=run.answered?Math.round(run.correct/run.answered*100)+'%':'0%'}
function next(){run.idx++;run.idx>=Q.length?finish():renderQ()}
function finish(){const acc=Math.round(run.correct/Q.length*100);$('summary').innerHTML=`<div class="grid stats"><div class="stat">Betul<br><b>${run.correct}/15</b></div><div class="stat">Ketepatan<br><b>${acc}%</b></div><div class="stat">Skor<br><b>${run.score}</b></div><div class="stat">Status<br><b>${acc>=70?'Lulus':'Ulang Kaji'}</b></div></div><div class="feedback"><b>${acc>=70?'World 1 berjaya diselesaikan.':'Sasaran lulus ialah sekurang-kurangnya 70%.'}</b></div>`;show('finish')}
renderAv();$('enter').onclick=enter;$('backMap').onclick=()=>{renderMap();show('map')};$('finishMap').onclick=()=>{renderMap();show('map')};$('retry').onclick=start;$('next').onclick=next;
</script></body></html>
