<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sistem Bahasa Hunter Tingkatan 2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hero{text-align:center;padding:28px}.tag{display:inline-block;padding:5px 10px;border-radius:99px;background:#1c304b;color:#d6e2f1;font-size:.8rem}.muted{color:var(--muted)}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px}.module{border:1px solid var(--line);border-radius:20px;padding:22px;background:#0a1728;cursor:pointer;color:white;text-align:left;transition:.2s}.module:hover{transform:translateY(-4px);border-color:var(--good);box-shadow:0 12px 28px rgba(0,0,0,.3)}.module h2{margin:10px 0}.module strong{font-size:1.1rem}.btn{border:0;border-radius:13px;padding:12px 16px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.secondary{background:#1d314c}.viewer{display:none;margin-top:14px}.viewer.active{display:block}.viewerTop{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.frameWrap{height:calc(100vh - 115px);min-height:650px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#07111f}.frameWrap iframe{width:100%;height:100%;border:0;display:block}.note{margin-top:14px;padding:12px;border-left:4px solid var(--gold);background:#111d30;border-radius:10px}.profile{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:16px}.profile input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white}.petcard{margin-top:14px;text-align:center}.pet{font-size:78px;display:inline-block;transition:.3s}.petmeta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.petstat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:10px}@media(max-width:760px){.choices{grid-template-columns:1fr}.hero{padding:20px 14px}.frameWrap{height:calc(100vh - 105px);min-height:580px}.viewerTop{align-items:flex-start;flex-direction:column}.profile{grid-template-columns:1fr}.petmeta{grid-template-columns:1fr 1fr}}</style></head><body><div class="wrap"><section id="portal"><div class="card hero"><span class="tag">KSSM TINGKATAN 2</span><h1>Sistem Bahasa Hunter</h1><p class="muted">Satu laman web untuk empat modul utama. Tiada lock — murid bebas memilih latihan.</p><div class="profile"><input id="studentName" placeholder="Masukkan nama murid untuk memulihkan pet"><button class="btn" onclick="loadProfile()">Lihat Pet Saya</button></div><div id="petCard" class="card petcard" style="display:none"><div id="pet" class="pet">🥚</div><h2 id="petOwner"></h2><p id="petStatus" class="muted"></p><div class="petmeta"><div class="petstat">Tahap<br><b id="petLevel">1</b></div><div class="petstat">XP<br><b id="petXp">0</b></div><div class="petstat">Betul<br><b id="petCorrect">0</b></div><div class="petstat">Salah<br><b id="petWrong">0</b></div></div></div></div><div class="choices"><button class="module" onclick="openModule('v16.html','Sintaksis Hunter','sintaksis')"><span class="tag">MODUL A</span><h2>⚔️ Sintaksis Hunter</h2><strong>10 World • 150 soalan</strong><p class="muted">Subjek dan predikat, pola ayat, jenis ayat, susunan biasa dan songsang, aktif-pasif, transformasi dan analisis.</p></button><button class="module" onclick="openModule('morfologi-hub.html','Morfologi Hunter','morfologi')"><span class="tag">MODUL B</span><h2>🧩 Morfologi Hunter</h2><strong>10 World • 150 soalan</strong><p class="muted">Kata ganti nama, akronim, kata adjektif, kata kerja transitif, kata ganda, kata terbitan, kata majmuk, kata bantu dan kata tugas.</p></button><button class="module" onclick="openModule('ejaan-hunter.html','Kesalahan Ejaan Hunter','ejaan')"><span class="tag">MODUL C</span><h2>✍️ Kesalahan Ejaan Hunter</h2><strong>15 soalan interaktif</strong><p class="muted">di-/di, ke-/ke, kata ganda, kata majmuk, imbuhan, kata pinjaman, huruf besar dan tanda baca.</p></button><button class="module" onclick="openModule('kesalahan-bahasa-hunter.html','Kesalahan Bahasa Hunter','bahasa')"><span class="tag">MODUL D</span><h2>🛠️ Kesalahan Bahasa Hunter</h2><strong>15 soalan interaktif</strong><p class="muted">Kata sendi, kata nafi, kata pemeri, kata bilangan, imbuhan, frasa, struktur ayat dan pembetulan gramatis.</p></button></div><div class="note"><b>Pet System：</b> 答对宠物成长，答错宠物变小。学生下次输入同一个名字，即可恢复自己的宠物记录。</div></section><section id="viewer" class="viewer"><div class="viewerTop"><div><span class="tag">SISTEM BAHASA HUNTER</span><h2 id="moduleTitle" style="margin:6px 0"></h2></div><button class="btn secondary" onclick="backPortal()">← Pilih Modul / 选择模块</button></div><div class="frameWrap"><iframe id="moduleFrame" title="Sistem Bahasa Hunter"></iframe></div></section></div><script>const portal=document.getElementById('portal'),viewer=document.getElementById('viewer'),frame=document.getElementById('moduleFrame'),title=document.getElementById('moduleTitle');const stages=['🥚','🐣','🐥','🐤','🦊','🐉'];function petKey(n){return 'sbh-pet-'+n.trim().toLowerCase().replace(/\s+/g,'-')}function loadProfile(){const n=document.getElementById('studentName').value.trim();if(!n)return alert('Masukkan nama murid.');const p=JSON.parse(localStorage.getItem(petKey(n)))||{name:n,xp:0,correct:0,wrong:0,plays:0};const level=Math.max(0,Math.min(stages.length-1,Math.floor(p.xp/5)));document.getElementById('pet').textContent=stages[level];document.getElementById('pet').style.transform='scale('+(0.75+Math.min(0.75,p.xp*0.025))+')';document.getElementById('petOwner').textContent=n+' punya pet';document.getElementById('petStatus').textContent=p.plays?'Rekod ditemui. Selamat kembali!':'Pet baharu telah dicipta.';document.getElementById('petLevel').textContent=level+1;document.getElementById('petXp').textContent=p.xp;document.getElementById('petCorrect').textContent=p.correct;document.getElementById('petWrong').textContent=p.wrong;document.getElementById('petCard').style.display='block';localStorage.setItem(petKey(n),JSON.stringify(p))}function openModule(src,name,hash){portal.style.display='none';viewer.classList.add('active');title.textContent=name;frame.src=src;history.replaceState(null,'','#'+hash);window.scrollTo(0,0)}function backPortal(){frame.src='about:blank';viewer.classList.remove('active');portal.style.display='block';history.replaceState(null,'',location.pathname);window.scrollTo(0,0)}const routes={sintaksis:['v16.html','Sintaksis Hunter'],morfologi:['morfologi-hub.html','Morfologi Hunter'],ejaan:['ejaan-hunter.html','Kesalahan Ejaan Hunter'],bahasa:['kesalahan-bahasa-hunter.html','Kesalahan Bahasa Hunter']};const key=location.hash.replace('#','');if(routes[key])openModule(routes[key][0],routes[key][1],key);</script></body></html>
