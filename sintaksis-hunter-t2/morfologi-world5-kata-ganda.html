<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 5</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.avatar{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.avatar{background:#0b1930;border:1px solid var(--line)}.avatar.active{border:2px solid var(--accent)}.avatar span{display:block;font-size:32px}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad)}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 5</span><h1>Kata Ganda</h1><p class="muted">15 cabaran • penuh, separa dan berentak</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 5 • KATA GANDA</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">🪞</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World 5 Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KG-001',s:'Kata ganda penuh',d:'Mudah',q:'Pilih kata ganda penuh.',i:'Cari perkataan yang diulang seluruhnya.',a:['rumah-rumah','jejari','kuih-muih','dedaun'],c:0,e:'“Rumah-rumah” menggandakan seluruh kata dasar rumah.',cn:'rumah-rumah把整个词重复，所以是完全重叠词。',f:'Kata dasar + kata dasar.',m:'整词重复，就是 ganda penuh。',t:'“Dedaun” ialah kata ganda separa.'},
{id:'KG-002',s:'Kata ganda separa',d:'Mudah',q:'Pilih kata ganda separa.',i:'Cari perkataan yang hanya menggandakan sebahagian kata dasar.',a:['buku-buku','lelaki','sayur-mayur','anak-anak'],c:1,e:'“Lelaki” terbentuk melalui penggandaan sebahagian kata dasar “laki”.',cn:'lelaki只重复部分音节，所以是部分重叠词。',f:'Sebahagian kata dasar digandakan.',m:'只重复一部分，就是 separa。',t:'Jangan pilih semua perkataan yang mempunyai suku kata berulang.'},
{id:'KG-003',s:'Kata ganda berentak',d:'Mudah',q:'Pilih kata ganda berentak.',i:'Cari pasangan bunyi yang berima atau berubah.',a:['murid-murid','kuih-muih','pepohon','kereta-kereta'],c:1,e:'“Kuih-muih” mempunyai perubahan bunyi yang berentak.',cn:'kuih-muih的声音有规律变化，所以是韵律重叠词。',f:'Kata dasar + pasangan bunyi berentak.',m:'声音有节奏变化，用 berentak。',t:'Tidak semua kata bersengkang ialah kata ganda berentak.'},
{id:'KG-004',s:'Ejaan kata ganda',d:'Sederhana',q:'Pilih ejaan yang betul.',i:'Fokus pada penggunaan tanda sempang.',a:['murid murid','murid2','murid-murid','murid—murid'],c:2,e:'Kata ganda penuh dieja dengan tanda sempang.',cn:'完全重叠词要用连字符。',f:'Kata ganda penuh → tanda sempang.',m:'重复两次，中间一横。',t:'Angka “2” tidak digunakan dalam penulisan standard.'},
{id:'KG-005',s:'Makna jamak',d:'Sederhana',q:'Semua _____ diminta beratur di luar dewan.',i:'Pilih kata yang gramatis.',a:['murid-murid','para murid-murid','murid para','para-para murid'],c:0,e:'“Murid-murid” sudah membawa makna jamak. “Para murid-murid” ialah penggandaan jamak.',cn:'murid-murid已经表示复数，不能再加 para。',f:'Satu penanda jamak sahaja.',m:'有 para 不重叠；有重叠不用 para。',t:'Elakkan dua penanda jamak dalam satu frasa.'},
{id:'KG-006',s:'Kata ganda separa berimbuhan',d:'Sederhana Tinggi',q:'Pilih kata ganda separa berimbuhan.',i:'Kenal pasti perkataan yang menerima imbuhan.',a:['dedaun','berlari-lari','pepohon','lelaki'],c:1,e:'“Berlari-lari” ialah kata ganda yang menerima imbuhan ber-.',cn:'berlari-lari带有 ber- 词缀，是带词缀的重叠词。',f:'Imbuhan + kata ganda.',m:'有词缀又重复，就是 berimbuhan。',t:'“Dedaun” dan “pepohon” ialah kata ganda separa tanpa imbuhan tambahan.'},
{id:'KG-007',s:'Kata ganda berentak vokal',d:'Sukar',q:'Pilih kata ganda berentak pengulangan vokal.',i:'Perhatikan perubahan bunyi vokal.',a:['sayur-mayur','lauk-pauk','gunung-ganang','saudara-mara'],c:1,e:'“Lauk-pauk” menunjukkan persamaan dan perubahan bunyi vokal.',cn:'lauk-pauk主要呈现元音韵律变化。',f:'Berentak vokal → pola vokal berkaitan.',m:'看元音节奏。',t:'Jenis berentak ditentukan melalui pola bunyi, bukan makna sahaja.'},
{id:'KG-008',s:'Kata ganda berentak konsonan',d:'Sukar',q:'Pilih kata ganda berentak pengulangan konsonan.',i:'Perhatikan bunyi konsonan yang berulang.',a:['gunung-ganang','lauk-pauk','kuih-muih','hingar-bingar'],c:3,e:'“Hingar-bingar” mengekalkan rentak konsonan yang jelas.',cn:'hingar-bingar有明显的辅音韵律。',f:'Berentak konsonan → bunyi konsonan sepadan.',m:'看辅音重复。',t:'Jangan meneka berdasarkan tanda sempang sahaja.'},
{id:'KG-009',s:'Makna kata ganda',d:'Sederhana Tinggi',q:'Budak itu berjalan _____ kerana kakinya sakit.',i:'Pilih kata ganda yang paling tepat.',a:['perlahan-lahan','rumah-rumah','sayur-mayur','pepohon'],c:0,e:'“Perlahan-lahan” menerangkan cara berjalan.',cn:'perlahan-lahan说明走路的方式：慢慢地。',f:'Kata ganda boleh membawa maksud cara.',m:'问“怎样做”，找方式。',t:'Jangan anggap semua kata ganda hanya bermaksud banyak.'},
{id:'KG-010',s:'Kata ganda semu',d:'Sukar',q:'Pilih perkataan yang mesti hadir dalam bentuk berganda dan tidak membawa maksud jamak.',i:'Cari kata ganda semu.',a:['kanak-kanak','buku-buku','rumah-rumah','murid-murid'],c:0,e:'“Kanak-kanak” ialah kata ganda semu dan merujuk golongan budak.',cn:'kanak-kanak是固定形式，不是简单表示“很多”。',f:'Bentuk berganda tetapi dianggap satu makna khusus.',m:'固定双词，不一定是复数。',t:'Jangan ubah “kanak-kanak” menjadi “kanak”.'},
{id:'KG-011',s:'Membetulkan kesalahan',d:'Sukar',q:'Pilih ayat yang gramatis.',i:'Semak penggunaan penanda jamak.',a:['Para peserta-peserta sedang menunggu.','Semua peserta-peserta sedang menunggu.','Peserta-peserta sedang menunggu.','Setiap peserta-peserta sedang menunggu.'],c:2,e:'“Peserta-peserta” sudah cukup menunjukkan jamak.',cn:'peserta-peserta本身已经表示复数。',f:'Elakkan para/semua/setiap + kata ganda jamak.',m:'复数标记只用一个。',t:'“Setiap” membawa maksud satu demi satu, bukan jamak berganda.'},
{id:'KG-012',s:'Kata ganda dalam ayat',d:'Sederhana',q:'Ibu membeli _____ di pasar malam.',i:'Pilih kata ganda yang sesuai.',a:['kuih-muih','dedaun','lelaki','berlari-lari'],c:0,e:'“Kuih-muih” merujuk pelbagai jenis kuih.',cn:'kuih-muih表示各种糕点。',f:'Berentak boleh membawa maksud pelbagai jenis.',m:'种类很多，用 berentak。',t:'Pilih berdasarkan konteks ayat.'},
{id:'KG-013',s:'Kata ganda separa',d:'Sukar',q:'Pilih pasangan yang kedua-duanya kata ganda separa.',i:'Analisis bentuk perkataan.',a:['dedaun dan pepohon','rumah-rumah dan buku-buku','kuih-muih dan lauk-pauk','kanak-kanak dan murid-murid'],c:0,e:'“Dedaun” dan “pepohon” menggandakan sebahagian kata dasar.',cn:'dedaun和pepohon都属于部分重叠。',f:'Separa → hanya sebahagian bunyi diulang.',m:'不是整词重复。',t:'Jangan tertipu oleh kata yang tiada tanda sempang.'},
{id:'KG-014',s:'Perubahan makna',d:'Boss',q:'Pilih ayat yang menggunakan kata ganda untuk menunjukkan perbuatan berulang.',i:'Cari maksud tindakan dilakukan berkali-kali.',a:['Burung-burung terbang di langit.','Dia mengetuk-ngetuk pintu itu.','Ibu membeli kuih-muih.','Kanak-kanak bermain di taman.'],c:1,e:'“Mengetuk-ngetuk” menunjukkan perbuatan mengetuk dilakukan berulang kali.',cn:'mengetuk-ngetuk表示反复敲门。',f:'Kata kerja ganda → perbuatan berulang.',m:'动作重复，动词也重复。',t:'Kata nama ganda biasanya menunjukkan banyak atau pelbagai.'},
{id:'KG-015',s:'Analisis lengkap',d:'Final Boss',q:'Pilih analisis paling tepat bagi perkataan “berlari-lari”.',i:'Tentukan jenis, imbuhan dan makna.',a:['Kata ganda penuh tanpa imbuhan; bermaksud banyak orang.','Kata ganda berentak; bermaksud pelbagai jenis larian.','Kata ganda berimbuhan; bermaksud perbuatan dilakukan berulang atau tanpa tujuan khusus.','Kata ganda separa; bermaksud seorang pelari.'],c:2,e:'“Berlari-lari” menerima imbuhan ber- dan menunjukkan perbuatan berlari secara berulang atau santai.',cn:'berlari-lari带有ber-，表示反复或随意地跑。',f:'ber- + kata kerja ganda.',m:'有 ber-，动作重复。',t:'Jangan hanya melihat tanda sempang; analisis imbuhan dan makna.'}
];const $=id=>document.getElementById(id);let sel=0,player='',run=null;function show(id){['login','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function av(){ $('avatars').innerHTML=AV.map((x,i)=>`<button class="avatar ${i===sel?'active':''}" data-i="${i}"><span>${x[1]}</span>${x[0]}</button>`).join('');document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{sel=+b.dataset.i;av()})}function start(){player=$('name').value.trim()||player;if(!player)return alert('Masukkan nama murid.');run={idx:0,score:0,correct:0,answered:0,combo:0,locked:false};$('player').textContent=`${AV[sel][1]} ${player}`;show('game');render()}function render(){run.locked=false;const x=Q[run.idx];$('meta').textContent=`${x.id} • ${x.s} • ${x.d}`;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=`${run.idx+1}/15`;$('hp').style.width=`${100-run.idx/15*100}%`;$('ans').innerHTML='';x.a.forEach((v,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=v;b.onclick=()=>answer(i);$('ans').appendChild(b)});$('fb').classList.add('hidden');$('next').classList.add('hidden');stats()}function answer(n){if(run.locked)return;run.locked=true;const x=Q[run.idx],ok=n===x.c;run.answered++;if(ok){run.correct++;run.combo++;run.score+=100+run.combo*10}else run.combo=0;$('fb').innerHTML=`<b style="color:${ok?'var(--good)':'var(--bad)'}">${ok?'Tepat!':'Belum tepat'}</b>${ok?'':`<p><b>Jawapan betul:</b> ${x.a[x.c]}</p>`}<p><b>Penjelasan BM:</b> ${x.e}</p><p class="cn"><b>华语讲解：</b> ${x.cn}</p><div class="formula"><b>Formula:</b> ${x.f}<br><span class="cn"><b>口诀：</b> ${x.m}</span></div><div class="trap"><b>Perangkap / 常见陷阱：</b><br>${x.t}</div>`;$('fb').classList.remove('hidden');$('next').classList.remove('hidden');[...$('ans').children].forEach((b,i)=>{b.disabled=true;if(i===x.c)b.style.borderColor='var(--good)';if(i===n&&!ok)b.style.borderColor='var(--bad)'});stats()}function stats(){$('score').textContent=run.score;$('combo').textContent=`x${run.combo}`;$('acc').textContent=run.answered?Math.round(run.correct/run.answered*100)+'%':'0%'}function next(){run.idx++;run.idx>=Q.length?finish():render()}function finish(){const a=Math.round(run.correct/15*100);$('summary').innerHTML=`<div class="grid stats"><div class="stat">Betul<br><b>${run.correct}/15</b></div><div class="stat">Ketepatan<br><b>${a}%</b></div><div class="stat">Skor<br><b>${run.score}</b></div><div class="stat">Status<br><b>${a>=70?'Lulus':'Ulang Kaji'}</b></div></div>`;show('finish')}av();$('enter').onclick=start;$('retry').onclick=start;$('next').onclick=next;</script></body></html>
