<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 4</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.avatar{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.avatar{background:#0b1930;border:1px solid var(--line)}.avatar.active{border:2px solid var(--accent)}.avatar span{display:block;font-size:32px}.stats{grid-template-columns:repeat(5,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}.petbox{text-align:center;background:#0a1728;border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0}.pet{font-size:72px;display:inline-block;transition:.3s}.petname{font-weight:800}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad)}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 4</span><h1>Kata Kerja Transitif</h1><p class="muted">15 cabaran • jawab betul untuk membesarkan haiwan peliharaan anda</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="morfologi-hub.html">Peta</a></p><div id="returning" class="feedback hidden"></div></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 4 • KATA KERJA TRANSITIF</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div><div class="stat">Tahap Pet<br><b id="petLevel">1</b></div></div><section class="card"><div class="petbox"><div id="pet" class="pet">🥚</div><div class="petname" id="petText"></div><div class="muted" id="petGrowth"></div></div><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">⚔️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World 4 Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KKT-001',s:'Kata kerja transitif',d:'Mudah',q:'Ibu sedang memasak nasi di dapur.',i:'Pilih kata kerja transitif.',a:['sedang','memasak','nasi','di'],c:1,e:'“Memasak” memerlukan objek “nasi”.',cn:'memasak 后面需要宾语 nasi。',f:'KKT + objek.',m:'动作后问“什么”。',t:'Jangan pilih kata bantu “sedang”.'},
{id:'KKT-002',s:'Objek',d:'Mudah',q:'Farid membaca novel itu setiap malam.',i:'Apakah objek?',a:['Farid','novel itu','setiap malam','membaca'],c:1,e:'“Novel itu” menerima perbuatan membaca.',cn:'被阅读的是 novel itu。',f:'Pelaku + KKT + objek.',m:'谁做，什么被做。',t:'“Setiap malam” ialah keterangan masa.'},
{id:'KKT-003',s:'Tak transitif',d:'Sederhana',q:'Pilih ayat tanpa kata kerja transitif.',i:'Pilih jawapan.',a:['Aina menulis surat.','Murid-murid berlari di padang.','Ayah membaiki basikal.','Guru memuji Hassan.'],c:1,e:'“Berlari” tidak memerlukan objek.',cn:'berlari 不需要宾语。',f:'Lengkap tanpa objek = tak transitif.',m:'动作自己完整。',t:'“Di padang” ialah keterangan.'},
{id:'KKT-004',s:'Imbuhan meN-',d:'Sederhana',q:'Kakak _____ kain itu dengan gunting.',i:'Pilih bentuk gramatis.',a:['potong','memotong','terpotong','berpotong'],c:1,e:'Ayat aktif transitif lazimnya menggunakan meN-.',cn:'主动及物动词通常用 meN-。',f:'meN- + objek.',m:'主动做，用 meN-。',t:'“Terpotong” bermakna tidak sengaja.'},
{id:'KKT-005',s:'Imbuhan memper-',d:'Sederhana',q:'Pihak sekolah akan _____ peraturan keselamatan.',i:'Pilih jawapan.',a:['memperketat','diperketat','ketat','berketat'],c:0,e:'Pelaku di hadapan memerlukan bentuk aktif “memperketat”.',cn:'主语在前，用 memperketat。',f:'Pelaku + memper- + objek.',m:'谁做放前面。',t:'“Diperketat” ialah pasif.'},
{id:'KKT-006',s:'Ayat pasif',d:'Sukar',q:'Pengawas menutup pintu pagar itu.',i:'Pilih ayat pasif.',a:['Pintu pagar itu ditutup oleh pengawas.','Pengawas ditutup oleh pintu pagar itu.','Pintu pagar itu menutup pengawas.','Oleh pengawas menutup pintu pagar itu.'],c:0,e:'Objek dipindahkan ke hadapan dan kata kerja menjadi “ditutup”.',cn:'宾语前移，动词换成 di-。',f:'Objek + di- + oleh pelaku.',m:'宾语前移，换 di-。',t:'Jangan kekalkan meN-.'},
{id:'KKT-007',s:'Objek dan keterangan',d:'Sukar',q:'Pasukan itu mendaki gunung pada awal pagi.',i:'Apakah objek?',a:['Pasukan itu','mendaki','gunung','pada awal pagi'],c:2,e:'“Gunung” ialah sasaran perbuatan mendaki.',cn:'被攀登的是 gunung。',f:'Mendaki apa? Gunung.',m:'动词后问什么。',t:'Awal pagi ialah masa.'},
{id:'KKT-008',s:'Dua objek',d:'Sukar',q:'Cikgu menghadiahi Amin sebuah buku.',i:'Pilih analisis tepat.',a:['Amin objek tepat, buku objek sipi.','Buku objek tepat, Amin objek sipi.','Tiada objek.','Kedua-duanya keterangan.'],c:0,e:'“Menghadiahi” diikuti penerima kemudian benda.',cn:'先接受者 Amin，再物品 buku。',f:'menghadiahi seseorang sesuatu.',m:'人先，物后。',t:'Ada dua objek.'},
{id:'KKT-009',s:'Pembetulan',d:'Sukar',q:'Pilih ayat gramatis.',i:'Fokus pada “membincangkan”.',a:['Dia membincangkan tentang masalah itu.','Dia membincangkan masalah itu.','Dia berbincangkan masalah itu.','Dia bincang tentang masalah itu.'],c:1,e:'“Membincangkan” terus diikuti objek.',cn:'membincangkan 后直接接宾语。',f:'membincangkan + objek.',m:'有 -kan，不要 tentang。',t:'Jangan campur dua pola.'},
{id:'KKT-010',s:'Memberi',d:'Sukar',q:'Pilih ayat betul.',i:'Bezakan susunan objek.',a:['Ibu memberikan adik hadiah.','Ibu memberi hadiah kepada adik.','Ibu memberi kepada adik hadiah.','Ibu memberikan kepada adik.'],c:1,e:'“Memberi” diikuti benda kemudian penerima dengan “kepada”.',cn:'先物品，再 kepada + 接收者。',f:'memberi sesuatu kepada seseorang.',m:'给什么，再给谁。',t:'Susunan mesti lengkap.'},
{id:'KKT-011',s:'Apitan',d:'Sederhana',q:'Kerajaan sedang _____ kempen kebersihan.',i:'Pilih jawapan.',a:['melancarkan','dilancarkan','pelancaran','berlancar'],c:0,e:'“Melancarkan” ialah kata kerja transitif aktif.',cn:'melancarkan 是主动及物动词。',f:'meN-...-kan + objek.',m:'主动发动，用 melancarkan。',t:'“Pelancaran” ialah kata nama.'},
{id:'KKT-012',s:'Pasif diri pertama',d:'Sukar',q:'Saya telah menyiapkan tugasan itu.',i:'Pilih ayat pasif betul.',a:['Tugasan itu telah disiapkan oleh saya.','Tugasan itu telah saya siapkan.','Saya telah tugasan itu siapkan.','Tugasan itu saya telah disiapkan.'],c:1,e:'Pasif diri pertama menggunakan kata ganti sebelum kata kerja dasar.',cn:'第一人称被动不用 di-。',f:'Objek + telah + saya + kata dasar.',m:'我你被动，不加 di-。',t:'Jangan guna di- selepas saya.'},
{id:'KKT-013',s:'Pasif diri kedua',d:'Sukar',q:'Kamu mesti menghantar borang itu hari ini.',i:'Pilih bentuk pasif.',a:['Borang itu mesti dihantar oleh kamu.','Borang itu mesti kamu hantar.','Kamu mesti borang itu dihantar.','Borang itu kamu mesti dihantarkan.'],c:1,e:'Kata ganti diri kedua hadir sebelum kata kerja dasar.',cn:'kamu 放在动词原形前。',f:'Objek + mesti + kamu + kata dasar.',m:'你被动，也不加 di-。',t:'Jangan tambah di-.'},
{id:'KKT-014',s:'Objek hilang',d:'Boss',q:'Pilih ayat tidak gramatis.',i:'Cari kata kerja transitif tanpa objek.',a:['Murid itu sedang menyalin nota.','Ayah sedang mencuci.','Polis menahan suspek.','Kami menyusun kerusi.'],c:1,e:'“Mencuci” memerlukan objek dalam ayat lengkap.',cn:'mencuci 需要说明洗什么。',f:'KKT mesti ada objek.',m:'及物动词不能丢宾语。',t:'Ayat pendek belum tentu lengkap.'},
{id:'KKT-015',s:'Analisis lengkap',d:'Final Boss',q:'“Laporan itu telah kami serahkan kepada pengetua semalam.”',i:'Pilih analisis tepat.',a:['Ayat aktif; serahkan tak transitif.','Ayat pasif diri pertama; serahkan transitif; laporan itu objek asal.','Ayat pasif diri ketiga; pengetua objek tepat.','Ayat songsang tanpa objek.'],c:1,e:'“Kami” mendahului kata kerja dasar dalam pasif diri pertama.',cn:'kami + serahkan 是第一人称被动结构。',f:'Objek + kata bantu + kami + kata dasar.',m:'看到 kami + kata dasar，想 pasif diri pertama。',t:'“Kepada pengetua” bukan objek tepat.'}
];let ai=0,idx=0,score=0,combo=0,correct=0,locked=false,student='',petData=null;const $=x=>document.getElementById(x);const petStages=['🥚','🐣','🐥','🐤','🦊','🐉'];function petKey(n){return 'sbh-pet-'+n.trim().toLowerCase().replace(/\s+/g,'-')}function loadPet(n){return JSON.parse(localStorage.getItem(petKey(n)))||{name:n,xp:0,correct:0,wrong:0,plays:0}}function savePet(){localStorage.setItem(petKey(student),JSON.stringify(petData))}function petStage(){return Math.max(0,Math.min(petStages.length-1,Math.floor(petData.xp/5)))}function renderPet(msg=''){const st=petStage();$('pet').textContent=petStages[st];$('pet').style.transform='scale('+(0.75+Math.min(0.75,petData.xp*0.025))+')';$('petLevel').textContent=st+1;$('petText').textContent=student+' punya pet';$('petGrowth').textContent=msg||('XP '+petData.xp+' • Betul '+petData.correct+' • Salah '+petData.wrong)}AV.forEach((v,i)=>{const b=document.createElement('button');b.className='avatar';b.innerHTML='<span>'+v[1]+'</span>'+v[0];b.onclick=()=>{ai=i;document.querySelectorAll('.avatar').forEach(x=>x.classList.remove('active'));b.classList.add('active')};$('avatars').appendChild(b)});document.querySelector('.avatar').classList.add('active');$('name').addEventListener('input',()=>{const n=$('name').value.trim();if(!n)return $('returning').classList.add('hidden');const p=loadPet(n);$('returning').innerHTML='<b>Rekod dijumpai:</b> '+petStages[Math.max(0,Math.min(5,Math.floor(p.xp/5)))]+' XP '+p.xp+' • Betul '+p.correct+' • Salah '+p.wrong;$('returning').classList.remove('hidden')});$('enter').onclick=()=>{student=$('name').value.trim()||'Murid';petData=loadPet(student);petData.plays++;savePet();$('player').textContent=AV[ai][1]+' '+student;$('login').classList.add('hidden');$('game').classList.remove('hidden');renderPet('Selamat kembali! Pet anda telah dipulihkan.');render()};function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s+' • '+x.d;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('hp').style.width=((15-idx)/15*100)+'%';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;petData.xp+=2;petData.correct++;b.style.borderColor='var(--good)';renderPet('Betul! Pet membesar +2 XP.')}else{combo=0;petData.xp=Math.max(0,petData.xp-1);petData.wrong++;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)';renderPet('Salah. Pet mengecil -1 XP. Cuba lagi pada soalan seterusnya.')}savePet();$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('summary').innerHTML='<h2>'+petStages[petStage()]+' Pet Tahap '+(petStage()+1)+'</h2><p>Skor: '+score+'</p><p>Betul: '+correct+'/15</p><p>Ketepatan: '+Math.round(correct/15*100)+'%</p><p>Jumlah XP pet: '+petData.xp+'</p>'} $('retry').onclick=()=>location.reload();</script></body></html>
