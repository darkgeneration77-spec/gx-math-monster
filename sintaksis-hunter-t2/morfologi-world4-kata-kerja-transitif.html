<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 4</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.avatar{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.avatar{background:#0b1930;border:1px solid var(--line)}.avatar.active{border:2px solid var(--accent)}.avatar span{display:block;font-size:32px}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad)}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 4</span><h1>Kata Kerja Transitif</h1><p class="muted">15 cabaran • objek, imbuhan dan ayat pasif</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 4 • KATA KERJA TRANSITIF</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">⚔️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World 4 Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KKT-001',s:'Mengenal pasti kata kerja transitif',d:'Mudah',q:'Ibu sedang memasak nasi di dapur.',i:'Pilih kata kerja transitif.',a:['sedang','memasak','nasi','di'],c:1,e:'“Memasak” memerlukan objek “nasi”.',cn:'memasak 后面需要宾语 nasi，所以是及物动词。',f:'Kata kerja transitif + objek.',m:'动作后面能接“什么”，就是 transitif。',t:'Jangan pilih kata bantu “sedang”.'},
{id:'KKT-002',s:'Objek tepat',d:'Mudah',q:'Farid membaca novel itu setiap malam.',i:'Apakah objek bagi kata kerja “membaca”?',a:['Farid','novel itu','setiap malam','membaca'],c:1,e:'Objek menerima perbuatan membaca, iaitu “novel itu”.',cn:'被“阅读”的是 novel itu，因此它是宾语。',f:'Pelaku + kata kerja transitif + objek.',m:'谁做动作，什么被做。',t:'“Setiap malam” ialah keterangan masa.'},
{id:'KKT-003',s:'Kata kerja tak transitif',d:'Sederhana',q:'Pilih ayat yang tidak mengandungi kata kerja transitif.',i:'Pilih jawapan paling tepat.',a:['Aina menulis surat.','Murid-murid berlari di padang.','Ayah membaiki basikal.','Guru memuji Hassan.'],c:1,e:'“Berlari” tidak memerlukan objek.',cn:'berlari 不需要宾语，因此是不及物动词。',f:'Jika kata kerja lengkap tanpa objek → tak transitif.',m:'动作自己完整，不需“什么”。',t:'Frasa “di padang” ialah keterangan tempat, bukan objek.'},
{id:'KKT-004',s:'Imbuhan meN-',d:'Sederhana',q:'Kakak _____ kain itu dengan gunting.',i:'Pilih kata kerja transitif yang gramatis.',a:['potong','memotong','terpotong','berpotong'],c:1,e:'Kata kerja aktif transitif lazimnya menerima imbuhan meN-.',cn:'主动及物动词通常使用 meN-，所以是 memotong。',f:'Ayat aktif transitif: meN- + objek.',m:'主动做动作，常见 meN-。',t:'“Terpotong” membawa makna tidak sengaja atau sudah terpotong.'},
{id:'KKT-005',s:'Imbuhan memper-',d:'Sederhana Tinggi',q:'Pihak sekolah akan _____ peraturan keselamatan.',i:'Pilih kata kerja yang tepat.',a:['memperketat','diperketat','ketat','berketat'],c:0,e:'“Memperketat” ialah kata kerja aktif transitif dan diikuti objek “peraturan keselamatan”.',cn:'memperketat 后面接宾语 peraturan keselamatan。',f:'Pelaku di depan → memper-; objek di depan → diper-.',m:'谁做放前面，用 memper-。',t:'“Diperketat” ialah bentuk pasif.'},
{id:'KKT-006',s:'Ayat pasif',d:'Sukar',q:'Pengawas menutup pintu pagar itu.',i:'Pilih ayat pasif yang betul.',a:['Pintu pagar itu ditutup oleh pengawas.','Pengawas ditutup oleh pintu pagar itu.','Pintu pagar itu menutup pengawas.','Oleh pengawas menutup pintu pagar itu.'],c:0,e:'Objek asal dipindahkan ke hadapan dan kata kerja berubah kepada “ditutup”.',cn:'原宾语移到前面，mem- 变成 di-。',f:'Aktif: Pelaku + meN- + objek → Pasif: Objek + di- + oleh pelaku.',m:'宾语前移，动词换 di-。',t:'Jangan kekalkan kata kerja aktif selepas objek dipindahkan.'},
{id:'KKT-007',s:'Objek dan keterangan',d:'Sukar',q:'Pasukan itu mendaki gunung pada awal pagi.',i:'Apakah objek dalam ayat ini?',a:['Pasukan itu','mendaki','gunung','pada awal pagi'],c:2,e:'“Gunung” menjadi sasaran perbuatan mendaki.',cn:'被攀登的是 gunung，所以它是宾语。',f:'Tanya “mendaki apa?” → gunung.',m:'动词后问“什么”。',t:'“Pada awal pagi” ialah keterangan masa.'},
{id:'KKT-008',s:'Dua objek',d:'Sukar',q:'Cikgu menghadiahi Amin sebuah buku.',i:'Pilih analisis yang tepat.',a:['Amin ialah objek tepat, sebuah buku objek sipi.','Sebuah buku ialah objek tepat, Amin objek sipi.','Tiada objek.','Kedua-duanya keterangan.'],c:0,e:'Kata kerja “menghadiahi” diikuti penerima dahulu, kemudian benda.',cn:'menghadiahi 后面先是接受者 Amin，再是物品 buku。',f:'menghadiahi seseorang sesuatu.',m:'给某人某物：人先，物后。',t:'Jangan anggap semua frasa selepas kata kerja ialah satu objek sahaja.'},
{id:'KKT-009',s:'Membetulkan ayat',d:'Sukar',q:'Pilih ayat yang gramatis.',i:'Fokus pada penggunaan kata kerja transitif.',a:['Dia membincangkan tentang masalah itu.','Dia membincangkan masalah itu.','Dia berbincangkan masalah itu.','Dia bincang tentang masalah itu.'],c:1,e:'“Membincangkan” terus diikuti objek tanpa kata sendi “tentang”.',cn:'membincangkan 后面直接接宾语，不需要 tentang。',f:'membincangkan + objek; berbincang tentang + perkara.',m:'有 -kan，直接接宾语。',t:'Jangan campur “membincangkan” dengan “tentang”.'},
{id:'KKT-010',s:'Membetulkan ayat',d:'Sukar',q:'Pilih ayat yang betul.',i:'Bezakan “memberi” dan “memberikan”.',a:['Ibu memberikan adik hadiah.','Ibu memberi hadiah kepada adik.','Ibu memberi kepada adik hadiah.','Ibu memberikan kepada adik.'],c:1,e:'“Memberi” boleh diikuti benda, kemudian penerima dengan “kepada”.',cn:'memberi 后接物品，再用 kepada 接收者。',f:'memberi sesuatu kepada seseorang.',m:'给什么，再给谁。',t:'Susunan objek mesti jelas dan lengkap.'},
{id:'KKT-011',s:'Kata kerja berapitan',d:'Sederhana Tinggi',q:'Kerajaan sedang _____ kempen kebersihan di seluruh negara.',i:'Pilih jawapan yang paling tepat.',a:['melancarkan','dilancarkan','pelancaran','berlancar'],c:0,e:'“Melancarkan” ialah kata kerja transitif dan menerima objek “kempen kebersihan”.',cn:'melancarkan 是及物动词，后面接宾语 kempen。',f:'meN-...-kan + objek.',m:'主动发动某事，用 melancarkan。',t:'“Pelancaran” ialah kata nama.'},
{id:'KKT-012',s:'Pasif diri pertama',d:'Sukar',q:'Saya telah menyiapkan tugasan itu.',i:'Pilih ayat pasif diri pertama yang betul.',a:['Tugasan itu telah disiapkan oleh saya.','Tugasan itu telah saya siapkan.','Saya telah tugasan itu siapkan.','Tugasan itu saya telah disiapkan.'],c:1,e:'Pasif diri pertama tidak menggunakan “di-”; kata ganti nama hadir sebelum kata kerja dasar.',cn:'第一人称被动句不用 di-，结构是 tugasan itu + saya + siapkan。',f:'Objek + telah + saya + kata kerja dasar.',m:'我你被动，不加 di-。',t:'Jangan gunakan “disiapkan oleh saya” dalam pola pasif diri pertama standard sekolah.'},
{id:'KKT-013',s:'Pasif diri kedua',d:'Sukar',q:'Kamu mesti menghantar borang itu hari ini.',i:'Pilih bentuk pasif yang betul.',a:['Borang itu mesti dihantar oleh kamu hari ini.','Borang itu mesti kamu hantar hari ini.','Kamu mesti borang itu dihantar.','Borang itu kamu mesti dihantarkan.'],c:1,e:'Pasif diri kedua meletakkan kata ganti nama sebelum kata kerja dasar.',cn:'第二人称被动句：borang itu + mesti + kamu + hantar。',f:'Objek + kata bantu + kamu + kata kerja dasar.',m:'你被动，kamu 在动词前。',t:'Jangan tambah “di-” selepas kata ganti nama diri kedua.'},
{id:'KKT-014',s:'Transitif tanpa objek',d:'Boss',q:'Pilih ayat yang tidak gramatis.',i:'Cari kata kerja transitif yang kehilangan objek.',a:['Murid itu sedang menyalin nota.','Ayah sedang mencuci.','Polis menahan suspek tersebut.','Kami menyusun kerusi.'],c:1,e:'“Mencuci” ialah kata kerja transitif dan dalam ayat ini objeknya tidak dinyatakan.',cn:'mencuci 通常需要说明洗什么，这里缺少宾语。',f:'Kata kerja transitif mesti mempunyai objek dalam ayat lengkap.',m:'及物动词，不能丢宾语。',t:'Jangan anggap semua ayat pendek itu lengkap.'},
{id:'KKT-015',s:'Analisis lengkap',d:'Final Boss',q:'Pilih analisis yang paling tepat bagi ayat “Laporan itu telah kami serahkan kepada pengetua semalam.”',i:'Tentukan ragam, kata kerja dan objek.',a:['Ayat aktif; “serahkan” tak transitif; “pengetua” objek.','Ayat pasif diri pertama; “serahkan” transitif; “laporan itu” objek asal.','Ayat pasif diri ketiga; “kami” objek.','Ayat aktif songsang; tiada objek.'],c:1,e:'“Laporan itu” ialah objek asal yang dipindahkan ke hadapan. “Kami serahkan” membentuk pasif diri pertama.',cn:'laporan itu 原本是宾语，移到前面；kami serahkan 是第一人称被动结构。',f:'Objek + telah + kami + kata kerja dasar.',m:'物在前，我在中，动词不加 di-。',t:'Jangan keliru ayat pasif diri pertama dengan pasif diri ketiga.'}
];const $=x=>document.getElementById(x);let sel=0,run;function show(id){['login','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function av(){avatars.innerHTML=AV.map((a,i)=>`<button class="avatar ${i===sel?'active':''}" data-a="${i}"><span>${a[1]}</span>${a[0]}</button>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{sel=+b.dataset.a;av()})}function start(){run={i:0,s:0,c:0,a:0,co:0,l:false};player.textContent=AV[sel][1]+' '+name.value.trim();show('game');render()}function render(){run.l=false;const x=Q[run.i];meta.textContent=`${x.id} • ${x.s} • ${x.d}`;q.textContent=x.q;ins.textContent=x.i;prog.textContent=`${run.i+1}/15`;hp.style.width=`${100-run.i/15*100}%`;ans.innerHTML='';x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=t;b.onclick=()=>answer(i);ans.appendChild(b)});fb.classList.add('hidden');next.classList.add('hidden');stats()}function answer(n){if(run.l)return;run.l=true;const x=Q[run.i],ok=n===x.c;run.a++;if(ok){run.c++;run.co++;run.s+=100+run.co*10}else run.co=0;fb.innerHTML=`<b style="color:${ok?'var(--good)':'var(--bad)'}">${ok?'Tepat!':'Belum tepat'}</b>${ok?'':`<p><b>Jawapan betul:</b> ${x.a[x.c]}</p>`}<p><b>Penjelasan BM:</b> ${x.e}</p><p class="cn"><b>华语讲解：</b> ${x.cn}</p><div class="formula"><b>Formula:</b> ${x.f}<br><span class="cn"><b>口诀：</b> ${x.m}</span></div><div class="trap"><b>Perangkap / 常见陷阱：</b><br>${x.t}</div>`;fb.classList.remove('hidden');next.classList.remove('hidden');[...ans.children].forEach((b,i)=>{b.disabled=true;if(i===x.c)b.style.borderColor='var(--good)';if(i===n&&!ok)b.style.borderColor='var(--bad)'});stats()}function stats(){score.textContent=run.s;combo.textContent='x'+run.co;acc.textContent=run.a?Math.round(run.c/run.a*100)+'%':'0%'}function done(){const a=Math.round(run.c/15*100);summary.innerHTML=`<div class="grid stats"><div class="stat">Betul<br><b>${run.c}/15</b></div><div class="stat">Ketepatan<br><b>${a}%</b></div><div class="stat">Skor<br><b>${run.s}</b></div><div class="stat">Status<br><b>${a>=70?'Lulus':'Ulang Kaji'}</b></div></div>`;show('finish')}av();enter.onclick=()=>{if(!name.value.trim())return alert('Masukkan nama murid.');start()};next.onclick=()=>{run.i++;run.i>=15?done():render()};retry.onclick=start;</script></body></html>
