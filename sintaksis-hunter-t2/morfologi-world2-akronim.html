<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi Hunter World 2 - Akronim</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.grid{display:grid;gap:12px}.stats{grid-template-columns:repeat(4,1fr)}.stat{background:#0a1728;border:1px solid var(--line);border-radius:15px;padding:14px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b;color:#d6e2f1;font-size:.8rem}.btn{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}.secondary{background:#1d314c}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:6px 0 14px}.avatars{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.avatar,.answer{border:1px solid var(--line);border-radius:13px;background:#0b1930;color:white;padding:13px;cursor:pointer}.avatar{text-align:center}.avatar.active{border:2px solid var(--accent);background:#172947}.avatar span{display:block;font-size:34px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answer{text-align:left}.feedback{margin-top:13px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.formula{border-left:4px solid var(--gold);padding:10px 12px;background:#111d30;border-radius:10px;margin-top:10px}.cn{color:#65c7ff}.trap{border-left:4px solid var(--bad);padding:10px 12px;background:#25151d;border-radius:10px;margin-top:10px}.bar{height:13px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad);transition:.3s}.monster{height:140px;display:grid;place-items:center;font-size:70px;background:#0a1728;border:1px solid var(--line);border-radius:18px;margin:12px 0}@media(max-width:720px){.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}@media(max-width:480px){.avatars{grid-template-columns:1fr 1fr}}</style></head><body><div class="wrap"><section id="login" class="card" style="max-width:620px;margin:24px auto"><span class="tag">MORFOLOGI WORLD 2</span><h1>Akronim Hunter</h1><p class="muted">15 cabaran rasmi • Bahasa Melayu + 华语讲解</p><label>Nama murid<input id="name" maxlength="30" placeholder="Nama"></label><label>Pilih watak</label><div id="avatars" class="avatars"></div><button id="enter" class="btn" style="margin-top:14px">Masuk Permainan</button> <a class="btn secondary" href="morfologi-hub.html">Peta Morfologi</a></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 2 • AKRONIM</span><h1 id="playerTitle"></h1></div><a class="btn secondary" href="morfologi-hub.html">Peta</a></div><div class="grid stats" style="margin:14px 0"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="accuracy">0%</b></div><div class="stat">Soalan<br><b id="progress">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">🔤</div><div id="meta" class="muted"></div><h2 id="question"></h2><p id="instruction" class="muted"></p><div id="answers" class="answers"></div><div id="feedback" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><span class="tag">WORLD SELESAI</span><h1>Keputusan World 2</h1><div id="summary"></div><div style="margin-top:14px"><button id="retry" class="btn">Main Semula</button> <a class="btn secondary" href="morfologi-hub.html">Peta Morfologi</a></div></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'AKR-001',skill:'Maksud akronim',difficulty:'Mudah',q:'Apakah maksud akronim?',i:'Pilih definisi yang tepat.',a:['Kata yang terbentuk daripada gabungan huruf awal atau suku kata','Kata yang diulang sepenuhnya','Kata yang menerima imbuhan','Kata pinjaman asing'],c:0,e:'Akronim ialah kependekan yang dibentuk daripada huruf awal atau suku kata dan disebut sebagai satu perkataan.',cn:'Akronim 是由首字母或音节组合而成，并像一个完整单词那样读。',formula:'Huruf awal / suku kata digabung → satu perkataan.',mnemonic:'缩短再合并，就是 akronim。',trap:'Jangan keliru dengan singkatan yang dieja huruf demi huruf.'},
{id:'AKR-002',skill:'Akronim nama khas',difficulty:'Mudah',q:'Yang manakah akronim?',i:'Pilih jawapan yang disebut sebagai satu perkataan.',a:['MARA','kg','Dr.','hlm.'],c:0,e:'MARA ialah akronim bagi Majlis Amanah Rakyat dan disebut sebagai satu perkataan.',cn:'MARA 是首字母组成并直接读成一个词。',formula:'Boleh disebut sebagai perkataan → akronim.',mnemonic:'能整词读出来，才像 akronim。',trap:'kg、Dr. dan hlm. ialah singkatan, bukan akronim.'},
{id:'AKR-003',skill:'Akronim huruf awal',difficulty:'Sederhana',q:'Apakah bentuk penuh “MARA”?',i:'Pilih jawapan yang tepat.',a:['Majlis Amanah Rakyat','Masyarakat Aman dan Rajin','Majlis Angkatan Rakyat','Maktab Amanah Remaja Aktif'],c:0,e:'MARA ialah singkatan akronim bagi Majlis Amanah Rakyat.',cn:'MARA 的完整名称是 Majlis Amanah Rakyat。',formula:'Ambil huruf awal setiap perkataan penting.',mnemonic:'M-A-R-A 对应四个词的首字母。',trap:'Jangan cipta bentuk penuh berdasarkan bunyi sahaja.'},
{id:'AKR-004',skill:'Akronim suku kata',difficulty:'Sederhana',q:'Perkataan “pawagam” terbentuk daripada gabungan apa?',i:'Pilih gabungan yang betul.',a:['panggung wayang gambar','papan wayang gambar','panggung warga gambar','pameran wayang gambar'],c:0,e:'“Pawagam” terbentuk daripada suku kata panggung, wayang dan gambar.',cn:'pawagam 来自 panggung + wayang + gambar 的部分音节组合。',formula:'Suku kata beberapa perkataan digabung.',mnemonic:'pa-wa-gam，按音节拼。',trap:'Akronim tidak semestinya hanya menggunakan huruf awal.'},
{id:'AKR-005',skill:'Akronim suku kata',difficulty:'Sederhana',q:'“Tadika” ialah akronim bagi...',i:'Pilih bentuk penuh yang tepat.',a:['taman didikan kanak-kanak','taman diri kanak-kanak','tempat didikan keluarga','taman disiplin kanak-kanak'],c:0,e:'Tadika terbentuk daripada taman didikan kanak-kanak.',cn:'tadika 来自 taman didikan kanak-kanak。',formula:'ta + di + ka → tadika.',mnemonic:'ta-di-ka，三个部分合起来。',trap:'Jangan tertipu oleh pilihan yang bunyinya hampir sama.'},
{id:'AKR-006',skill:'Akronim suku kata',difficulty:'Sederhana Tinggi',q:'“Tabika” ialah akronim bagi...',i:'Pilih bentuk penuh yang tepat.',a:['taman bimbingan kanak-kanak','taman bina kanak-kanak','tempat bimbingan keluarga','taman belajar kanak-kanak'],c:0,e:'Tabika terbentuk daripada taman bimbingan kanak-kanak.',cn:'tabika 来自 taman bimbingan kanak-kanak。',formula:'ta + bi + ka → tabika.',mnemonic:'bimbingan 有 bi，所以是 tabika。',trap:'Tadika dan tabika hampir sama tetapi bentuk penuhnya berbeza.'},
{id:'AKR-007',skill:'Membezakan singkatan',difficulty:'Sukar',q:'Yang manakah BUKAN akronim?',i:'Pilih singkatan yang dibaca huruf demi huruf.',a:['UPSR','MARA','tadika','pawagam'],c:0,e:'UPSR dibaca huruf demi huruf, maka bukan akronim dalam konteks ini.',cn:'UPSR 是逐个字母读，不是当作一个完整单词读。',formula:'Dieja satu-satu → singkatan; disebut satu perkataan → akronim.',mnemonic:'逐字母读，不算 akronim。',trap:'Semua bentuk pendek tidak semestinya akronim.'},
{id:'AKR-008',skill:'Akronim nama khas',difficulty:'Sederhana',q:'Pilih ayat yang menggunakan akronim dengan betul.',i:'Perhatikan huruf besar dan konteks.',a:['Ayah bekerja di MARA.','Ayah bekerja di mara.','Ayah bekerja di M.A.R.A.','Ayah bekerja di MaRa.'],c:0,e:'Akronim nama khas seperti MARA ditulis dengan huruf besar.',cn:'专有名称缩略词 MARA 要全部大写。',formula:'Akronim nama khas daripada huruf awal → huruf besar.',mnemonic:'机构名称，通常全大写。',trap:'Jangan gunakan bentuk rawak seperti MaRa.'},
{id:'AKR-009',skill:'Akronim kata umum',difficulty:'Sederhana',q:'Pilih ejaan yang betul.',i:'Akronim yang sudah menjadi kata umum ditulis dengan huruf kecil.',a:['pawagam','PAWAGAM','PaWaGam','Pawagam'],c:0,e:'“pawagam” sudah menjadi kata umum, maka ditulis dengan huruf kecil kecuali pada awal ayat.',cn:'pawagam 已成为普通词，所以一般用小写。',formula:'Kata umum → huruf kecil.',mnemonic:'普通词，小写。',trap:'Jangan samakan semua akronim dengan nama organisasi.'},
{id:'AKR-010',skill:'Membina akronim',difficulty:'Sederhana Tinggi',q:'Gabungan manakah menghasilkan “cerpen”?',i:'Pilih bentuk penuh yang betul.',a:['cerita pendek','cerita pendidikan','ceramah pendek','cerita penulis'],c:0,e:'“Cerpen” terbentuk daripada cerita pendek.',cn:'cerpen 来自 cerita + pendek。',formula:'cer + pen → cerpen.',mnemonic:'cerita pendek，缩成 cerpen。',trap:'Pastikan kedua-dua unsur membawa maksud asal.'},
{id:'AKR-011',skill:'Membina akronim',difficulty:'Sederhana Tinggi',q:'“Kugiran” terbentuk daripada...',i:'Pilih bentuk penuh yang tepat.',a:['kumpulan gitar rancak','kumpulan irama rancak','kumpulan gitar remaja','kumpulan nyanyian rancak'],c:0,e:'Kugiran ialah akronim bagi kumpulan gitar rancak.',cn:'kugiran 来自 kumpulan gitar rancak。',formula:'ku + gi + ran → kugiran.',mnemonic:'每个词取一部分。',trap:'Jangan hanya bergantung pada maksud umum muzik.'},
{id:'AKR-012',skill:'Penggunaan dalam ayat',difficulty:'Sukar',q:'Pilih ayat yang paling tepat.',i:'Perhatikan ejaan akronim dan struktur ayat.',a:['Ibu menghantar adik ke tadika setiap pagi.','Ibu menghantar adik ke TADIKA setiap pagi.','Ibu menghantar adik ke TaDiKa setiap pagi.','Ibu menghantar adik ke t.a.d.i.k.a setiap pagi.'],c:0,e:'“tadika” ialah kata umum dan ditulis dengan huruf kecil.',cn:'tadika 是普通词，正常用小写书写。',formula:'Kata umum yang telah mantap → huruf kecil tanpa titik.',mnemonic:'成为普通词，就像普通词写。',trap:'Jangan tambah titik atau gunakan huruf besar semua.'},
{id:'AKR-013',skill:'Analisis bentuk',difficulty:'Sukar',q:'Mengapakah “MARA” dianggap akronim tetapi “S.M.K.” tidak?',i:'Pilih alasan paling tepat.',a:['MARA disebut sebagai satu perkataan, S.M.K. dieja satu-satu','MARA lebih panjang','S.M.K. mempunyai titik','MARA ialah kata kerja'],c:0,e:'Perbezaan utama ialah cara sebutan: MARA sebagai satu perkataan, S.M.K. huruf demi huruf.',cn:'关键在读法：MARA 整词读，S.M.K. 一个字母一个字母读。',formula:'Cara sebutan menentukan kategori.',mnemonic:'整词读 akronim；逐字母 singkatan。',trap:'Kehadiran titik bukan satu-satunya sebab.'},
{id:'AKR-014',skill:'Klasifikasi akronim',difficulty:'Sukar',q:'Pilih kumpulan yang semuanya akronim.',i:'Semua item mesti benar.',a:['MARA, tadika, pawagam','kg, Dr., hlm.','S.M.K., U.P.S.R., cm','No., En., Pn.'],c:0,e:'MARA, tadika dan pawagam semuanya akronim yang boleh disebut sebagai perkataan.',cn:'只有第一组全部都能当作完整词来读。',formula:'Semak setiap item satu per satu.',mnemonic:'一组题，必须全部对。',trap:'Satu item salah menjadikan seluruh kumpulan salah.'},
{id:'AKR-015',skill:'Final Boss akronim',difficulty:'Boss',q:'Pilih pernyataan yang paling tepat tentang akronim.',i:'Gabungkan definisi, sebutan dan ejaan.',a:['Akronim terbentuk daripada huruf awal atau suku kata, disebut sebagai satu perkataan, dan ejaannya bergantung pada nama khas atau kata umum.','Semua singkatan ialah akronim dan mesti ditulis dengan huruf besar.','Akronim hanya terbentuk daripada huruf pertama setiap perkataan.','Akronim mesti mempunyai titik di antara huruf.'],c:0,e:'Pernyataan pertama merangkumi ciri utama akronim secara lengkap.',cn:'第一项完整说明了构成方式、读法和大小写规则。',formula:'Bentuk + sebutan + ejaan = analisis lengkap.',mnemonic:'怎么组成、怎么读、怎么写，三步一起看。',trap:'Jangan menerima pernyataan mutlak seperti “semua” atau “mesti” tanpa semakan.'}
];const $=id=>document.getElementById(id);let selected=0,player='',run=null;function show(id){['login','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function renderAv(){$('avatars').innerHTML=AV.map((a,i)=>`<button class="avatar ${i===selected?'active':''}" data-a="${i}"><span>${a[1]}</span>${a[0]}</button>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{selected=+b.dataset.a;renderAv()})}function enter(){player=$('name').value.trim();if(!player)return alert('Masukkan nama murid.');$('playerTitle').textContent=`${AV[selected][1]} ${player}`;start()}function start(){run={idx:0,score:0,correct:0,answered:0,combo:0,locked:false};show('game');renderQ()}function renderQ(){run.locked=false;const q=Q[run.idx];$('meta').textContent=`${q.id} • ${q.skill} • ${q.difficulty}`;$('question').textContent=q.q;$('instruction').textContent=q.i;$('progress').textContent=`${run.idx+1}/15`;$('hp').style.width=`${100-run.idx/15*100}%`;$('answers').innerHTML='';q.a.forEach((text,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=text;b.onclick=()=>answer(i);$('answers').appendChild(b)});$('feedback').classList.add('hidden');$('next').classList.add('hidden');updateStats()}function answer(n){if(run.locked)return;run.locked=true;const q=Q[run.idx],ok=n===q.c;run.answered++;if(ok){run.correct++;run.combo++;run.score+=100+run.combo*10}else run.combo=0;$('feedback').innerHTML=`<b style="color:${ok?'var(--good)':'var(--bad)'}">${ok?'Tepat!':'Belum tepat'}</b>${ok?'':`<p><b>Jawapan betul:</b> ${q.a[q.c]}</p>`}<p><b>Penjelasan BM:</b> ${q.e}</p><p class="cn"><b>华语讲解：</b> ${q.cn}</p><div class="formula"><b>Formula:</b> ${q.formula}<br><span class="cn"><b>口诀：</b> ${q.mnemonic}</span></div><div class="trap"><b>Perangkap / 常见陷阱：</b><br>${q.trap}</div>`;$('feedback').classList.remove('hidden');$('next').classList.remove('hidden');[...$('answers').children].forEach((b,i)=>{b.disabled=true;if(i===q.c)b.style.borderColor='var(--good)';if(i===n&&!ok)b.style.borderColor='var(--bad)'});updateStats()}function updateStats(){$('score').textContent=run.score;$('combo').textContent=`x${run.combo}`;$('accuracy').textContent=run.answered?Math.round(run.correct/run.answered*100)+'%':'0%'}function next(){run.idx++;run.idx>=Q.length?finish():renderQ()}function finish(){const acc=Math.round(run.correct/Q.length*100);$('summary').innerHTML=`<div class="grid stats"><div class="stat">Betul<br><b>${run.correct}/15</b></div><div class="stat">Ketepatan<br><b>${acc}%</b></div><div class="stat">Skor<br><b>${run.score}</b></div><div class="stat">Status<br><b>${acc>=70?'Lulus':'Ulang Kaji'}</b></div></div><div class="feedback"><b>${acc>=70?'World 2 berjaya diselesaikan.':'Sasaran lulus ialah sekurang-kurangnya 70%.'}</b></div>`;show('finish')}renderAv();$('enter').onclick=enter;$('retry').onclick=start;$('next').onclick=next;</script></body></html>
