<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Bahasa Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Bahasa Hunter</h1><p class="muted">15 cabaran • kata, frasa, ayat, imbuhan dan struktur gramatis</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="index.html">Portal</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">KESALAHAN BAHASA</span><h1 id="player"></h1></div><a class="btn" href="index.html">Portal</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="monster">🛠️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>Latihan Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="index.html">Portal</a></p></section></div><script>const Q=[{id:'KBH-001',s:'Kata sendi nama',q:'Pilih ayat yang betul.',i:'Bezakan dari dan daripada.',a:['Saya menerima hadiah dari ibu.','Saya menerima hadiah daripada ibu.','Saya menerima hadiah ke ibu.','Saya menerima hadiah pada ibu.'],c:1,e:'“Daripada” digunakan untuk manusia atau sumber.',cn:'来自人或来源使用 daripada。',f:'daripada + manusia/sumber.',m:'人和来源，用 daripada。',t:'“Dari” digunakan untuk tempat, arah atau masa.'},{id:'KBH-002',s:'Kata nafi',q:'Pilih ayat yang gramatis.',i:'Bezakan tidak dan bukan.',a:['Dia bukan rajin.','Dia tidak rajin.','Dia bukan belajar.','Dia tidak seorang guru.'],c:1,e:'“Tidak” menafikan kata adjektif “rajin”.',cn:'否定形容词 rajin 使用 tidak。',f:'tidak + kata kerja/kata adjektif.',m:'动作和性质，用 tidak。',t:'“Bukan” biasanya menafikan frasa nama atau frasa sendi.'},{id:'KBH-003',s:'Kata pemeri',q:'Pilih ayat yang betul.',i:'Bezakan ialah dan adalah.',a:['Encik Lim adalah guru disiplin.','Encik Lim ialah guru disiplin.','Encik Lim ialah sangat tegas.','Encik Lim adalah seorang guru disiplin ialah.'],c:1,e:'“Ialah” hadir sebelum frasa nama “guru disiplin”.',cn:'ialah 用在名词短语前。',f:'ialah + frasa nama.',m:'A ialah B，两边是名词。',t:'Jangan gunakan “adalah” sebelum frasa nama.'},{id:'KBH-004',s:'Kata bilangan',q:'Pilih ayat yang betul.',i:'Elakkan penggandaan jamak.',a:['Para murid-murid beratur.','Para murid beratur.','Murid para beratur.','Semua para murid beratur.'],c:1,e:'“Para” sudah menunjukkan jamak, jadi “murid” tidak perlu digandakan.',cn:'para 已表示复数，murid 不再重复。',f:'penanda jamak + kata nama tunggal.',m:'有 para，不要再重叠。',t:'Elakkan dua penanda jamak dalam satu frasa.'},{id:'KBH-005',s:'Kata kerja transitif',q:'Pilih ayat yang gramatis.',i:'Semak objek selepas kata kerja.',a:['Kami membincangkan tentang masalah itu.','Kami membincangkan masalah itu.','Kami berbincangkan masalah itu.','Kami bincang akan masalah itu.'],c:1,e:'“Membincangkan” terus diikuti objek tanpa “tentang”.',cn:'membincangkan 后直接接宾语，不需要 tentang。',f:'membincangkan + objek.',m:'有 -kan，直接接对象。',t:'Jangan campur pola “membincangkan” dengan “berbincang tentang”.'},{id:'KBH-006',s:'Ayat pasif',q:'Pilih ayat pasif yang betul.',i:'Fokus pada kata ganti nama diri pertama.',a:['Tugasan itu telah disiapkan oleh saya.','Tugasan itu telah saya siapkan.','Saya telah tugasan itu siapkan.','Tugasan itu saya telah disiapkan.'],c:1,e:'Pasif diri pertama menggunakan kata ganti nama sebelum kata kerja dasar.',cn:'第一人称被动句：对象 + saya + 动词原形。',f:'Objek + saya/kami + kata kerja dasar.',m:'我你被动，不加 di-。',t:'Jangan gunakan bentuk pasif diri ketiga untuk saya/kami.'},{id:'KBH-007',s:'Imbuhan',q:'Pilih ayat yang betul.',i:'Semak imbuhan kata kerja.',a:['Pihak sekolah memperketatkan kawalan keselamatan.','Pihak sekolah memperketat kawalan keselamatan.','Pihak sekolah diperketat kawalan keselamatan.','Pihak sekolah berketat kawalan keselamatan.'],c:1,e:'Bentuk standard yang tepat ialah “memperketat kawalan”.',cn:'标准搭配是 memperketat kawalan。',f:'memper- + kata adjektif tertentu.',m:'使变严格：memperketat。',t:'Elakkan menambah -kan tanpa keperluan.'},{id:'KBH-008',s:'Kata hubung',q:'Pilih ayat yang betul.',i:'Pilih kata hubung mengikut maksud.',a:['Aina tidak hadir supaya dia sakit.','Aina tidak hadir kerana dia sakit.','Aina tidak hadir manakala dia sakit.','Aina tidak hadir tetapi dia sakit kerana.'],c:1,e:'“Kerana” menghubungkan sebab dengan akibat.',cn:'kerana 表示原因。',f:'akibat + kerana + sebab.',m:'问为什么，找 kerana。',t:'“Supaya” menunjukkan tujuan, bukan sebab.'},{id:'KBH-009',s:'Kata bantu',q:'Pilih ayat yang gramatis.',i:'Semak susunan kata bantu.',a:['Mereka mesti akan hadir esok.','Mereka akan mesti hadir esok.','Mereka mesti hadir esok.','Mereka telah akan hadir esok.'],c:2,e:'Ayat yang paling gramatis dan jelas ialah “Mereka mesti hadir esok”.',cn:'最自然正确的是 mesti + 动词。',f:'kata bantu ragam + kata kerja.',m:'mesti 表示必须。',t:'Gabungan kata bantu perlu mematuhi maksud masa dan ragam.'},{id:'KBH-010',s:'Frasa adjektif',q:'Pilih ayat yang betul.',i:'Semak kata penguat.',a:['Pemandangan itu sangat indah sekali.','Pemandangan itu sangat indah.','Pemandangan itu terlalu indah sekali.','Pemandangan itu paling indah sekali.'],c:1,e:'“Sangat” sudah berfungsi sebagai kata penguat dan tidak perlu digandakan dengan “sekali” dalam pola ini.',cn:'sangat 已加强语气，不需再加 sekali。',f:'sangat + kata adjektif.',m:'一个加强词就够。',t:'Elakkan penguat berganda yang tidak gramatis.'},{id:'KBH-011',s:'Kata ganti nama',q:'Pilih ayat yang sesuai untuk bercakap dengan guru.',i:'Gunakan kata ganti nama yang sopan.',a:['Aku sudah menyiapkan kerja itu, cikgu.','Saya sudah menyiapkan kerja itu, cikgu.','Kau sudah menyiapkan kerja itu, cikgu.','Beta sudah menyiapkan kerja itu, cikgu.'],c:1,e:'“Saya” sesuai digunakan oleh murid ketika bercakap dengan guru.',cn:'学生对老师说话使用 saya。',f:'situasi rasmi/sopan → saya.',m:'对老师，用 saya。',t:'“Aku” kurang sesuai dalam situasi formal.'},{id:'KBH-012',s:'Susunan ayat',q:'Pilih susunan biasa yang betul.',i:'Letakkan subjek di hadapan predikat.',a:['Sedang membaca buku adik saya.','Adik saya sedang membaca buku.','Buku sedang adik saya membaca.','Membaca adik saya sedang buku.'],c:1,e:'Susunan biasa ialah subjek “Adik saya” diikuti predikat “sedang membaca buku”.',cn:'正常语序是主语在前，谓语在后。',f:'Subjek + Predikat.',m:'谁/什么在前，说明在后。',t:'Jangan pilih ayat songsang jika soalan meminta susunan biasa.'},{id:'KBH-013',s:'Frasa sendi nama',q:'Pilih ayat yang gramatis.',i:'Semak penggunaan “pada” dan “kepada”.',a:['Mesyuarat itu bermula kepada pukul 8.00 pagi.','Mesyuarat itu bermula pada pukul 8.00 pagi.','Mesyuarat itu bermula di pukul 8.00 pagi.','Mesyuarat itu bermula daripada pukul 8.00 pagi.'],c:1,e:'“Pada” digunakan untuk masa.',cn:'表示时间使用 pada。',f:'pada + masa.',m:'时间用 pada。',t:'“Kepada” digunakan untuk manusia atau sasaran.'},{id:'KBH-014',s:'Pembetulan ayat',q:'Pilih ayat yang bebas daripada kesalahan bahasa.',i:'Semak kata sendi, kata bilangan dan struktur.',a:['Semua pelajar-pelajar pergi ke dewan.','Semua pelajar pergi ke dewan.','Semua para pelajar pergi kedewan.','Pelajar semua-semua pergi di dewan.'],c:1,e:'“Semua” sudah menunjukkan jamak dan “ke dewan” menunjukkan arah dengan betul.',cn:'semua 已表示复数；去礼堂使用 ke dewan。',f:'semua + kata nama tunggal; ke + tempat tujuan.',m:'有 semua 不重叠；去哪里用 ke。',t:'Final semakan perlu melihat lebih daripada satu kesalahan.'},{id:'KBH-015',s:'Final Boss',q:'Pilih ayat yang paling gramatis.',i:'Semak kata pemeri, kata nafi, imbuhan dan kata sendi.',a:['Tujuan program itu ialah untuk membantu murid yang tidak mampu.','Tujuan program itu adalah untuk membantu murid yang tidak mampu.','Tujuan program itu adalah membantu kepada murid yang bukan mampu.','Tujuan program itu ialah membantu pada murid yang tidak mampu.'],c:1,e:'“Adalah” sesuai sebelum frasa sendi “untuk membantu...”, manakala “tidak mampu” menafikan kata adjektif.',cn:'adalah 用在 untuk 开头的介词短语前；否定 mampu 使用 tidak。',f:'adalah + frasa sendi; tidak + kata adjektif.',m:'后面有 untuk 用 adalah；性质否定用 tidak。',t:'Final Boss menggabungkan beberapa hukum tatabahasa.'}];let idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);$('enter').onclick=()=>{$('player').textContent=$('name').value.trim()||'Murid';$('login').classList.add('hidden');$('game').classList.remove('hidden');render()};function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('summary').innerHTML='<p>Skor: <b>'+score+'</b></p><p>Betul: <b>'+correct+'/15</b></p><p>Ketepatan: <b>'+Math.round(correct/15*100)+'%</b></p>'}$('retry').onclick=()=>location.reload();</script></body></html>
