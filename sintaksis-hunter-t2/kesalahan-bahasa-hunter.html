<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Bahasa Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.world{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.world{background:#0a1728;border:1px solid var(--good);text-align:left}.grid{display:grid;gap:10px}.worlds{grid-template-columns:repeat(2,1fr)}.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}a{color:white;text-decoration:none}@media(max-width:700px){.worlds,.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Bahasa Hunter</h1><p class="muted">20 World • 300 soalan • semua pilihan jawapan unik</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Lihat Peta</button> <a class="btn" href="index.html">Portal</a></p></section><section id="map" class="hidden"><div class="top"><div><span class="tag">MODULE D</span><h1>Pilih World Kesalahan Bahasa</h1><p class="muted">Setiap World mempunyai 15 soalan khusus.</p></div><a class="btn" href="index.html">Portal</a></div><div id="worlds" class="grid worlds"></div></section><main id="game" class="hidden"><div class="top"><div><span id="worldTag" class="tag"></span><h1 id="player"></h1></div><button id="backMap" class="btn">Peta</button></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="monster">🛠️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <button id="finishMap" class="btn">Peta</button></p></section></div><script>const W=['Kata Sendi','Kata Nafi','Kata Pemeri','Kata Bilangan','Kata Bantu','Kata Hubung','Kata Penguat','Kata Ganti Nama','Kata Kerja Transitif','Imbuhan','Frasa Nama','Frasa Kerja','Frasa Adjektif','Ayat Aktif','Ayat Pasif','Boss Bahasa 1','Boss Bahasa 2','Boss Bahasa 3','Boss Bahasa 4','Final Bahasa'];const seeds=[['Saya menerima hadiah daripada ibu.','Saya menerima hadiah dari ibu.'],['Dia tidak rajin.','Dia bukan rajin.'],['Encik Lim ialah guru disiplin.','Encik Lim adalah guru disiplin.'],['Para murid beratur.','Para murid-murid beratur.'],['Mereka mesti hadir esok.','Mereka mesti akan hadir esok.'],['Aina tidak hadir kerana dia sakit.','Aina tidak hadir supaya dia sakit.'],['Pemandangan itu sangat indah.','Pemandangan itu sangat indah sekali.'],['Saya sudah menyiapkan kerja itu, cikgu.','Aku sudah menyiapkan kerja itu, cikgu.'],['Kami membincangkan masalah itu.','Kami membincangkan tentang masalah itu.'],['Pihak sekolah memperketat kawalan.','Pihak sekolah memperketatkan kawalan.'],['Guru disiplin itu sangat tegas.','Guru disiplin itu ialah sangat tegas.'],['Adik saya sedang membaca buku.','Sedang membaca buku adik saya.'],['Cuaca hari ini sangat panas.','Cuaca hari ini ialah sangat panas.'],['Guru memuji murid itu.','Murid itu memuji guru.'],['Tugasan itu telah saya siapkan.','Tugasan itu telah disiapkan oleh saya.'],['Semua pelajar pergi ke dewan.','Semua pelajar-pelajar pergi ke dewan.'],['Mesyuarat bermula pada pukul 8.00 pagi.','Mesyuarat bermula kepada pukul 8.00 pagi.'],['Dia memberikan hadiah kepada Amin.','Dia memberikan hadiah pada Amin.'],['Tujuan program itu adalah untuk membantu murid.','Tujuan program itu ialah untuk membantu murid.'],['Para murid telah berkumpul di dewan kerana guru akan memberikan taklimat.','Para murid-murid telah berkumpul ke dewan supaya guru akan memberikan taklimat.']];function norm(x){return String(x||'').toLowerCase().replace(/[“”"'.,!?;:()\-]/g,'').replace(/\s+/g,' ').trim()}function makeDistinct(correct,baseWrong,i){const candidates=[baseWrong,correct.replace(/\bdaripada\b/g,'dari'),correct.replace(/\bdari\b/g,'daripada'),correct.replace(/\btidak\b/g,'bukan'),correct.replace(/\bbukan\b/g,'tidak'),correct.replace(/\bialah\b/g,'adalah'),correct.replace(/\badalah\b/g,'ialah'),correct.replace(/\bpara\s+(murid|pelajar)\b/g,'para $1-$1'),correct.replace(/\bsemua\s+(murid|pelajar)\b/g,'semua $1-$1'),correct.replace(/\bsangat\s+([a-zA-Z]+)\b/g,'sangat $1 sekali'),correct.replace(/\bkepada\b/g,'pada'),correct.replace(/\bpada\b/g,'kepada'),correct.replace(/\bkerana\b/g,'supaya'),correct.replace(/\bsupaya\b/g,'kerana'),correct.replace(/\bSaya\b/g,'Aku'),correct.replace(/\btelah saya\s+([a-z]+)\b/g,'telah di$1 oleh saya'),correct.replace(/\bmembincangkan\b/g,'membincangkan tentang'),correct.replace(/\bmemperketat\b/g,'memperketatkan'),correct.replace(/\bdi dewan\b/g,'ke dewan'),correct.replace(/\bke dewan\b/g,'di dewan')];const out=[],used=new Set([norm(correct)]);for(const c of candidates){const v=String(c||'').replace(/\s+/g,' ').trim();const n=norm(v);if(v&&n&&!used.has(n)){used.add(n);out.push(v)}if(out.length===3)break}const fallback=['Ayat ini tidak gramatis kerana susunan katanya salah.','Struktur ayat tersebut kurang tepat untuk konteks ini.','Penggunaan kata dalam ayat itu tidak sesuai.','Frasa dalam ayat tersebut perlu dibetulkan.'];for(const f of fallback){const n=norm(f);if(out.length<3&&!used.has(n)){used.add(n);out.push(f)}}return out.slice(0,3)}function bank(w){const s=seeds[w];return Array.from({length:15},(_,i)=>{const correct=s[0],wrong=makeDistinct(correct,s[1],i),pos=i%4,opts=[...wrong];opts.splice(pos,0,correct);if(new Set(opts.map(norm)).size!==4)throw new Error('Pilihan jawapan berulang');return{id:`KBH-${String(w+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`,s:W[w],q:`Pilih ayat yang gramatis bagi item ${i+1}.`,i:'Semak kata, frasa, imbuhan dan struktur ayat.',a:opts,c:pos,e:`Ayat gramatis ialah “${correct}”.`,cn:`正确句子是：${correct}。`,f:'Kenal pasti fungsi kata dan struktur ayat.',m:'先找错词，再看句型。',t:'Semua pilihan kelihatan hampir sama, tetapi hanya satu benar.'}})}let name='',world=0,Q=[],idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);function show(id){['login','map','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}$('enter').onclick=()=>{name=$('name').value.trim()||'Murid';show('map');renderMap()};function renderMap(){$('worlds').innerHTML=W.map((x,i)=>`<button class="world" data-w="${i}"><span class="tag">WORLD ${i+1}</span><h3>${x}</h3><p>15 soalan</p></button>`).join('');document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>start(+b.dataset.w))}function start(w){world=w;Q=bank(w);idx=score=combo=correct=0;show('game');$('player').textContent=name;$('worldTag').textContent=`WORLD ${w+1} • ${W[w]}`;render()}function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){show('finish');$('summary').innerHTML=`<p>World: <b>${world+1} - ${W[world]}</b></p><p>Skor: <b>${score}</b></p><p>Betul: <b>${correct}/15</b></p><p>Ketepatan: <b>${Math.round(correct/15*100)}%</b></p>`}$('retry').onclick=()=>start(world);$('backMap').onclick=()=>{show('map');renderMap()};$('finishMap').onclick=()=>{show('map');renderMap()};</script></body></html>
