<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Bahasa Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:18px}.card{background:#101d31;border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.world{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.world{background:#0a1728;border:1px solid var(--good);text-align:left}.grid{display:grid;gap:10px}.worlds,.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}a{color:white;text-decoration:none}@media(max-width:700px){.worlds,.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Bahasa Hunter</h1><p class="muted">20 World • 300 soalan berbeza • pilihan A–D unik</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Lihat Peta</button> <a class="btn" href="index.html">Portal</a></p></section><section id="map" class="hidden"><div class="top"><div><span class="tag">MODULE D</span><h1>Pilih World Kesalahan Bahasa</h1><p class="muted">Setiap World mempunyai 15 soalan berlainan.</p></div><a class="btn" href="index.html">Portal</a></div><div id="worlds" class="grid worlds"></div></section><main id="game" class="hidden"><div class="top"><div><span id="worldTag" class="tag"></span><h1 id="player"></h1></div><button id="backMap" class="btn">Peta</button></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="monster">🛠️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <button id="finishMap" class="btn">Peta</button></p></section></div><script>const W=['Kata Sendi','Kata Nafi','Kata Pemeri','Kata Bilangan','Kata Bantu','Kata Hubung','Kata Penguat','Kata Ganti Nama','Kata Kerja Transitif','Imbuhan','Frasa Nama','Frasa Kerja','Frasa Adjektif','Ayat Aktif','Ayat Pasif','Boss Bahasa 1','Boss Bahasa 2','Boss Bahasa 3','Boss Bahasa 4','Final Bahasa'];const S=['Ali','Aina','Farid','Mei Ling','Kumar','Siti','Encik Rahman','Cikgu Amin','Adik saya','Ibu','Ayah','Murid itu','Pengawas','Pasukan sekolah','Pihak sekolah'];const O=['buku itu','hadiah tersebut','tugasan sekolah','surat rasmi','basikal baharu','laporan lengkap','kelas kami','program kebersihan','borang penyertaan','pintu pagar','masalah disiplin','peraturan sekolah','projek sains','makanan itu','meja kayu'];const T=['pagi tadi','semalam','hari ini','esok','pada hari Isnin','pada pukul 8.00 pagi','minggu lalu','bulan hadapan','selepas kelas','sebelum rehat','ketika cuti sekolah','pada waktu petang','setiap hari','baru-baru ini','sejak semalam'];const P=['di sekolah','di kantin','di perpustakaan','di dewan','di rumah','di pejabat','di padang','di makmal','di kelas','di pasar','di hospital','di muzium','di taman','di bilik guru','di atas meja'];function pair(c,w,e,cn,f,m,t){return{c,w,e,cn,f,m,t}}const base=[];base[0]=S.map((s,i)=>pair(`${s} menerima ${O[i]} daripada ${S[(i+3)%15]}.`,`${s} menerima ${O[i]} dari ${S[(i+3)%15]}.`,'“Daripada” digunakan untuk manusia atau sumber.','来自人或来源使用 daripada。','daripada + manusia/sumber.','人和来源，用 daripada。','“Dari” digunakan untuk tempat, arah dan masa.'));base[1]=S.map((s,i)=>pair(i%2?`${s} bukan ketua kelas.`:`${s} tidak hadir ${T[i]}.`,i%2?`${s} tidak ketua kelas.`:`${s} bukan hadir ${T[i]}.`,'Gunakan “bukan” untuk frasa nama dan “tidak” untuk kata kerja atau adjektif.','名词短语用 bukan，动词或形容词用 tidak。','bukan + FN; tidak + FK/FA.','名词 bukan，动作性质 tidak。','Jangan menukar kedua-duanya sesuka hati.'));base[2]=S.map((s,i)=>pair(i%2?`${s} ialah ketua pasukan.`:`Matlamat program itu adalah untuk membantu murid.`,i%2?`${s} adalah ketua pasukan.`:`Matlamat program itu ialah untuk membantu murid.`,'“Ialah” sebelum frasa nama; “adalah” sebelum frasa adjektif atau frasa sendi.','ialah 用在名词短语前；adalah 用在形容词或介词短语前。','ialah + FN; adalah + FA/FS.','名词 ialah，形容词介词 adalah。','Periksa jenis frasa selepas kata pemeri.'));base[3]=S.map((s,i)=>pair(`${['Para','Semua','Beberapa','Kedua-dua','Setiap'][i%5]} ${i%5===4?'murid':'murid'} menyertai program itu.`,`${['Para','Semua','Beberapa','Kedua-dua','Setiap'][i%5]} murid-murid menyertai program itu.`,'Elakkan dua penanda jamak dalam satu frasa.','一个短语不要重复两个复数标记。','penanda bilangan + kata nama tunggal.','有数量词，不再重叠。','“Setiap” juga diikuti kata nama tunggal.'));base[4]=S.map((s,i)=>pair(`${s} ${['mesti','akan','telah','sedang','masih'][i%5]} menyiapkan ${O[i]}.`,`${s} ${['mesti akan','akan mesti','telah akan','sedang telah','masih sudah'][i%5]} menyiapkan ${O[i]}.`,'Susunan kata bantu mesti sesuai dengan makna masa dan ragam.','助动词次序要符合时间与语气。','kata bantu + kata kerja.','先时间，再语气，句意要通。','Jangan menggabungkan kata bantu yang bercanggah.'));base[5]=S.map((s,i)=>pair(`${s} tidak hadir ${i%2?'kerana':'supaya'} ${i%2?'dia sakit':'dapat berehat'}.`,`${s} tidak hadir ${i%2?'supaya':'kerana'} ${i%2?'dia sakit':'dapat berehat'}.`,'“Kerana” menunjukkan sebab; “supaya” menunjukkan tujuan.','kerana 表示原因，supaya 表示目的。','kerana = sebab; supaya = tujuan.','原因 kerana，目的 supaya。','Kenal pasti hubungan makna antara klausa.'));base[6]=S.map((s,i)=>pair(`${O[i]} itu ${['sangat baik','amat cantik','terlalu berat','paling mahal','agak sukar'][i%5]}.`,`${O[i]} itu ${['sangat baik sekali','amat cantik sekali','terlalu berat sekali','paling mahal sekali','agak sangat sukar'][i%5]}.`,'Elakkan penggunaan kata penguat yang berlebihan.','避免重复使用程度副词。','satu pola penguat yang gramatis.','加强词不要堆叠。','Tidak semua gabungan penguat boleh digunakan bersama.'));base[7]=S.map((s,i)=>pair(i%3===0?`Saya sudah menyerahkan ${O[i]} kepada cikgu.`:i%3===1?`Beliau akan merasmikan program itu.`:`Mereka sedang menunggu di luar kelas.`,i%3===0?`Aku sudah menyerahkan ${O[i]} kepada cikgu.`:i%3===1?`Dia orang akan merasmikan program itu.`:`Kita orang sedang menunggu di luar kelas.`,'Pilih kata ganti nama mengikut situasi dan tahap kesopanan.','根据场合与礼貌程度选择代词。','situasi rasmi → saya/beliau/mereka.','正式场合用礼貌代词。','Elakkan bentuk percakapan tidak baku.'));base[8]=S.map((s,i)=>pair(`${s} ${['membincangkan','membaca','menulis','membaiki','mengangkat'][i%5]} ${O[i]}.`,`${s} ${['membincangkan tentang','membaca akan','menulis kepada','membaiki tentang','mengangkat akan'][i%5]} ${O[i]}.`,'Kata kerja transitif mesti diikuti objek secara langsung.','及物动词后直接接宾语。','kata kerja transitif + objek.','动作后直接接对象。','Jangan tambah kata sendi yang tidak diperlukan.'));base[9]=S.map((s,i)=>pair(`${s} ${['memperketat','menjalankan','melaksanakan','menggunakan','meningkatkan'][i%5]} ${O[i]}.`,`${s} ${['memperketatkan','menjalani','melaksana','mengguna','mempertingkatkan'][i%5]} ${O[i]}.`,'Gunakan bentuk imbuhan yang tepat mengikut fungsi kata.','根据词语功能使用正确词缀。','imbuhan + kata dasar yang tepat.','词根配正确词缀。','Jangan menambah atau membuang imbuhan sesuka hati.'));base[10]=S.map((s,i)=>pair(`${['Guru disiplin','Ketua kelas','Pasukan debat','Murid Tingkatan Dua','Pegawai sekolah'][i%5]} itu sangat ${['tegas','rajin','cekap','aktif','bertanggungjawab'][i%5]}.`,`Itu ${['guru disiplin','ketua kelas','pasukan debat','murid Tingkatan Dua','pegawai sekolah'][i%5]} sangat ${['tegas','rajin','cekap','aktif','bertanggungjawab'][i%5]}.`,'Frasa nama mempunyai inti dan penerang yang tersusun.','名词短语的中心词与修饰语要排列正确。','inti + penerang.','中心词在前，说明在后。','Jangan songsangkan inti dan penerang tanpa sebab.'));base[11]=S.map((s,i)=>pair(`${S[i]} sedang ${['membaca buku','menulis laporan','membaiki basikal','membersihkan kelas','menyusun kerusi'][i%5]} ${T[i]}.`,`Sedang ${['membaca buku','menulis laporan','membaiki basikal','membersihkan kelas','menyusun kerusi'][i%5]} ${S[i]} ${T[i]}.`,'Frasa kerja hadir selepas subjek dalam susunan biasa.','正常语序中，动词短语位于主语后。','Subjek + Frasa Kerja.','谁在前，动作在后。','Jangan pilih susunan songsang jika soalan meminta ayat biasa.'));base[12]=S.map((s,i)=>pair(`${P[i]} sangat ${['bersih','luas','sunyi','cantik','selesa'][i%5]}.`,`${P[i]} ialah sangat ${['bersih','luas','sunyi','cantik','selesa'][i%5]}.`,'Frasa adjektif tidak memerlukan “ialah” sebelum kata adjektif.','形容词短语前不使用 ialah。','subjek + kata penguat + kata adjektif.','主语后直接接加强词和形容词。','“Ialah” digunakan sebelum frasa nama.'));base[13]=S.map((s,i)=>pair(`${S[i]} ${['memuji','menegur','membantu','memanggil','mengajar'][i%5]} ${S[(i+1)%15]}.`,`${S[(i+1)%15]} ${['memuji','menegur','membantu','memanggil','mengajar'][i%5]} ${S[i]}.`,'Ayat aktif meletakkan pelaku sebelum kata kerja.','主动句把施事者放在动词前。','Pelaku + kata kerja + objek.','谁做在前，谁被做在后。','Jangan tertukar pelaku dengan objek.'));base[14]=S.map((s,i)=>pair(`${O[i]} telah ${i%3===0?'saya':i%3===1?'kami':'kamu'} ${['siapkan','serahkan','susun','bawa','cat'][i%5]}.`,`${O[i]} telah di${['siapkan','serahkan','susun','bawa','cat'][i%5]} oleh ${i%3===0?'saya':i%3===1?'kami':'kamu'}.`,'Pasif diri pertama dan kedua menggunakan kata ganti nama sebelum kata kerja dasar.','第一、第二人称被动句把代词放在动词原形前。','Objek + saya/kami/kamu + kata kerja dasar.','我你被动，不加 di-。','Jangan gunakan pola pasif diri ketiga.'));function norm(x){return x.toLowerCase().replace(/\s+/g,' ').replace(/[.,!?;:“”"']/g,'').trim()}function options(item,i){const extra=[item.w,item.c.replace(/\bdi\b/g,'ke'),item.c.replace(/\bke\b/g,'di'),item.c.replace(/\btidak\b/g,'bukan'),item.c.replace(/\bialah\b/g,'adalah'),item.c.replace(/\badalah\b/g,'ialah'),item.c.replace(/\bkepada\b/g,'pada'),item.c.replace(/\bkerana\b/g,'supaya'),item.c.replace(/\bSaya\b/g,'Aku'),item.c.replace(/\bsangat\b/g,'amat sekali')];const u=[];for(const x of extra){if(x&&norm(x)!==norm(item.c)&&!u.some(y=>norm(y)===norm(x)))u.push(x.trim())}while(u.length<3)u.push(`Ayat ini tidak gramatis bagi pilihan ${u.length+1}.`);const pos=i%4,a=u.slice(0,3);a.splice(pos,0,item.c);return{a,c:pos}}function bank(w){let src;if(w<15)src=base[w];else{const picks=[];for(let i=0;i<15;i++){const bw=(w*3+i)%15,bi=(i*7+w)%15;picks.push(base[bw][bi])}src=picks}return src.map((x,i)=>{const z=options(x,i);return{id:`KBH-${String(w+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`,s:W[w],q:`Pilih ayat yang gramatis.`,i:'Bandingkan keempat-empat pilihan dengan teliti.',a:z.a,c:z.c,e:x.e,cn:x.cn,f:x.f,m:x.m,t:x.t}})}let name='',world=0,Q=[],idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);function show(id){['login','map','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}$('enter').onclick=()=>{name=$('name').value.trim()||'Murid';show('map');renderMap()};function renderMap(){$('worlds').innerHTML=W.map((x,i)=>`<button class="world" data-w="${i}"><span class="tag">WORLD ${i+1}</span><h3>${x}</h3><p>15 soalan berbeza</p></button>`).join('');document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>start(+b.dataset.w))}function start(w){world=w;Q=bank(w);idx=score=combo=correct=0;show('game');$('player').textContent=name;$('worldTag').textContent=`WORLD ${w+1} • ${W[w]}`;render()}function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>Jawapan betul: '+x.a[x.c]+'</p><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){show('finish');$('summary').innerHTML=`<p>World: <b>${world+1} - ${W[world]}</b></p><p>Skor: <b>${score}</b></p><p>Betul: <b>${correct}/15</b></p><p>Ketepatan: <b>${Math.round(correct/15*100)}%</b></p>`}$('retry').onclick=()=>start(world);$('backMap').onclick=()=>{show('map');renderMap()};$('finishMap').onclick=()=>{show('map');renderMap()};</script></body></html>
