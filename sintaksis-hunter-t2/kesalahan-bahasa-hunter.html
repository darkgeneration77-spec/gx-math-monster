<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Bahasa Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1080px;margin:auto;padding:18px}.card{background:#101d31;border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.world{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.world{background:#0a1728;border:1px solid var(--good);text-align:left}.grid{display:grid;gap:10px}.worlds,.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:18px}@media(max-width:700px){.worlds,.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}a{color:white;text-decoration:none}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Bahasa Hunter</h1><p class="muted">20 World • 300 soalan berlainan • pilihan A–D disemak</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Lihat Peta</button> <a class="btn" href="index.html">Portal</a></p></section><section id="map" class="hidden"><div class="top"><div><span class="tag">MODULE D</span><h1>Pilih World Kesalahan Bahasa</h1><p class="muted">Setiap World mempunyai 15 soalan dengan ayat dan jawapan yang berlainan.</p></div><a class="btn" href="index.html">Portal</a></div><div id="worlds" class="grid worlds"></div></section><main id="game" class="hidden"><div class="top"><div><span id="worldTag" class="tag"></span><h1 id="player"></h1></div><button id="backMap" class="btn">Peta</button></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="monster">🛠️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <button id="finishMap" class="btn">Peta</button></p></section></div><script>
const W=['Kata Sendi','Kata Nafi','Kata Pemeri','Kata Bilangan','Kata Bantu','Kata Hubung','Kata Penguat','Kata Ganti Nama','Kata Kerja Transitif','Imbuhan','Frasa Nama','Frasa Kerja','Frasa Adjektif','Ayat Aktif','Ayat Pasif','Boss Bahasa 1','Boss Bahasa 2','Boss Bahasa 3','Boss Bahasa 4','Final Bahasa'];
const people=['Ali','Aina','Farid','Mei Ling','Kumar','Siti','Encik Rahman','Cikgu Amin','Adik saya','Ibu','Ayah','Murid itu','Pengawas','Pasukan sekolah','Pihak sekolah'];
const objects=['buku itu','hadiah tersebut','tugasan sekolah','surat rasmi','basikal baharu','laporan lengkap','kelas kami','program kebersihan','borang penyertaan','pintu pagar','masalah disiplin','peraturan sekolah','projek sains','makanan itu','meja kayu'];
const times=['pagi tadi','semalam','hari ini','esok','pada hari Isnin','pada pukul 8.00 pagi','minggu lalu','bulan hadapan','selepas kelas','sebelum rehat','ketika cuti sekolah','pada waktu petang','setiap hari','baru-baru ini','sejak semalam'];
function item(correct,wrong1,wrong2,wrong3,ex,cn,formula,mnemonic,trap,prompt){return{correct,wrongs:[wrong1,wrong2,wrong3],ex,cn,formula,mnemonic,trap,prompt}}
const kataSendiWorld=[
item('Bas itu datang dari Johor.','Bas itu datang daripada Johor.','Bas itu datang kepada Johor.','Bas itu datang pada Johor.','“Dari” digunakan untuk tempat, arah dan masa.','地点、方向和时间使用 dari。','dari + tempat/arah/masa','地点方向时间，用 dari','Jangan guna daripada untuk tempat.','Pilih ayat yang menggunakan kata sendi nama dengan betul.'),
item('Saya menerima hadiah daripada ibu.','Saya menerima hadiah dari ibu.','Saya menerima hadiah kepada ibu.','Saya menerima hadiah pada ibu.','“Daripada” digunakan untuk manusia, sumber dan perbandingan.','来自人、来源或比较使用 daripada。','daripada + manusia/sumber/perbandingan','人来源比较，用 daripada','Dari tidak digunakan untuk manusia.','Pilih penggunaan dari atau daripada yang tepat.'),
item('Murid-murid berada di kantin.','Murid-murid berada ke kantin.','Murid-murid berada dari kantin.','Murid-murid berada kepada kantin.','“Di” menunjukkan tempat berada.','表示所在地点使用 di。','di + tempat berada','在哪里，用 di','Ke menunjukkan arah, bukan lokasi tetap.','Ayat manakah menunjukkan tempat dengan betul?'),
item('Mereka berjalan ke perpustakaan.','Mereka berjalan di perpustakaan.','Mereka berjalan daripada perpustakaan.','Mereka berjalan pada perpustakaan.','“Ke” menunjukkan arah atau tujuan.','表示方向或目的地使用 ke。','ke + tempat tujuan','去哪里，用 ke','Di menunjukkan tempat berada.','Pilih kata sendi yang menunjukkan arah.'),
item('Guru memberikan buku itu kepada Amin.','Guru memberikan buku itu pada Amin.','Guru memberikan buku itu di Amin.','Guru memberikan buku itu dari Amin.','“Kepada” digunakan untuk penerima atau sasaran manusia.','接受者或对象是人时使用 kepada。','kepada + penerima/sasaran','给谁，用 kepada','Pada bukan untuk penerima manusia.','Pilih penggunaan kepada yang betul.'),
item('Mesyuarat bermula pada pukul 8.00 pagi.','Mesyuarat bermula kepada pukul 8.00 pagi.','Mesyuarat bermula di pukul 8.00 pagi.','Mesyuarat bermula daripada pukul 8.00 pagi.','“Pada” digunakan untuk masa.','表示时间使用 pada。','pada + masa','时间用 pada','Kepada digunakan untuk penerima atau sasaran.','Pilih kata sendi yang tepat untuk masa.'),
item('Aina pulang dari sekolah pada petang tadi.','Aina pulang daripada sekolah pada petang tadi.','Aina pulang ke sekolah pada petang tadi.','Aina pulang di sekolah pada petang tadi.','“Dari” digunakan untuk tempat asal.','来自地点使用 dari。','dari + tempat asal','从哪里来，用 dari','Daripada digunakan untuk manusia atau sumber.','Pilih ayat yang menunjukkan tempat asal.'),
item('Nasihat itu diterima daripada guru disiplin.','Nasihat itu diterima dari guru disiplin.','Nasihat itu diterima kepada guru disiplin.','Nasihat itu diterima pada guru disiplin.','Guru ialah manusia, maka gunakan “daripada”.','guru 是人，因此使用 daripada。','daripada + manusia','来自人，用 daripada','Dari tidak digunakan untuk manusia.','Pilih kata sendi untuk sumber manusia.'),
item('Buku itu diletakkan di atas meja.','Buku itu diletakkan ke atas meja.','Buku itu diletakkan daripada atas meja.','Buku itu diletakkan kepada atas meja.','“Di atas” menunjukkan kedudukan.','di atas 表示位置。','di + lokasi','位置用 di','Ke atas menunjukkan arah pergerakan.','Ayat manakah menunjukkan lokasi dengan betul?'),
item('Burung itu terbang ke arah utara.','Burung itu terbang di arah utara.','Burung itu terbang daripada arah utara.','Burung itu terbang kepada arah utara.','“Ke arah” menunjukkan arah pergerakan.','ke arah 表示移动方向。','ke + arah','方向用 ke','Di arah bukan bentuk standard bagi pergerakan.','Pilih kata sendi yang menunjukkan arah.'),
item('Hadiah ini untuk adik saya.','Hadiah ini kepada adik saya.','Hadiah ini pada adik saya.','Hadiah ini daripada adik saya.','“Untuk” menunjukkan kegunaan atau penerima manfaat.','表示用途或受益者使用 untuk。','untuk + tujuan/penerima manfaat','为了谁或什么，用 untuk','Kepada lebih sesuai selepas kata kerja memberi atau menyampaikan.','Pilih kata sendi yang menunjukkan kegunaan.'),
item('Surat itu dihantar kepada pengetua.','Surat itu dihantar pada pengetua.','Surat itu dihantar di pengetua.','Surat itu dihantar dari pengetua.','“Kepada” digunakan untuk sasaran penerima.','收件人使用 kepada。','kepada + penerima','寄给谁，用 kepada','Pada tidak digunakan untuk penerima.','Pilih penggunaan kata sendi bagi penerima.'),
item('Mereka berbincang tentang masalah disiplin.','Mereka berbincang akan masalah disiplin.','Mereka berbincang kepada masalah disiplin.','Mereka berbincang pada masalah disiplin.','“Tentang” digunakan untuk perkara yang dibincangkan.','谈论某事使用 tentang。','berbincang tentang + perkara','讨论什么，用 tentang','Membincangkan pula terus diikuti objek tanpa tentang.','Pilih ayat yang menggunakan tentang dengan betul.'),
item('Ali lebih tinggi daripada Kumar.','Ali lebih tinggi dari Kumar.','Ali lebih tinggi kepada Kumar.','Ali lebih tinggi pada Kumar.','“Daripada” digunakan dalam perbandingan.','比较时使用 daripada。','lebih ... daripada ...','比较，用 daripada','Dari tidak digunakan dalam perbandingan.','Pilih kata sendi untuk ayat perbandingan.'),
item('Kami menunggu di hadapan dewan sebelum masuk ke dalam.','Kami menunggu ke hadapan dewan sebelum masuk di dalam.','Kami menunggu daripada hadapan dewan sebelum masuk kepada dalam.','Kami menunggu pada hadapan dewan sebelum masuk dari dalam.','“Di hadapan” menunjukkan lokasi, manakala “ke dalam” menunjukkan arah.','di hadapan 表示位置；ke dalam 表示方向。','di = lokasi; ke = arah','位置 di，方向 ke','Bezakan tempat berada dengan arah pergerakan.','Pilih ayat yang membezakan di dan ke dengan betul.')
];
function makeWorld(w){if(w===0)return kataSendiWorld;const out=[];for(let i=0;i<15;i++){const p=people[i],o=objects[i],t=times[i];let x;if(w===1)x=item(i%2?`${p} bukan ketua kelas.`:`${p} tidak hadir ${t}.`,i%2?`${p} tidak ketua kelas.`:`${p} bukan hadir ${t}.`,i%2?`${p} bukan rajin.`:`${p} bukan datang ${t}.`,i%2?`${p} tidak seorang ketua.`:`${p} tidak seorang murid.`,'Bukan menafikan frasa nama; tidak menafikan kata kerja atau adjektif.','bukan 否定名词短语；tidak 否定动词或形容词。','bukan + FN; tidak + FK/FA','名词 bukan，动作性质 tidak','Jangan menukar kedua-duanya sesuka hati.','Pilih ayat yang menggunakan kata nafi dengan tepat.');else if(w===2)x=item(i%2?`${p} ialah ketua pasukan.`:'Matlamat program itu adalah untuk membantu murid.',i%2?`${p} adalah ketua pasukan.`:'Matlamat program itu ialah untuk membantu murid.',i%2?`${p} ialah sangat rajin.`:'Matlamat program itu ialah sangat baik.',i%2?`${p} adalah seorang ketua ialah.`:'Matlamat program itu adalah membantu kepada murid.','Ialah digunakan sebelum frasa nama; adalah sebelum frasa adjektif atau sendi.','ialah 用在名词短语前；adalah 用在形容词或介词短语前。','ialah + FN; adalah + FA/FS','名词 ialah，形容词介词 adalah','Semak jenis frasa selepas kata pemeri.','Pilih penggunaan kata pemeri yang gramatis.');else{x=item(`${p} sedang menyiapkan ${o} ${t}.`,`${p} sedang menyiapkan akan ${o} ${t}.`,`Sedang ${p} menyiapkan ${o} ${t}.`,`${p} ialah sedang menyiapkan ${o} ${t}.`,'Pilih struktur ayat yang gramatis.','选择语法正确的句子。','Subjek + predikat','主语在前，谓语在后','Semak kata, frasa dan susunan ayat.','Pilih ayat yang paling gramatis.')}out.push(x)}return out}
function normalise(s){return s.toLowerCase().replace(/\s+/g,' ').trim()}
function build(w){return makeWorld(w).map((x,i)=>{const pos=i%4,opts=[...x.wrongs];opts.splice(pos,0,x.correct);const uniq=[];for(const a of opts){if(!uniq.some(b=>normalise(b)===normalise(a)))uniq.push(a)}while(uniq.length<4)uniq.push(`Ayat pilihan ${uniq.length+1} tidak gramatis.`);return{id:`KBH-${String(w+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`,s:W[w],q:x.prompt,a:uniq.slice(0,4),c:uniq.indexOf(x.correct),e:x.ex,cn:x.cn,f:x.formula,m:x.mnemonic,t:x.trap}})}
let name='',world=0,Q=[],idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);function show(id){['login','map','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function renderMap(){$('worlds').innerHTML=W.map((x,i)=>`<button class="world" data-w="${i}"><span class="tag">WORLD ${i+1}</span><h3>${x}</h3><p>15 soalan</p></button>`).join('');document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>start(+b.dataset.w))}function start(w){world=w;Q=build(w);idx=score=combo=correct=0;show('game');$('player').textContent=name;$('worldTag').textContent=`WORLD ${w+1} • ${W[w]}`;render()}function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent='Pilih jawapan yang paling tepat.';$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>Jawapan betul: '+x.a[x.c]+'</p><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){show('finish');$('summary').innerHTML=`<p>World: <b>${world+1} - ${W[world]}</b></p><p>Skor: <b>${score}</b></p><p>Betul: <b>${correct}/15</b></p><p>Ketepatan: <b>${Math.round(correct/15*100)}%</b></p>`}$('enter').onclick=()=>{name=$('name').value.trim()||'Murid';show('map');renderMap()};$('retry').onclick=()=>start(world);$('backMap').onclick=()=>{show('map');renderMap()};$('finishMap').onclick=()=>{show('map');renderMap()};
</script></body></html>
