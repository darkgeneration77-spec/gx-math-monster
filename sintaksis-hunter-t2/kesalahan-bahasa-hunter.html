<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Bahasa Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:1080px;margin:auto;padding:18px}.card{background:#101d31;border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.world{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.world{background:#0a1728;border:1px solid var(--good);text-align:left}.grid{display:grid;gap:10px}.worlds,.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:18px}@media(max-width:700px){.worlds,.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}a{color:white;text-decoration:none}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Bahasa Hunter</h1><p class="muted">20 World • 300 soalan berlainan • pilihan A–D disemak</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Lihat Peta</button> <a class="btn" href="index.html">Portal</a></p></section><section id="map" class="hidden"><div class="top"><div><span class="tag">MODULE D</span><h1>Pilih World Kesalahan Bahasa</h1><p class="muted">Setiap World mempunyai 15 soalan dengan ayat dan jawapan yang berlainan.</p></div><a class="btn" href="index.html">Portal</a></div><div id="worlds" class="grid worlds"></div></section><main id="game" class="hidden"><div class="top"><div><span id="worldTag" class="tag"></span><h1 id="player"></h1></div><button id="backMap" class="btn">Peta</button></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="monster">🛠️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <button id="finishMap" class="btn">Peta</button></p></section></div><script>
const W=['Kata Sendi','Kata Nafi','Kata Pemeri','Kata Bilangan','Kata Bantu','Kata Hubung','Kata Penguat','Kata Ganti Nama','Kata Kerja Transitif','Imbuhan','Frasa Nama','Frasa Kerja','Frasa Adjektif','Ayat Aktif','Ayat Pasif','Boss Bahasa 1','Boss Bahasa 2','Boss Bahasa 3','Boss Bahasa 4','Final Bahasa'];
const people=['Ali','Aina','Farid','Mei Ling','Kumar','Siti','Encik Rahman','Cikgu Amin','Adik saya','Ibu','Ayah','Murid itu','Pengawas','Pasukan sekolah','Pihak sekolah'];
const objects=['buku itu','hadiah tersebut','tugasan sekolah','surat rasmi','basikal baharu','laporan lengkap','kelas kami','program kebersihan','borang penyertaan','pintu pagar','masalah disiplin','peraturan sekolah','projek sains','makanan itu','meja kayu'];
const times=['pagi tadi','semalam','hari ini','esok','pada hari Isnin','pada pukul 8.00 pagi','minggu lalu','bulan hadapan','selepas kelas','sebelum rehat','ketika cuti sekolah','pada waktu petang','setiap hari','baru-baru ini','sejak semalam'];
function item(correct,wrong1,wrong2,wrong3,ex,cn,formula,mnemonic,trap,prompt){return{correct,wrongs:[wrong1,wrong2,wrong3],ex,cn,formula,mnemonic,trap,prompt}}
function makeWorld(w){const out=[];for(let i=0;i<15;i++){const p=people[i],o=objects[i],t=times[i];let x;if(w===0)x=item(`${p} menerima ${o} daripada ${people[(i+2)%15]}.`,`${p} menerima ${o} dari ${people[(i+2)%15]}.`,`${p} menerima ${o} kepada ${people[(i+2)%15]}.`,`${p} menerima ${o} pada ${people[(i+2)%15]}.`,'Daripada digunakan untuk manusia atau sumber.','来自人或来源使用 daripada。','daripada + manusia/sumber','人和来源用 daripada','Dari digunakan untuk tempat, arah atau masa.',`Ayat manakah menggunakan kata sendi nama dengan betul?`);
else if(w===1)x=item(i%2?`${p} bukan ketua kelas.`:`${p} tidak hadir ${t}.`,i%2?`${p} tidak ketua kelas.`:`${p} bukan hadir ${t}.`,i%2?`${p} bukan rajin.`:`${p} bukan datang ${t}.`,i%2?`${p} tidak seorang ketua.`:`${p} tidak seorang murid.`,'Bukan menafikan frasa nama; tidak menafikan kata kerja atau adjektif.','bukan 否定名词短语；tidak 否定动词或形容词。','bukan + FN; tidak + FK/FA','名词 bukan，动作性质 tidak','Jangan menukar kedua-duanya sesuka hati.',`Pilih ayat yang menggunakan kata nafi dengan tepat.`);
else if(w===2)x=item(i%2?`${p} ialah ketua pasukan.`:`Matlamat program itu adalah untuk membantu murid.`,i%2?`${p} adalah ketua pasukan.`:`Matlamat program itu ialah untuk membantu murid.`,i%2?`${p} ialah sangat rajin.`:`Matlamat program itu ialah sangat baik.`,i%2?`${p} adalah seorang ketua ialah.`:`Matlamat program itu adalah membantu kepada murid.`,'Ialah digunakan sebelum frasa nama; adalah sebelum frasa adjektif atau sendi.','ialah 用在名词短语前；adalah 用在形容词或介词短语前。','ialah + FN; adalah + FA/FS','名词 ialah，形容词介词 adalah','Semak jenis frasa selepas kata pemeri.',`Pilih penggunaan kata pemeri yang gramatis.`);
else if(w===3){const q=['Para','Semua','Beberapa','Kedua-dua','Setiap'][i%5];x=item(`${q} murid menyertai program itu.`,`${q} murid-murid menyertai program itu.`,`Semua para murid menyertai program itu.`,`Murid-murid semua para menyertai program itu.`,'Elakkan dua penanda jamak dalam satu frasa.','一个短语不要重复两个复数标记。','kata bilangan + kata nama tunggal','有数量词，不再重叠','Setiap juga diikuti kata nama tunggal.',`Ayat manakah menggunakan kata bilangan dengan betul?`)}
else if(w===4){const bantu=['mesti','akan','telah','sedang','masih'][i%5];x=item(`${p} ${bantu} menyiapkan ${o}.`,`${p} mesti akan menyiapkan ${o}.`,`${p} akan mesti menyiapkan ${o}.`,`${p} telah akan menyiapkan ${o}.`,'Kata bantu mesti sesuai dengan masa dan ragam.','助动词要符合时间与语气。','kata bantu + kata kerja','助动词后接动词','Elakkan gabungan kata bantu yang bercanggah.',`Pilih susunan kata bantu yang paling tepat.`)}
else if(w===5)x=item(i%2?`${p} tidak hadir kerana dia sakit.`:`${p} belajar bersungguh-sungguh supaya berjaya.`,i%2?`${p} tidak hadir supaya dia sakit.`:`${p} belajar bersungguh-sungguh kerana berjaya.`,i%2?`${p} tidak hadir tetapi dia sakit kerana.`:`${p} belajar manakala berjaya.`,i%2?`${p} tidak hadir manakala dia sakit.`:`${p} belajar tetapi supaya berjaya.`,'Kerana menunjukkan sebab; supaya menunjukkan tujuan.','kerana 表示原因；supaya 表示目的。','kerana = sebab; supaya = tujuan','原因 kerana，目的 supaya','Kenal pasti hubungan makna antara klausa.',`Pilih kata hubung yang sesuai dengan maksud ayat.`);
else if(w===6){const adj=['baik','cantik','berat','mahal','sukar'][i%5];x=item(`${o} itu sangat ${adj}.`,`${o} itu sangat ${adj} sekali.`,`${o} itu paling ${adj} sekali.`,`${o} itu terlalu sangat ${adj}.`,'Elakkan kata penguat berlebihan.','避免重复使用程度副词。','satu pola penguat yang gramatis','加强词不要堆叠','Tidak semua penguat boleh digunakan bersama.',`Ayat manakah menggunakan kata penguat dengan betul?`)}
else if(w===7)x=item(i%3===0?`Saya sudah menyerahkan ${o} kepada cikgu.`:i%3===1?`Beliau akan merasmikan program itu.`:`Mereka sedang menunggu di luar kelas.`,i%3===0?`Aku sudah menyerahkan ${o} kepada cikgu.`:i%3===1?`Dia orang akan merasmikan program itu.`:`Kita orang sedang menunggu di luar kelas.`,i%3===0?`Beta sudah menyerahkan ${o} kepada cikgu.`:i%3===1?`Kau akan merasmikan program itu.`:`Kami orang sedang menunggu di luar kelas.`,i%3===0?`Patik sudah menyerahkan ${o} kepada cikgu.`:i%3===1?`Aku akan merasmikan program itu.`:`Dia orang sedang menunggu di luar kelas.`,'Gunakan kata ganti nama mengikut situasi formal dan sopan.','根据正式与礼貌场合选择代词。','situasi rasmi → saya/beliau/mereka','正式场合用礼貌代词','Elakkan bentuk percakapan tidak baku.',`Pilih kata ganti nama yang sesuai dalam situasi rasmi.`);
else if(w===8){const v=['membincangkan','membaca','menulis','membaiki','mengangkat'][i%5];x=item(`${p} ${v} ${o}.`,`${p} ${v} tentang ${o}.`,`${p} ${v} kepada ${o}.`,`${p} ${v} akan ${o}.`,'Kata kerja transitif diikuti objek secara langsung.','及物动词后直接接宾语。','kata kerja transitif + objek','动词后直接接对象','Jangan tambah kata sendi yang tidak diperlukan.',`Pilih ayat yang menggunakan kata kerja transitif dengan betul.`)}
else if(w===9){const v=['memperketat','menjalankan','melaksanakan','menggunakan','meningkatkan'][i%5];x=item(`${p} ${v} ${o}.`,`${p} memperketatkan ${o}.`,`${p} melaksana ${o}.`,`${p} mengguna ${o}.`,'Gunakan imbuhan yang tepat mengikut fungsi kata.','根据词语功能使用正确词缀。','imbuhan + kata dasar yang tepat','词根配正确词缀','Jangan menambah atau membuang imbuhan sesuka hati.',`Ayat manakah menggunakan imbuhan dengan betul?`)}
else if(w===10){const n=['guru disiplin','ketua kelas','pasukan debat','murid Tingkatan Dua','pegawai sekolah'][i%5],a=['tegas','rajin','cekap','aktif','bertanggungjawab'][i%5];x=item(`${n} itu sangat ${a}.`,`Itu ${n} sangat ${a}.`,`${a} itu ${n} sangat.`,`Sangat ${n} itu ${a}.`,'Frasa nama mempunyai inti dan penerang yang tersusun.','名词短语的中心词和修饰语要排列正确。','inti + penerang','中心词在前，说明在后','Jangan songsangkan inti dan penerang tanpa sebab.',`Pilih frasa nama yang tersusun dengan betul.`)}
else if(w===11){const v=['membaca buku','menulis laporan','membaiki basikal','membersihkan kelas','menyusun kerusi'][i%5];x=item(`${p} sedang ${v} ${t}.`,`Sedang ${v} ${p} ${t}.`,`${v} sedang ${p} ${t}.`,`${p} ${t} sedang ${v} itu.`,'Susunan biasa ialah subjek diikuti frasa kerja.','正常语序是主语后接动词短语。','Subjek + Frasa Kerja','谁在前，动作在后','Jangan pilih susunan songsang jika diminta ayat biasa.',`Pilih ayat dengan frasa kerja yang gramatis.`)}
else if(w===12){const a=['bersih','luas','sunyi','cantik','selesa'][i%5];x=item(`Tempat itu sangat ${a}.`,`Tempat itu ialah sangat ${a}.`,`Tempat itu adalah seorang ${a}.`,`Sangat tempat itu ${a}.`,'Frasa adjektif tidak memerlukan ialah sebelum kata adjektif.','形容词短语前不使用 ialah。','subjek + penguat + adjektif','主语后接加强词和形容词','Ialah digunakan sebelum frasa nama.',`Pilih ayat yang mengandungi frasa adjektif yang betul.`)}
else if(w===13){const v=['memuji','menegur','membantu','memanggil','mengajar'][i%5],q=people[(i+1)%15];x=item(`${p} ${v} ${q}.`,`${q} ${v} ${p}.`,`${p} telah ${q} ${v}.`,`${v} ${p} oleh ${q}.`,'Ayat aktif meletakkan pelaku sebelum kata kerja.','主动句把施事者放在动词前。','Pelaku + kata kerja + objek','谁做在前，谁被做在后','Jangan tertukar pelaku dengan objek.',`Pilih ayat aktif yang betul.`)}
else if(w===14){const g=i%3===0?'saya':i%3===1?'kami':'kamu',v=['siapkan','serahkan','susun','bawa','cat'][i%5];x=item(`${o} telah ${g} ${v}.`,`${o} telah di${v} oleh ${g}.`,`${g} telah ${o} ${v}.`,`${o} ${g} telah di${v}.`,'Pasif diri pertama dan kedua tidak menggunakan di-.','被动句第一、二人称不用 di-。','Objek + kata bantu + saya/kami/kamu + kata kerja dasar','宾语在前，人称代词后接动词原形','Jangan gunakan pola pasif diri ketiga.',`Pilih ayat pasif diri pertama atau kedua yang betul.`)}
else{const src=makeWorld((w-15)*3+i%15)[i%15];return src}out.push({id:`KBH-${String(w+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`,topic:W[w],...x})}return out}
function normalize(s){return s.toLowerCase().replace(/[“”'".,!?;:()\-]/g,'').replace(/\s+/g,' ').trim()}
function buildOptions(q,index){const all=[q.correct,...q.wrongs];const unique=[];for(const s of all){if(!unique.some(x=>normalize(x)===normalize(s)))unique.push(s)}while(unique.length<4)unique.push(`Ayat ini tidak gramatis ${unique.length}.`);const pos=index%4;const wrongs=unique.filter(x=>normalize(x)!==normalize(q.correct)).slice(0,3);const opts=[...wrongs];opts.splice(pos,0,q.correct);return{opts,c:pos}}
let name='',world=0,Q=[],idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);function show(id){['login','map','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}
$('enter').onclick=()=>{name=$('name').value.trim()||'Murid';show('map');renderMap()};function renderMap(){$('worlds').innerHTML=W.map((x,i)=>`<button class="world" data-w="${i}"><span class="tag">WORLD ${i+1}</span><h3>${x}</h3><p>15 soalan berbeza</p></button>`).join('');document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>start(+b.dataset.w))}
function start(w){world=w;Q=makeWorld(w).map((q,i)=>{const b=buildOptions(q,i);return{...q,a:b.opts,c:b.c}});idx=score=combo=correct=0;show('game');$('player').textContent=name;$('worldTag').textContent=`WORLD ${w+1} • ${W[w]}`;render()}
function render(){locked=false;const x=Q[idx];$('meta').textContent=`${x.id} • ${x.topic}`;$('q').textContent=x.prompt;$('ins').textContent=`Teliti keempat-empat ayat. Soalan ${idx+1} menggunakan contoh yang berbeza.`;$('prog').textContent=`${idx+1}/15`;$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}
function answer(i,b){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML=`<b>${ok?'Betul!':'Belum tepat.'}</b><p><b>Jawapan betul:</b> ${x.correct}</p><p>${x.ex}</p><p class="cn">${x.cn}</p><div class="formula"><b>Formula:</b> ${x.formula}<br><b>口诀:</b> ${x.mnemonic}</div><div class="trap"><b>Perangkap:</b> ${x.trap}</div>`;$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}
$('next').onclick=()=>{idx++;idx<Q.length?render():finish()};function finish(){show('finish');$('summary').innerHTML=`<p>World: <b>${world+1} - ${W[world]}</b></p><p>Skor: <b>${score}</b></p><p>Betul: <b>${correct}/15</b></p><p>Ketepatan: <b>${Math.round(correct/15*100)}%</b></p>`}$('retry').onclick=()=>start(world);$('backMap').onclick=()=>{show('map');renderMap()};$('finishMap').onclick=()=>{show('map');renderMap()};</script></body></html>
