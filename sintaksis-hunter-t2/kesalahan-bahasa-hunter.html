<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kesalahan Bahasa Hunter T2</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">KSSM TINGKATAN 2</span><h1>Kesalahan Bahasa Hunter</h1><p class="muted">Bank 50 soalan • setiap permainan pilih 15 soalan secara rawak</p><input id="name" placeholder="Nama murid"><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="index.html">Portal</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">KESALAHAN BAHASA</span><h1 id="player"></h1></div><a class="btn" href="index.html">Portal</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="monster">🛠️</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>Latihan Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="index.html">Portal</a></p></section></div><script>const Q=[
{id:'KBH-001',s:'Kata sendi nama',q:'Pilih ayat yang betul.',i:'Bezakan dari dan daripada.',a:['Saya menerima hadiah dari ibu.','Saya menerima hadiah daripada ibu.','Saya menerima hadiah ke ibu.','Saya menerima hadiah pada ibu.'],c:1,e:'“Daripada” digunakan untuk manusia atau sumber.',cn:'来自人或来源使用 daripada。',f:'daripada + manusia/sumber.',m:'人和来源，用 daripada。',t:'“Dari” digunakan untuk tempat, arah atau masa.'},
{id:'KBH-002',s:'Kata nafi',q:'Pilih ayat yang gramatis.',i:'Bezakan tidak dan bukan.',a:['Dia bukan rajin.','Dia tidak rajin.','Dia bukan belajar.','Dia tidak seorang guru.'],c:1,e:'“Tidak” menafikan kata adjektif “rajin”.',cn:'否定形容词 rajin 使用 tidak。',f:'tidak + kata kerja/kata adjektif.',m:'动作和性质，用 tidak。',t:'“Bukan” biasanya menafikan frasa nama atau frasa sendi.'},
{id:'KBH-003',s:'Kata pemeri',q:'Pilih ayat yang betul.',i:'Bezakan ialah dan adalah.',a:['Encik Lim adalah guru disiplin.','Encik Lim ialah guru disiplin.','Encik Lim ialah sangat tegas.','Encik Lim adalah seorang guru disiplin ialah.'],c:1,e:'“Ialah” hadir sebelum frasa nama “guru disiplin”.',cn:'ialah 用在名词短语前。',f:'ialah + frasa nama.',m:'A ialah B，两边是名词。',t:'Jangan gunakan “adalah” sebelum frasa nama.'},
{id:'KBH-004',s:'Kata bilangan',q:'Pilih ayat yang betul.',i:'Elakkan penggandaan jamak.',a:['Para murid-murid beratur.','Para murid beratur.','Murid para beratur.','Semua para murid beratur.'],c:1,e:'“Para” sudah menunjukkan jamak, jadi “murid” tidak perlu digandakan.',cn:'para 已表示复数，murid 不再重复。',f:'penanda jamak + kata nama tunggal.',m:'有 para，不要再重叠。',t:'Elakkan dua penanda jamak dalam satu frasa.'},
{id:'KBH-005',s:'Kata kerja transitif',q:'Pilih ayat yang gramatis.',i:'Semak objek selepas kata kerja.',a:['Kami membincangkan tentang masalah itu.','Kami membincangkan masalah itu.','Kami berbincangkan masalah itu.','Kami bincang akan masalah itu.'],c:1,e:'“Membincangkan” terus diikuti objek tanpa “tentang”.',cn:'membincangkan 后直接接宾语，不需要 tentang。',f:'membincangkan + objek.',m:'有 -kan，直接接对象。',t:'Jangan campur pola “membincangkan” dengan “berbincang tentang”.'},
{id:'KBH-006',s:'Ayat pasif',q:'Pilih ayat pasif yang betul.',i:'Fokus pada kata ganti nama diri pertama.',a:['Tugasan itu telah disiapkan oleh saya.','Tugasan itu telah saya siapkan.','Saya telah tugasan itu siapkan.','Tugasan itu saya telah disiapkan.'],c:1,e:'Pasif diri pertama menggunakan kata ganti nama sebelum kata kerja dasar.',cn:'第一人称被动句：对象 + saya + 动词原形。',f:'Objek + saya/kami + kata kerja dasar.',m:'我你被动，不加 di-。',t:'Jangan gunakan bentuk pasif diri ketiga untuk saya/kami.'},
{id:'KBH-007',s:'Imbuhan',q:'Pilih ayat yang betul.',i:'Semak imbuhan kata kerja.',a:['Pihak sekolah memperketatkan kawalan keselamatan.','Pihak sekolah memperketat kawalan keselamatan.','Pihak sekolah diperketat kawalan keselamatan.','Pihak sekolah berketat kawalan keselamatan.'],c:1,e:'Bentuk standard yang tepat ialah “memperketat kawalan”.',cn:'标准搭配是 memperketat kawalan。',f:'memper- + kata adjektif tertentu.',m:'使变严格：memperketat。',t:'Elakkan menambah -kan tanpa keperluan.'},
{id:'KBH-008',s:'Kata hubung',q:'Pilih ayat yang betul.',i:'Pilih kata hubung mengikut maksud.',a:['Aina tidak hadir supaya dia sakit.','Aina tidak hadir kerana dia sakit.','Aina tidak hadir manakala dia sakit.','Aina tidak hadir tetapi dia sakit kerana.'],c:1,e:'“Kerana” menghubungkan sebab dengan akibat.',cn:'kerana 表示原因。',f:'akibat + kerana + sebab.',m:'问为什么，找 kerana。',t:'“Supaya” menunjukkan tujuan, bukan sebab.'},
{id:'KBH-009',s:'Kata bantu',q:'Pilih ayat yang gramatis.',i:'Semak susunan kata bantu.',a:['Mereka mesti akan hadir esok.','Mereka akan mesti hadir esok.','Mereka mesti hadir esok.','Mereka telah akan hadir esok.'],c:2,e:'Ayat yang paling gramatis dan jelas ialah “Mereka mesti hadir esok”.',cn:'最自然正确的是 mesti + 动词。',f:'kata bantu ragam + kata kerja.',m:'mesti 表示必须。',t:'Gabungan kata bantu perlu mematuhi maksud masa dan ragam.'},
{id:'KBH-010',s:'Frasa adjektif',q:'Pilih ayat yang betul.',i:'Semak kata penguat.',a:['Pemandangan itu sangat indah sekali.','Pemandangan itu sangat indah.','Pemandangan itu terlalu indah sekali.','Pemandangan itu paling indah sekali.'],c:1,e:'“Sangat” sudah berfungsi sebagai kata penguat dan tidak perlu digandakan dengan “sekali” dalam pola ini.',cn:'sangat 已加强语气，不需再加 sekali。',f:'sangat + kata adjektif.',m:'一个加强词就够。',t:'Elakkan penguat berganda yang tidak gramatis.'},
{id:'KBH-011',s:'Kata ganti nama',q:'Pilih ayat yang sesuai untuk bercakap dengan guru.',i:'Gunakan kata ganti nama yang sopan.',a:['Aku sudah menyiapkan kerja itu, cikgu.','Saya sudah menyiapkan kerja itu, cikgu.','Kau sudah menyiapkan kerja itu, cikgu.','Beta sudah menyiapkan kerja itu, cikgu.'],c:1,e:'“Saya” sesuai digunakan oleh murid ketika bercakap dengan guru.',cn:'学生对老师说话使用 saya。',f:'situasi rasmi/sopan → saya.',m:'对老师，用 saya。',t:'“Aku” kurang sesuai dalam situasi formal.'},
{id:'KBH-012',s:'Susunan ayat',q:'Pilih susunan biasa yang betul.',i:'Letakkan subjek di hadapan predikat.',a:['Sedang membaca buku adik saya.','Adik saya sedang membaca buku.','Buku sedang adik saya membaca.','Membaca adik saya sedang buku.'],c:1,e:'Susunan biasa ialah subjek “Adik saya” diikuti predikat “sedang membaca buku”.',cn:'正常语序是主语在前，谓语在后。',f:'Subjek + Predikat.',m:'谁/什么在前，说明在后。',t:'Jangan pilih ayat songsang jika soalan meminta susunan biasa.'},
{id:'KBH-013',s:'Frasa sendi nama',q:'Pilih ayat yang gramatis.',i:'Semak penggunaan “pada” dan “kepada”.',a:['Mesyuarat itu bermula kepada pukul 8.00 pagi.','Mesyuarat itu bermula pada pukul 8.00 pagi.','Mesyuarat itu bermula di pukul 8.00 pagi.','Mesyuarat itu bermula daripada pukul 8.00 pagi.'],c:1,e:'“Pada” digunakan untuk masa.',cn:'表示时间使用 pada。',f:'pada + masa.',m:'时间用 pada。',t:'“Kepada” digunakan untuk manusia atau sasaran.'},
{id:'KBH-014',s:'Pembetulan ayat',q:'Pilih ayat yang bebas daripada kesalahan bahasa.',i:'Semak kata sendi, kata bilangan dan struktur.',a:['Semua pelajar-pelajar pergi ke dewan.','Semua pelajar pergi ke dewan.','Semua para pelajar pergi kedewan.','Pelajar semua-semua pergi di dewan.'],c:1,e:'“Semua” sudah menunjukkan jamak dan “ke dewan” menunjukkan arah dengan betul.',cn:'semua 已表示复数；去礼堂使用 ke dewan。',f:'semua + kata nama tunggal; ke + tempat tujuan.',m:'有 semua 不重叠；去哪里用 ke。',t:'Final semakan perlu melihat lebih daripada satu kesalahan.'},
{id:'KBH-015',s:'Kata sendi nama',q:'Pilih ayat yang betul.',i:'Bezakan di dan ke.',a:['Mereka berada ke kantin.','Mereka berada di kantin.','Mereka berada dari kantin.','Mereka berada kepada kantin.'],c:1,e:'“Di” digunakan untuk tempat berada.',cn:'表示所在地点使用 di。',f:'di + tempat.',m:'在哪里，用 di。',t:'“Ke” menunjukkan arah.'},
{id:'KBH-016',s:'Kata sendi nama',q:'Pilih ayat yang betul.',i:'Bezakan dari dan daripada.',a:['Bas itu datang daripada Johor.','Bas itu datang dari Johor.','Bas itu datang kepada Johor.','Bas itu datang pada Johor.'],c:1,e:'“Dari” digunakan untuk tempat.',cn:'来自地点使用 dari。',f:'dari + tempat/arah/masa.',m:'地点方向时间，用 dari。',t:'“Daripada” untuk manusia atau sumber.'},
{id:'KBH-017',s:'Kata sendi nama',q:'Pilih ayat yang betul.',i:'Semak penggunaan “kepada”.',a:['Guru memberikan hadiah pada Amin.','Guru memberikan hadiah kepada Amin.','Guru memberikan hadiah di Amin.','Guru memberikan hadiah dari Amin.'],c:1,e:'“Kepada” digunakan untuk penerima manusia.',cn:'接受者是人时使用 kepada。',f:'kepada + penerima.',m:'给谁，用 kepada。',t:'“Pada” biasanya untuk masa atau keadaan.'},
{id:'KBH-018',s:'Kata nafi',q:'Pilih ayat yang betul.',i:'Bezakan bukan dan tidak.',a:['Itu tidak rumah saya.','Itu bukan rumah saya.','Itu belum rumah saya.','Itu jangan rumah saya.'],c:1,e:'“Bukan” menafikan frasa nama.',cn:'否定名词短语使用 bukan。',f:'bukan + frasa nama.',m:'不是某物，用 bukan。',t:'“Tidak” bukan untuk frasa nama.'},
{id:'KBH-019',s:'Kata nafi',q:'Pilih ayat yang betul.',i:'Semak kata kerja.',a:['Dia bukan datang semalam.','Dia tidak datang semalam.','Dia bukan seorang datang semalam.','Dia tidak seorang datang semalam.'],c:1,e:'“Tidak” menafikan kata kerja “datang”.',cn:'否定动作 datang 使用 tidak。',f:'tidak + kata kerja.',m:'动作否定，用 tidak。',t:'Jangan gunakan “bukan” untuk kata kerja biasa.'},
{id:'KBH-020',s:'Kata pemeri',q:'Pilih ayat yang betul.',i:'Semak frasa sendi nama.',a:['Tujuan lawatan itu ialah untuk menimba pengalaman.','Tujuan lawatan itu adalah untuk menimba pengalaman.','Tujuan lawatan itu adalah pengalaman.','Tujuan lawatan itu ialah sangat penting.'],c:1,e:'“Adalah” sesuai sebelum frasa sendi “untuk menimba pengalaman”.',cn:'adalah 用在介词短语前。',f:'adalah + frasa sendi/frasa adjektif.',m:'后面有 untuk，用 adalah。',t:'“Ialah” diikuti frasa nama.'},
{id:'KBH-021',s:'Kata pemeri',q:'Pilih ayat yang betul.',i:'Semak frasa nama.',a:['Bapa saya adalah seorang jurutera.','Bapa saya ialah seorang jurutera.','Bapa saya ialah sangat rajin.','Bapa saya adalah di pejabat.'],c:1,e:'“Ialah” digunakan sebelum frasa nama.',cn:'ialah 用在名词短语前。',f:'ialah + frasa nama.',m:'A ialah B。',t:'Jangan guna “adalah” sebelum frasa nama.'},
{id:'KBH-022',s:'Kata bilangan',q:'Pilih ayat yang betul.',i:'Elakkan dua penanda jamak.',a:['Semua peserta-peserta hadir.','Semua peserta hadir.','Para semua peserta hadir.','Peserta-peserta semua-semua hadir.'],c:1,e:'“Semua” sudah menunjukkan jamak.',cn:'semua 已表示复数，不再重叠。',f:'semua + kata nama tunggal.',m:'有 semua，不重复。',t:'Jangan gandakan kata nama selepas semua.'},
{id:'KBH-023',s:'Kata bilangan',q:'Pilih ayat yang betul.',i:'Semak penggunaan setiap.',a:['Setiap murid-murid perlu hadir.','Setiap murid perlu hadir.','Semua setiap murid perlu hadir.','Setiap para murid perlu hadir.'],c:1,e:'“Setiap” diikuti kata nama tunggal.',cn:'setiap 后接单数名词。',f:'setiap + kata nama tunggal.',m:'每一个，不重叠。',t:'Jangan guna “murid-murid”.'},
{id:'KBH-024',s:'Kata hubung',q:'Pilih ayat yang betul.',i:'Bezakan kerana dan supaya.',a:['Dia belajar bersungguh-sungguh kerana mendapat keputusan cemerlang.','Dia belajar bersungguh-sungguh supaya mendapat keputusan cemerlang.','Dia belajar bersungguh-sungguh manakala mendapat keputusan cemerlang.','Dia belajar bersungguh-sungguh tetapi mendapat keputusan cemerlang supaya.'],c:1,e:'“Supaya” menunjukkan tujuan.',cn:'supaya 表示目的。',f:'tindakan + supaya + tujuan.',m:'为了什么，用 supaya。',t:'“Kerana” menunjukkan sebab.'},
{id:'KBH-025',s:'Kata hubung',q:'Pilih ayat yang betul.',i:'Gunakan walaupun...tetapi.',a:['Walaupun hujan lebat tetapi mereka terus bermain.','Walaupun hujan lebat, mereka terus bermain.','Hujan lebat walaupun tetapi mereka terus bermain.','Walaupun kerana hujan lebat, mereka terus bermain.'],c:1,e:'Dalam ayat standard, “walaupun” sudah cukup menghubungkan klausa tanpa perlu “tetapi”.',cn:'标准句中 walaupun 已足够，不必再加 tetapi。',f:'walaupun + klausa, klausa.',m:'有 walaupun，通常不再加 tetapi。',t:'Elakkan pasangan berlebihan.'},
{id:'KBH-026',s:'Kata kerja transitif',q:'Pilih ayat yang betul.',i:'Semak objek.',a:['Ayah sedang mencuci.','Ayah sedang mencuci kereta.','Ayah sedang bercuci kereta.','Ayah sedang mencucikan.'],c:1,e:'Kata kerja transitif “mencuci” perlu diikuti objek.',cn:'及物动词 mencuci 后需要宾语。',f:'kata kerja transitif + objek.',m:'洗什么，要说出来。',t:'Jangan tinggalkan objek.'},
{id:'KBH-027',s:'Kata kerja transitif',q:'Pilih ayat yang betul.',i:'Semak penggunaan “menjalankan”.',a:['Sekolah menjalani kempen kebersihan.','Sekolah menjalankan kempen kebersihan.','Sekolah berjalan kempen kebersihan.','Sekolah dijalani kempen kebersihan.'],c:1,e:'“Menjalankan” sesuai untuk melaksanakan sesuatu program atau kempen.',cn:'进行活动或计划使用 menjalankan。',f:'menjalankan + program/kempen.',m:'执行计划，用 menjalankan。',t:'“Menjalani” biasanya dialami oleh seseorang.'},
{id:'KBH-028',s:'Imbuhan',q:'Pilih ayat yang betul.',i:'Bezakan menghadiahi dan menghadiahkan.',a:['Cikgu menghadiahkan Ali sebuah buku.','Cikgu menghadiahi Ali sebuah buku.','Cikgu menghadiahi sebuah buku kepada Ali.','Cikgu menghadiah Ali buku.'],c:1,e:'“Menghadiahi” diikuti penerima, kemudian benda.',cn:'menghadiahi 后先接人，再接物。',f:'menghadiahi seseorang sesuatu.',m:'给某人某物：人先。',t:'Jangan campur pola menghadiahi dengan menghadiahkan.'},
{id:'KBH-029',s:'Imbuhan',q:'Pilih ayat yang betul.',i:'Bezakan memberikan dan memberi.',a:['Ibu memberikan adik hadiah.','Ibu memberikan hadiah kepada adik.','Ibu memberi kepada adik hadiah.','Ibu memberikan kepada adik.'],c:1,e:'“Memberikan” diikuti benda, kemudian penerima dengan “kepada”.',cn:'memberikan 后接物，再用 kepada 接人。',f:'memberikan sesuatu kepada seseorang.',m:'给什么，再给谁。',t:'Susunan objek mesti lengkap.'},
{id:'KBH-030',s:'Ayat pasif',q:'Pilih ayat pasif diri kedua yang betul.',i:'Gunakan kata ganti nama sebelum kata kerja dasar.',a:['Borang itu mesti dihantar oleh kamu.','Borang itu mesti kamu hantar.','Kamu mesti borang itu dihantar.','Borang itu kamu mesti dihantarkan.'],c:1,e:'Pasif diri kedua tidak menggunakan “di-”.',cn:'第二人称被动句不用 di-。',f:'Objek + kata bantu + kamu + kata kerja dasar.',m:'你被动，不加 di-。',t:'Jangan guna bentuk pasif diri ketiga.'},
{id:'KBH-031',s:'Ayat aktif-pasif',q:'Pilih ayat pasif yang betul.',i:'Objek dipindahkan ke hadapan.',a:['Pintu itu ditutup oleh pengawas.','Pengawas ditutup oleh pintu itu.','Pintu itu menutup pengawas.','Ditutup pengawas pintu itu oleh.'],c:0,e:'Objek asal menjadi subjek ayat pasif dan kata kerja menggunakan “di-”.',cn:'原宾语移到前面，动词改为 di-。',f:'Objek + di- + oleh pelaku.',m:'宾语前移，动词换 di-。',t:'Jangan tukar pelaku dan objek.'},
{id:'KBH-032',s:'Kata bantu',q:'Pilih ayat yang betul.',i:'Semak aspek masa.',a:['Mereka telah akan tiba semalam.','Mereka telah tiba semalam.','Mereka sedang tiba semalam.','Mereka akan tiba semalam.'],c:1,e:'“Telah” sesuai dengan peristiwa lampau.',cn:'telah 表示已经发生。',f:'telah + kata kerja.',m:'已经发生，用 telah。',t:'Jangan gabungkan masa lampau dengan “akan”.'},
{id:'KBH-033',s:'Kata bantu',q:'Pilih ayat yang betul.',i:'Semak tindakan sedang berlaku.',a:['Dia sedang membaca sekarang.','Dia telah membaca sekarang.','Dia akan membaca sekarang semalam.','Dia belum sedang membaca semalam.'],c:0,e:'“Sedang” menunjukkan tindakan yang sedang berlaku.',cn:'sedang 表示正在进行。',f:'sedang + kata kerja.',m:'正在做，用 sedang。',t:'Pastikan keterangan masa sesuai.'},
{id:'KBH-034',s:'Kata penguat',q:'Pilih ayat yang betul.',i:'Elakkan penguat berganda.',a:['Bilik itu terlalu sempit sekali.','Bilik itu terlalu sempit.','Bilik itu paling sempit sekali.','Bilik itu sangat terlalu sempit.'],c:1,e:'Satu kata penguat sudah memadai.',cn:'一个加强词就足够。',f:'kata penguat + kata adjektif.',m:'加强词不要堆叠。',t:'Elakkan “terlalu...sekali”.'},
{id:'KBH-035',s:'Kata penguat',q:'Pilih ayat yang betul.',i:'Semak kedudukan “sekali”.',a:['Makanan itu sekali sedap.','Makanan itu sedap sekali.','Makanan itu sangat sedap sekali.','Makanan itu paling sedap sekali.'],c:1,e:'“Sekali” sebagai penguat belakang hadir selepas kata adjektif.',cn:'sekali 作后置加强词，放在形容词后。',f:'kata adjektif + sekali.',m:'sekali 放后面。',t:'Jangan letak sebelum kata adjektif.'},

];let pool=[],idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);const shuffle=a=>[...a].sort(()=>Math.random()-.5);$('enter').onclick=()=>{pool=shuffle(Q).slice(0,15);$('player').textContent=$('name').value.trim()||'Murid';$('login').classList.add('hidden');$('game').classList.remove('hidden');render()};function render(){locked=false;const x=pool[idx];$('meta').textContent=x.id+' • '+x.s;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=pool[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<pool.length?render():finish()};function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('summary').innerHTML='<p>Skor: <b>'+score+'</b></p><p>Betul: <b>'+correct+'/15</b></p><p>Ketepatan: <b>'+Math.round(correct/15*100)+'%</b></p><p>Bank soalan: <b>50</b></p>'}$('retry').onclick=()=>location.reload();</script></body></html>
