<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 7</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.avatar{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.avatar{background:#0b1930;border:1px solid var(--line)}.avatar.active{border:2px solid var(--accent)}.avatar span{display:block;font-size:32px}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad)}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 7</span><h1>Kata Majmuk</h1><p class="muted">15 cabaran • jenis, ejaan dan kata majmuk mantap</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 7 • KATA MAJMUK</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">🔗</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World 7 Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KM-001',s:'Kata majmuk bebas',d:'Mudah',q:'Pilih kata majmuk bebas.',i:'Pilih jawapan yang tepat.',a:['meja tulis','antarabangsa','kerjasama','olahraga'],c:0,e:'“Meja tulis” ialah gabungan dua kata bebas yang dieja terpisah.',cn:'meja tulis 是两个独立词组成，分开写。',f:'Dua kata bebas + satu makna khusus = kata majmuk.',m:'两个词，合成一个意思。',t:'Jangan anggap semua bentuk rapat sebagai kata majmuk biasa.'},
{id:'KM-002',s:'Kata majmuk istilah khusus',d:'Sederhana',q:'Yang manakah kata majmuk istilah khusus?',i:'Pilih istilah bidang tertentu.',a:['garis pusat','rumah besar','budak kecil','jalan jauh'],c:0,e:'“Garis pusat” ialah istilah khusus dalam matematik.',cn:'garis pusat 是数学专门术语。',f:'Istilah bidang ilmu sering berupa kata majmuk khusus.',m:'看到学科术语，想到 istilah khusus。',t:'Frasa biasa tidak semestinya kata majmuk istilah khusus.'},
{id:'KM-003',s:'Kata majmuk kiasan',d:'Sederhana',q:'Pilih kata majmuk kiasan.',i:'Cari gabungan yang membawa makna bukan literal.',a:['kaki ayam','kerusi kayu','buku teks','jalan raya'],c:0,e:'“Kaki ayam” bermaksud tidak berkasut, bukan kaki seekor ayam.',cn:'kaki ayam 是比喻义，表示赤脚。',f:'Makna tidak sama dengan gabungan literal → kiasan.',m:'字面不对，可能是比喻。',t:'Jangan pilih berdasarkan bentuk sahaja; lihat makna.'},
{id:'KM-004',s:'Ejaan kata majmuk',d:'Mudah',q:'Pilih ejaan yang betul.',i:'Kata majmuk biasa lazimnya dieja terpisah.',a:['alatulis','alat tulis','alattulis','alat-tulis'],c:1,e:'“Alat tulis” dieja terpisah.',cn:'alat tulis 必须分开写。',f:'Kata majmuk biasa → dua perkataan terpisah.',m:'普通复合词，分开写。',t:'Jangan rapatkan tanpa sebab.'},
{id:'KM-005',s:'Kata majmuk mantap',d:'Sederhana',q:'Pilih kata majmuk mantap.',i:'Kata majmuk mantap dieja rapat.',a:['tanggung jawab','tanggungjawab','tanggung-jawab','tanggung  jawab'],c:1,e:'“Tanggungjawab” ialah kata majmuk mantap dan dieja rapat.',cn:'tanggungjawab 是固定复合词，连写。',f:'Kata majmuk mantap → ejaan rapat.',m:'已固定，就连写。',t:'Jangan pisahkan kata majmuk mantap.'},
{id:'KM-006',s:'Kata majmuk mantap',d:'Sederhana',q:'Yang manakah dieja rapat?',i:'Pilih bentuk baku.',a:['kereta api','surat khabar','pesuruhjaya','jam tangan'],c:2,e:'“Pesuruhjaya” ialah kata majmuk mantap.',cn:'pesuruhjaya 要连写。',f:'Hafal bentuk mantap yang standard.',m:'固定名单要记牢。',t:'Bukan semua kata majmuk dieja rapat.'},
{id:'KM-007',s:'Pembentukan jamak',d:'Sukar',q:'Pilih bentuk jamak yang betul bagi “alat tulis”.',i:'Gandakan unsur pertama sahaja.',a:['alat-alat tulis','alat tulis-alat tulis','alat-alat tulis-tulis','alat tulis-tulis'],c:0,e:'Bagi kata majmuk biasa, unsur pertama digandakan.',cn:'普通复合词变复数，只重叠第一个词。',f:'Kata majmuk jamak → unsur pertama digandakan.',m:'复数只翻第一块。',t:'Jangan gandakan kedua-dua unsur.'},
{id:'KM-008',s:'Imbuhan pada kata majmuk',d:'Sukar',q:'Pilih bentuk berimbuhan yang betul.',i:'Apitan menyebabkan kata majmuk dirapatkan.',a:['menyatu padukan','menyatupadukan','menyatu-padukan','menyatu padukankan'],c:1,e:'Apabila menerima apitan, “satu padu” menjadi “menyatupadukan”.',cn:'复合词加环缀后要连写：menyatupadukan。',f:'Apitan pada kata majmuk → ejaan rapat.',m:'前后都加缀，就合起来。',t:'Jangan kekalkan jarak selepas menerima apitan.'},
{id:'KM-009',s:'Awalan pada kata majmuk',d:'Sukar',q:'Pilih ejaan yang betul.',i:'Awalan sahaja tidak merapatkan keseluruhan kata majmuk.',a:['bercampurtangan','bercampur tangan','ber-campur tangan','bercampur-tangan'],c:1,e:'Dengan awalan sahaja, “campur tangan” masih dieja terpisah.',cn:'只加前缀时仍分开写：bercampur tangan。',f:'Awalan sahaja → kata majmuk kekal terpisah.',m:'只加前缀，不一定合体。',t:'Bezakan awalan sahaja dengan apitan.'},
{id:'KM-010',s:'Makna kata majmuk',d:'Sederhana Tinggi',q:'Apakah maksud “buah tangan”?',i:'Pilih makna kiasan yang tepat.',a:['buah yang dipegang','hadiah yang dibawa pulang','tangan berbentuk buah','hasil tanaman'],c:1,e:'“Buah tangan” bermaksud hadiah atau cenderamata.',cn:'buah tangan 指带回来的礼物。',f:'Kata majmuk kiasan mesti difahami melalui makna keseluruhan.',m:'整组看意思，不逐字翻。',t:'Jangan terjemah setiap kata secara literal.'},
{id:'KM-011',s:'Mengenal pasti jenis',d:'Sukar',q:'“Mata pelajaran” tergolong sebagai...',i:'Pilih klasifikasi yang tepat.',a:['kata majmuk bebas','kata ganda','kata terbitan','akronim'],c:0,e:'“Mata pelajaran” ialah gabungan kata bebas yang membentuk satu unit makna.',cn:'mata pelajaran 是普通复合词。',f:'Dua kata bebas, satu konsep → kata majmuk.',m:'两个词，一个概念。',t:'Jangan keliru dengan frasa biasa.'},
{id:'KM-012',s:'Pembetulan ejaan',d:'Sukar',q:'Pilih ayat yang gramatis.',i:'Fokus pada ejaan kata majmuk.',a:['Ayah membaca suratkhabar.','Ayah membaca surat khabar.','Ayah membaca surat-khabar.','Ayah membaca surat  khabar.'],c:1,e:'“Surat khabar” dieja terpisah.',cn:'surat khabar 必须分开写。',f:'Kata majmuk biasa → terpisah.',m:'报纸两个词，分开。',t:'Jangan ikut sebutan cepat lalu merapatkan ejaan.'},
{id:'KM-013',s:'Kata majmuk mantap',d:'Sukar',q:'Pilih kumpulan yang semuanya kata majmuk mantap.',i:'Semua mesti dieja rapat.',a:['antarabangsa, kerjasama, olahraga','kereta api, surat khabar, meja tulis','jalan raya, mata pelajaran, rumah sakit','alat tulis, jam tangan, gambar rajah'],c:0,e:'Ketiga-tiga perkataan itu ialah kata majmuk mantap.',cn:'antarabangsa、kerjasama、olahraga 都是固定连写。',f:'Mantap = bentuk baku yang telah dirapatkan.',m:'固定词，整块记。',t:'Jangan campur kata majmuk biasa dengan mantap.'},
{id:'KM-014',s:'Analisis imbuhan',d:'Boss',q:'Pilih analisis yang betul bagi “penguatkuasaan”.',i:'Tentukan asal dan ejaan.',a:['Asalnya kuat kuasa; menerima apitan lalu dieja rapat.','Asalnya kuatkuasa; tiada imbuhan.','Asalnya kuasa kuat; menerima awalan sahaja.','Bukan kata majmuk.'],c:0,e:'“Kuat kuasa” menerima apitan peN-...-an lalu menjadi “penguatkuasaan”.',cn:'kuat kuasa 加上环缀后连写成 penguatkuasaan。',f:'Kata majmuk + apitan → dirapatkan.',m:'复合词加环缀，合起来。',t:'Jangan anggap bentuk rapat itu kata dasar asal.'},
{id:'KM-015',s:'Analisis lengkap',d:'Final Boss',q:'Pilih ayat yang semuanya betul.',i:'Semak jenis, ejaan dan imbuhan kata majmuk.',a:['Mereka bekerjasama untuk menguat kuasakan undang-undang itu.','Mereka bekerja sama untuk menguatkuasa undang-undang itu.','Mereka bekerjasama untuk menguatkuasakan undang-undang itu.','Mereka berkerjasama untuk menguat-kuasakan undang-undang itu.'],c:2,e:'“Bekerjasama” dan “menguatkuasakan” ialah bentuk baku yang dieja rapat.',cn:'正确写法是 bekerjasama 和 menguatkuasakan。',f:'Mantap dan bentuk berapitan → ejaan rapat.',m:'固定词连写，环缀词也连写。',t:'Jangan pisahkan atau tambah sempang sesuka hati.'}
];const $=id=>document.getElementById(id);let selected=0,player='',run=null;function show(id){['login','game','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function renderAv(){$('avatars').innerHTML=AV.map((a,i)=>`<button class="avatar ${i===selected?'active':''}" data-a="${i}"><span>${a[1]}</span>${a[0]}</button>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{selected=+b.dataset.a;renderAv()})}function enter(){player=$('name').value.trim();if(!player)return alert('Masukkan nama murid.');$('player').textContent=`${AV[selected][1]} ${player}`;start()}function start(){run={idx:0,score:0,correct:0,answered:0,combo:0,locked:false};show('game');renderQ()}function renderQ(){run.locked=false;const q=Q[run.idx];$('meta').textContent=`${q.id} • ${q.s} • ${q.d}`;$('q').textContent=q.q;$('ins').textContent=q.i;$('prog').textContent=`${run.idx+1}/15`;$('hp').style.width=`${100-run.idx/15*100}%`;$('ans').innerHTML='';q.a.forEach((x,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=x;b.onclick=()=>answer(i);$('ans').appendChild(b)});$('fb').classList.add('hidden');$('next').classList.add('hidden');stats()}function answer(n){if(run.locked)return;run.locked=true;const q=Q[run.idx],ok=n===q.c;run.answered++;if(ok){run.correct++;run.combo++;run.score+=100+run.combo*10}else run.combo=0;$('fb').innerHTML=`<b style="color:${ok?'var(--good)':'var(--bad)'}">${ok?'Tepat!':'Belum tepat'}</b>${ok?'':`<p><b>Jawapan betul:</b> ${q.a[q.c]}</p>`}<p><b>Penjelasan BM:</b> ${q.e}</p><p class="cn"><b>华语讲解：</b> ${q.cn}</p><div class="formula"><b>Formula:</b> ${q.f}<br><span class="cn"><b>口诀：</b> ${q.m}</span></div><div class="trap"><b>Perangkap / 常见陷阱：</b><br>${q.t}</div>`;$('fb').classList.remove('hidden');$('next').classList.remove('hidden');[...$('ans').children].forEach((b,i)=>{b.disabled=true;if(i===q.c)b.style.borderColor='var(--good)';if(i===n&&!ok)b.style.borderColor='var(--bad)'});stats()}function stats(){$('score').textContent=run.score;$('combo').textContent=`x${run.combo}`;$('acc').textContent=run.answered?Math.round(run.correct/run.answered*100)+'%':'0%'}function next(){run.idx++;run.idx>=Q.length?finish():renderQ()}function finish(){const acc=Math.round(run.correct/Q.length*100);$('summary').innerHTML=`<div class="grid stats"><div class="stat">Betul<br><b>${run.correct}/15</b></div><div class="stat">Ketepatan<br><b>${acc}%</b></div><div class="stat">Skor<br><b>${run.score}</b></div><div class="stat">Status<br><b>${acc>=70?'Lulus':'Ulang Kaji'}</b></div></div><div class="feedback"><b>${acc>=70?'World 7 berjaya diselesaikan.':'Sasaran lulus ialah sekurang-kurangnya 70%.'}</b></div>`;show('finish')}renderAv();$('enter').onclick=enter;$('retry').onclick=start;$('next').onclick=next;</script></body></html>
