<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sintaksis Hunter T2 Phase 2 World 3</title>
<style>html,body{margin:0;width:100%;height:100%;background:#07111f}iframe{border:0;width:100%;height:100%;display:block}</style>
<script src="phase2-world3.js"></script>
</head>
<body>
<iframe id="phase2" src="v7.html" title="Sintaksis Hunter Phase 2 World 1 hingga 3"></iframe>
<script>
const outer=document.getElementById('phase2');
function installWorld3(){
 try{
  const level1=outer.contentDocument;
  const level2=level1&&level1.getElementById('phase2');
  const level2Doc=level2&&level2.contentDocument;
  const inner=level2Doc&&level2Doc.getElementById('game');
  if(!inner||!inner.contentWindow||!inner.contentWindow.buildQuestions)return false;
  const game=inner.contentWindow;
  if(game.__phase2World3Installed)return true;
  const previousBuild=game.buildQuestions;
  game.buildQuestions=function(world){
   if(world===2)return window.PHASE2_WORLD3.map(q=>({...q,a:[...q.a],keywords:[...(q.keywords||[])]}));
   return previousBuild(world);
  };
  game.__phase2World3Installed=true;
  return true;
 }catch(e){return false}
}
outer.addEventListener('load',()=>{
 let tries=0;
 const timer=setInterval(()=>{
  tries++;
  if(installWorld3()||tries>60)clearInterval(timer);
 },150);
});
</script>
</body>
</html>
