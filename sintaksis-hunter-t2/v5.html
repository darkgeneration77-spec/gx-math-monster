<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sintaksis Hunter T2 V5</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#07111f}iframe{border:0;width:100%;height:100%;display:block}
</style>
</head>
<body>
<iframe id="game" src="v4.html" title="Sintaksis Hunter T2 V5"></iframe>
<script>
const frame=document.getElementById('game');
frame.addEventListener('load',()=>{
 const w=frame.contentWindow,d=frame.contentDocument;
 const css=d.createElement('style');
 css.textContent=`
 .coach-modal{position:fixed;inset:0;background:rgba(2,8,18,.84);display:grid;place-items:center;padding:18px;z-index:9999}
 .coach-box{width:min(680px,100%);max-height:90vh;overflow:auto;background:#101d31;border:1px solid #36577e;border-radius:22px;padding:20px;color:#f4f7fb}
 .coach-avatar{font-size:54px;text-align:center}.coach-step{padding:13px;border:1px solid #29425f;border-radius:14px;background:#0a1728;margin:10px 0}
 .coach-options{display:grid;gap:9px;margin-top:12px}.coach-options button{padding:12px;border:1px solid #36577e;border-radius:12px;background:#142541;color:white;text-align:left;cursor:pointer}
 .coach-options button:hover{border-color:#7c5cff}.coach-cn{color:#65c7ff}.coach-ok{color:#29c875;font-weight:700}.coach-bad{color:#ff6272;font-weight:700}
 `;
 d.head.appendChild(css);
 const modal=d.createElement('div');modal.id='coachModal';modal.className='coach-modal hidden';
 modal.innerHTML=`<div class="coach-box"><div class="coach-avatar">🧙‍♂️</div><div class="tag">GRAMMAR MASTER</div><h2 id="coachTitle">Mari cari jawapan bersama</h2><p id="coachIntro" class="muted"></p><div id="coachBody"></div><div class="nav" style="margin-top:14px"><button id="coachClose" class="btn secondary">Tutup</button></div></div>`;
 d.body.appendChild(modal);
 const $=id=>d.getElementById(id);
 function guideFor(q){return w.GUIDES[q.cat]||w.GUIDES['Analisis Sintaksis']}
 function coachQuestions(q){
  if(q.cat==='Subjek dan Predikat')return[
   {bm:'Apakah perkara pertama yang perlu dicari?',cn:'第一步应该先找什么？',opts:['Siapa atau apa yang dibincangkan','Kata terakhir dalam ayat','Tanda baca sahaja'],c:0},
   {bm:'Selepas subjek dikenal pasti, bahagian selebihnya ialah...',cn:'找到主语后，剩下的部分是什么？',opts:['Predikat','Subjek kedua','Kata sendi'],c:0}
  ];
  if(q.cat==='Pola Ayat')return[
   {bm:'Bahagian manakah menentukan pola ayat?',cn:'哪一部分决定基本句型？',opts:['Inti predikat','Kata pertama sahaja','Panjang ayat'],c:0},
   {bm:'Jika inti predikat menunjukkan sifat, pilih...',cn:'谓语核心表示性质时选什么？',opts:['FA','FK','FS'],c:0}
  ];
  if(q.cat==='Jenis Ayat')return[
   {bm:'Untuk menentukan jenis ayat, kita lihat...',cn:'判断句子种类要看什么？',opts:['Tujuan ayat','Bilangan perkataan','Subjek sahaja'],c:0},
   {bm:'Kata jangan, usah atau tolong biasanya menunjukkan...',cn:'jangan、usah、tolong 通常表示什么？',opts:['Ayat perintah','Ayat seruan','Ayat penyata'],c:0}
  ];
  if(q.cat==='Susunan Ayat')return[
   {bm:'Susunan biasa menggunakan formula...',cn:'正常语序公式是什么？',opts:['S + P','P + S','Objek + Subjek'],c:0},
   {bm:'Jika predikat berada di hadapan, ayat itu...',cn:'谓语放在前面是什么语序？',opts:['Songsang','Biasa','Pasif sahaja'],c:0}
  ];
  if(q.cat==='Ayat Aktif dan Pasif')return[
   {bm:'Dalam ayat aktif, siapakah berada di hadapan?',cn:'主动句中谁在前面？',opts:['Pelaku','Objek','Tempat'],c:0},
   {bm:'Dalam ayat pasif, apakah dipindahkan ke hadapan?',cn:'被动句中什么移到前面？',opts:['Objek','Pelaku','Kata adjektif'],c:0}
  ];
  return[
   {bm:'Langkah pertama analisis sintaksis ialah...',cn:'综合分析第一步是什么？',opts:['Pisahkan subjek dan predikat','Terus pilih jawapan','Cari tanda seru sahaja'],c:0},
   {bm:'Selepas itu, semak inti predikat dan...',cn:'接着检查谓语核心和什么？',opts:['Tujuan serta susunan ayat','Bilangan huruf','Nama watak sahaja'],c:0}
  ];
 }
 function openCoach(q,chosen,onDone){
  const g=guideFor(q),steps=coachQuestions(q);let si=0,earned=0;
  $('coachModal').classList.remove('hidden');$('coachTitle').textContent='Grammar Master: Jangan terus hafal jawapan';
  $('coachIntro').innerHTML=`<b>Soalan:</b> ${q.q}<br><span class="coach-cn">先跟着步骤判断，不要直接背答案。</span>`;
  function renderStep(){
   const s=steps[si];
   if(!s){
    $('coachBody').innerHTML=`<div class="coach-step"><div class="coach-ok">Panduan selesai! +${earned} Recovery Points</div><p><b>Jawapan anda:</b> ${q.a[chosen]}</p><p><b>Jawapan betul:</b> ${q.a[q.c]}</p><div class="formula"><b>${g.bm}</b><br><span class="coach-cn">${g.cn}</span></div><p><b>Penjelasan:</b> ${q.e}</p><p class="coach-cn"><b>华语总结：</b> ${g.cnsteps.join(' ')}</p><button id="coachDone" class="btn good">Saya faham / 我明白了</button></div>`;
    $('coachDone').onclick=()=>{$('coachModal').classList.add('hidden');onDone(earned)};return;
   }
   $('coachBody').innerHTML=`<div class="coach-step"><div class="tag">LANGKAH ${si+1}/${steps.length}</div><h3>${s.bm}</h3><p class="coach-cn">${s.cn}</p><div class="coach-options">${s.opts.map((x,i)=>`<button data-o="${i}">${x}</button>`).join('')}</div><div id="coachMsg"></div></div>`;
   d.querySelectorAll('[data-o]').forEach(b=>b.onclick=()=>{const ok=+b.dataset.o===s.c;$('coachMsg').innerHTML=ok?'<p class="coach-ok">Betul! 你找对方向了。</p>':'<p class="coach-bad">Belum tepat. 再看口诀：先判断这一步要找什么。</p>';if(ok){earned+=10;setTimeout(()=>{si++;renderStep()},500)}})
  }
  renderStep();
 }
 $('coachClose').onclick=()=>$('coachModal').classList.add('hidden');
 const originalAnswer=w.answer;
 w.answer=function(n){
  if(w.run.locked)return;
  const q=w.run.qs[w.run.idx],wrong=n!==q.c;
  originalAnswer(n);
  if(wrong){
   const nextBtn=d.getElementById('next');nextBtn.disabled=true;nextBtn.textContent='Selesaikan Grammar Master dahulu';
   setTimeout(()=>openCoach(q,n,(earned)=>{w.state.total+=earned;w.state.coins+=Math.floor(earned/2);w.save();nextBtn.disabled=false;nextBtn.textContent='Seterusnya'}),250);
  }
 };
 const originalReview=w.review;
 w.review=function(){originalReview();d.querySelectorAll('[data-r]').forEach(b=>{const i=+b.dataset.r;b.textContent=w.state.wrong[i].resolved?'Selesai':'Grammar Master + Jawab Semula';b.onclick=()=>{const item=w.state.wrong[i];openCoach(item,item.chosen,()=>w.retry(i))}})};
});
</script>
</body>
</html>
