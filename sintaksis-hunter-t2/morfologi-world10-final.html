<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 10</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#311b62,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.avatar{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.avatar{background:#0b1930;border:1px solid var(--line)}.avatar.active{border:2px solid var(--gold)}.avatar span{display:block;font-size:32px}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#3e2b71}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:76px;padding:18px}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--bad),var(--gold))}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 10</span><h1>Final Morfologi Arena</h1><p class="muted">15 cabaran Boss • campuran semua tatabahasa Morfologi</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Final Arena</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 10 • FINAL MORFOLOGI</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">👑</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>Final Arena Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <button id="wrong" class="btn hidden">Ulang Soalan Salah</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const ALL=[
{id:'FM-001',s:'Kata Ganti Nama',d:'Boss',q:'Pilih ayat yang menggunakan kata ganti nama diri dengan betul.',i:'Pilih jawapan paling tepat.',a:['Kami akan membantu kamu menyiapkan tugasan itu.','Kita akan menghadiri mesyuarat yang kamu tidak sertai.','Beliau digunakan untuk kawan rapat saya.','Mereka merujuk kepada sebuah meja.'],c:0,e:'“Kami” merujuk penutur dan pihak lain tanpa pendengar.',cn:'kami 包括说话者和其他人，但不包括听者。',f:'kami = penutur + pihak lain, tidak termasuk pendengar.',m:'Kami 不包括你。',t:'Kita mesti termasuk pendengar.'},
{id:'FM-002',s:'Akronim',d:'Boss',q:'Yang manakah akronim yang dieja sebagai satu perkataan?',i:'Pilih jawapan.',a:['MARA','tadika','JKR','SMK'],c:1,e:'“Tadika” ialah akronim daripada taman didikan kanak-kanak.',cn:'tadika 是由多个词组合形成并作为一个词书写。',f:'Akronim sebutan kata → eja sebagai satu perkataan.',m:'能像普通词读出来，就连写。',t:'Huruf singkatan biasa bukan semuanya akronim perkataan.'},
{id:'FM-003',s:'Kata Adjektif',d:'Boss',q:'Pilih ayat yang menggunakan kata penguat dengan betul.',i:'Pilih jawapan.',a:['Pemandangan itu paling indah sekali.','Pemandangan itu sungguh indah.','Pemandangan itu terindah sekali sangat.','Pemandangan itu amat terindah.'],c:1,e:'“Sungguh indah” ialah binaan yang gramatis.',cn:'sungguh + 形容词是正确搭配。',f:'kata penguat + kata adjektif.',m:'一个加强词就够。',t:'Elakkan darjah penghabisan berganda.'},
{id:'FM-004',s:'Kata Kerja Transitif',d:'Boss',q:'Pilih ayat yang gramatis.',i:'Fokus pada objek.',a:['Mereka membincangkan tentang masalah itu.','Mereka membincangkan masalah itu.','Mereka berbincangkan masalah itu.','Mereka membincang akan masalah itu.'],c:1,e:'“Membincangkan” terus diikuti objek.',cn:'membincangkan 后面直接接宾语。',f:'membincangkan + objek.',m:'有 -kan，不要再加 tentang。',t:'Jangan campur pola membincangkan dengan berbincang tentang.'},
{id:'FM-005',s:'Kata Ganda',d:'Boss',q:'Pilih ayat yang betul.',i:'Elakkan penanda jamak berganda.',a:['Semua murid-murid hadir.','Para peserta-peserta berkumpul.','Murid-murid hadir awal.','Beberapa buah-buah rumah rosak.'],c:2,e:'“Murid-murid” sudah membawa makna jamak.',cn:'murid-murid 已经表示复数，不需要其他复数词。',f:'Satu penanda jamak sahaja.',m:'复数标记只能一个。',t:'Semua + murid-murid ialah lewah.'},
{id:'FM-006',s:'Kata Terbitan',d:'Boss',q:'Pilih kata terbitan yang betul daripada kata dasar “indah”.',i:'Pilih jawapan.',a:['keindahan','pengindahaan','mengindahi','terindahan'],c:0,e:'“Keindahan” terbentuk daripada apitan ke-...-an.',cn:'keindahan 使用 ke-...-an 构成名词。',f:'ke- + indah + -an.',m:'性质变名词，常用 ke-...-an。',t:'Jangan tambah huruf secara sembarangan.'},
{id:'FM-007',s:'Kata Majmuk',d:'Boss',q:'Pilih ejaan kata majmuk yang betul.',i:'Pilih jawapan.',a:['tengahari','alatulis','kereta api','urus setia'],c:2,e:'“Kereta api” ialah kata majmuk bebas dan dieja terpisah.',cn:'kereta api 是自由复合词，分开书写。',f:'Kata majmuk biasa → eja terpisah.',m:'大多数 kata majmuk 分开写。',t:'“Urus setia” kini bentuk mantap “urusetia”.'},
{id:'FM-008',s:'Kata Bantu',d:'Boss',q:'Pilih susunan kata bantu yang betul.',i:'Pilih jawapan.',a:['Mereka akan mesti hadir.','Mereka mesti akan hadir.','Mereka masih belum tiba.','Mereka belum masih tiba.'],c:2,e:'“Masih belum” ialah susunan aspek yang tepat.',cn:'masih belum 表示仍然还没有。',f:'masih + belum + kata kerja.',m:'仍然未 = masih belum。',t:'Susunan kata bantu tidak boleh diterbalikkan sesuka hati.'},
{id:'FM-009',s:'Kata Tugas',d:'Boss',q:'Pilih ayat yang menggunakan kata pemeri dengan betul.',i:'Pilih jawapan.',a:['Encik Ali adalah guru kami.','Tujuan program itu ialah untuk membantu murid.','Encik Ali ialah guru kami.','Bilik itu ialah sangat luas.'],c:2,e:'“Ialah” digunakan sebelum frasa nama.',cn:'ialah 用在名词短语前。',f:'ialah + frasa nama.',m:'A ialah B。',t:'“Adalah” tidak sesuai sebelum frasa nama.'},
{id:'FM-010',s:'Campuran Imbuhan',d:'Boss',q:'Pilih ayat pasif diri pertama yang betul.',i:'Pilih jawapan.',a:['Tugasan itu telah disiapkan oleh saya.','Tugasan itu telah saya siapkan.','Tugasan itu saya telah disiapkan.','Saya telah tugasan itu siapkan.'],c:1,e:'Pasif diri pertama menggunakan kata ganti nama sebelum kata kerja dasar.',cn:'第一人称被动句：objek + saya + kata kerja dasar。',f:'Objek + kata bantu + saya + kata kerja dasar.',m:'我你被动，不加 di-。',t:'Elakkan “disiapkan oleh saya” dalam pola sekolah.'},
{id:'FM-011',s:'Kesalahan Bahasa',d:'Boss',q:'Pilih ayat tanpa kesalahan bahasa.',i:'Pilih jawapan.',a:['Dia berasal daripada Johor.','Dia berasal dari keluarga miskin.','Hadiah itu datang dari ibunya.','Mereka tiba daripada Kuala Lumpur.'],c:0,e:'“Daripada” digunakan untuk asal keturunan atau sumber manusia.',cn:'来自人的背景或来源使用 daripada。',f:'daripada + manusia/sumber; dari + tempat/masa/arah.',m:'人来源 daripada，地点时间 dari。',t:'Jangan gunakan dari untuk sumber manusia.'},
{id:'FM-012',s:'Analisis Kata',d:'Boss',q:'Dalam ayat “Para pemain sedang berlatih di padang”, perkataan manakah kata bantu?',i:'Pilih jawapan.',a:['Para','pemain','sedang','padang'],c:2,e:'“Sedang” ialah kata bantu aspek yang menunjukkan perbuatan berlaku sekarang.',cn:'sedang 表示动作正在进行。',f:'sedang + kata kerja.',m:'正在 = sedang。',t:'“Para” ialah kata bilangan.'},
{id:'FM-013',s:'Kata Majmuk Berimbuhan',d:'Boss',q:'Pilih bentuk berimbuhan yang betul.',i:'Pilih jawapan.',a:['mengambilalih','mengambil alih','pengambil alihan','pengambilalihan'],c:3,e:'Apitan pada kata majmuk menyebabkan bentuk itu dieja rapat: pengambilalihan.',cn:'复合词加前后缀后通常连写。',f:'peN- + ambil alih + -an → pengambilalihan.',m:'前后都包住，就连起来。',t:'Awalan sahaja biasanya masih terpisah.'},
{id:'FM-014',s:'Analisis Pelbagai',d:'Boss',q:'Pilih analisis tepat bagi ayat “Wah, adik masih membaca buku cerita itu.”',i:'Tentukan kelas kata.',a:['Wah kata seru; masih kata bantu; membaca kata kerja transitif; buku cerita kata majmuk.','Wah kata tanya; masih kata nafi; membaca kata adjektif; buku cerita kata ganda.','Wah kata perintah; masih kata hubung; membaca kata nama; buku cerita akronim.','Semua ialah kata tugas.'],c:0,e:'Ayat ini mengandungi empat kategori morfologi yang berbeza.',cn:'句中同时包含感叹词、助动词、及物动词和复合词。',f:'Analisis fungsi setiap perkataan dalam konteks.',m:'一词一功能，逐个判断。',t:'Jangan menilai hanya berdasarkan kedudukan.'},
{id:'FM-015',s:'Final Boss',d:'Final Boss',q:'Pilih ayat yang paling gramatis.',i:'Gabungkan semua pengetahuan morfologi.',a:['Para pelajar-pelajar masih sedang membincangkan tentang kerja sama itu.','Para pelajar masih membincangkan kerjasama itu.','Pelajar-pelajar masih membincang tentang kerjasama itu sekali.','Semua para pelajar membincangkan kerja-sama itu.'],c:1,e:'Ayat ini mengelakkan jamak berganda, menggunakan kata bantu dengan tepat, kata kerja transitif terus dengan objek, dan ejaan “kerjasama” yang mantap.',cn:'这句没有重复复数，助动词、及物动词和 kerjasama 的拼写都正确。',f:'para pelajar + masih + membincangkan + kerjasama itu.',m:'复数一个、动词接宾语、固定词连写。',t:'Soalan akhir biasanya menggabungkan beberapa perangkap.'}
];let AVQ=ALL.slice(),ai=0,idx=0,score=0,combo=0,correct=0,locked=false,wrongIds=[];const $=x=>document.getElementById(x);AV.forEach((v,i)=>{const b=document.createElement('button');b.className='avatar';b.innerHTML='<span>'+v[1]+'</span>'+v[0];b.onclick=()=>{ai=i;document.querySelectorAll('.avatar').forEach(x=>x.classList.remove('active'));b.classList.add('active')};$('avatars').appendChild(b)});document.querySelector('.avatar').classList.add('active');$('enter').onclick=()=>start(ALL.slice());function start(bank){AVQ=bank;idx=score=combo=correct=0;wrongIds=[];const n=$('name').value.trim()||'Murid';$('player').textContent=AV[ai][1]+' '+n;$('login').classList.add('hidden');$('finish').classList.add('hidden');$('game').classList.remove('hidden');render()}function render(){locked=false;const x=AVQ[idx];$('meta').textContent=x.id+' • '+x.s+' • '+x.d;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/'+AVQ.length;$('hp').style.width=((AVQ.length-idx)/AVQ.length*100)+'%';$('ans').innerHTML='';$('fb').classList.add('hidden');$('next').classList.add('hidden');x.a.forEach((t,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+t;b.onclick=()=>answer(i,b);$('ans').appendChild(b)})}function answer(i,b){if(locked)return;locked=true;const x=AVQ[idx],ok=i===x.c;if(ok){score+=150+combo*25;combo++;correct++;b.style.borderColor='var(--good)'}else{combo=0;wrongIds.push(x.id);b.style.borderColor='var(--bad)';document.querySelectorAll('.answer')[x.c].style.borderColor='var(--good)'}$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=Math.round(correct/(idx+1)*100)+'%';$('fb').innerHTML='<b>'+(ok?'Betul! Boss terkena serangan!':'Belum tepat.')+'</b><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<AVQ.length?render():finish()};function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');const pct=Math.round(correct/AVQ.length*100),stars=pct>=90?'★★★':pct>=70?'★★☆':'★☆☆';const best=Math.max(score,Number(localStorage.getItem('morfologiWorld10Best')||0));localStorage.setItem('morfologiWorld10Best',best);$('summary').innerHTML='<h2>'+stars+' Morfologi Master</h2><p>Skor: <b>'+score+'</b> • Rekod tertinggi: <b>'+best+'</b></p><p>Betul: <b>'+correct+'/'+AVQ.length+'</b> • Ketepatan: <b>'+pct+'%</b></p><p>Soalan salah: <b>'+wrongIds.length+'</b></p>';$('wrong').classList.toggle('hidden',wrongIds.length===0)}$('retry').onclick=()=>start(ALL.slice());$('wrong').onclick=()=>start(ALL.filter(q=>wrongIds.includes(q.id)));</script></body></html>
