<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 6</title><style>:root{--bg:#07111f;--p:#101d31;--l:#29425f;--t:#f4f7fb;--m:#9fb0c7;--a:#7c5cff;--g:#29c875;--b:#ff6272;--y:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--t)}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:var(--p);border:1px solid var(--l);border-radius:20px;padding:18px}.hidden{display:none!important}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.avatars{grid-template-columns:repeat(4,1fr)}.stat,.answer,.avatar{background:#0a1728;border:1px solid var(--l);border-radius:13px;padding:13px;color:white}.answer,.avatar,.btn{cursor:pointer}.btn{border:0;border-radius:12px;padding:12px 15px;background:var(--a);color:white;font-weight:800;text-decoration:none}.avatar.active{border:2px solid var(--a)}.avatar span{display:block;font-size:32px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--m)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--l);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--l);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--y);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--b);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:72px;padding:18px}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--b)}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 6</span><h1>Kata Terbitan</h1><p class="muted">15 cabaran • awalan, akhiran, apitan dan sisipan</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 6 • KATA TERBITAN</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">🧩</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World 6 Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KT-001',s:'Kata dasar',d:'Mudah',q:'Apakah kata dasar bagi “bermain”?',i:'Pilih kata dasar.',a:['main','bermain','permainan','pemain'],c:0,e:'“Bermain” terbentuk daripada awalan ber- + kata dasar main.',cn:'bermain由前缀ber-加词根main构成。',f:'Buang imbuhan untuk mencari kata dasar.',m:'先拆词缀，再找词根。',t:'Jangan pilih kata yang masih berimbuhan.'},
{id:'KT-002',s:'Awalan meN-',d:'Mudah',q:'Pilih kata terbitan berawalan meN-.',i:'Pilih jawapan tepat.',a:['membaca','bacaan','pembaca','terbaca'],c:0,e:'“Membaca” menerima awalan meN-.',cn:'membaca含有前缀meN-。',f:'meN- + baca → membaca.',m:'主动动作常见meN-。',t:'“Pembaca” menggunakan peN-.'},
{id:'KT-003',s:'Awalan peN-',d:'Sederhana',q:'Orang yang menulis disebut _____.',i:'Pilih kata nama terbitan.',a:['penulis','menulis','tulisan','tertulis'],c:0,e:'peN- membentuk kata nama pelaku “penulis”.',cn:'peN-可构成人物名词，penulis表示作者。',f:'peN- + kata kerja → pelaku.',m:'做事的人，常用peN-。',t:'“Tulisan” ialah hasil, bukan pelaku.'},
{id:'KT-004',s:'Akhiran -an',d:'Sederhana',q:'Pilih kata berakhiran -an.',i:'Kenal pasti imbuhan akhiran.',a:['makanan','memakan','pemakan','termakan'],c:0,e:'“Makanan” ialah makan + -an.',cn:'makanan由词根makan加后缀-an。',f:'Kata dasar + -an.',m:'尾巴-an，看词末。',t:'Jangan keliru dengan awalan meN- atau peN-.'},
{id:'KT-005',s:'Apitan ke-...-an',d:'Sederhana',q:'Pilih kata yang menggunakan apitan ke-...-an.',i:'Pilih jawapan.',a:['kebersihan','bersih','membersihkan','pembersih'],c:0,e:'“Kebersihan” menerima ke- dan -an serentak.',cn:'kebersihan同时含有ke-和-an。',f:'ke- + dasar + -an.',m:'前ke后an，夹住词根。',t:'Apitan mesti mempunyai bahagian depan dan belakang.'},
{id:'KT-006',s:'Apitan peN-...-an',d:'Sukar',q:'Proses membina bangunan disebut _____.',i:'Pilih kata nama proses.',a:['pembinaan','membina','binaan','pembina'],c:0,e:'“Pembinaan” ialah peN-...-an yang membawa makna proses.',cn:'pembinaan表示建造过程，使用peN-...-an。',f:'peN-...-an → proses / hasil.',m:'过程名词常见peN-...-an。',t:'“Pembina” ialah orang.'},
{id:'KT-007',s:'Apitan meN-...-kan',d:'Sukar',q:'Cikgu sedang _____ peraturan baharu itu kepada murid.',i:'Pilih kata kerja yang gramatis.',a:['menerangkan','penerangan','terang','diterangkan'],c:0,e:'Subjek melakukan tindakan, jadi “menerangkan” digunakan.',cn:'主语主动说明，因此使用menerangkan。',f:'Ayat aktif → meN-...-kan.',m:'主动做，用meN-。',t:'“Diterangkan” ialah pasif.'},
{id:'KT-008',s:'Apitan meN-...-i',d:'Sukar',q:'Penduduk kampung sedang _____ kawasan itu dengan pokok bunga.',i:'Pilih kata yang tepat.',a:['menghiasi','menghiaskan','hiasan','dihiasi'],c:0,e:'“Menghiasi” bermaksud memberi hiasan pada sesuatu tempat.',cn:'menghiasi表示装饰某个地方。',f:'meN-...-i sering berfokus pada tempat/objek sasaran.',m:'给某处加上东西，常用-i。',t:'Jangan pilih kata nama “hiasan”.'},
{id:'KT-009',s:'Awalan ter-',d:'Sederhana',q:'Pintu itu _____ apabila ditiup angin kuat.',i:'Pilih kata kerja yang menunjukkan tidak sengaja.',a:['terbuka','membuka','dibuka','pembukaan'],c:0,e:'Awalan ter- boleh menunjukkan keadaan berlaku tanpa sengaja.',cn:'ter-可表示无意中发生。',f:'ter- → tidak sengaja / sudah dalam keadaan.',m:'不小心发生，看ter-。',t:'“Dibuka” menunjukkan pasif oleh pelaku.'},
{id:'KT-010',s:'Awalan di-',d:'Sederhana',q:'Surat itu _____ oleh pengawas semalam.',i:'Pilih kata kerja pasif.',a:['dihantar','menghantar','penghantar','hantaran'],c:0,e:'Subjek menerima tindakan, maka awalan di- digunakan.',cn:'主语承受动作，因此使用di-。',f:'Objek di depan → di- + kata kerja.',m:'被做，用di-。',t:'Jangan guna meN- dalam ayat pasif.'},
{id:'KT-011',s:'Sisipan -el-',d:'Sukar',q:'Pilih kata yang mengandungi sisipan -el-.',i:'Pilih jawapan.',a:['telunjuk','gemuruh','seruling','gerigi'],c:0,e:'“Telunjuk” mengandungi sisipan -el-.',cn:'telunjuk含有中缀-el-。',f:'Sisipan hadir di tengah kata dasar.',m:'词中间藏词缀。',t:'Sisipan tidak berada di awal atau akhir.'},
{id:'KT-012',s:'Sisipan -em-',d:'Sukar',q:'Pilih kata yang mengandungi sisipan -em-.',i:'Pilih jawapan.',a:['gemuruh','telapak','seruling','gerigi'],c:0,e:'“Gemuruh” mengandungi sisipan -em-.',cn:'gemuruh含有中缀-em-。',f:'g + em + uruh → gemuruh.',m:'中间出现em。',t:'Jangan meneka berdasarkan bunyi sahaja.'},
{id:'KT-013',s:'Pembetulan imbuhan',d:'Boss',q:'Pilih ayat yang gramatis.',i:'Fokus pada penggunaan imbuhan.',a:['Ali memperbesarkan bilik itu.','Ali membesarkan bilik itu.','Ali dibesarkan bilik itu.','Ali kebesaran bilik itu.'],c:1,e:'“Membesarkan” bermaksud menjadikan bilik lebih besar.',cn:'使房间变大应使用membesarkan。',f:'meN-...-kan + objek.',m:'使……变得，用-kan。',t:'“Memperbesarkan” dianggap lewah dalam bentuk standard sekolah.'},
{id:'KT-014',s:'Kata nama dan kata kerja terbitan',d:'Boss',q:'Pasangan manakah terdiri daripada kata nama terbitan dan kata kerja terbitan?',i:'Pilih pasangan tepat.',a:['pembaca — membaca','baca — buku','cantik — sangat','di rumah — rumah'],c:0,e:'“Pembaca” ialah kata nama terbitan; “membaca” ialah kata kerja terbitan.',cn:'pembaca是派生名词，membaca是派生动词。',f:'peN- sering bina nama; meN- sering bina kerja.',m:'peN-人物，meN-动作。',t:'Pastikan kedua-duanya benar-benar kata terbitan.'},
{id:'KT-015',s:'Analisis lengkap',d:'Final Boss',q:'Pilih analisis tepat bagi kata “ketidakadilan”.',i:'Tentukan bentuk dan makna.',a:['Apitan ke-...-an pada bentuk tidak adil; kata nama abstrak','Awalan di-; kata kerja pasif','Akhiran -an sahaja; kata kerja','Sisipan -el-; kata adjektif'],c:0,e:'“Ketidakadilan” terbentuk daripada ke- + tidak adil + -an dan menjadi kata nama abstrak.',cn:'ketidakadilan由ke-...-an包住tidak adil，形成抽象名词。',f:'ke- + frasa dasar + -an → kata nama abstrak.',m:'前ke后an，常变抽象名词。',t:'Jangan hanya melihat -an di hujung.'}
];const $=x=>document.getElementById(x);let sel=0,name='',run;function show(x){['login','game','finish'].forEach(i=>$(i).classList.add('hidden'));$(x).classList.remove('hidden')}function avatars(){$('avatars').innerHTML=AV.map((a,i)=>`<button class="avatar ${i===sel?'active':''}" data-i="${i}"><span>${a[1]}</span>${a[0]}</button>`).join('');document.querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{sel=+b.dataset.i;avatars()})}function start(){name=$('name').value.trim()||name;if(!name)return alert('Masukkan nama murid.');run={i:0,s:0,c:0,a:0,combo:0,lock:false};$('player').textContent=`${AV[sel][1]} ${name}`;show('game');render()}function render(){run.lock=false;const q=Q[run.i];$('meta').textContent=`${q.id} • ${q.s} • ${q.d}`;$('q').textContent=q.q;$('ins').textContent=q.i;$('prog').textContent=`${run.i+1}/15`;$('hp').style.width=`${100-run.i/15*100}%`;$('ans').innerHTML=q.a.map((x,i)=>`<button class="answer" data-a="${i}">${x}</button>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>answer(+b.dataset.a));$('fb').classList.add('hidden');$('next').classList.add('hidden');stats()}function answer(n){if(run.lock)return;run.lock=true;const q=Q[run.i],ok=n===q.c;run.a++;if(ok){run.c++;run.combo++;run.s+=100+run.combo*10}else run.combo=0;$('fb').innerHTML=`<b style="color:${ok?'var(--g)':'var(--b)'}">${ok?'Tepat!':'Belum tepat'}</b>${ok?'':`<p><b>Jawapan betul:</b> ${q.a[q.c]}</p>`}<p><b>BM:</b> ${q.e}</p><p class="cn"><b>华语：</b> ${q.cn}</p><div class="formula"><b>Formula:</b> ${q.f}<br><span class="cn"><b>口诀：</b> ${q.m}</span></div><div class="trap"><b>陷阱：</b> ${q.t}</div>`;$('fb').classList.remove('hidden');$('next').classList.remove('hidden');document.querySelectorAll('[data-a]').forEach((b,i)=>{b.disabled=true;if(i===q.c)b.style.borderColor='var(--g)';if(i===n&&!ok)b.style.borderColor='var(--b)'});stats()}function stats(){$('score').textContent=run.s;$('combo').textContent='x'+run.combo;$('acc').textContent=run.a?Math.round(run.c/run.a*100)+'%':'0%'}function next(){run.i++;run.i>=15?finish():render()}function finish(){const a=Math.round(run.c/15*100);$('summary').innerHTML=`<div class="grid stats"><div class="stat">Betul<br><b>${run.c}/15</b></div><div class="stat">Ketepatan<br><b>${a}%</b></div><div class="stat">Skor<br><b>${run.s}</b></div><div class="stat">Status<br><b>${a>=70?'Lulus':'Ulang Kaji'}</b></div></div>`;show('finish')}avatars();$('enter').onclick=start;$('retry').onclick=start;$('next').onclick=next;</script></body></html>
