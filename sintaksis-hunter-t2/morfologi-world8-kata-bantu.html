<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morfologi World 8</title><style>:root{--bg:#07111f;--panel:#101d31;--line:#29425f;--text:#f4f7fb;--muted:#9fb0c7;--accent:#7c5cff;--good:#29c875;--bad:#ff6272;--gold:#ffc94a}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#183154,#07111f 58%);color:var(--text);min-height:100vh}.wrap{max-width:980px;margin:auto;padding:18px}.card{background:rgba(16,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:18px}.hidden{display:none!important}.btn,.answer,.avatar{border:0;border-radius:12px;padding:12px 15px;background:var(--accent);color:white;font-weight:800;cursor:pointer}.answer{background:#0b1930;border:1px solid var(--line);text-align:left}.grid{display:grid;gap:10px}.answers{grid-template-columns:1fr 1fr}.avatars{grid-template-columns:repeat(4,1fr)}.avatar{background:#0b1930;border:1px solid var(--line)}.avatar.active{border:2px solid var(--accent)}.avatar span{display:block;font-size:32px}.stats{grid-template-columns:repeat(4,1fr);margin:12px 0}.stat{background:#0a1728;border:1px solid var(--line);border-radius:12px;padding:12px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;background:#1c304b}.muted{color:var(--muted)}input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#071426;color:white;margin:8px 0 14px}.feedback{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:13px;background:#0a1728}.cn{color:#65c7ff}.formula{border-left:4px solid var(--gold);padding:10px;background:#111d30;margin-top:10px}.trap{border-left:4px solid var(--bad);padding:10px;background:#25151d;margin-top:10px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.monster{text-align:center;font-size:70px;padding:20px}.bar{height:12px;background:#050d18;border-radius:99px;overflow:hidden}.fill{height:100%;background:var(--bad)}a{color:white;text-decoration:none}@media(max-width:700px){.answers,.stats{grid-template-columns:1fr}.avatars{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="wrap"><section id="login" class="card"><span class="tag">WORLD 8</span><h1>Kata Bantu</h1><p class="muted">15 cabaran • aspek, ragam dan gabungan kata bantu</p><input id="name" placeholder="Nama murid"><div id="avatars" class="grid avatars"></div><p><button id="enter" class="btn">Masuk Permainan</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section><main id="game" class="hidden"><div class="top"><div><span class="tag">WORLD 8 • KATA BANTU</span><h1 id="player"></h1></div><a class="btn" href="morfologi-hub.html">Peta</a></div><div class="grid stats"><div class="stat">Skor<br><b id="score">0</b></div><div class="stat">Combo<br><b id="combo">x0</b></div><div class="stat">Ketepatan<br><b id="acc">0%</b></div><div class="stat">Soalan<br><b id="prog">1/15</b></div></div><section class="card"><div class="bar"><div id="hp" class="fill"></div></div><div class="monster">⏳</div><div id="meta" class="muted"></div><h2 id="q"></h2><p id="ins" class="muted"></p><div id="ans" class="grid answers"></div><div id="fb" class="feedback hidden"></div><button id="next" class="btn hidden" style="margin-top:12px">Seterusnya</button></section></main><section id="finish" class="card hidden"><h1>World 8 Selesai</h1><div id="summary"></div><p><button id="retry" class="btn">Main Semula</button> <a class="btn" href="morfologi-hub.html">Peta</a></p></section></div><script>const AV=[['Warrior','⚔️'],['Mage','🧙'],['Archer','🏹'],['Ninja','🥷']];const Q=[
{id:'KB-001',s:'Kata bantu aspek',d:'Mudah',q:'Aina sedang membaca buku.',i:'Pilih kata bantu aspek.',a:['Aina','sedang','membaca','buku'],c:1,e:'“Sedang” menunjukkan perbuatan masih berlaku.',cn:'sedang 表示动作正在进行。',f:'Kata bantu aspek + kata kerja.',m:'Aspek = masa tindakan.',t:'Jangan pilih kata kerja utama.'},
{id:'KB-002',s:'Aspek lampau',d:'Mudah',q:'Mereka _____ tiba di sekolah.',i:'Pilih kata bantu yang sesuai.',a:['telah','akan','masih','mahu'],c:0,e:'“Telah” menunjukkan perbuatan sudah berlaku.',cn:'telah 表示动作已经发生。',f:'telah + kata kerja.',m:'Telah = 已经。',t:'“Akan” menunjukkan masa hadapan.'},
{id:'KB-003',s:'Aspek belum selesai',d:'Mudah',q:'Adik _____ belum tidur.',i:'Pilih kata bantu aspek yang tepat.',a:['masih','telah','akan','mesti'],c:0,e:'“Masih belum” menunjukkan keadaan belum berubah.',cn:'masih belum 表示到现在仍未发生。',f:'masih + belum + kata kerja.',m:'Masih belum = 还没有。',t:'Jangan gunakan “telah belum”.'},
{id:'KB-004',s:'Aspek masa depan',d:'Mudah',q:'Kami _____ melawat muzium esok.',i:'Pilih jawapan paling tepat.',a:['akan','sudah','sedang','pernah'],c:0,e:'“Akan” menunjukkan perbuatan pada masa hadapan.',cn:'akan 表示将来。',f:'akan + kata kerja.',m:'Esok nampak → akan.',t:'Jangan pilih “sedang” untuk masa hadapan.'},
{id:'KB-005',s:'Ragam keupayaan',d:'Sederhana',q:'Farah _____ berenang sejauh satu kilometer.',i:'Pilih kata bantu ragam.',a:['dapat','telah','sedang','masih'],c:0,e:'“Dapat” menunjukkan keupayaan.',cn:'dapat 表示有能力做到。',f:'dapat + kata kerja.',m:'Boleh buat = dapat.',t:'“Telah” ialah aspek, bukan keupayaan.'},
{id:'KB-006',s:'Ragam keizinan',d:'Sederhana',q:'Kamu _____ keluar selepas menyiapkan kerja.',i:'Pilih kata bantu yang sesuai.',a:['boleh','mesti','telah','sedang'],c:0,e:'“Boleh” menunjukkan keizinan.',cn:'boleh 在这里表示允许。',f:'boleh + kata kerja.',m:'Dapat izin = boleh.',t:'“Mesti” membawa maksud wajib.'},
{id:'KB-007',s:'Ragam kemestian',d:'Sederhana',q:'Semua murid _____ memakai lencana sekolah.',i:'Pilih jawapan yang tepat.',a:['mesti','mahu','akan','sudah'],c:0,e:'“Mesti” menunjukkan kewajipan.',cn:'mesti 表示必须。',f:'mesti + kata kerja.',m:'Peraturan = mesti.',t:'Jangan guna “mahu” untuk arahan wajib.'},
{id:'KB-008',s:'Ragam kehendak',d:'Sederhana',q:'Saya _____ membeli kamus baharu.',i:'Pilih kata bantu ragam.',a:['mahu','telah','masih','pernah'],c:0,e:'“Mahu” menunjukkan kehendak.',cn:'mahu 表示想要。',f:'mahu + kata kerja.',m:'Ada keinginan = mahu.',t:'“Pernah” ialah kata bantu aspek.'},
{id:'KB-009',s:'Ragam kesopanan',d:'Sederhana Tinggi',q:'Kamu _____ menjaga tutur kata ketika bercakap dengan guru.',i:'Pilih kata bantu yang paling sesuai.',a:['harus','sedang','telah','pernah'],c:0,e:'“Harus” membawa maksud patut atau wajar.',cn:'harus 在这里表示应该。',f:'harus + kata kerja.',m:'Patut dibuat = harus.',t:'Bezakan harus dengan mesti; mesti lebih tegas.'},
{id:'KB-010',s:'Gabungan aspek + ragam',d:'Sukar',q:'Murid itu masih belum dapat menjawab soalan tersebut.',i:'Pilih susunan analisis yang betul.',a:['aspek + aspek + ragam + kata kerja','ragam + aspek + aspek + kata kerja','aspek + ragam + aspek + kata kerja','semua ialah kata kerja'],c:0,e:'“Masih” dan “belum” ialah aspek, “dapat” ialah ragam.',cn:'masih、belum 是时态辅助词；dapat 是情态辅助词。',f:'Aspek boleh bergabung dengan ragam.',m:'Masa dulu, kemampuan kemudian.',t:'Jangan anggap semua perkataan sebelum kata kerja sama jenis.'},
{id:'KB-011',s:'Susunan kata bantu',d:'Sukar',q:'Pilih ayat yang gramatis.',i:'Fokus pada susunan kata bantu.',a:['Dia mesti sudah pulang semalam.','Dia sudah mesti pulang semalam.','Dia pulang mesti sudah semalam.','Sudah dia mesti pulang semalam.'],c:0,e:'Kata bantu ragam boleh hadir sebelum kata bantu aspek dalam konteks tertentu.',cn:'这里 mesti + sudah + pulang 的顺序正确。',f:'ragam + aspek + kata kerja.',m:'Wajib dahulu, masa kemudian.',t:'Jangan susun kata bantu secara rawak.'},
{id:'KB-012',s:'Pernah',d:'Sederhana',q:'Saya pernah menyertai pertandingan pidato.',i:'Apakah fungsi “pernah”?',a:['menunjukkan pengalaman lampau','menunjukkan masa depan','menunjukkan kewajipan','menunjukkan larangan'],c:0,e:'“Pernah” menandakan pengalaman yang berlaku pada masa lalu.',cn:'pernah 表示过去曾经发生。',f:'pernah + kata kerja.',m:'Pernah = 曾经。',t:'Jangan keliru dengan “telah”; pernah menekankan pengalaman.'},
{id:'KB-013',s:'Belum',d:'Sederhana',q:'Bas itu belum tiba.',i:'Pilih huraian yang tepat.',a:['Perbuatan dijangka berlaku tetapi belum terjadi.','Perbuatan sedang berlaku.','Perbuatan wajib berlaku.','Perbuatan tidak dibenarkan.'],c:0,e:'“Belum” menunjukkan sesuatu tidak berlaku hingga masa sekarang.',cn:'belum 表示截至现在还没发生。',f:'belum + kata kerja.',m:'Sampai sekarang belum.',t:'“Belum” bukan kata nafi.'},
{id:'KB-014',s:'Kesalahan kata bantu',d:'Boss',q:'Pilih ayat yang tidak gramatis.',i:'Cari penggunaan kata bantu yang salah.',a:['Mereka sedang berbincang.','Kami akan bertolak esok.','Dia telah akan pulang semalam.','Kamu mesti belajar bersungguh-sungguh.'],c:2,e:'Gabungan “telah akan” bercanggah kerana lampau dan masa depan digunakan serentak.',cn:'telah 是过去，akan 是未来，不能这样直接冲突使用。',f:'Pastikan makna masa tidak bercanggah.',m:'过去和未来不要撞车。',t:'Jangan menilai berdasarkan bentuk sahaja; semak makna.'},
{id:'KB-015',s:'Analisis lengkap',d:'Final Boss',q:'Pilih analisis tepat bagi ayat “Pasukan itu mungkin akan dapat memenangi pertandingan ini.”',i:'Tentukan jenis kata bantu.',a:['mungkin ragam, akan aspek, dapat ragam','mungkin aspek, akan ragam, dapat aspek','semua aspek','semua ragam'],c:0,e:'“Mungkin” menyatakan kemungkinan, “akan” masa depan, “dapat” keupayaan.',cn:'mungkin 是可能性情态，akan 是未来时态，dapat 是能力情态。',f:'ragam + aspek + ragam + kata kerja.',m:'Kemungkinan + masa + kemampuan.',t:'Final Boss: klasifikasikan setiap kata satu demi satu.'}
];let av=0,idx=0,score=0,combo=0,correct=0,locked=false;const $=x=>document.getElementById(x);function init(){AV.forEach((v,i)=>{const b=document.createElement('button');b.className='avatar'+(i===0?' active':'');b.innerHTML='<span>'+v[1]+'</span>'+v[0];b.onclick=()=>{av=i;document.querySelectorAll('.avatar').forEach(x=>x.classList.remove('active'));b.classList.add('active')};$('avatars').appendChild(b)});$('enter').onclick=start;$('next').onclick=next;$('retry').onclick=()=>location.reload()}function start(){const n=$('name').value.trim()||'Murid';$('player').textContent=AV[av][1]+' '+n;$('login').classList.add('hidden');$('game').classList.remove('hidden');render()}function render(){locked=false;const x=Q[idx];$('meta').textContent=x.id+' • '+x.s+' • '+x.d;$('q').textContent=x.q;$('ins').textContent=x.i;$('prog').textContent=(idx+1)+'/15';$('hp').style.width=((Q.length-idx)/Q.length*100)+'%';$('ans').innerHTML='';x.a.forEach((v,i)=>{const b=document.createElement('button');b.className='answer';b.textContent=String.fromCharCode(65+i)+'. '+v;b.onclick=()=>answer(i);$('ans').appendChild(b)});$('fb').classList.add('hidden');$('next').classList.add('hidden');stats()}function answer(i){if(locked)return;locked=true;const x=Q[idx],ok=i===x.c;if(ok){score+=100+combo*20;combo++;correct++}else combo=0;document.querySelectorAll('.answer').forEach((b,j)=>{b.disabled=true;if(j===x.c)b.style.borderColor='var(--good)';if(j===i&&j!==x.c)b.style.borderColor='var(--bad)'});$('fb').innerHTML='<h3>'+(ok?'Betul!':'Belum tepat')+'</h3><p>'+x.e+'</p><p class="cn">'+x.cn+'</p><div class="formula"><b>Formula:</b> '+x.f+'<br><b>口诀:</b> '+x.m+'</div><div class="trap"><b>Perangkap:</b> '+x.t+'</div>';$('fb').classList.remove('hidden');$('next').classList.remove('hidden');stats()}function next(){idx++;if(idx>=Q.length)return finish();render()}function stats(){$('score').textContent=score;$('combo').textContent='x'+combo;$('acc').textContent=(idx+(locked?1:0)?Math.round(correct/(idx+(locked?1:0))*100):0)+'%'}function finish(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('summary').innerHTML='<h2>Skor: '+score+'</h2><p>Betul: '+correct+'/15</p><p>Ketepatan: '+Math.round(correct/15*100)+'%</p>'}init();</script></body></html>
