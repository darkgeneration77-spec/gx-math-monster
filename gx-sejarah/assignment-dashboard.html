<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Assignment Dashboard</title><style>body{margin:0;font-family:Arial,sans-serif;background:#07131d;color:#fff;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:24px}.panel{background:#102737;border:1px solid #ffffff18;border-radius:22px;padding:20px;margin-top:16px}.controls{display:grid;grid-template-columns:1fr auto;gap:10px}input{padding:13px;border:0;border-radius:12px}.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:900;cursor:pointer;background:#e8bd5d;color:#251900}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#ffffff0b;border-radius:14px;padding:14px}.big{font-size:30px;color:#e8bd5d;font-weight:900}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{text-align:left;padding:11px;border-bottom:1px solid #ffffff14}.ok{color:#60d697}.bad{color:#ff8b8b}.muted{color:#b8cbd5}@media(max-width:760px){.stats{grid-template-columns:1fr 1fr}.controls{grid-template-columns:1fr}table{font-size:13px}}</style></head><body><main class="wrap"><h1>教师作业追踪中心</h1><section class="panel controls"><input id="code" maxlength="8" placeholder="输入任务代码"><button id="load" class="btn">读取记录</button></section><section class="panel"><div class="stats"><div class="stat"><div class="muted">提交人数</div><div id="count" class="big">0</div></div><div class="stat"><div class="muted">平均分</div><div id="avg" class="big">0%</div></div><div class="stat"><div class="muted">及格人数</div><div id="pass" class="big">0</div></div><div class="stat"><div class="muted">逾期提交</div><div id="late" class="big">0</div></div></div><h2>学生记录</h2><div id="table" class="muted">请输入任务代码。</div></section><section class="panel"><h2>高频错题 / 知识点</h2><div id="wrong" class="muted">尚无资料。</div></section><p><a href="v3-assignment-launcher.html" style="color:#fff">返回 V3.0 入口</a></p></main><script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const $=id=>document.getElementById(id),cfg=window.GX_SEJARAH_CONFIG||{},ready=cfg.supabaseUrl&&cfg.supabaseAnonKey&&!String(cfg.supabaseUrl).includes('YOUR_'),sb=ready?supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;async function load(){const code=$('code').value.trim().toUpperCase();if(!code)return;if(!sb)return $('table').innerHTML='<span class="bad">Supabase 尚未配置。</span>';const [{data:task},{data:rows,error}]=await Promise.all([sb.from('gx_assignments').select('*').eq('assignment_code',code).maybeSingle(),sb.from('gx_assignment_submissions').select('*').eq('assignment_code',code).order('percentage',{ascending:false})]);if(error)return $('table').textContent=error.message;const list=rows||[],deadline=task?.deadline?new Date(task.deadline):null;let late=0;list.forEach(r=>{if(deadline&&new Date(r.completed_at)>deadline)late++});$('count').textContent=list.length;$('avg').textContent=(list.length?list.reduce((s,r)=>s+Number(r.percentage||0),0)/list.length:0).toFixed(1)+'%';$('pass').textContent=list.filter(r=>Number(r.percentage)>=40).length;$('late').textContent=late;$('table').innerHTML=list.length?`<table><thead><tr><th>学生</th><th>分数</th><th>百分比</th><th>状态</th><th>时间</th></tr></thead><tbody>${list.map(r=>`<tr><td>${r.student_name}</td><td>${r.score}/${r.max_score}</td><td>${Number(r.percentage).toFixed(1)}%</td><td class="${deadline&&new Date(r.completed_at)>deadline?'bad':'ok'}">${deadline&&new Date(r.completed_at)>deadline?'逾期':'完成'}</td><td>${new Date(r.completed_at).toLocaleString()}</td></tr>`).join('')}</tbody></table>`:'没有提交记录。';const m={};list.forEach(r=>(r.wrong_topics||[]).forEach(x=>m[x]=(m[x]||0)+1));const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]);$('wrong').innerHTML=arr.length?arr.slice(0,12).map(([k,v])=>`<div>${k} — ${v}人错误</div>`).join(''):'尚无错题资料。'}$('load').onclick=load;</script></body></html>
