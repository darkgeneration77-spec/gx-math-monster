<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Tingkatan 4 · 1050题</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315e74,#0a1b28 46%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:1220px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}.tag{color:#e8bd5d;font-weight:900;letter-spacing:.12em}h1{font-size:clamp(36px,6vw,68px);margin:8px 0}.sub{color:#c5d7df;line-height:1.65;max-width:820px}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{background:#ffffff10;border:1px solid #ffffff1d;border-radius:999px;padding:9px 13px}.modes{display:flex;gap:9px;flex-wrap:wrap;margin:20px 0}.mode{border:1px solid #ffffff25;background:#183143;color:#fff;padding:10px 15px;border-radius:999px;font-weight:800;cursor:pointer}.mode.on{background:#e8bd5d;color:#251900}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.bab{background:#0d2231;border:1px solid #ffffff1b;border-radius:21px;padding:19px;cursor:pointer;transition:.2s}.bab:hover{transform:translateY(-3px);border-color:#e8bd5d}.bab.done{outline:2px solid #3ddc97}.bab h2{margin:5px 0;color:#f3dfa4}.bab p{color:#aec2cc;line-height:1.5}.meta{font-size:13px;color:#e8bd5d}.bar{height:9px;background:#ffffff12;border-radius:999px;overflow:hidden;margin-top:12px}.bar i{display:block;height:100%;background:#3ddc97}.panel{display:none;background:#0d2231;border:1px solid #ffffff1c;border-radius:22px;padding:22px;margin-top:22px}.panel.show{display:block}.q{font-size:22px;line-height:1.5}.opts{display:grid;gap:10px;margin-top:16px}.opt{padding:13px 15px;border-radius:13px;border:1px solid #ffffff22;background:#183143;color:#fff;text-align:left;font-size:16px;cursor:pointer}.opt:hover{border-color:#e8bd5d}.opt.correct{background:#15513d}.opt.wrong{background:#5a2525}.feedback{margin-top:15px;padding:14px;border-radius:13px;background:#ffffff0c;line-height:1.65}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}.gold{background:#e8bd5d;color:#251900}.dark{background:#294356;color:#fff}.wrongitem{background:#ffffff0b;border:1px solid #ffffff16;border-radius:14px;padding:14px;margin:10px 0;line-height:1.6}.warning{background:#62351e;border:1px solid #e8bd5d55;padding:13px;border-radius:13px;margin:14px 0}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="tag">GX SEJARAH · COMPLETE DEEP REVISION</div><h1>Tingkatan 4 · 1050题</h1><div class="sub">Bab 1 至 Bab 10，每章105题。选择15题热身、30题标准或完整105题深度训练。每题即时批改，并提供华语解释与马来文关键词。</div></div><div class="stats"><div class="pill">完成：<b id="done">0</b>/10</div><div class="pill">累计正确：<b id="totalCorrect">0</b></div><div class="pill">总题库：<b>1050</b></div></div></div><div class="modes"><button class="mode on" data-n="15">热身 15题</button><button class="mode" data-n="30">标准 30题</button><button class="mode" data-n="105">完整 105题</button></div><section id="map" class="grid"></section><section id="quiz" class="panel"><div class="meta" id="qmeta"></div><h2 id="qtitle"></h2><div class="q" id="qtext"></div><div class="opts" id="opts"></div><div id="feedback"></div><div class="btns"><button class="btn gold" id="next" style="display:none">下一题</button><button class="btn dark" onclick="backMap()">返回 Bab 地图</button></div></section><section id="result" class="panel"><h2 id="rtitle"></h2><p id="rscore"></p><div id="wronglist"></div><div class="btns"><button class="btn gold" onclick="restart()">重做这个 Bab</button><button class="btn dark" onclick="backMap()">返回 Bab 地图</button></div></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script src="questions/tingkatan4-bab2-10-105.js"></script><script>
const TITLES={1:'Warisan Negara Bangsa',2:'Kebangkitan Nasionalisme',3:'Konflik Dunia dan Pendudukan Jepun',4:'Era Peralihan Kuasa British',5:'Persekutuan Tanah Melayu 1948',6:'Ancaman Komunis dan Darurat',7:'Usaha ke Arah Kemerdekaan',8:'Pilihan Raya',9:'Perlembagaan PTM 1957',10:'Pemasyhuran Kemerdekaan'};
const b1=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])];
function norm(q){if(q.choices&&Array.isArray(q.correct)){return{id:q.id,title:q.title||'',question:q.question,choices:q.choices,correct:q.correct[0],chinese:q.chinese||q.correction||'',keywords:q.keywords||[]}}return q}
const BANK={1:b1.map(norm)};for(let i=2;i<=10;i++)BANK[i]=(window.GX_T4_DEEP[i].questions||[]).map(norm);
let count=15,currentBab=1,list=[],idx=0,score=0,wrong=[],locked=false;const KEY='gxT4Deep1050';let save=JSON.parse(localStorage.getItem(KEY)||'{}');
function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));b.classList.add('on');count=Number(b.dataset.n)});
function renderMap(){map.innerHTML='';for(let i=1;i<=10;i++){let s=save[i]||{},pct=s.total?Math.round(s.correct/s.total*100):0;let d=document.createElement('article');d.className='bab'+(s.total?' done':'');d.innerHTML=`<div class="meta">BAB ${i} · 105题深度题库</div><h2>${TITLES[i]}</h2><p>可选择15题、30题或完整105题。即时批改、华语解释、关键词订正。</p><div class="bar"><i style="width:${pct}%"></i></div><p>${s.total?`上次：${s.correct}/${s.total}（${pct}%）`:'尚未完成'}</p>`;d.onclick=()=>start(i);map.appendChild(d)}updateStats()}
function updateStats(){let vals=Object.values(save);done.textContent=vals.filter(x=>x&&x.total).length;totalCorrect.textContent=vals.reduce((a,x)=>a+(x.correct||0),0)}
function start(b){currentBab=b;let source=BANK[b]||[];list=shuffled(source).slice(0,Math.min(count,source.length));idx=0;score=0;wrong=[];map.style.display='none';result.classList.remove('show');quiz.classList.add('show');showQ()}
function showQ(){locked=false;next.style.display='none';feedback.innerHTML='';let q=list[idx];qmeta.textContent=`Bab ${currentBab} · 第 ${idx+1}/${list.length} 题 · ${q.id||''}`;qtitle.textContent=q.title||TITLES[currentBab];qtext.textContent=q.question;opts.innerHTML='';q.choices.forEach((c,i)=>{let b=document.createElement('button');b.className='opt';b.textContent=`${String.fromCharCode(65+i)}. ${c}`;b.onclick=()=>answer(i,b);opts.appendChild(b)})}
function answer(i,btn){if(locked)return;locked=true;let q=list[idx],buttons=[...document.querySelectorAll('.opt')];buttons.forEach((b,k)=>{b.disabled=true;if(k===q.correct)b.classList.add('correct')});if(i===q.correct){score++;feedback.innerHTML=`<div class="feedback"><b>正确</b><br>${q.chinese||''}<br><b>关键词：</b>${(q.keywords||[]).join(' · ')}</div>`}else{btn.classList.add('wrong');wrong.push({q,chosen:i});feedback.innerHTML=`<div class="feedback"><b>需要订正</b><br>正确答案：${q.choices[q.correct]}<br>${q.chinese||''}<br><b>关键词：</b>${(q.keywords||[]).join(' · ')}</div>`}next.style.display='inline-block'}
next.onclick=()=>{idx++;if(idx>=list.length)finish();else showQ()};
function finish(){quiz.classList.remove('show');result.classList.add('show');let pct=Math.round(score/list.length*100);rtitle.textContent=`Bab ${currentBab} 完成`;rscore.innerHTML=`成绩：<b>${score}/${list.length}</b>（${pct}%）`;save[currentBab]={correct:score,total:list.length,date:new Date().toISOString()};localStorage.setItem(KEY,JSON.stringify(save));wronglist.innerHTML=wrong.length?'<h3>错题报告</h3>':'<div class="feedback">全部正确。</div>';wrong.forEach((x,n)=>{let d=document.createElement('div');d.className='wrongitem';d.innerHTML=`<b>${n+1}. ${x.q.question}</b><br>你的答案：${x.q.choices[x.chosen]||'未作答'}<br>正确答案：${x.q.choices[x.q.correct]}<br>${x.q.chinese||''}<br><b>关键词：</b>${(x.q.keywords||[]).join(' · ')}`;wronglist.appendChild(d)});updateStats()}
function restart(){start(currentBab)}function backMap(){quiz.classList.remove('show');result.classList.remove('show');map.style.display='grid';renderMap()}renderMap();
</script></body></html>
