<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sejarah Tingkatan 4 · 1050题 V3</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315e74,#0a1b28 46%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:1220px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}.tag{color:#e8bd5d;font-weight:900;letter-spacing:.12em}h1{font-size:clamp(36px,6vw,68px);margin:8px 0}.sub{color:#c5d7df;line-height:1.65;max-width:860px}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{background:#ffffff10;border:1px solid #ffffff1d;border-radius:999px;padding:9px 13px}.modes{display:flex;gap:9px;flex-wrap:wrap;margin:20px 0}.mode{border:1px solid #ffffff25;background:#183143;color:#fff;padding:10px 15px;border-radius:999px;font-weight:800;cursor:pointer}.mode.on{background:#e8bd5d;color:#251900}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.bab{background:#0d2231;border:1px solid #ffffff1b;border-radius:21px;padding:19px;cursor:pointer;transition:.2s}.bab:hover{transform:translateY(-3px);border-color:#e8bd5d}.bab.done{outline:2px solid #3ddc97}.bab.error{outline:2px solid #ff6961}.bab h2{margin:5px 0;color:#f3dfa4}.bab p{color:#aec2cc;line-height:1.5}.meta{font-size:13px;color:#e8bd5d}.count{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:999px;background:#173b2e;color:#7ef0b9;font-weight:900}.bar{height:9px;background:#ffffff12;border-radius:999px;overflow:hidden;margin-top:12px}.bar i{display:block;height:100%;background:#3ddc97}.panel{display:none;background:#0d2231;border:1px solid #ffffff1c;border-radius:22px;padding:22px;margin-top:22px}.panel.show{display:block}.q{font-size:22px;line-height:1.5}.opts{display:grid;gap:10px;margin-top:16px}.opt{padding:13px 15px;border-radius:13px;border:1px solid #ffffff22;background:#183143;color:#fff;text-align:left;font-size:16px;cursor:pointer}.opt:hover{border-color:#e8bd5d}.opt.correct{background:#15513d}.opt.wrong{background:#5a2525}.feedback{margin-top:15px;padding:14px;border-radius:13px;background:#ffffff0c;line-height:1.65}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}.gold{background:#e8bd5d;color:#251900}.dark{background:#294356;color:#fff}.wrongitem{background:#ffffff0b;border:1px solid #ffffff16;border-radius:14px;padding:14px;margin:10px 0;line-height:1.6}.warning{background:#62351e;border:1px solid #e8bd5d55;padding:13px;border-radius:13px;margin:14px 0}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="tag">GX SEJARAH · COMPLETE DEEP REVISION V3</div><h1>Tingkatan 4 · 1050题</h1><div class="sub">已修复第4题后停止的问题。系统会把 Bab 1 的单选、多选、卡片与结构题统一转换成可连续作答格式，并自动跳过损坏题目。</div></div><div class="stats"><div class="pill">完成：<b id="done">0</b>/10</div><div class="pill">累计正确：<b id="totalCorrect">0</b></div><div class="pill">实际加载：<b id="loadedTotal">0</b>/1050</div></div></div><div class="modes"><button class="mode on" data-n="15">热身 15题</button><button class="mode" data-n="30">标准 30题</button><button class="mode" data-n="105">完整 105题</button></div><section id="map" class="grid"></section><section id="quiz" class="panel"><div class="meta" id="qmeta"></div><h2 id="qtitle"></h2><div class="q" id="qtext"></div><div class="opts" id="opts"></div><div id="feedback"></div><div class="btns"><button class="btn gold" id="next" style="display:none">下一题</button><button class="btn dark" onclick="backMap()">返回 Bab 地图</button></div></section><section id="result" class="panel"><h2 id="rtitle"></h2><p id="rscore"></p><div id="wronglist"></div><div class="btns"><button class="btn gold" onclick="restart()">重做这个 Bab</button><button class="btn dark" onclick="backMap()">返回 Bab 地图</button></div></section></main><script src="questions/world1-1.1.js?v=20260722-3"></script><script src="questions/world1-1.2.js?v=20260722-3"></script><script src="questions/world1-1.3.js?v=20260722-3"></script><script src="questions/world1-1.4.js?v=20260722-3"></script><script src="questions/world1-final-boss.js?v=20260722-3"></script><script src="questions/tingkatan4-bab2-10-105.js?v=20260722-3"></script><script>
const TITLES={1:'Warisan Negara Bangsa',2:'Kebangkitan Nasionalisme',3:'Konflik Dunia dan Pendudukan Jepun',4:'Era Peralihan Kuasa British',5:'Persekutuan Tanah Melayu 1948',6:'Ancaman Komunis dan Darurat',7:'Usaha ke Arah Kemerdekaan',8:'Pilihan Raya',9:'Perlembagaan PTM 1957',10:'Pemasyhuran Kemerdekaan'};
function safeText(v){return typeof v==='string'?v:String(v??'')}
function normalizeQuestion(q,index,bab){try{if(!q||typeof q!=='object')return null;let id=q.id||`T4-B${bab}-${String(index+1).padStart(3,'0')}`;let title=q.title||TITLES[bab]||'';let question=safeText(q.question||q.prompt||q.title||`Soalan ${index+1}`);let chinese=q.chinese||q.correction||q.explanation||'';let keywords=Array.isArray(q.keywords)?q.keywords:[];let choices=[];let correct=0;
if(Array.isArray(q.choices)&&q.choices.length>=2){choices=q.choices.map(safeText);if(Array.isArray(q.correct)){correct=Number(q.correct[0]??0)}else{correct=Number(q.correct??q.answer??0)}}
else if(Array.isArray(q.cards)&&q.cards.length>=2){choices=q.cards.map(x=>safeText(x.text||x.label||x.id));let valid=q.cards.filter(x=>String(x.tag||'').toLowerCase().includes('fakta')||String(x.tag||'').toLowerCase().includes('huraian')||String(x.tag||'').toLowerCase().includes('kesan')||String(x.tag||'').toLowerCase().includes('penegasan'));correct=Math.max(0,q.cards.indexOf(valid[0]||q.cards[0]))}
else if(Array.isArray(q.slots)&&q.slots.length){choices=[...(q.keywords||[]).slice(0,4),'Tidak berkaitan'].map(safeText);while(choices.length<4)choices.push(`Pilihan ${choices.length+1}`);correct=0}
else{return null}
if(!Number.isInteger(correct)||correct<0||correct>=choices.length)correct=0;let answer=choices[correct];let distractors=choices.filter((_,i)=>i!==correct);if(distractors.length<3){['Tidak tepat','Bukan jawapan','Maklumat lain'].forEach(x=>{if(!distractors.includes(x)&&x!==answer)distractors.push(x)})}let finalChoices=[answer,...distractors.slice(0,3)];for(let i=finalChoices.length-1;i>0;i--){let j=(index*17+bab*13+i*7)%(i+1);[finalChoices[i],finalChoices[j]]=[finalChoices[j],finalChoices[i]]}correct=finalChoices.indexOf(answer);return{id,title,question,choices:finalChoices,correct,chinese,keywords}}
catch(e){console.error('Normalize failed',q,e);return null}}
const rawB1=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])];
const BANK={1:rawB1.map((q,i)=>normalizeQuestion(q,i,1)).filter(Boolean)};for(let i=2;i<=10;i++){let src=window.GX_T4_DEEP&&window.GX_T4_DEEP[i]&&Array.isArray(window.GX_T4_DEEP[i].questions)?window.GX_T4_DEEP[i].questions:[];BANK[i]=src.map((q,n)=>normalizeQuestion(q,n,i)).filter(Boolean)}
let count=15,currentBab=1,list=[],idx=0,score=0,wrong=[],locked=false;const KEY='gxT4Deep1050V3';let save={};try{save=JSON.parse(localStorage.getItem(KEY)||'{}')||{}}catch(e){save={}}
function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));b.classList.add('on');count=Number(b.dataset.n)});
function renderMap(){map.innerHTML='';let total=0;for(let i=1;i<=10;i++){let actual=BANK[i].length;total+=actual;let s=save[i]||{},pct=s.total?Math.round(s.correct/s.total*100):0;let d=document.createElement('article');d.className='bab'+(s.total?' done':'')+(actual<100?' error':'');d.innerHTML=`<div class="meta">BAB ${i} · 深度题库</div><h2>${TITLES[i]}</h2><div class="count">已加载 ${actual} 题</div><p>${actual?`可选择15题、30题或完整${actual}题。已加入连续作答保护。`:'题库加载失败，请刷新。'}</p><div class="bar"><i style="width:${pct}%"></i></div><p>${s.total?`上次：${s.correct}/${s.total}（${pct}%）`:'尚未完成'}</p>`;d.onclick=()=>actual?start(i):alert(`Bab ${i} 题库未加载。`);map.appendChild(d)}loadedTotal.textContent=total;updateStats()}
function updateStats(){let vals=Object.values(save);done.textContent=vals.filter(x=>x&&x.total).length;totalCorrect.textContent=vals.reduce((a,x)=>a+(x.correct||0),0)}
function start(b){currentBab=b;let source=BANK[b]||[];if(!source.length){alert('此 Bab 没有可用题目。');return}list=shuffled(source).slice(0,Math.min(count,source.length));idx=0;score=0;wrong=[];map.style.display='none';result.classList.remove('show');quiz.classList.add('show');showQ()}
function showQ(){try{if(idx>=list.length){finish();return}locked=false;next.style.display='none';feedback.innerHTML='';let q=list[idx];if(!q||!Array.isArray(q.choices)||q.choices.length<2){idx++;showQ();return}qmeta.textContent=`Bab ${currentBab} · 第 ${idx+1}/${list.length} 题 · ${q.id||''}`;qtitle.textContent=q.title||TITLES[currentBab];qtext.textContent=q.question;opts.innerHTML='';q.choices.forEach((c,i)=>{let b=document.createElement('button');b.className='opt';b.textContent=`${String.fromCharCode(65+i)}. ${c}`;b.onclick=()=>answer(i,b);opts.appendChild(b)})}catch(e){console.error('showQ error',e);feedback.innerHTML='<div class="warning">此题格式异常，系统已自动跳过。</div>';next.style.display='inline-block'}}
function answer(i,btn){try{if(locked)return;locked=true;let q=list[idx],buttons=[...document.querySelectorAll('.opt')];buttons.forEach((b,k)=>{b.disabled=true;if(k===q.correct)b.classList.add('correct')});if(i===q.correct){score++;feedback.innerHTML=`<div class="feedback"><b>正确</b><br>${q.chinese||''}<br><b>关键词：</b>${(q.keywords||[]).join(' · ')}</div>`}else{btn.classList.add('wrong');wrong.push({q,chosen:i});feedback.innerHTML=`<div class="feedback"><b>需要订正</b><br>正确答案：${q.choices[q.correct]}<br>${q.chinese||''}<br><b>关键词：</b>${(q.keywords||[]).join(' · ')}</div>`}next.style.display='inline-block'}catch(e){console.error('answer error',e);feedback.innerHTML='<div class="warning">答题处理异常，点击下一题继续。</div>';next.style.display='inline-block'}}
next.onclick=()=>{idx++;showQ()};
function finish(){quiz.classList.remove('show');result.classList.add('show');let pct=list.length?Math.round(score/list.length*100):0;rtitle.textContent=`Bab ${currentBab} 完成`;rscore.innerHTML=`成绩：<b>${score}/${list.length}</b>（${pct}%）`;save[currentBab]={correct:score,total:list.length,date:new Date().toISOString()};localStorage.setItem(KEY,JSON.stringify(save));wronglist.innerHTML=wrong.length?'<h3>错题报告</h3>':'<div class="feedback">全部正确。</div>';wrong.forEach((x,n)=>{let d=document.createElement('div');d.className='wrongitem';d.innerHTML=`<b>${n+1}. ${x.q.question}</b><br>你的答案：${x.q.choices[x.chosen]||'未作答'}<br>正确答案：${x.q.choices[x.q.correct]}<br>${x.q.chinese||''}<br><b>关键词：</b>${(x.q.keywords||[]).join(' · ')}`;wronglist.appendChild(d)});updateStats()}
function restart(){start(currentBab)}function backMap(){quiz.classList.remove('show');result.classList.remove('show');map.style.display='grid';renderMap()}renderMap();
</script></body></html>
