<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.1 Online Class Boss</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#3a1e2a,#101827 48%,#06090e);color:#fff;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900}.panel{margin-top:16px;background:#101f2ddd;border:1px solid #ffffff1a;border-radius:20px;padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr auto;gap:10px}input,button{border:0;border-radius:12px;padding:13px;font-size:16px}button{font-weight:900;cursor:pointer;background:#e8bd5d;color:#221700}.hidden{display:none}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#172c3d;border-radius:14px;padding:14px}.stat b{display:block;font-size:28px;color:#e8bd5d}.bar{height:16px;background:#0009;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;transition:.3s}.boss i{background:#ff6173}.class i{background:#49ce87}.arena{display:grid;grid-template-columns:1fr 1fr;gap:14px}.question{background:#faf1dc;color:#17232b;border-radius:16px;padding:18px}.choice{display:block;width:100%;margin:8px 0;text-align:left;background:#fff;color:#17232b;border:2px solid #d8cfbb}.choice.sel{border-color:#277da1;background:#e5f5fb}.board{background:#142838;border-radius:16px;padding:16px}.row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #ffffff13}.ok{color:#63dca1}.bad{color:#ff888f}.note{color:#b6c7cf;line-height:1.55}@media(max-width:760px){.grid,.stats,.arena{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.1 ONLINE CLASS BOSS</div><h1>跨设备班级合作战</h1></div><div id="status">检查连接中…</div></div><section id="login" class="panel"><div class="grid"><input id="name" placeholder="Nama pelajar"><input id="code" placeholder="Kod kelas，例如 GX4A01"><button id="join">加入战斗</button></div><p class="note">需要先在 Supabase 执行 class-boss-schema.sql 与 class-boss-rpc.sql，并填写 config.js。未配置时页面不会伪装成在线模式。</p></section><section id="game" class="hidden"><div class="panel stats"><div class="stat">Boss HP<b id="bossHp">1000</b></div><div class="stat">Class HP<b id="classHp">500</b></div><div class="stat">Phase<b id="phase">1</b></div><div class="stat">Players<b id="players">0</b></div></div><section class="panel"><div>Boss</div><div class="bar boss"><i id="bossBar" style="width:100%"></i></div><div style="margin-top:12px">Class</div><div class="bar class"><i id="classBar" style="width:100%"></i></div></section><section class="panel arena"><div class="question"><div id="qid"></div><h2 id="qtext"></h2><div id="choices"></div><button id="submit">Serang</button><p id="feedback"></p></div><div class="board"><h2>个人贡献榜</h2><div id="leaderboard"></div></div></section></section><p><a href="portal.html" style="color:#fff">返回 Portal</a></p></main><script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script>const $=id=>document.getElementById(id),BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices&&q.correct?.length===1);let client=null,name='',code='',q=null,selected=null,timer=null;function configured(){const c=window.GX_SEJARAH_CONFIG||{};return c.supabaseUrl&&!c.supabaseUrl.includes('YOUR-PROJECT')&&c.supabaseAnonKey&&!c.supabaseAnonKey.includes('YOUR-ANON')}async function init(){if(!configured()){$('status').textContent='未连接 Supabase';$('status').className='bad';return}client=window.supabase.createClient(window.GX_SEJARAH_CONFIG.supabaseUrl,window.GX_SEJARAH_CONFIG.supabaseAnonKey);$('status').textContent='Supabase 已连接';$('status').className='ok'}function nextQ(){q=BANK[Math.floor(Math.random()*BANK.length)];selected=null;$('qid').textContent=q.id+' · '+q.marks+' markah';$('qtext').textContent=q.question;$('choices').innerHTML=q.choices.map((x,i)=>`<button class="choice" data-i="${i}">${x}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{selected=+b.dataset.i;document.querySelectorAll('.choice').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')});$('feedback').textContent=''}async function join(){if(!client)return alert('请先配置 Supabase。');name=$('name').value.trim();code=$('code').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');if(!name||!code)return alert('请输入姓名和班级代码。');await client.from('gx_class_boss_rooms').upsert({class_code:code},{onConflict:'class_code',ignoreDuplicates:true});$('login').classList.add('hidden');$('game').classList.remove('hidden');nextQ();await refresh();timer=setInterval(refresh,3000)}async function refresh(){const{data:room}=await client.from('gx_class_boss_rooms').select('*').eq('class_code',code).maybeSingle();const{data:players}=await client.from('gx_class_boss_players').select('*').eq('class_code',code).order('damage',{ascending:false});if(room){$('bossHp').textContent=room.boss_hp;$('classHp').textContent=room.class_hp;$('phase').textContent=room.phase;$('bossBar').style.width=(room.boss_hp/room.boss_max_hp*100)+'%';$('classBar').style.width=(room.class_hp/room.class_max_hp*100)+'%';if(room.status!=='active'){$('feedback').textContent=room.status==='victory'?'全班击败 Boss！':'Class HP 已归零。';$('submit').disabled=true}}$('players').textContent=(players||[]).length;$('leaderboard').innerHTML=(players||[]).map((p,i)=>`<div class="row"><span>${i+1}. ${p.student_name}</span><b>${p.damage}</b></div>`).join('')||'暂无贡献'}async function attack(){if(selected===null)return alert('请选择答案。');const ok=selected===q.correct[0],phase=Number($('phase').textContent)||1,damage=ok?(phase===3?45:phase===2?35:28):0,heal=ok?0:(phase===3?24:16),classDamage=ok?0:(phase===3?24:16);const{error}=await client.rpc('gx_apply_class_boss_action',{p_class_code:code,p_student_name:name,p_question_id:q.id,p_is_correct:ok,p_damage:damage,p_boss_heal:heal,p_class_damage:classDamage});$('feedback').textContent=ok?`答对！造成 ${damage} 伤害。`:`答错：Boss 回血 ${heal}，Class HP -${classDamage}。`;await refresh();setTimeout(nextQ,900)}$('join').onclick=join;$('submit').onclick=attack;init();</script></body></html>
