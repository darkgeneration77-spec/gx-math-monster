<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Paper 2 高频题库</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315f76,#091823 48%,#040a10);color:#fff;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.hero h1{font-size:clamp(36px,6vw,64px);margin:12px 0}.hero p{color:#c7d7df;line-height:1.6}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.btn,.mode{border:0;border-radius:12px;padding:11px 15px;font-weight:900;cursor:pointer}.btn{background:#e8bd5d;color:#241900}.dark{background:#294356;color:#fff}.mode{background:#183143;color:#fff;border:1px solid #ffffff22}.mode.on{background:#e8bd5d;color:#241900}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card,.panel{background:#0d2231;border:1px solid #ffffff1c;border-radius:20px;padding:18px}.card{cursor:pointer}.card:hover{border-color:#e8bd5d}.card h2{color:#f3dfa4;margin:6px 0}.tag{font-size:12px;color:#e8bd5d;font-weight:900}.hidden{display:none}.question{font-size:22px;line-height:1.55}.answer{width:100%;min-height:190px;padding:14px;border-radius:14px;font-size:16px;line-height:1.55}.feedback{margin-top:14px;padding:14px;border-radius:14px;background:#ffffff0c;line-height:1.65}.point{padding:9px 11px;border-radius:10px;background:#ffffff0a;margin:8px 0}.hit{border-left:4px solid #3ddc97}.miss{border-left:4px solid #ff8d85}.stat{background:#ffffff10;border-radius:999px;padding:8px 12px}.stats{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><header class="top"><div class="brand">GX SEJARAH · PAPER 2 KEYWORD MARKING</div><div class="stats"><div class="stat">题库 <b id="bankCount">0</b></div><div class="stat">分数 <b id="scoreView">0</b></div></div></header><section id="menu"><div class="hero"><h1>Paper 2 高频题库</h1><p>Bab 1–10。学生必须先作答，提交后才显示批改、得分点、参考答案与华语解释。评分采用关键词与同义词命中，不要求答案与参考答案一模一样。</p></div><div class="toolbar"><button class="mode on" data-count="10">10题</button><button class="mode" data-count="20">20题</button><button class="mode" data-count="50">50题</button><button class="mode" data-count="100">完整100题</button></div><div id="babGrid" class="grid"></div><div class="toolbar"><button class="btn" onclick="startMixed()">开始混合高频练习</button><button class="btn dark" onclick="location.href='app.html?v=paper2keyword'">返回统一主页</button></div></section><section id="practice" class="hidden"><div class="panel"><div class="tag" id="meta"></div><h2 id="title"></h2><div class="question" id="question"></div><textarea id="answer" class="answer" placeholder="请输入马来文答案。只要写到正确关键词或同义词即可得分。"></textarea><div class="toolbar"><button id="submitBtn" class="btn" onclick="submitAnswer()">提交答案并批改</button><button id="nextBtn" class="btn dark hidden" onclick="nextQuestion()">下一题</button><button class="btn dark" onclick="backMenu()">返回题库</button></div><div id="feedback"></div></div></section><section id="result" class="hidden"><div class="panel"><h2>练习完成</h2><p id="finalScore"></p><div id="review"></div><div class="toolbar"><button class="btn" onclick="backMenu()">返回题库</button></div></div></section></main><script src="questions/paper2-high-frequency.js?v=keyword1"></script><script>const BANK=Array.isArray(window.GX_PAPER2_HIGH_FREQUENCY)?window.GX_PAPER2_HIGH_FREQUENCY:[];let selectedCount=10,list=[],idx=0,totalScore=0,totalMarks=0,records=[];const STOP=new Set(['dan','yang','untuk','dengan','kepada','daripada','oleh','dalam','ialah','adalah','serta','akan','telah','juga','dapat','boleh','sebagai','pada','ini','itu','agar','supaya','kerana']);const SYN={raja:['raja','sultan','pemerintah'],taat:['taat setia','kesetiaan','setia'],wilayah:['wilayah pengaruh','kawasan pemerintahan','jajahan'],undang:['undang-undang','hukum','peraturan'],nasionalisme:['nasionalisme','semangat kebangsaan','cinta negara'],akhbar:['akhbar','media cetak','surat khabar'],pendidikan:['pendidikan','sekolah','madrasah'],persatuan:['persatuan','pertubuhan','organisasi'],inflasi:['inflasi','harga meningkat','kenaikan harga'],makanan:['kekurangan makanan','bekalan makanan kurang','makanan tidak cukup'],komunis:['komunis','pkm','pengganas komunis'],perpaduan:['perpaduan','bersatu','kerjasama kaum'],kedaulatan:['kedaulatan','berdaulat','bebas penjajahan'],kemerdekaan:['kemerdekaan','merdeka','bebas daripada penjajahan'],pilihanraya:['pilihan raya','mengundi','wakil rakyat'],perlembagaan:['perlembagaan','undang-undang tertinggi','constitution']};function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s-]/g,' ').replace(/\s+/g,' ').trim()}function tokens(s){return norm(s).split(' ').filter(x=>x.length>2&&!STOP.has(x))}function groupFor(point){let p=norm(point),groups=[];Object.entries(SYN).forEach(([k,arr])=>{if(arr.some(x=>p.includes(norm(x))))groups.push(arr)});let ts=tokens(point);ts.forEach(t=>{if(!groups.some(g=>g.some(x=>norm(x).split(' ').includes(t))))groups.push([t])});return groups}function hitPoint(answer,point){let a=norm(answer),groups=groupFor(point);let strong=groups.filter(g=>g.some(x=>norm(x).includes(' ')));if(strong.some(g=>g.some(x=>a.includes(norm(x)))))return true;let hits=groups.filter(g=>g.some(x=>a.includes(norm(x)))).length;return hits>=Math.min(2,groups.length)}function renderMenu(){bankCount.textContent=BANK.length;babGrid.innerHTML='';for(let b=1;b<=10;b++){let arr=BANK.filter(q=>q.bab===b),d=document.createElement('article');d.className='card';d.innerHTML=`<div class="tag">BAB ${b} · ${arr.length}题</div><h2>${arr[0]?.title||'高频题库'}</h2><p>点击进入本章 Paper 2 高频练习。</p>`;d.onclick=()=>startBab(b);babGrid.appendChild(d)}}document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));b.classList.add('on');selectedCount=Number(b.dataset.count)});function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function startBab(b){start(BANK.filter(q=>q.bab===b))}function startMixed(){start(BANK)}function start(source){list=shuffle(source).slice(0,Math.min(selectedCount,source.length));idx=0;totalScore=0;totalMarks=0;records=[];menu.classList.add('hidden');result.classList.add('hidden');practice.classList.remove('hidden');showQ()}function showQ(){let q=list[idx];meta.textContent=`Bab ${q.bab} · 第 ${idx+1}/${list.length}题 · ${q.marks}分`;title.textContent=q.title;question.textContent=q.question;answer.value='';answer.disabled=false;feedback.innerHTML='';submitBtn.classList.remove('hidden');nextBtn.classList.add('hidden')}function submitAnswer(){let text=answer.value.trim();if(text.length<3){alert('请先输入答案，提交后才会显示批改。');return}let q=list[idx],hits=[],miss=[];q.points.forEach(p=>(hitPoint(text,p)?hits:miss).push(p));let marks=Math.min(q.marks,hits.length);totalScore+=marks;totalMarks+=q.marks;records.push({q,marks,hits,miss,answer:text});scoreView.textContent=`${totalScore}/${totalMarks}`;answer.disabled=true;submitBtn.classList.add('hidden');nextBtn.classList.remove('hidden');feedback.innerHTML=`<div class="feedback"><h3>估计得分：${marks}/${q.marks}</h3><p>评分规则：每个得分点只要出现关键概念或同义词即可得分，不要求整句相同。</p><h4>已命中得分点</h4>${hits.length?hits.map(p=>`<div class="point hit">✓ ${p}</div>`).join(''):'<div class="point miss">尚未命中明确关键词</div>'}<h4>遗漏得分点</h4>${miss.map(p=>`<div class="point miss">✗ ${p}</div>`).join('')}<h4>参考答案</h4><p>${q.reference}</p><h4>华语解释</h4><p>${q.chinese}</p><small>这是关键词估分，正式分数由老师根据完整表达确认。</small></div>`}function nextQuestion(){idx++;if(idx>=list.length)finish();else showQ()}function finish(){practice.classList.add('hidden');result.classList.remove('hidden');finalScore.innerHTML=`总分：<b>${totalScore}/${totalMarks}</b>（${totalMarks?Math.round(totalScore/totalMarks*100):0}%）`;review.innerHTML=records.map((r,i)=>`<div class="feedback"><b>${i+1}. ${r.q.question}</b><br>得分：${r.marks}/${r.q.marks}<br>命中：${r.hits.join('；')||'无'}<br>遗漏：${r.miss.join('；')||'无'}</div>`).join('');localStorage.setItem('gxPaper2KeywordLatest',JSON.stringify({score:totalScore,total:totalMarks,date:new Date().toISOString(),records:records.map(r=>({id:r.q.id,marks:r.marks,total:r.q.marks}))}))}function backMenu(){practice.classList.add('hidden');result.classList.add('hidden');menu.classList.remove('hidden');scoreView.textContent='0'}renderMenu();</script></body></html>
