<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.9 Join Assignment</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#2b566c,#091923 50%,#050b11);color:#fff;min-height:100vh;display:grid;place-items:center}.box{width:min(760px,calc(100% - 30px));padding:28px;border-radius:24px;background:#0d2231;border:1px solid #ffffff20;box-shadow:0 18px 60px #0008}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}input{width:100%;padding:14px;border:0;border-radius:12px;font-size:18px;text-transform:uppercase;margin:10px 0}.btn{display:inline-block;border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer;text-decoration:none;margin:5px}.primary{background:#e8bd5d;color:#251900}.secondary{background:#29485c;color:#fff}.card{margin-top:16px;background:#ffffff0b;border:1px solid #ffffff18;border-radius:17px;padding:17px}.code{font-size:30px;font-weight:900;color:#e8bd5d;letter-spacing:.1em}.bad{color:#ff9191}.ok{color:#71dfa9}.hidden{display:none}.small{color:#a9bdc7;font-size:13px;line-height:1.6}</style></head><body><main class="box"><div class="brand">GX SEJARAH · V2.9 STUDENT TASK</div><h1>加入教师任务</h1><p>输入老师提供的6位任务代码，或直接打开老师分享的任务链接。</p><input id="codeInput" maxlength="6" placeholder="例如 AB12CD"><button id="findBtn" class="btn primary">读取任务</button><section id="detail" class="card hidden"><div class="small">任务代码</div><div id="taskCode" class="code"></div><h2 id="taskTitle"></h2><p id="taskInfo"></p><p id="deadline"></p><label>学生姓名<input id="studentName" maxlength="30" placeholder="输入姓名"></label><button id="startBtn" class="btn primary">开始任务</button></section><section class="card"><div class="small">说明：同一设备可通过任务代码读取老师在本机建立的任务；老师分享的完整链接可在其他设备直接打开任务。</div><p><a href="portal.html" style="color:#fff">返回 Portal</a></p></section></main><script>const KEY='gxSejarahAssignmentsV29',DONE='gxSejarahAssignmentCompletionsV29';const $=id=>document.getElementById(id);let task=null;function decodePayload(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))))}catch(e){return null}}function localFind(code){try{return (JSON.parse(localStorage.getItem(KEY)||'[]')).find(x=>x.code===code)}catch(e){return null}}function showTask(x){task=x;if(!x)return alert('找不到任务。请检查代码，或使用老师分享的完整链接。');$('detail').classList.remove('hidden');$('taskCode').textContent=x.code;$('taskTitle').textContent=x.title;$('taskInfo').textContent=`模式：${x.mode} · 范围：${x.route} · ${x.count}题 · ${x.minutes}分钟`;const expired=x.deadline&&new Date(x.deadline)<new Date();$('deadline').className=expired?'bad':'ok';$('deadline').textContent=x.deadline?(expired?'任务已截止：':'截止：')+new Date(x.deadline).toLocaleString():'未设截止日期';$('startBtn').disabled=expired}function target(x){const map={main:'index.html',paper1:'spm-mock-exam.html',paper2:'paper2-mock-exam.html',daily:'daily-challenge.html',boss:'boss-battle.html',free:'free-text-examiner.html'};let url=map[x.mode]||'index.html';const p=new URLSearchParams({assignment:x.code,route:x.route,count:String(x.count),minutes:String(x.minutes)});return url+'?'+p.toString()}$('findBtn').onclick=()=>showTask(localFind($('codeInput').value.trim().toUpperCase()));$('startBtn').onclick=()=>{const name=$('studentName').value.trim();if(!name)return alert('请输入学生姓名。');const records=JSON.parse(localStorage.getItem(DONE)||'[]');records.unshift({assignment:task.code,name,status:'started',startedAt:new Date().toISOString(),mode:task.mode});localStorage.setItem(DONE,JSON.stringify(records.slice(0,100)));localStorage.setItem('gxSejarahActiveAssignment',JSON.stringify({...task,studentName:name,startedAt:new Date().toISOString()}));location.href=target(task)};const q=new URLSearchParams(location.search);const payload=q.get('task');if(payload){task=decodePayload(payload);if(task){$('codeInput').value=task.code||'';showTask(task)}}else if(q.get('code')){$('codeInput').value=q.get('code').toUpperCase();showTask(localFind(q.get('code').toUpperCase()))}</script></body></html>
