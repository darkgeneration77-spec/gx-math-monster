<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V3.2 Paper 2 Remediation</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315c72,#0b1c28 48%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:900px;margin:auto;padding:24px}.panel{background:#0d2231;border:1px solid #ffffff20;border-radius:22px;padding:22px;margin-top:16px}.tag{color:#e8bd5d;font-weight:900;letter-spacing:.12em}h1{font-size:44px;margin:10px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;font-weight:800;margin-top:10px}input,select,textarea{width:100%;padding:13px;border:0;border-radius:12px;margin-top:7px;font-size:16px}textarea{min-height:110px}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer;margin-top:14px}.primary{background:#e8bd5d;color:#251900}.secondary{background:#29475a;color:#fff}.result{background:#ffffff0b;border-radius:16px;padding:16px;margin-top:16px;word-break:break-all}.small{color:#bdd0d9;line-height:1.6}@media(max-width:700px){.grid{grid-template-columns:1fr}h1{font-size:36px}}</style></head><body><main class="wrap"><div class="tag">GX SEJARAH · V3.2</div><h1>Paper 2 个性化补救生成器</h1><p class="small">输入学生姓名与错题编号，系统会优先重做原本的 Struktur、Huraian、KBAT 或 Esei，再从最弱 Bab 补充相同类型题目。</p><section class="panel"><div class="grid"><label>学生姓名<input id="name" placeholder="Nama pelajar"></label><label>补救题量<select id="count"><option>3</option><option selected>5</option><option>8</option></select></label></div><label>Paper 2 错题编号<textarea id="wrong" placeholder="例如：W1-1.3-020, W1-1.3-025, W1-1.4-018"></textarea></label><button id="load" class="btn secondary">读取本机最新错题</button> <button id="generate" class="btn primary">生成专属链接</button><div id="result" class="result" hidden></div></section><p><a href="portal.html" style="color:#fff">返回统一入口</a></p></main><script>const $=id=>document.getElementById(id);$('load').onclick=()=>{let ids=[];try{const a=JSON.parse(localStorage.getItem('gxSejarahPaper2MockLatest')||'null');if(a&&Array.isArray(a.wrongIds))ids=a.wrongIds}catch(e){}try{const b=JSON.parse(localStorage.getItem('gxSejarahLatestRemediation')||'null');if(b&&Array.isArray(b.wrongIds))ids=[...ids,...b.wrongIds]}catch(e){}$('wrong').value=[...new Set(ids)].join(', ');if(!$('wrong').value)alert('本机暂时没有 Paper 2 错题记录。')}function cleanIds(){return $('wrong').value.split(/[\s,;，；]+/).map(x=>x.trim()).filter(Boolean)}$('generate').onclick=()=>{const name=$('name').value.trim()||'Pelajar',ids=cleanIds(),count=Number($('count').value)||5;if(!ids.length)return alert('请输入至少一个 Paper 2 错题编号。');const routes={};ids.forEach(id=>{const m=id.match(/W1-(1\.[1-4]|FINAL|BOSS)/i);const r=m?m[1].toUpperCase():'1.3';routes[r]=(routes[r]||0)+1});const weakest=Object.entries(routes).sort((a,b)=>b[1]-a[1])[0]?.[0]||'1.3';const p=new URLSearchParams({name,ids:ids.join(','),count:String(count),route:weakest});const url=new URL('paper2-remediation-practice.html?'+p.toString(),location.href).href;$('result').hidden=false;$('result').innerHTML=`<b>最弱范围：Bab ${weakest}</b><p>${url}</p><button class="btn primary" id="copy">复制学生链接</button> <a class="btn secondary" style="display:inline-block;text-decoration:none" href="${url}">打开测试</a>`;document.getElementById('copy').onclick=async()=>{await navigator.clipboard.writeText(url);alert('链接已复制。')}};</script></body></html>
