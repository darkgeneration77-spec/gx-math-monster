<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GX Sejarah Live Battle</title>
<style>
:root{--gold:#e8bd5d;--bg:#06111a;--panel:#102737;--ok:#2db675;--bad:#e25d66;--muted:#9eb2bd}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#29556c,#091c29 45%,#050a10);color:#fff;min-height:100vh}.app{max-width:1180px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:var(--gold);font-weight:900;letter-spacing:.1em}.status{padding:8px 12px;border:1px solid #ffffff25;border-radius:999px;background:#ffffff0d}.panel{margin-top:16px;background:#0c2130e8;border:1px solid #ffffff1c;border-radius:22px;padding:20px}.controls{display:grid;grid-template-columns:1fr auto;gap:10px}input,button{border:0;border-radius:12px;padding:13px 15px;font-size:16px}input{background:#fff;color:#17242c}button{cursor:pointer;font-weight:900}.primary{background:linear-gradient(135deg,#f1d27d,#bd8525);color:#241900}.secondary{background:#234359;color:#fff}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}.metric{background:#153347;border:1px solid #ffffff17;border-radius:16px;padding:15px}.metric b{display:block;font-size:30px;color:var(--gold);margin-top:5px}.arena{margin-top:18px;display:grid;grid-template-columns:1fr 260px;gap:14px}.board{display:grid;gap:10px}.row{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center;background:#132f42;border:1px solid #ffffff17;border-radius:16px;padding:13px}.rank{font-size:26px;font-weight:900;color:var(--gold);text-align:center}.name{font-weight:900}.meta{color:var(--muted);font-size:13px;margin-top:4px}.score{font-size:24px;font-weight:900}.bar{height:9px;background:#ffffff14;border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#2ca36d,#e8bd5d)}.monster{background:linear-gradient(160deg,#38202b,#151b28);border:1px solid #ffffff17;border-radius:18px;padding:18px;text-align:center}.monster .face{font-size:86px}.speech{margin-top:12px;background:#fff;color:#2d1d25;border-radius:16px 16px 4px 16px;padding:12px;font-weight:800;line-height:1.5}.empty{color:var(--muted);padding:30px;text-align:center}.links{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.links a{color:#fff}@media(max-width:800px){.controls,.arena{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.monster{order:-1}.row{grid-template-columns:42px 1fr}.score{grid-column:2}}
</style>
</head>
<body><main class="app">
<div class="top"><div><div class="brand">GX SEJARAH · V0.6 LIVE BATTLE</div><h1>班级实时战斗榜</h1></div><div id="status" class="status">等待班级代码</div></div>
<section class="panel"><div class="controls"><input id="classCode" maxlength="12" placeholder="输入班级代码，例如 GX4A01"><button id="startBtn" class="primary">开始 Live Battle</button></div><div class="links"><a href="play-online.html">学生入口</a><a href="teacher-dashboard.html">教师后台</a><a href="index.html">World 1</a></div></section>
<section class="panel"><div class="metrics"><div class="metric">在线/已提交<b id="count">0</b></div><div class="metric">最高分<b id="topScore">0</b></div><div class="metric">平均正确率<b id="avg">0%</b></div><div class="metric">总错题<b id="wrong">0</b></div></div><div class="arena"><div id="board" class="board"><div class="empty">请输入班级代码开始。</div></div><aside class="monster"><div class="face">🐲</div><h3>Maharaja Lupa Sejarah</h3><div id="speech" class="speech">“没有人敢挑战我的历史堡垒吗？”</div></aside></div></section>
</main><script src="config.js"></script><script>
const $=id=>document.getElementById(id);let timer=null,current=[];
function configured(){const c=window.GX_SEJARAH_CONFIG||{};return c.supabaseUrl&&!c.supabaseUrl.includes('YOUR-PROJECT')&&c.supabaseAnonKey&&!c.supabaseAnonKey.includes('YOUR-ANON')}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function localRows(code){return JSON.parse(localStorage.getItem('gx_sejarah_teacher_records')||'[]').filter(x=>String(x.classCode||'').toUpperCase()===code)}
async function remoteRows(code){const c=window.GX_SEJARAH_CONFIG;const url=c.supabaseUrl+'/rest/v1/gx_sejarah_scores?class_code=eq.'+encodeURIComponent(code)+'&select=*&order=created_at.desc';const r=await fetch(url,{headers:{apikey:c.supabaseAnonKey,Authorization:'Bearer '+c.supabaseAnonKey}});if(!r.ok)throw new Error('Supabase '+r.status);return r.json()}
function newestPerStudent(data){const map=new Map();for(const x of data){const n=String(x.student_name||x.name||'').trim();if(n&&!map.has(n))map.set(n,x)}return [...map.values()]}
function render(data){current=newestPerStudent(data).sort((a,b)=>(b.score||0)-(a.score||0));$('count').textContent=current.length;$('topScore').textContent=current[0]?.score||0;const avg=current.length?Math.round(current.reduce((s,x)=>s+((x.max_score||x.maxScore)?(x.score/(x.max_score||x.maxScore))*100:0),0)/current.length):0;$('avg').textContent=avg+'%';$('wrong').textContent=current.reduce((s,x)=>s+(x.wrong_count??x.wrong??0),0);$('board').innerHTML=current.length?current.map((x,i)=>{const max=x.max_score||x.maxScore||29,pct=max?Math.round((x.score||0)/max*100):0;return `<article class="row"><div class="rank">${i+1}</div><div><div class="name">${esc(x.student_name||x.name||'-')}</div><div class="meta">错题 ${x.wrong_count??x.wrong??0} · Hint ${x.hint_count??x.hints??0} · 进度 ${x.progress_percent??x.progress??100}%</div><div class="bar"><i style="width:${Math.min(100,pct)}%"></i></div></div><div class="score">${x.score||0}/${max}</div></article>`}).join(''):'<div class="empty">这个班级还没有成绩。</div>';taunt()}
function taunt(){if(!current.length){$('speech').textContent='“没有人敢挑战我的历史堡垒吗？”';return}const leader=current[0],last=current[current.length-1];const lines=current.length===1?[`“${leader.student_name||leader.name}，一个人也想打败我？”`]:[`“${leader.student_name||leader.name} 暂时领先，但别得意！”`,`“${last.student_name||last.name}，你的分数落后了，快求救神秘人！”`,`“全班只有真正掌握关键词的人才能击破我！”`];$('speech').textContent=lines[Math.floor(Math.random()*lines.length)]}
async function refresh(){const code=$('classCode').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');if(!code)return;try{const data=configured()?await remoteRows(code):localRows(code);render(data);$('status').textContent=(configured()?'在线同步':'本机模式')+' · '+new Date().toLocaleTimeString()}catch(e){$('status').textContent='读取失败：'+e.message}}
$('startBtn').addEventListener('click',()=>{clearInterval(timer);refresh();timer=setInterval(refresh,5000)});$('classCode').addEventListener('keydown',e=>{if(e.key==='Enter')$('startBtn').click()});setInterval(taunt,8000);
</script></body></html>
