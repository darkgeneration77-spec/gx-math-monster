<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah System Health</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:#07131d;color:#eef5f8;min-height:100vh}.wrap{max-width:1000px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900}.panel{margin-top:18px;background:#102737;border:1px solid #ffffff18;border-radius:20px;padding:20px}.row{display:grid;grid-template-columns:1fr auto;gap:12px;padding:13px 0;border-bottom:1px solid #ffffff13}.ok{color:#66d99e}.bad{color:#ff8686}.wait{color:#e8bd5d}.summary{font-size:34px;font-weight:900;color:#e8bd5d}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer;background:#e8bd5d;color:#241900}a{color:#fff}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V1.0 SYSTEM HEALTH</div><h1>系统健康检查</h1></div><button id="run" class="btn">重新检查</button></div><section class="panel"><div class="summary" id="summary">检查中…</div><p id="note">正在验证正式发布所需资源。</p><div id="rows"></div></section><p><a href="portal.html">返回统一入口</a></p></main><script>const files=['index.html','play-online.html','teacher-dashboard.html','live-battle.html','question-validator.html','progress-save.js','score-integrity.js','config.js','questions/world1-1.1.js','questions/world1-1.2.js','questions/world1-1.3.js','questions/world1-1.4.js','questions/world1-final-boss.js'];const $=id=>document.getElementById(id);async function test(path){try{const r=await fetch(path+'?health='+Date.now(),{cache:'no-store'});return {path,ok:r.ok,status:r.status}}catch(e){return {path,ok:false,status:e.message}}}async function run(){$('summary').textContent='检查中…';$('rows').innerHTML=files.map(f=>`<div class="row"><span>${f}</span><b class="wait">WAIT</b></div>`).join('');const out=[];for(const f of files){out.push(await test(f));$('rows').innerHTML=out.map(x=>`<div class="row"><span>${x.path}</span><b class="${x.ok?'ok':'bad'}">${x.ok?'OK':'FAIL '+x.status}</b></div>`).join('')+files.slice(out.length).map(x=>`<div class="row"><span>${x}</span><b class="wait">WAIT</b></div>`).join('')}const good=out.filter(x=>x.ok).length;$('summary').textContent=`${good}/${out.length} 项正常`;$('note').textContent=good===out.length?'核心资源全部可以加载。':'存在无法加载的资源，请检查对应文件路径。'}$('run').onclick=run;run();</script></body></html>
