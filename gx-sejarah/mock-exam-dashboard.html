<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Mock Exam Dashboard</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:#07131d;color:#eef5f8;min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:24px}.brand{color:#e8bd5d;font-weight:900}.controls,.cards,.grid{display:grid;gap:12px}.controls{grid-template-columns:1fr auto}.cards{grid-template-columns:repeat(4,1fr);margin-top:16px}.grid{grid-template-columns:1.2fr .8fr;margin-top:16px}.panel,.card{background:#102737;border:1px solid #ffffff18;border-radius:18px;padding:18px}.card b{font-size:30px;color:#e8bd5d}input{width:100%;padding:13px;border:0;border-radius:12px;font-size:16px}.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:900;cursor:pointer;background:#e8bd5d;color:#251900}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid #ffffff12}.bar{height:12px;background:#ffffff12;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#e8bd5d}.weak{background:#fff;color:#17242c;border-radius:12px;padding:12px;margin-top:8px}.small{color:#9db2bd;font-size:13px}.bad{color:#ff9292}.ok{color:#6edaa2}@media(max-width:850px){.cards{grid-template-columns:1fr 1fr}.grid,.controls{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="brand">GX SEJARAH · V2.7 TEACHER</div><h1>模拟考试成绩中心</h1><div class="controls"><input id="classCode" maxlength="20" placeholder="输入班级代码，例如 F4A"><button id="load" class="btn">读取成绩</button></div><p id="status" class="small"></p><section class="cards"><div class="card">学生人数<br><b id="students">0</b></div><div class="card">平均正确率<br><b id="average">0%</b></div><div class="card">及格率<br><b id="passRate">0%</b></div><div class="card">平均用时<br><b id="duration">0m</b></div></section><section class="grid"><div class="panel"><h2>学生成绩</h2><div style="overflow:auto"><table><thead><tr><th>学生</th><th>模式</th><th>分数</th><th>等级</th><th>用时</th><th>提交</th></tr></thead><tbody id="rows"><tr><td colspan="6">尚未读取</td></tr></tbody></table></div></div><div class="panel"><h2>等级分布</h2><div id="grades"></div><h2>高频错题</h2><div id="weak"><div class="weak">尚无资料</div></div><button id="print" class="btn" style="margin-top:12px">打印班级成绩单</button></div></section><p><a href="v2-6-exam-launcher.html" style="color:#fff">返回考试入口</a></p></main><script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const $=id=>document.getElementById(id);function cfg(){return window.GX_SEJARAH_CONFIG||window.GX_CONFIG||{}}function client(){const c=cfg(),url=c.supabaseUrl||c.url,key=c.supabaseAnonKey||c.anonKey;return url&&key&&window.supabase?window.supabase.createClient(url,key):null}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}async function load(){const code=$('classCode').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');if(!code)return $('status').textContent='请输入班级代码。';const sb=client();if(!sb)return $('status').innerHTML='<span class="bad">Supabase 尚未配置。</span>';$('status').textContent='正在读取……';const {data,error}=await sb.from('gx_mock_exam_results').select('*').eq('class_code',code).order('submitted_at',{ascending:false});if(error)return $('status').innerHTML=`<span class="bad">读取失败：${esc(error.message)}</span>`;const latest=[];const seen=new Set();for(const r of data||[]){const key=r.student_name+'|'+r.exam_mode;if(!seen.has(key)){seen.add(key);latest.push(r)}}render(latest);$('status').innerHTML=`<span class="ok">已读取 ${latest.length} 条最新成绩。</span>`}function render(rows){const students=new Set(rows.map(r=>r.student_name)).size,avg=rows.length?rows.reduce((s,r)=>s+Number(r.percentage||0),0)/rows.length:0,pass=rows.length?rows.filter(r=>Number(r.percentage)>=40).length/rows.length*100:0,dur=rows.length?rows.reduce((s,r)=>s+Number(r.duration_seconds||0),0)/rows.length:0;$('students').textContent=students;$('average').textContent=avg.toFixed(1)+'%';$('passRate').textContent=pass.toFixed(0)+'%';$('duration').textContent=Math.round(dur/60)+'m';$('rows').innerHTML=rows.length?rows.map(r=>`<tr><td>${esc(r.student_name)}</td><td>${esc(r.exam_mode)}</td><td>${r.score}/${r.total}<br><span class="small">${Number(r.percentage).toFixed(1)}%</span></td><td>${esc(r.grade)}</td><td>${Math.floor(r.duration_seconds/60)}m ${r.duration_seconds%60}s</td><td>${new Date(r.submitted_at).toLocaleString()}</td></tr>`).join(''):'<tr><td colspan="6">没有成绩</td></tr>';const order=['A','B','C','D','E','G'];const counts={};rows.forEach(r=>counts[r.grade]=(counts[r.grade]||0)+1);$('grades').innerHTML=order.map(g=>{const n=counts[g]||0,p=rows.length?n/rows.length*100:0;return `<div style="margin:10px 0"><b>${g}</b> · ${n}<div class="bar"><i style="width:${p}%"></i></div></div>`}).join('');const wrong={};rows.forEach(r=>(r.wrong_question_ids||[]).forEach(id=>wrong[id]=(wrong[id]||0)+1));const top=Object.entries(wrong).sort((a,b)=>b[1]-a[1]).slice(0,8);$('weak').innerHTML=top.length?top.map(([id,n])=>`<div class="weak"><b>${esc(id)}</b><br>${n} 位学生答错</div>`).join(''):'<div class="weak">目前没有错题编号资料。</div>'}$('load').onclick=load;$('print').onclick=()=>window.print();const q=new URLSearchParams(location.search).get('class');if(q){$('classCode').value=q;load()}</script></body></html>
