<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah World 1 Hub</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315d72,#0a1c28 45%,#050b10);color:#fff;min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#edc867;font-weight:900;letter-spacing:.12em}.hud{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 12px;border-radius:999px;background:#ffffff0d;border:1px solid #ffffff1d}.panel{margin-top:18px;background:#0e2332e8;border:1px solid #ffffff1c;border-radius:24px;padding:20px;box-shadow:0 18px 50px #0005}.chapter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.chapter{border:1px solid #ffffff1d;border-radius:20px;padding:20px;background:linear-gradient(145deg,#17394b,#102634);cursor:pointer;transition:.2s}.chapter:hover{transform:translateY(-3px);border-color:#edc867}.chapter.done{outline:2px solid #36c486}.chapter h2{margin:5px 0;color:#f5e2aa}.chapter p{color:#bed0d8;line-height:1.5}.tag{font-size:12px;color:#edc867;font-weight:900;letter-spacing:.12em}.hidden{display:none!important}.question-box{background:#fff8e8;color:#15222b;border-radius:18px;padding:20px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.choice{border:2px solid #d8cfba;background:#fff;color:#18252c;border-radius:12px;padding:13px;text-align:left;font-weight:800;cursor:pointer}.choice.selected{border-color:#d39a2c;background:#fff1c9}.choice.correct{border-color:#2fa56d;background:#e2f6eb}.choice.wrong{border-color:#d8515c;background:#fde6e8}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer}.primary{background:linear-gradient(135deg,#f2d37f,#bd8627);color:#241800}.secondary{background:#263f51;color:#fff}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.feedback{margin-top:14px;border-radius:16px;padding:16px;background:#173649}.feedback h3{margin-top:0;color:#f4dda2}.progress{height:12px;border-radius:999px;background:#0008;overflow:hidden;margin-top:8px}.progress i{display:block;height:100%;background:#3bc486;transition:.25s}.report-item{margin-top:10px;padding:13px;border-radius:14px;background:#ffffff0b;border:1px solid #ffffff15}.answer-input{width:100%;min-height:120px;border-radius:14px;padding:14px;font:inherit;border:2px solid #d8cfba}.map-title{font-size:clamp(36px,6vw,64px);margin:8px 0}.sub{color:#bfd0d8;line-height:1.6}.mode-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.mode{padding:9px 13px;border-radius:999px;border:1px solid #ffffff22;background:#ffffff0b;color:#fff;cursor:pointer}.mode.active{background:#edc867;color:#241800}.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#ffffff0b;border:1px solid #ffffff16;border-radius:14px;padding:14px;text-align:center}.stat b{font-size:24px;color:#f4dda2}@media(max-width:760px){.chapter-grid,.choices,.summary-grid{grid-template-columns:1fr}.map-title{font-size:40px}}</style></head><body><main class="wrap"><header class="top"><div><div class="brand">GX SEJARAH · WORLD 1 UNIFIED SYSTEM</div><h1 class="map-title">Warisan Negara Bangsa</h1><p class="sub">在同一个页面选择 Bab、完成练习、查看华语讲解、订正错题，再返回 World 1 地图。</p></div><div class="hud"><span class="chip">学生 <b id="studentName">Pelajar</b></span><span class="chip">总分 <b id="totalScore">0</b></span><span class="chip">完成 <b id="completedCount">0</b>/5</span></div></header><section id="startPanel" class="panel"><h2>开始 World 1</h2><input id="nameInput" placeholder="输入学生姓名" style="width:100%;padding:13px;border-radius:12px;border:1px solid #ffffff22;background:#ffffff0b;color:#fff"><div class="mode-row"><button class="mode active" data-count="5">Quick · 每章5题</button><button class="mode" data-count="10">Standard · 每章10题</button><button class="mode" data-count="15">Mastery · 每章15题</button></div><div class="actions"><button id="startBtn" class="btn primary">进入 World 1</button></div></section><section id="mapPanel" class="panel hidden"><div class="chapter-grid" id="chapterGrid"></div><div class="actions"><a href="portal.html" class="btn secondary" style="text-decoration:none">返回 Portal</a><button id="resetBtn" class="btn secondary">清除本机进度</button></div></section><section id="practicePanel" class="panel hidden"><div class="top"><div><div class="tag" id="routeTag"></div><h2 id="chapterTitle"></h2></div><div><span class="chip">题目 <b id="qIndex">1</b>/<b id="qTotal">0</b></span><span class="chip">本章分数 <b id="chapterScore">0</b></span></div></div><div class="progress"><i id="bar" style="width:0%"></i></div><div id="questionArea" class="question-box" style="margin-top:16px"></div><div id="feedback" class="feedback hidden"></div><div class="actions"><button id="submitBtn" class="btn primary">提交答案</button><button id="nextBtn" class="btn primary hidden">下一题</button><button id="backMapBtn" class="btn secondary">返回 World 1 地图</button></div></section><section id="resultPanel" class="panel hidden"><h2 id="resultTitle">章节完成</h2><div class="summary-grid"><div class="stat"><b id="resScore">0</b><div>得分</div></div><div class="stat"><b id="resCorrect">0</b><div>答对</div></div><div class="stat"><b id="resWrong">0</b><div>错题</div></div><div class="stat"><b id="resRate">0%</b><div>正确率</div></div></div><div id="wrongReport"></div><div class="actions"><button id="resultBack" class="btn primary">返回 World 1 地图</button><button id="retryBtn" class="btn secondary">重做本章</button></div></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script>const BANKS={'1.1':window.GX_SEJARAH_WORLD1_1_1||[],'1.2':window.GX_SEJARAH_WORLD1_1_2||[],'1.3':window.GX_SEJARAH_WORLD1_1_3||[],'1.4':window.GX_SEJARAH_WORLD1_1_4||[],'boss':window.GX_SEJARAH_WORLD1_FINAL_BOSS||[]};const META=[{id:'1.1',title:'Bab 1.1 · Latar Belakang Negara Bangsa',desc:'国家形成背景、王权、人民、法律与领土。'},{id:'1.2',title:'Bab 1.2 · Ciri-ciri Negara Bangsa KMM',desc:'Kerajaan、rakyat、kedaulatan、wilayah pengaruh、undang-undang 与 lambang kebesaran。'},{id:'1.3',title:'Bab 1.3 · Pentadbiran dan Undang-undang',desc:'Sistem Pembesar Empat Lipatan、Hukum Kanun Melaka 与 Undang-undang Laut Melaka。'},{id:'1.4',title:'Bab 1.4 · Peranan Pemerintah dan Rakyat',desc:'统治者与人民的责任、taat setia、kerah、gotong-royong 与 hubungan timbal balik。'},{id:'boss',title:'Final Boss · 综合挑战',desc:'综合 Bab 1.1 至 1.4，检验跨章节辨别与高阶应用。'}];const KEY='gxWorld1UnifiedV1';const $=id=>document.getElementById(id);let state={name:'Pelajar',count:5,done:{},totalScore:0};let activeRoute=null,questions=[],index=0,selected=[],chapterScore=0,wrong=[],answered=false;function loadState(){try{const s=JSON.parse(localStorage.getItem(KEY)||'null');if(s)state=Object.assign(state,s)}catch(e){}}function saveState(){localStorage.setItem(KEY,JSON.stringify(state))}function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function show(id){['startPanel','mapPanel','practicePanel','resultPanel'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function renderHud(){$('studentName').textContent=state.name;$('totalScore').textContent=state.totalScore||0;$('completedCount').textContent=Object.keys(state.done||{}).length}function renderMap(){$('chapterGrid').innerHTML=META.map((m,i)=>{const done=state.done&&state.done[m.id];return `<article class="chapter ${done?'done':''}" data-route="${m.id}"><div class="tag">${m.id==='boss'?'FINAL BOSS':'WORLD 1'}</div><h2>${m.title}</h2><p>${m.desc}</p><p>${done?`已完成 · ${done.score}/${done.total} · ${done.rate}%`:`点击进入 ${state.count} 题练习`}</p></article>`}).join('');document.querySelectorAll('.chapter').forEach(c=>c.onclick=()=>startChapter(c.dataset.route));renderHud()}function normalizeQuestion(q){if(q.choices&&q.correct)return q;const cards=q.cards||[];return Object.assign({},q,{choices:cards.map(x=>x.text),correct:(q.correct||cards.map(x=>x.id)).map(v=>typeof v==='number'?v:cards.findIndex(c=>c.id===v)).filter(x=>x>=0)})}function startChapter(route){activeRoute=route;const pool=(BANKS[route]||[]).map(normalizeQuestion).filter(q=>q.choices&&q.choices.length&&q.correct&&q.correct.length);questions=shuffle(pool).slice(0,Math.min(state.count,pool.length));index=0;chapterScore=0;wrong=[];show('practicePanel');$('routeTag').textContent=route==='boss'?'FINAL BOSS':'WORLD 1 · '+route;$('chapterTitle').textContent=META.find(x=>x.id===route).title;loadQuestion()}function loadQuestion(){answered=false;selected=[];$('feedback').classList.add('hidden');$('submitBtn').classList.remove('hidden');$('nextBtn').classList.add('hidden');const q=questions[index];$('qIndex').textContent=index+1;$('qTotal').textContent=questions.length;$('chapterScore').textContent=chapterScore;$('bar').style.width=(index/questions.length*100)+'%';const multi=q.correct.length>1;$('questionArea').innerHTML=`<div class="tag">${q.paper||q.mode||''} · ${q.marks||1} markah</div><h2>${q.question}</h2><p>${multi?`选择 ${q.correct.length} 个答案。`:'选择一个答案。'}</p><div class="choices">${q.choices.map((x,i)=>`<button class="choice" data-i="${i}">${x}</button>`).join('')}</div>`;document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>toggleChoice(+b.dataset.i,b,multi))}function toggleChoice(i,b,multi){if(answered)return;if(!multi){selected=[i];document.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}else{if(selected.includes(i)){selected=selected.filter(x=>x!==i);b.classList.remove('selected')}else{const q=questions[index];if(selected.length>=q.correct.length)return;selected.push(i);b.classList.add('selected')}}}function sameSet(a,b){return a.length===b.length&&a.every(x=>b.includes(x))}function submit(){if(!selected.length)return alert('请先选择答案。');answered=true;const q=questions[index];const ok=sameSet(selected,q.correct);document.querySelectorAll('.choice').forEach(b=>{const i=+b.dataset.i;if(q.correct.includes(i))b.classList.add('correct');else if(selected.includes(i))b.classList.add('wrong');b.disabled=true});if(ok)chapterScore+=Number(q.marks)||1;else wrong.push(q);$('chapterScore').textContent=chapterScore;$('feedback').innerHTML=`<h3>${ok?'答对了':'需要订正'}</h3><p><b>正确答案：</b>${q.correct.map(i=>q.choices[i]).join('；')}</p><p><b>华语讲解：</b>${q.chinese||'请根据课本关键词订正。'}</p><p><b>马来文关键词：</b>${(q.keywords||[]).join(' · ')||'—'}</p><p><b>订正提醒：</b>${q.correction||'重新阅读题目关键词。'}</p>`;$('feedback').classList.remove('hidden');$('submitBtn').classList.add('hidden');$('nextBtn').classList.remove('hidden')}function next(){index++;if(index>=questions.length)return finish();loadQuestion()}function finish(){const total=questions.reduce((s,q)=>s+(Number(q.marks)||1),0);const rate=Math.round(chapterScore/Math.max(1,total)*100);const prev=state.done&&state.done[activeRoute];if(!state.done)state.done={};state.done[activeRoute]={score:chapterScore,total,rate};state.totalScore=(state.totalScore||0)-(prev?prev.score:0)+chapterScore;saveState();$('resScore').textContent=chapterScore+'/'+total;$('resCorrect').textContent=questions.length-wrong.length;$('resWrong').textContent=wrong.length;$('resRate').textContent=rate+'%';$('resultTitle').textContent=META.find(x=>x.id===activeRoute).title+' 完成';$('wrongReport').innerHTML=wrong.length?'<h2>错题订正</h2>'+wrong.map(q=>`<div class="report-item"><b>${q.id||''} · ${q.question}</b><p>正确答案：${q.correct.map(i=>q.choices[i]).join('；')}</p><p>华语讲解：${q.chinese||'—'}</p><p>关键词：${(q.keywords||[]).join(' · ')||'—'}</p></div>`).join(''):'<div class="report-item">本章全部答对。</div>';show('resultPanel');renderHud()}document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.count=+b.dataset.count});$('startBtn').onclick=()=>{state.name=$('nameInput').value.trim()||state.name||'Pelajar';saveState();renderMap();show('mapPanel')};$('submitBtn').onclick=submit;$('nextBtn').onclick=next;$('backMapBtn').onclick=()=>{renderMap();show('mapPanel')};$('resultBack').onclick=()=>{renderMap();show('mapPanel')};$('retryBtn').onclick=()=>startChapter(activeRoute);$('resetBtn').onclick=()=>{if(confirm('确定清除 World 1 本机进度？')){localStorage.removeItem(KEY);state={name:'Pelajar',count:5,done:{},totalScore:0};location.reload()}};loadState();$('nameInput').value=state.name==='Pelajar'?'':state.name;renderHud();</script></body></html>
