swered=false,wrong=[];const S=JSON.parse(localStorage.getItem('gxT4AllBab')||'{}');function map(){const m=document.getElementById('map');m.innerHTML='';Object.entries(B).forEach(([n,b])=>{const d=document.createElement('div');d.className='bab'+(S[n]?.done?' done':'');d.innerHTML=`<div class="meta">BAB ${n} · 10 SOALAN</div><h2>${b.t}</h2><p>${S[n]?.done?`已完成：${S[n].score}/10`:'点击开始本章复习'}</p>`;d.onclick=()=>start(+n);m.appendChild(d)});stats()}function stats(){document.getElementById('done').textContent=Object.values(S).filter(x=>x.done).length;document.getElementById('totalCorrect').textContent=Object.values(S).reduce((a,x)=>a+(x.score||0),0)}function start(n){current=n;idx=0;score=0;wrong=[];document.getElementById('map').style.display='none';document.getElementById('result').classList.remove('show');document.getElementById('quiz').classList.add('show');render()}function render(){answered=false;document.getElementById('next').style.display='none';document.getElementById('feedback').innerHTML='';const b=B[current],q=b.q[idx];document.getElementById('qmeta').textContent=`Bab ${current} · ${b.t} · ${idx+1}/10`;document.getElementById('qtitle').textContent='选择正确答案';document.getElementById('qtext').textContent=q[0];const o=document.getElementById('opts');o.innerHTML='';q[1].forEach((x,i)=>{const bt=document.createElement('button');bt.className='opt';bt.textContent=String.fromCharCode(65+i)+'. '+x;bt.onclick=()=>choose(i,bt);o.appendChild(bt)})}function choose(i,bt){if(answered)return;answered=true;const q=B[current].q[idx],buttons=[...document.querySelectorAll('.opt')];buttons[q[2]].classList.add('correct');if(i===q[2])score++;else{bt.classList.add('wrong');wrong.push({q:q[0],your:q[1][i],ans:q[1][q[2]],ex:q[3]})}document.getElementById('feedback').innerHTML=`<div class="feedback"><b>${i===q[2]?'正确':'错误'}</b><br>正确答案：${q[1][q[2]]}<br>华语解释：${q[3]}<br>订正：请把马来文关键词抄写一次。</div>`;document.getElementById('next').style.display='inline-block'}document.getElementById('next').onclick=()=>{idx++;idx<10?render():finish()};function finish(){document.getElementById('quiz').classList.remove('show');document.getElementById('result').classList.add('show');S[current]={done:true,score};localStorage.setItem('gxT4AllBab',JSON.stringify(S));document.getElementById('rtitle').textContent=`Bab ${current} 完成`;document.getElementById('rscore').innerHTML=`成绩：<b>${score}/10</b> · ${score>=8?'掌握良好':score>=5?'需要再复习':'必须进行补救练习'}`;document.getElementById('wronglist').innerHTML=wrong.length?wrong.map((w,i)=>`<div class="wrongitem"><b>错题 ${i+1}</b><br>${w.q}<br>你的答案：${w.your}<br>正确答案：${w.ans}<br>华语解释：${w.ex}</div>`).join(''):'<div class="wrongitem">全部正确。</div>';stats()}function backMap(){document.getElementById('quiz').classList.remove('show');document.getElementById('result').classList.remove('show');document.getElementById('map').style.display='grid';map()}function restart(){start(current)}map();</script></body></html>
