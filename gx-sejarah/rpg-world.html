<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.0 RPG World</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315d72,#0b1d29 45%,#050b10);color:#fff;min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.hud{display:flex;gap:8px;flex-wrap:wrap}.chip{background:#ffffff0d;border:1px solid #ffffff20;border-radius:999px;padding:8px 12px}.map{margin-top:16px;background:linear-gradient(#17394aee,#0d2431ee);border:1px solid #ffffff1b;border-radius:24px;padding:20px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.place{position:relative;min-height:210px;border-radius:20px;padding:18px;background:linear-gradient(145deg,#17394c,#102534);border:1px solid #ffffff1c;cursor:pointer;transition:.2s;overflow:hidden}.place:hover{transform:translateY(-3px);border-color:#e8bd5d}.place.locked{opacity:.38;cursor:not-allowed}.place.done{outline:2px solid #3bc486}.place .icon{font-size:56px}.place h2{margin:8px 0;color:#f6e5ae}.place p{color:#b9cbd4;line-height:1.5}.npc{position:absolute;right:15px;bottom:10px;font-size:54px}.panel{margin-top:16px;background:#0d2231;border:1px solid #ffffff1c;border-radius:22px;padding:20px}.dialog{display:grid;grid-template-columns:120px 1fr;gap:16px;align-items:center}.portrait{font-size:88px;text-align:center}.speech{background:#fff;color:#17242c;border-radius:18px 18px 18px 4px;padding:16px;line-height:1.6}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}.primary{background:linear-gradient(135deg,#f1d27e,#bd8525);color:#251900}.secondary{background:#244257;color:#fff}.reward{margin-top:14px;background:#163447;border-radius:16px;padding:14px}.inventory{display:flex;gap:8px;flex-wrap:wrap}.item{background:#ffffff10;border:1px solid #ffffff1e;border-radius:12px;padding:9px 12px}.hidden{display:none}@media(max-width:760px){.grid{grid-template-columns:1fr}.dialog{grid-template-columns:1fr}.portrait{font-size:68px}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.0 PHASE C</div><h1>马六甲皇城 RPG</h1></div><div class="hud"><span class="chip">Dokumen <b id="docs">0</b>/5</span><span class="chip">XP <b id="xp">0</b></span></div></div><section class="map"><div id="places" class="grid"></div></section><section id="quest" class="panel hidden"><div class="dialog"><div id="portrait" class="portrait"></div><div class="speech"><b id="npcName"></b><p id="speech"></p><div class="actions"><button id="accept" class="btn primary">接受任务</button><button id="close" class="btn secondary">返回地图</button></div></div></div><div id="reward" class="reward hidden"></div></section><section class="panel"><h2>Dokumen 收藏</h2><div id="inventory" class="inventory"><span class="item">尚未获得文件</span></div><p><a href="portal.html" style="color:#fff">返回统一入口</a></p></section></main><script>const DATA=[{id:'palace',name:'Istana Melaka',icon:'🏯',npc:'Sultan',face:'👑',desc:'学习 kerajaan、kedaulatan 与 lambang kebesaran。',speech:'Beta mahu kamu membuktikan bahawa Melaka mempunyai sistem negara bangsa yang tersusun.',reward:'Piagam Kedaulatan',link:'free-text-examiner.html?route=1.2'},{id:'hall',name:'Balai Bendahara',icon:'🏛️',npc:'Bendahara',face:'🧔🏻',desc:'掌握 Sistem Pembesar Empat Lipatan。',speech:'Pentadbiran yang cekap memerlukan pembahagian tugas yang jelas. Buktikan kamu memahami peranan pembesar.',reward:'Surat Pentadbiran',link:'index.html'},{id:'court',name:'Mahkamah Melaka',icon:'⚖️',npc:'Hakim',face:'🧑🏻‍⚖️',desc:'复习 Hukum Kanun Melaka 与 Undang-undang Laut Melaka。',speech:'Undang-undang menjaga keamanan negeri. Selesaikan cabaran undang-undang untuk membuka rekod mahkamah.',reward:'Naskhah Undang-undang',link:'free-text-examiner.html?route=1.3'},{id:'port',name:'Pelabuhan Melaka',icon:'⚓',npc:'Laksamana',face:'🧭',desc:'理解 pelayaran、nakhoda 与 perdagangan。',speech:'Pelabuhan tidak akan aman tanpa undang-undang laut dan pertahanan maritim.',reward:'Peta Laluan Dagang',link:'index.html'},{id:'village',name:'Kampung Rakyat',icon:'🏘️',npc:'Ketua Kampung',face:'🧑🏽‍🌾',desc:'学习 taat setia、gotong-royong、kerah 与 hubungan timbal balik。',speech:'Rakyat yang bersatu mengukuhkan kerajaan. Tunjukkan peranan rakyat kepada pemerintah.',reward:'Ikrar Taat Setia',link:'free-text-examiner.html?route=1.4'}];const KEY='gxSejarahRPG';let state=JSON.parse(localStorage.getItem(KEY)||'{"done":[],"xp":0}');const $=id=>document.getElementById(id);function save(){localStorage.setItem(KEY,JSON.stringify(state))}function render(){$('docs').textContent=state.done.length;$('xp').textContent=state.xp;$('places').innerHTML=DATA.map((p,i)=>{const locked=i>0&&!state.done.includes(DATA[i-1].id),done=state.done.includes(p.id);return `<article class="place ${locked?'locked':''} ${done?'done':''}" data-id="${p.id}"><div class="icon">${p.icon}</div><h2>${p.name}</h2><p>${p.desc}</p><div class="npc">${p.face}</div></article>`}).join('');document.querySelectorAll('.place').forEach(x=>x.onclick=()=>{if(x.classList.contains('locked'))return alert('先完成前一个地点。');openQuest(x.dataset.id)});$('inventory').innerHTML=state.done.length?state.done.map(id=>`<span class="item">📜 ${DATA.find(x=>x.id===id).reward}</span>`).join(''):'<span class="item">尚未获得文件</span>'}let active=null;function openQuest(id){active=DATA.find(x=>x.id===id);$('portrait').textContent=active.face;$('npcName').textContent=active.npc;$('speech').textContent=active.speech;$('reward').classList.add('hidden');$('quest').classList.remove('hidden');$('accept').textContent=state.done.includes(id)?'再次挑战':'接受任务';window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})}$('accept').onclick=()=>{if(!active)return;const win=confirm('完成这个任务后获得奖励。现在进入挑战页面？');if(!win)return;if(!state.done.includes(active.id)){state.done.push(active.id);state.xp+=100;save();$('reward').innerHTML=`任务完成奖励：<b>${active.reward}</b> · +100 XP`;$('reward').classList.remove('hidden');render()}setTimeout(()=>location.href=active.link,600)};$('close').onclick=()=>$('quest').classList.add('hidden');render();</script></body></html>
