<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GX Sejarah Teacher Dashboard V0.5</title>
<style>
:root{--panel:#102636;--gold:#e8bd5d;--text:#eef5f8;--muted:#9eb2bd;--ok:#2aa36e;--bad:#d85a5a}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#264f64,#091b28 44%,#050b11);color:var(--text);min-height:100vh}.app{max-width:1180px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:var(--gold);font-weight:900;letter-spacing:.1em}.panel{margin-top:18px;background:#0d2130e8;border:1px solid #ffffff1b;border-radius:22px;padding:20px}.controls{display:grid;grid-template-columns:1fr auto auto auto;gap:10px}input,button{border:0;border-radius:12px;padding:13px 15px;font-size:15px}input{background:#fff;color:#15232c}button{cursor:pointer;font-weight:800}.primary{background:linear-gradient(135deg,#f0d27f,#bf8727);color:#211700}.secondary{background:#244257;color:#fff}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}.stat{background:#153044;border:1px solid #ffffff16;border-radius:16px;padding:16px}.stat b{font-size:30px;color:var(--gold);display:block;margin-top:5px}.table-wrap{overflow:auto;margin-top:18px}table{width:100%;border-collapse:collapse;min-width:860px}th,td{text-align:left;padding:12px;border-bottom:1px solid #ffffff16}th{color:var(--gold);font-size:13px;letter-spacing:.04em}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#ffffff12}.empty{text-align:center;color:var(--muted);padding:34px}.note{color:var(--muted);line-height:1.6}.ok{color:#59d89c}.bad{color:#ff8585}.switch{display:flex;align-items:center;gap:7px;background:#244257;border-radius:12px;padding:0 12px}.switch input{width:auto}@media(max-width:760px){.controls{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main class="app">
<div class="top"><div><div class="brand">GX SEJARAH · TEACHER DASHBOARD V0.5</div><h1>学生在线成绩后台</h1></div><a href="./play-online.html" style="color:#fff">学生入口</a></div>
<section class="panel">
<div class="controls"><input id="classCode" placeholder="输入班级代码，例如 GX401"><button id="loadBtn" class="primary">读取成绩</button><button id="exportBtn" class="secondary">导出 CSV</button><label class="switch"><input id="autoRefresh" type="checkbox" checked>自动刷新</label></div>
<p id="status" class="note">输入班级代码后，后台每10秒自动刷新。</p>
<div class="stats"><div class="stat">学生人数<b id="studentCount">0</b></div><div class="stat">平均分<b id="averageScore">0%</b></div><div class="stat">总错题<b id="wrongTotal">0</b></div><div class="stat">使用 Hint<b id="hintTotal">0</b></div></div>
<div class="table-wrap"><table><thead><tr><th>排名</th><th>学生</th><th>分数</th><th>正确</th><th>错题</th><th>Hint</th><th>进度</th><th>完成时间</th></tr></thead><tbody id="rows"><tr><td colspan="8" class="empty">请输入班级代码读取成绩</td></tr></tbody></table></div>
</section>
<section class="panel"><h2>后台配置状态</h2><p class="note">填写 <code>config.js</code> 的 Supabase Project URL 与 anon public key 后即可跨设备读取成绩。未配置时使用本机记录。</p><div id="configState" class="badge bad">尚未连接 Supabase</div></section>
</main>
<script src="./config.js"></script>
<script>
const $=id=>document.getElementById(id);let current=[],timer=null;
function configured(){const c=window.GX_SEJARAH_CONFIG;return c&&c.supabaseUrl&&!c.supabaseUrl.includes('YOUR-PROJECT')&&c.supabaseAnonKey&&!c.supabaseAnonKey.includes('YOUR-ANON')}
function localRows(code){return JSON.parse(localStorage.getItem('gx_sejarah_teacher_records')||'[]').filter(x=>!code||String(x.classCode||'').toUpperCase()===code.toUpperCase())}
async function remoteRows(code){const c=window.GX_SEJARAH_CONFIG;const url=c.supabaseUrl+'/rest/v1/gx_sejarah_scores?class_code=eq.'+encodeURIComponent(code)+'&select=*&order=score.desc,created_at.asc';const r=await fetch(url,{headers:{apikey:c.supabaseAnonKey,Authorization:'Bearer '+c.supabaseAnonKey}});if(!r.ok)throw new Error('Supabase '+r.status);return r.json()}
function latestPerStudent(data){const map=new Map();[...data].sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0)).forEach(x=>{const k=(x.student_name||x.name||'').trim().toLowerCase();if(k&&!map.has(k))map.set(k,x)});return [...map.values()]}
function render(data){current=latestPerStudent(data).sort((a,b)=>(b.score||0)-(a.score||0));$('studentCount').textContent=current.length;const pct=current.length?Math.round(current.reduce((s,x)=>s+((x.max_score||x.maxScore)?(x.score/(x.max_score||x.maxScore))*100:0),0)/current.length):0;$('averageScore').textContent=pct+'%';$('wrongTotal').textContent=current.reduce((s,x)=>s+(x.wrong_count??x.wrong??0),0);$('hintTotal').textContent=current.reduce((s,x)=>s+(x.hint_count??x.hints??0),0);$('rows').innerHTML=current.length?current.map((x,i)=>`<tr><td>${i+1}</td><td><b>${esc(x.student_name||x.name||'-')}</b></td><td>${x.score||0}/${x.max_score||x.maxScore||0}</td><td class="ok">${x.correct_count??x.correct??0}</td><td class="bad">${x.wrong_count??x.wrong??0}</td><td>${x.hint_count??x.hints??0}</td><td>${x.progress_percent??x.progress??100}%</td><td>${new Date(x.created_at||x.time||Date.now()).toLocaleString()}</td></tr>`).join(''):'<tr><td colspan="8" class="empty">这个班级还没有成绩</td></tr>'}
function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function load(){const code=$('classCode').value.trim().toUpperCase();if(!code){$('status').textContent='请先输入班级代码。';return}$('status').textContent='正在读取 '+code+'…';try{const d=configured()?await remoteRows(code):localRows(code);render(d);$('status').textContent=(configured()?'在线后台':'本机记录')+'：已读取 '+d.length+' 条提交，显示每位学生最新一次成绩。'}catch(e){$('status').textContent='读取失败：'+e.message;render([])}}
$('loadBtn').addEventListener('click',load);$('classCode').addEventListener('keydown',e=>{if(e.key==='Enter')load()});$('autoRefresh').addEventListener('change',()=>{if(timer)clearInterval(timer);if($('autoRefresh').checked)timer=setInterval(()=>{if($('classCode').value.trim())load()},10000)});timer=setInterval(()=>{if($('autoRefresh').checked&&$('classCode').value.trim())load()},10000);
$('exportBtn').addEventListener('click',()=>{if(!current.length){$('status').textContent='目前没有可导出的成绩。';return}const head=['rank','student','score','max_score','correct','wrong','hints','progress','created_at'];const lines=[head.join(','),...current.map((x,i)=>[i+1,x.student_name||x.name,x.score||0,x.max_score||x.maxScore||0,x.correct_count??x.correct??0,x.wrong_count??x.wrong??0,x.hint_count??x.hints??0,x.progress_percent??x.progress??100,x.created_at||x.time||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))];const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gx-sejarah-'+($('classCode').value||'scores')+'.csv';a.click();URL.revokeObjectURL(a.href)});
if(configured()){$('configState').textContent='Supabase 已连接';$('configState').className='badge ok'}
</script>
</body>
</html>
