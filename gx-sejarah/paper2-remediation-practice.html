<!doctype html><html lang="ms"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V3.2 Paper 2 Practice</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#2f596e,#091a26 48%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:980px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.tag{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.chip{background:#ffffff0d;border:1px solid #ffffff1d;border-radius:999px;padding:8px 12px}.panel{margin-top:16px;background:#0d2231;border:1px solid #ffffff1d;border-radius:22px;padding:22px}.paper{background:#fff8e8;color:#16242d;border-radius:18px;padding:20px}.question{font-size:21px;line-height:1.55;font-weight:850}.meta{color:#68747b;margin-bottom:10px}.answer{width:100%;min-height:190px;margin-top:14px;border:2px solid #d5cdb8;border-radius:14px;padding:14px;font-size:17px;line-height:1.55}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer;margin-top:14px}.primary{background:#e8bd5d;color:#251900}.secondary{background:#29475a;color:#fff}.feedback{margin-top:14px;background:#eef4f5;border-radius:14px;padding:15px;line-height:1.6}.point{background:#fff;border:1px solid #d7dfe2;border-radius:11px;padding:11px;margin-top:8px}.ok{border-left:5px solid #269d68}.no{border-left:5px solid #d4545b}.reference{background:#fff;border-left:5px solid #269d68;border-radius:11px;padding:12px;margin-top:12px}.hidden{display:none!important}.result .big{font-size:54px;color:#e8bd5d;font-family:Georgia,serif}.review{background:#fff;color:#17242c;border-radius:15px;padding:15px;margin-top:12px;line-height:1.6}@media(max-width:700px){.question{font-size:18px}}</style></head><body><main class="wrap"><div class="top"><div><div class="tag">GX SEJARAH · V3.2 PAPER 2 REMEDIATION</div><h1 id="title">Latihan Pemulihan</h1></div><div><span class="chip">Soalan <b id="progress">0/0</b></span> <span class="chip">Markah <b id="score">0</b></span></div></div><section id="practice" class="panel"><div class="paper"><div id="meta" class="meta"></div><div id="question" class="question"></div><textarea id="answer" class="answer" placeholder="Tulis jawapan lengkap dalam Bahasa Melayu..."></textarea><div><button id="check" class="btn primary">Semak Jawapan</button> <button id="next" class="btn secondary hidden">Soalan Seterusnya</button></div><div id="feedback" class="feedback hidden"></div></div></section><section id="result" class="panel result hidden"><div class="tag">LAPORAN PEMULIHAN</div><div id="final" class="big"></div><p id="message"></p><div id="reviews"></div><button class="btn primary" onclick="location.reload()">Cuba Lagi</button> <a class="btn secondary" href="student-profile.html" style="display:inline-block;text-decoration:none">Profil Pelajar</a></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script src="profile-system.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])];const $=id=>document.getElementById(id),p=new URLSearchParams(location.search),name=p.get('name')||'Pelajar',ids=(p.get('ids')||'').split(',').filter(Boolean),count=Math.max(1,Number(p.get('count'))||5),route=(p.get('route')||'1.3').toUpperCase();function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function isPaper2(q){return q.mode!=='PAPER 1'&&(q.cards||q.correct?.length>1)}function points(q){if(Array.isArray(q.cards)&&q.cards.length)return q.cards.filter(c=>!q.correctCards||q.correctCards.includes(c.id)||q.correct?.includes(c.id)||q.correct?.includes(q.cards.indexOf(c))).map(c=>({tag:c.tag||'Isi',text:c.text}));if(q.choices&&q.correct)return q.correct.map(i=>({tag:'Fakta',text:q.choices[i]}));return (q.keywords||[]).slice(0,q.marks||4).map(x=>({tag:'Kata kunci',text:x}))}const exact=ids.map(id=>BANK.find(q=>q.id===id)).filter(q=>q&&isPaper2(q));const pool=BANK.filter(q=>isPaper2(q)&&(q.route===route||route==='BOSS'&&q.route==='BOSS')&&!exact.includes(q));let questions=[...exact,...shuffle(pool)].slice(0,count);if(questions.length<count)questions=[...questions,...shuffle(BANK.filter(q=>isPaper2(q)&&!questions.includes(q))).slice(0,count-questions.length)];let i=0,total=0,max=questions.reduce((s,q)=>s+(Number(q.marks)||points(q).length||1),0),reviews=[],checked=false;$('title').textContent=`${name} · Paper 2 个性化补救`;function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}const stop=new Set(['yang','dan','atau','untuk','dalam','kepada','dengan','serta','akan','ialah','adalah','oleh','dapat','boleh','sebagai','pada','ini','itu']);function tokens(s){return norm(s).split(' ').filter(x=>x.length>3&&!stop.has(x))}function hitPoint(answer,text){const a=norm(answer),ts=tokens(text);if(!ts.length)return false;const need=Math.max(1,Math.ceil(ts.length*.45));return ts.filter(t=>a.includes(t)).length>=need}function load(){checked=false;$('feedback').classList.add('hidden');$('next').classList.add('hidden');$('check').disabled=false;$('answer').value='';const q=questions[i];$('progress').textContent=`${i+1}/${questions.length}`;$('meta').textContent=`${q.id} · ${q.paper||q.mode} · ${q.marks||points(q).length} markah`;$('question').textContent=q.question}function check(){if(checked)return;const answer=$('answer').value.trim();if(answer.length<8)return alert('请先写出较完整的答案。');checked=true;const q=questions[i],ps=points(q),hits=ps.map(x=>hitPoint(answer,x.text)),earned=Math.min(Number(q.marks)||ps.length,hits.filter(Boolean).length);total+=earned;$('score').textContent=total;const missing=ps.filter((x,n)=>!hits[n]);reviews.push({q,answer,earned,ps,hits,missing});$('feedback').classList.remove('hidden');$('feedback').innerHTML=`<b>Anggaran: ${earned}/${q.marks||ps.length} markah</b>${ps.map((x,n)=>`<div class="point ${hits[n]?'ok':'no'}"><b>${hits[n]?'✓ 已命中':'✗ 缺失'} · ${x.tag}</b><br>${x.text}</div>`).join('')}<div class="reference"><b>参考完整答案</b><br>${ps.map(x=>x.text).join(' ')}</div><p><b>华语提示：</b>${q.chinese||'请补充完整事实、解释与影响。'}</p>`;$('check').disabled=true;$('next').classList.remove('hidden')}function next(){i++;if(i>=questions.length)return finish();load()}function finish(){$('practice').classList.add('hidden');$('result').classList.remove('hidden');const pct=max?Math.round(total/max*100):0;$('final').textContent=`${total}/${max} · ${pct}%`;$('message').textContent=pct>=80?'得分点掌握良好，可以进入模拟考。':pct>=60?'基本掌握，但仍需补回缺失得分点。':'需要再次练习 Fakta 与 Huraian，再挑战同一组。';$('reviews').innerHTML=reviews.map(r=>`<article class="review"><b>${r.q.id} · ${r.earned}/${r.q.marks||r.ps.length}</b><p>${r.q.question}</p><p><b>你的答案：</b>${escapeHtml(r.answer)}</p><p><b>仍缺失：</b>${r.missing.length?r.missing.map(x=>x.text).join('；'):'无，全部得分点已命中。'}</p><p><b>华语说明：</b>${r.q.chinese||'-'}</p></article>`).join('');const wrongIds=reviews.filter(r=>r.missing.length).map(r=>r.q.id);localStorage.setItem('gxSejarahPaper2RemediationLatest',JSON.stringify({name,score:total,max,percent:pct,wrongIds,completedAt:new Date().toISOString()}));if(window.GX_PROFILE){GX_PROFILE.setName(name);GX_PROFILE.addXP(60+total*10,'Paper 2 remediation')}}function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}$('check').onclick=check;$('next').onclick=next;if(!questions.length){$('practice').innerHTML='<p>无法找到符合条件的 Paper 2 题目，请返回生成器重新建立链接。</p>'}else load();</script></body></html>
