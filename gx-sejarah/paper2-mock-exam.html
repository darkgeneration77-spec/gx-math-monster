<!doctype html><html lang="ms"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.8 Paper 2</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:#eef1f3;color:#17232b}.wrap{max-width:980px;margin:auto;padding:20px}.top{position:sticky;top:0;z-index:3;background:#fff;border:1px solid #d8dee2;border-radius:16px;padding:14px 18px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;box-shadow:0 8px 25px #0001}.brand{font-weight:900;color:#8a641f}.timer{font-size:24px;font-weight:900}.timer.danger{color:#c92f3d}.paper{background:#fff;margin-top:18px;padding:28px;border:1px solid #d8dee2;border-radius:18px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px}.meta input,.meta select,textarea{width:100%;padding:12px;border:1px solid #bbc6cc;border-radius:10px;font-size:16px}textarea{min-height:150px;line-height:1.6;resize:vertical}.q{margin-top:24px;padding-top:20px;border-top:2px solid #17232b}.q h3{line-height:1.5}.marks{float:right;font-weight:900}.btn{border:0;border-radius:11px;padding:13px 17px;font-weight:900;cursor:pointer}.primary{background:#b88a2e;color:#fff}.secondary{background:#314b5d;color:#fff}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.hidden{display:none!important}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#f3f5f6;border-radius:12px;padding:14px;text-align:center}.big{font-size:34px;font-weight:900;color:#8a641f}.review{margin-top:14px;padding:16px;border-radius:12px;background:#f6f7f8;border-left:5px solid #b88a2e}.hit{color:#167a4d;font-weight:800}.miss{color:#b52835;font-weight:800}.model{margin-top:10px;background:#fff;border:1px solid #d8dee2;border-radius:10px;padding:12px;line-height:1.6}@media(max-width:700px){.meta,.summary{grid-template-columns:1fr 1fr}.paper{padding:18px}}@media print{body{background:#fff}.top,.actions,.no-print{display:none!important}.paper{border:0;padding:0}.review{break-inside:avoid}}</style></head><body><main class="wrap"><div class="top"><div><b class="brand">GX SEJARAH · V2.8 PAPER 2</b><div>Ujian Struktur dan Esei · World 1</div></div><div id="timer" class="timer">60:00</div></div><section id="start" class="paper"><h1>Paper 2 模拟考试</h1><p>5道结构与论述题。直接输入马来文完整答案，系统根据题库得分点进行即时估分。</p><div class="meta"><label>Nama pelajar<input id="name" maxlength="30" placeholder="Nama"></label><label>Mod<select id="mode"><option value="standard">Standard · 5 soalan · 60 minit</option><option value="quick">Quick · 3 soalan · 35 minit</option></select></label></div><div class="actions"><button id="startBtn" class="btn primary">Mulakan Peperiksaan</button><a class="btn secondary" href="v2-6-exam-launcher.html" style="text-decoration:none">返回考试中心</a></div></section><section id="exam" class="paper hidden"><h1>Kertas 2 · Bahagian A/B</h1><p id="examInfo"></p><div id="questions"></div><div class="actions"><button id="submitBtn" class="btn primary">Hantar Jawapan</button></div></section><section id="result" class="paper hidden"><h1>Laporan Pemeriksa</h1><div class="summary"><div class="stat"><div id="score" class="big">0/0</div><small>MARKAH</small></div><div class="stat"><div id="percent" class="big">0%</div><small>PERATUS</small></div><div class="stat"><div id="grade" class="big">-</div><small>GRED</small></div><div class="stat"><div id="used" class="big">0m</div><small>MASA</small></div></div><div id="reviews"></div><div class="actions no-print"><button class="btn primary" onclick="window.print()">打印报告</button><button class="btn secondary" onclick="location.reload()">重新考试</button><a class="btn secondary" href="mock-exam-submit.html" style="text-decoration:none">提交成绩</a></div></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script src="profile-system.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>Array.isArray(q.cards)&&q.cards.length);const $=id=>document.getElementById(id);let qs=[],seconds=0,totalSeconds=0,timerId=null,startedAt=0;function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}const stop=new Set(['yang','dan','dengan','untuk','dalam','kepada','oleh','serta','ialah','adalah','akan','dapat','lebih','pada','ini','itu','sebagai','agar','supaya']);function words(s){return norm(s).split(' ').filter(x=>x.length>3&&!stop.has(x))}function pointHit(answer,text){const a=norm(answer),w=words(text);if(!a||!w.length)return false;const need=w.length<=3?1:Math.min(3,Math.ceil(w.length*.45));return w.filter(x=>a.includes(x)).length>=need}function grade(p){return p>=85?'A':p>=70?'B':p>=55?'C':p>=40?'D':p>=30?'E':'G'}function tick(){seconds--;const m=Math.floor(seconds/60),s=seconds%60;$('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');$('timer').classList.toggle('danger',seconds<=300);if(seconds<=0){clearInterval(timerId);submit(true)}}function start(){const name=$('name').value.trim();if(!name)return alert('请输入学生姓名。');const quick=$('mode').value==='quick',count=quick?3:5;totalSeconds=seconds=quick?2100:3600;startedAt=Date.now();qs=shuffle(BANK).slice(0,count);$('start').classList.add('hidden');$('exam').classList.remove('hidden');$('examInfo').textContent=`Nama: ${name} · ${count} soalan · Jumlah ${qs.reduce((s,q)=>s+q.marks,0)} markah`;$('questions').innerHTML=qs.map((q,i)=>`<article class="q"><span class="marks">[${q.marks} markah]</span><h3>${i+1}. ${q.question.replace(/\s*\[\d+ markah\]\s*/i,'')}</h3><textarea id="ans${i}" placeholder="Tulis jawapan lengkap dalam Bahasa Melayu..."></textarea></article>`).join('');tick();timerId=setInterval(tick,1000)}function submit(auto=false){if(!auto&&!confirm('确定交卷？'))return;clearInterval(timerId);let score=0,max=0,review=[];qs.forEach((q,i)=>{const ans=$('ans'+i).value.trim(),points=q.cards.slice(0,q.marks),hits=points.map(p=>pointHit(ans,p.text));const got=Math.min(q.marks,hits.filter(Boolean).length);score+=got;max+=q.marks;review.push({q,ans,points,hits,got})});const pct=max?Math.round(score/max*100):0,usedSec=Math.max(0,Math.round((Date.now()-startedAt)/1000));$('exam').classList.add('hidden');$('result').classList.remove('hidden');$('score').textContent=`${score}/${max}`;$('percent').textContent=pct+'%';$('grade').textContent=grade(pct);$('used').textContent=Math.floor(usedSec/60)+'m';$('reviews').innerHTML=review.map((r,i)=>`<div class="review"><h3>${i+1}. ${r.q.title} — ${r.got}/${r.q.marks}</h3><p><b>你的答案：</b>${r.ans||'未作答'}</p>${r.points.map((p,n)=>`<div class="${r.hits[n]?'hit':'miss'}">${r.hits[n]?'✓':'✗'} ${p.tag||'Isi'}: ${p.text}</div>`).join('')}<div class="model"><b>参考答案：</b><br>${r.points.map(p=>p.text).join(' ')}</div><p><b>华语说明：</b>${r.q.chinese||'-'}</p></div>`).join('');const record={name:$('name').value.trim(),mode:'paper2',score,max,percent:pct,grade:grade(pct),duration_seconds:usedSec,wrong_topics:review.filter(x=>x.got<x.q.marks).map(x=>x.q.id),completed_at:new Date().toISOString()};localStorage.setItem('gxSejarahLatestMockExam',JSON.stringify(record));const arr=JSON.parse(localStorage.getItem('gxSejarahMockExamRecords')||'[]');arr.unshift(record);localStorage.setItem('gxSejarahMockExamRecords',JSON.stringify(arr.slice(0,50)));if(window.GX_PROFILE)GX_PROFILE.addXP(100+score*10,'Paper 2 Mock Exam')} $('startBtn').onclick=start;$('submitBtn').onclick=()=>submit(false);</script></body></html>
