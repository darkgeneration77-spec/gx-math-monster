<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Student Profile</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#2f5669,#0b1c28 48%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}.panel{background:#0e2433;border:1px solid #ffffff1b;border-radius:22px;padding:20px}.hero{text-align:center}.avatar{font-size:96px}.level{font-size:42px;color:#e8bd5d;font-weight:900}.bar{height:14px;background:#0008;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#b97d20,#f0d67d)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:#ffffff0b;border-radius:14px;padding:13px;text-align:center}.stat b{font-size:25px;color:#f4d77e}.badges,.items{display:flex;gap:9px;flex-wrap:wrap}.badge,.item{padding:10px 12px;border-radius:12px;background:#ffffff0d;border:1px solid #ffffff1b}.badge{border-color:#e8bd5d66}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer;background:#e8bd5d;color:#241900}.secondary{background:#244257;color:#fff}input{width:100%;padding:12px;border:0;border-radius:11px;margin:8px 0}.small{color:#a9bdc7;font-size:13px}@media(max-width:760px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.2</div><h1>学生成长档案</h1></div><a class="btn secondary" href="portal.html" style="text-decoration:none">返回 Portal</a></div><section class="grid"><article class="panel hero"><div class="avatar">🛡️</div><div class="level">Lv. <span id="level">1</span></div><h2 id="name">Pelajar</h2><p id="title">Novis Sejarah</p><div class="bar"><i id="xpBar" style="width:0%"></i></div><p><b id="xp">0</b> XP · 距离下一级 <span id="next">100</span> XP</p><label>学生姓名<input id="nameInput" placeholder="输入姓名"></label><button id="saveName" class="btn">保存姓名</button></article><article class="panel"><h2>学习统计</h2><div class="stats"><div class="stat"><b id="questions">0</b><br>已答题</div><div class="stat"><b id="correct">0</b><br>答对</div><div class="stat"><b id="wrong">0</b><br>错题</div><div class="stat"><b id="hints">0</b><br>Hint</div><div class="stat"><b id="bossWins">0</b><br>Boss胜利</div><div class="stat"><b id="docs">0</b><br>Dokumen</div></div><p class="small">统计会读取主游戏、RPG和Boss奖励的本机记录。</p></article><article class="panel"><h2>徽章</h2><div id="badges" class="badges"></div></article><article class="panel"><h2>收藏品</h2><div id="items" class="items"></div></article></section></main><script src="profile-system.js"></script><script>const $=id=>document.getElementById(id);function render(){const p=GX_PROFILE.read(),base=(p.level-1)*(p.level-1)*100,next=p.level*p.level*100,progress=Math.max(0,Math.min(100,(p.xp-base)/(next-base)*100));$('level').textContent=p.level;$('name').textContent=p.name;$('title').textContent=p.title;$('xp').textContent=p.xp;$('next').textContent=Math.max(0,next-p.xp);$('xpBar').style.width=progress+'%';$('nameInput').value=p.name;Object.entries(p.stats||{}).forEach(([k,v])=>{if($(k))$(k).textContent=v||0});$('badges').innerHTML=(p.badges||[]).length?p.badges.map(x=>`<span class="badge">🏅 ${x}</span>`).join(''):'<span class="small">尚未获得徽章</span>';$('items').innerHTML=(p.items||[]).length?p.items.map(x=>`<span class="item">🎁 ${x}</span>`).join(''):'<span class="small">尚未获得收藏品</span>'}$('saveName').onclick=()=>{GX_PROFILE.setName($('nameInput').value);render()};render();</script></body></html>
