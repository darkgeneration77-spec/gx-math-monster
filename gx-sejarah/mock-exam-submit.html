<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Mock Exam Submit</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#244e64,#081722 48%,#04090e);color:#fff;min-height:100vh}.wrap{max-width:900px;margin:auto;padding:24px}.panel{margin-top:18px;background:#0d2231;border:1px solid #ffffff1b;border-radius:22px;padding:22px}.brand{color:#e8bd5d;font-weight:900}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}input{width:100%;padding:13px;border:0;border-radius:12px;font-size:16px}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer}.primary{background:#e8bd5d;color:#231800}.secondary{background:#244257;color:#fff}.summary{background:#fff;color:#17242c;border-radius:16px;padding:16px;line-height:1.6}.ok{color:#68d99d}.bad{color:#ff8a8a}.hidden{display:none}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="brand">GX SEJARAH · V2.7 STUDENT SUBMISSION</div><h1>模拟考试成绩提交</h1><section class="panel"><div id="record" class="summary">正在读取本机最新模拟考试成绩……</div><div class="grid" style="margin-top:14px"><label>Nama pelajar<input id="name" maxlength="50"></label><label>Kod kelas<input id="classCode" maxlength="20" placeholder="例如 F4A"></label></div><button id="submit" class="btn primary">提交到教师成绩中心</button> <a class="btn secondary" href="spm-mock-exam.html" style="text-decoration:none">返回模拟考试</a><p id="status"></p></section></main><script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const $=id=>document.getElementById(id);const keys=['gxSejarahMockExamResults','gxMockExamResults','gxSejarahMockExam'];let rows=[];for(const k of keys){try{const x=JSON.parse(localStorage.getItem(k)||'null');if(Array.isArray(x)&&x.length){rows=x;break}if(x&&typeof x==='object'){rows=[x];break}}catch(e){}}const latest=rows.sort((a,b)=>new Date(b.submittedAt||b.time||0)-new Date(a.submittedAt||a.time||0))[0];function val(o,names,fallback){for(const n of names)if(o&&o[n]!==undefined)return o[n];return fallback}if(!latest){$('record').innerHTML='<b class="bad">没有找到模拟考试成绩。</b><br>请先完成一次 V2.6 SPM Mock Exam。';$('submit').disabled=true}else{const score=Number(val(latest,['score','correct'],0)),total=Number(val(latest,['total','questions'],20)),pct=Number(val(latest,['percentage','percent'],total?score/total*100:0)),grade=val(latest,['grade'],'-'),duration=Number(val(latest,['durationSeconds','duration','usedSeconds'],0));$('name').value=val(latest,['name','studentName'],'');$('record').innerHTML=`<b>最新成绩</b><br>分数：${score}/${total}<br>正确率：${pct.toFixed(1)}%<br>等级：${grade}<br>用时：${Math.floor(duration/60)}分${duration%60}秒`;latest._normalized={score,total,pct,grade,duration}}function cfg(){return window.GX_SEJARAH_CONFIG||window.GX_CONFIG||{}}function client(){const c=cfg(),url=c.supabaseUrl||c.url,key=c.supabaseAnonKey||c.anonKey;return url&&key&&window.supabase?window.supabase.createClient(url,key):null}$('submit').onclick=async()=>{if(!latest)return;const name=$('name').value.trim(),classCode=$('classCode').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');if(!name||!classCode)return $('status').textContent='请填写学生姓名和班级代码。';const sb=client();if(!sb)return $('status').innerHTML='<span class="bad">Supabase 尚未配置。请先填写 config.js。</span>';const n=latest._normalized;const wrong=val(latest,['wrongQuestionIds','wrongIds','wrong'],[]);const payload={class_code:classCode,student_name:name,exam_mode:String(val(latest,['mode'],'standard')),score:n.score,total:n.total,percentage:n.pct,grade:String(n.grade),duration_seconds:n.duration,wrong_question_ids:Array.isArray(wrong)?wrong.map(x=>typeof x==='string'?x:(x.id||'')).filter(Boolean):[]};$('status').textContent='正在提交……';const {error}=await sb.from('gx_mock_exam_results').insert(payload);$('status').innerHTML=error?`<span class="bad">提交失败：${error.message}</span>`:'<span class="ok">提交成功。老师现在可以查看成绩。</span>'};</script></body></html>
