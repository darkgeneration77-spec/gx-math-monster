<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.5 Online Weekly League</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#34204f,#100b19 48%,#05070b);color:#fff;min-height:100vh}.wrap{max-width:1080px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}.brand{color:#f0c766;font-weight:900}.panel{margin-top:16px;background:#121928e8;border:1px solid #ffffff1a;border-radius:20px;padding:20px}input{width:100%;padding:13px;border:0;border-radius:12px;margin:6px 0 12px;font-size:16px}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}.primary{background:#f0c766;color:#211700}.secondary{background:#29384b;color:#fff}.status{padding:10px 12px;border-radius:12px;background:#ffffff0d}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.row{display:grid;grid-template-columns:50px 1fr auto auto;gap:10px;padding:11px 0;border-bottom:1px solid #ffffff12;align-items:center}.rank{font-size:22px;font-weight:900}.hidden{display:none!important}.question{background:#fff8e8;color:#17232b;border-radius:16px;padding:18px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}.choice{border:2px solid #d8cfba;background:#fff;border-radius:12px;padding:12px;text-align:left;font-weight:800;cursor:pointer}.choice.correct{background:#e1f5e9;border-color:#2f9f68}.choice.wrong{background:#fde5e7;border-color:#d7535c}@media(max-width:760px){.grid,.choices{grid-template-columns:1fr}.row{grid-template-columns:40px 1fr auto}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.5 ONLINE</div><h1>跨设备每周联赛</h1></div><a href="portal.html" style="color:#fff">返回 Portal</a></div><section id="join" class="panel"><div id="connection" class="status">检查 Supabase 连接中…</div><label>学生姓名<input id="name" maxlength="40"></label><label>班级代码<input id="classCode" maxlength="20" placeholder="例如 4AMANAH"></label><button id="start" class="btn primary">进入本周联赛</button></section><section id="game" class="panel hidden"><div class="grid"><div><h2 id="weekTitle"></h2><div id="questionBox" class="question"></div></div><div><h2>本周排行榜</h2><div id="leaderboard"></div></div></div></section><section id="result" class="panel hidden"><h2 id="resultTitle"></h2><p id="resultText"></p><button class="btn secondary" onclick="location.reload()">重新进入</button></section></main><script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script>const $=id=>document.getElementById(id);const CFG=window.GX_SEJARAH_CONFIG||{};const online=!!(CFG.supabaseUrl&&CFG.supabaseAnonKey&&window.supabase);const sb=online?window.supabase.createClient(CFG.supabaseUrl,CFG.supabaseAnonKey):null;const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices&&q.correct&&q.correct.length===1);$('connection').textContent=online?'Supabase 已连接，可跨设备排行。':'Supabase 未配置，将使用本机周榜。';function weekKey(){const d=new Date(),jan4=new Date(d.getFullYear(),0,4),day=(d-jan4)/86400000,w=Math.ceil((day+jan4.getDay()+1)/7);return d.getFullYear()+'-W'+String(w).padStart(2,'0')}function seeded(seed){let x=0;for(const c of seed)x=(x*31+c.charCodeAt(0))>>>0;return()=>((x=Math.imul(1664525,x)+1013904223>>>0)/4294967296)}function pick(){const a=[...BANK],r=seeded(weekKey());for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a.slice(0,10)}let qs=[],i=0,score=0,startTime=0,name='',classCode='';function renderQ(){const q=qs[i];$('questionBox').innerHTML=`<div><b>${i+1}/10 · ${q.id}</b><h3>${q.question}</h3><div class="choices">${q.choices.map((x,n)=>`<button class="choice" data-i="${n}">${x}</button>`).join('')}</div></div>`;document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>answer(+b.dataset.i,b))}function answer(n,b){const q=qs[i];document.querySelectorAll('.choice').forEach(x=>{const k=+x.dataset.i;if(q.correct.includes(k))x.classList.add('correct');else if(k===n)x.classList.add('wrong');x.disabled=true});if(q.correct.includes(n))score++;setTimeout(()=>{i++;i<qs.length?renderQ():finish()},450)}async function finish(){const duration=Math.max(1,Math.round((Date.now()-startTime)/1000)),xp=100+score*20;$('game').classList.add('hidden');$('result').classList.remove('hidden');$('resultTitle').textContent=`本周成绩 ${score}/10`;$('resultText').textContent=`用时 ${duration} 秒 · 基础奖励 ${xp} XP。`;if(window.GX_PROFILE)GX_PROFILE.addXP(xp,'weekly league');if(online){await sb.from('gx_weekly_league_scores').upsert({week_key:weekKey(),class_code:classCode,student_name:name,score,correct_count:score,wrong_count:10-score,duration_seconds:duration,xp_awarded:xp,submitted_at:new Date().toISOString()},{onConflict:'week_key,class_code,student_name'});}else{const key='gxWeeklyOnlineFallback',arr=JSON.parse(localStorage.getItem(key)||'[]').filter(x=>!(x.week_key===weekKey()&&x.class_code===classCode&&x.student_name===name));arr.push({week_key:weekKey(),class_code:classCode,student_name:name,score,duration_seconds:duration});localStorage.setItem(key,JSON.stringify(arr));}await loadBoard()}async function loadBoard(){let rows=[];if(online){const {data}=await sb.from('gx_weekly_league_scores').select('*').eq('week_key',weekKey()).eq('class_code',classCode).order('score',{ascending:false}).order('duration_seconds',{ascending:true}).limit(50);rows=data||[]}else rows=JSON.parse(localStorage.getItem('gxWeeklyOnlineFallback')||'[]').filter(x=>x.week_key===weekKey()&&x.class_code===classCode).sort((a,b)=>b.score-a.score||a.duration_seconds-b.duration_seconds);$('leaderboard').innerHTML=rows.length?rows.map((x,n)=>`<div class="row"><span class="rank">${n+1}</span><b>${x.student_name}</b><span>${x.score}/10</span><span>${x.duration_seconds}s</span></div>`).join(''):'<p>暂无成绩</p>'}$('start').onclick=async()=>{name=$('name').value.trim();classCode=$('classCode').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');if(!name||!classCode)return alert('请输入姓名和班级代码。');qs=pick();i=0;score=0;startTime=Date.now();$('join').classList.add('hidden');$('game').classList.remove('hidden');$('weekTitle').textContent=weekKey()+' · '+classCode;await loadBoard();renderQ();if(online)sb.channel('league-'+weekKey()+'-'+classCode).on('postgres_changes',{event:'*',schema:'public',table:'gx_weekly_league_scores',filter:'class_code=eq.'+classCode},loadBoard).subscribe()};</script><script src="profile-system.js"></script></body></html>
