<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.6 SPM Mock Exam</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:#08141e;color:#eef5f8;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.panel{margin-top:16px;background:#102536;border:1px solid #ffffff18;border-radius:22px;padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.chip{background:#ffffff0d;border:1px solid #ffffff18;border-radius:999px;padding:8px 12px}.question{background:#fff8e8;color:#17232b;border-radius:18px;padding:20px;margin-top:14px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.choice{border:2px solid #d7cfbc;background:#fff;color:#17232b;border-radius:12px;padding:13px;text-align:left;font-weight:800;cursor:pointer}.choice.selected{border-color:#247da3;background:#e5f5fb}.choice.correct{border-color:#2fa56d;background:#e2f6eb}.choice.wrong{border-color:#d8515c;background:#fde6e8}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}.primary{background:#e8bd5d;color:#251900}.secondary{background:#263d4e;color:#fff}.danger{background:#7b2d39;color:#fff}.hidden{display:none!important}.result{background:#fff;color:#17232b;border-radius:18px;padding:18px;margin-top:12px}.review{background:#fff8e8;color:#17232b;border-radius:14px;padding:14px;margin-top:10px}.big{font-size:48px;font-weight:900;color:#e8bd5d}.timer{font-size:28px;font-weight:900;color:#ffca6b}@media(max-width:760px){.grid,.choices{grid-template-columns:1fr}}@media print{body{background:#fff;color:#000}.no-print{display:none!important}.panel{border:1px solid #bbb;background:#fff;color:#000}.review,.result{border:1px solid #bbb}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.6 SPM MOCK</div><h1>SPM 模拟考试 · World 1</h1></div><div class="no-print"><span class="chip">题目 <b id="progress">0/20</b></span> <span class="chip timer" id="timer">45:00</span></div></div><section id="start" class="panel"><div class="grid"><label>Nama pelajar<input id="name" style="width:100%;padding:13px;border-radius:10px;border:0;margin-top:8px"></label><label>考试模式<select id="mode" style="width:100%;padding:13px;border-radius:10px;border:0;margin-top:8px"><option value="standard">Standard · 20题 · 45分钟</option><option value="quick">Quick · 10题 · 20分钟</option></select></label></div><p>Paper 1 选择题与 Paper 2 得分点题混合。时间结束后自动交卷。</p><button id="begin" class="btn primary">开始考试</button> <a href="portal.html" class="btn secondary" style="text-decoration:none">返回 Portal</a></section><section id="exam" class="panel hidden"><div id="paperLabel" class="brand"></div><div class="question"><h2 id="qtext"></h2><div id="choices" class="choices"></div><div style="margin-top:14px"><button id="next" class="btn primary" disabled>下一题</button> <button id="submit" class="btn danger">立即交卷</button></div></div></section><section id="final" class="panel hidden"><div class="grid"><div><div class="big" id="score"></div><h2 id="grade"></h2><p id="summary"></p></div><div><h3>考试资料</h3><div id="meta"></div><button class="btn primary no-print" onclick="window.print()">打印成绩单</button> <button class="btn secondary no-print" onclick="location.reload()">重新考试</button></div></div><h2>错题报告</h2><div id="reviews"></div></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script src="profile-system.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices&&q.correct&&q.correct.length===1);const $=id=>document.getElementById(id);let questions=[],i=0,answers=[],selected=null,seconds=2700,tick=null,startedAt=null;function shuffle(a){a=[...a];for(let x=a.length-1;x>0;x--){const j=Math.floor(Math.random()*(x+1));[a[x],a[j]]=[a[j],a[x]]}return a}function begin(){const count=$('mode').value==='quick'?10:20;seconds=$('mode').value==='quick'?1200:2700;questions=shuffle(BANK).slice(0,count);startedAt=Date.now();$('start').classList.add('hidden');$('exam').classList.remove('hidden');tick=setInterval(()=>{seconds--;renderTimer();if(seconds<=0)finish(true)},1000);renderTimer();load()}function renderTimer(){const m=Math.floor(seconds/60),s=seconds%60;$('timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;$('timer').style.color=seconds<300?'#ff7a7a':'#ffca6b'}function load(){selected=null;$('next').disabled=true;const q=questions[i];$('progress').textContent=`${i+1}/${questions.length}`;$('paperLabel').textContent=`${q.paper} · ${q.id} · ${q.marks} markah`;$('qtext').textContent=q.question;const order=shuffle(q.choices.map((text,original)=>({text,original})));$('choices').innerHTML=order.map(x=>`<button class="choice" data-i="${x.original}">${x.text}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{selected=+b.dataset.i;document.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');$('next').disabled=false})}function next(){answers.push({id:questions[i].id,selected});i++;if(i>=questions.length)finish(false);else load()}function grade(p){return p>=85?'A':p>=70?'B':p>=60?'C':p>=50?'D':p>=40?'E':'G'}function finish(auto){if(tick)clearInterval(tick);if(i<questions.length&&selected!==null)answers.push({id:questions[i].id,selected});const correct=answers.filter(a=>{const q=questions.find(x=>x.id===a.id);return q&&q.correct.includes(a.selected)}).length;const pct=Math.round(correct/questions.length*100);$('exam').classList.add('hidden');$('final').classList.remove('hidden');$('score').textContent=`${correct}/${questions.length} · ${pct}%`;$('grade').textContent=`Gred ${grade(pct)}`;$('summary').textContent=auto?'时间结束，系统已自动交卷。':'考试已完成并交卷。';const used=Math.round((Date.now()-startedAt)/1000);$('meta').innerHTML=`Nama: <b>${$('name').value.trim()||'Pelajar'}</b><br>Mode: <b>${$('mode').value}</b><br>用时: <b>${Math.floor(used/60)}分${used%60}秒</b><br>交卷: <b>${new Date().toLocaleString('ms-MY')}</b>`;const wrong=questions.filter(q=>{const a=answers.find(x=>x.id===q.id);return !a||!q.correct.includes(a.selected)});$('reviews').innerHTML=wrong.length?wrong.map(q=>{const a=answers.find(x=>x.id===q.id);return `<div class="review"><b>${q.id} · ${q.title}</b><p>${q.question}</p><p>你的答案：${a?q.choices[a.selected]:'未作答'}</p><p>正确答案：<b>${q.choices[q.correct[0]]}</b></p><p>华语解释：${q.chinese}</p></div>`}).join(''):'<div class="review">全部正确。</div>';localStorage.setItem('gxSejarahMockExam',JSON.stringify({name:$('name').value.trim()||'Pelajar',score:correct,total:questions.length,pct,grade:grade(pct),time:used,date:new Date().toISOString()}));if(window.GX_PROFILE)window.GX_PROFILE.addXP(correct*15+50,'SPM Mock Exam')}$('begin').onclick=begin;$('next').onclick=next;$('submit').onclick=()=>finish(false);</script></body></html>
