<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Assignment Submit</title><style>body{margin:0;font-family:Arial,sans-serif;background:#07131d;color:#fff;min-height:100vh}.wrap{max-width:820px;margin:auto;padding:24px}.panel{background:#102737;border:1px solid #ffffff18;border-radius:22px;padding:22px;margin-top:16px}input{width:100%;box-sizing:border-box;padding:13px;border:0;border-radius:12px;margin:7px 0 13px}.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:900;cursor:pointer;background:#e8bd5d;color:#251900}.muted{color:#b8cbd5}.ok{color:#62d89a}.bad{color:#ff8d8d}</style></head><body><main class="wrap"><h1>作业成绩提交</h1><p class="muted">读取本机最新考试或游戏成绩，并提交到老师指定的任务代码。</p><section class="panel"><label>任务代码<input id="code" maxlength="8" placeholder="例如 AB12CD"></label><label>班级代码<input id="classCode" maxlength="20" placeholder="例如 F4A"></label><label>学生姓名<input id="name" maxlength="40" placeholder="Nama pelajar"></label><button id="submit" class="btn">提交成绩</button><p id="status"></p></section><section class="panel"><h2>检测到的本机成绩</h2><div id="preview" class="muted"></div></section><p><a href="v3-assignment-launcher.html" style="color:#fff">返回 V3.0 入口</a></p></main><script src="config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const $=id=>document.getElementById(id);function latest(){const keys=['gxPaper2MockLatest','gxMockExamLatest','gxSejarahLatestResult'];for(const k of keys){try{const v=JSON.parse(localStorage.getItem(k)||'null');if(v)return {source:k,...v}}catch(e){}}try{const r=JSON.parse(localStorage.getItem('gxSejarahRecords')||'[]');if(r.length)return {source:'gxSejarahRecords',...r[0]}}catch(e){}return null}const result=latest();$('preview').textContent=result?JSON.stringify(result,null,2):'未找到本机成绩。请先完成模拟考或主游戏。';const cfg=window.GX_SEJARAH_CONFIG||{};const ready=cfg.supabaseUrl&&cfg.supabaseAnonKey&&!String(cfg.supabaseUrl).includes('YOUR_');const sb=ready?supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;$('submit').onclick=async()=>{const code=$('code').value.trim().toUpperCase(),classCode=$('classCode').value.trim().toUpperCase(),name=$('name').value.trim();if(!result||!code||!classCode||!name)return $('status').innerHTML='<span class="bad">资料不完整或没有成绩。</span>';if(!sb)return $('status').innerHTML='<span class="bad">Supabase 尚未配置。</span>';const score=Number(result.score??result.correct??0),max=Number(result.max??result.total??result.maxScore??0),pct=Number(result.percentage??(max?score/max*100:0)),wrong=result.wrongTopics??result.wrong??result.wrong_topics??[];const payload={assignment_code:code,class_code:classCode,student_name:name,score,max_score:max,percentage:Math.max(0,Math.min(100,pct)),status:'completed',wrong_topics:Array.isArray(wrong)?wrong:[],started_at:result.startedAt||null,completed_at:new Date().toISOString(),duration_seconds:Number(result.durationSeconds??result.duration??0)};const {error}=await sb.from('gx_assignment_submissions').upsert(payload,{onConflict:'assignment_code,student_name'});$('status').innerHTML=error?`<span class="bad">提交失败：${error.message}</span>`:'<span class="ok">成绩已提交。</span>'};</script></body></html>
