<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Class Boss</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#4a1f2d,#111827 45%,#05070b);color:#fff;min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#f0c96a;font-weight:900;letter-spacing:.1em}.panel{margin-top:16px;background:#101c29e8;border:1px solid #ffffff1a;border-radius:22px;padding:20px}.join{display:grid;grid-template-columns:1fr 1fr auto;gap:10px}input,button{border:0;border-radius:12px;padding:13px 15px;font-size:16px}button{cursor:pointer;font-weight:900}.primary{background:linear-gradient(135deg,#f0d27d,#bd8525);color:#241900}.secondary{background:#24384a;color:#fff}.arena{display:grid;grid-template-columns:1fr 300px;gap:16px}.boss{text-align:center;background:linear-gradient(160deg,#46202b,#161c2a);border-radius:20px;padding:18px}.face{font-size:110px}.bar{height:18px;background:#0008;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;transition:.35s}.bossbar i{background:linear-gradient(90deg,#ff4d67,#ffb04d)}.classbar i{background:linear-gradient(90deg,#2bb673,#62dba1)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.metric{background:#172b3b;border-radius:15px;padding:14px}.metric b{display:block;font-size:28px;color:#f0c96a;margin-top:4px}.question{margin-top:16px;background:#fff4de;color:#17202a;border-radius:18px;padding:18px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}.choice{background:#fff;border:2px solid #ddcfb3;color:#17202a;text-align:left}.choice.selected{border-color:#2c88ad;background:#e9f7fc}.choice.correct{border-color:#2da66f;background:#def5e9}.choice.wrong{border-color:#d95454;background:#fde3e3}.board{display:grid;gap:9px}.row{display:grid;grid-template-columns:35px 1fr auto;gap:9px;align-items:center;background:#162d3f;border-radius:13px;padding:11px}.log{max-height:210px;overflow:auto;background:#0b1721;border-radius:13px;padding:11px;line-height:1.5}.status{padding:8px 11px;border-radius:999px;background:#ffffff0d;border:1px solid #ffffff18}.hidden{display:none}@media(max-width:800px){.join,.arena{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.choices{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.0 PHASE E</div><h1>班级合作 Boss</h1></div><div id="status" class="status">本机合作模式</div></div><section class="panel"><div class="join"><input id="name" placeholder="学生姓名"><input id="classCode" placeholder="班级代码，例如 GX4A01"><button id="joinBtn" class="primary">加入战斗</button></div></section><section id="game" class="panel hidden"><div class="arena"><div><div class="boss"><div class="face" id="bossFace">🐉</div><h2>Maharaja Lupa Sejarah</h2><div class="bar bossbar"><i id="bossHpBar" style="width:100%"></i></div><p>Boss HP：<b id="bossHp">1000</b>/1000</p><div id="phase">Phase 1 · Serangan Fakta</div></div><div class="metrics"><div class="metric">Class HP<b id="classHp">500</b></div><div class="metric">在线学生<b id="players">0</b></div><div class="metric">全班伤害<b id="damage">0</b></div><div class="metric">Boss 回血<b id="heal">0</b></div></div><div class="bar classbar"><i id="classHpBar" style="width:100%"></i></div><div class="question"><div id="qid"></div><h3 id="qtext"></h3><div id="choices" class="choices"></div><p id="feedback"></p><button id="submit" class="primary">发动攻击</button> <button id="next" class="secondary hidden">下一题</button></div><h3>战斗记录</h3><div id="log" class="log"></div></div><aside><h3>个人贡献榜</h3><div id="board" class="board"></div></aside></div></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices);const $=id=>document.getElementById(id);const KEY='gxClassBossV2';let state={classCode:'',name:'',bossHp:1000,classHp:500,totalDamage:0,totalHeal:0,players:{},q:null,selected:null,answered:false};function load(){try{const x=JSON.parse(localStorage.getItem(KEY)||'null');if(x)state={...state,...x}}catch(e){}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function phase(){if(state.bossHp>650)return['Phase 1 · Serangan Fakta','🐉'];if(state.bossHp>300)return['Phase 2 · Kabus Undang-undang','🐲'];return['Phase 3 · Amukan Kedaulatan','👹']}function pick(){state.q=shuffle(BANK)[0];state.selected=null;state.answered=false;renderQuestion()}function renderQuestion(){const q=state.q;$('qid').textContent=q.id+' · '+q.marks+' markah';$('qtext').textContent=q.question;const order=shuffle(q.choices.map((t,i)=>({t,i})));$('choices').innerHTML=order.map(x=>`<button class="choice" data-i="${x.i}">${x.t}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{if(state.answered)return;state.selected=+b.dataset.i;document.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')});$('feedback').textContent='';$('submit').classList.remove('hidden');$('next').classList.add('hidden')}function render(){const p=phase();$('phase').textContent=p[0];$('bossFace').textContent=p[1];$('bossHp').textContent=Math.max(0,state.bossHp);$('bossHpBar').style.width=Math.max(0,state.bossHp/10)+'%';$('classHp').textContent=Math.max(0,state.classHp);$('classHpBar').style.width=Math.max(0,state.classHp/5)+'%';$('damage').textContent=state.totalDamage;$('heal').textContent=state.totalHeal;$('players').textContent=Object.keys(state.players).length;const arr=Object.values(state.players).sort((a,b)=>b.damage-a.damage);$('board').innerHTML=arr.length?arr.map((p,i)=>`<div class="row"><b>${i+1}</b><span>${p.name}</span><b>${p.damage}</b></div>`).join(''):'<div>暂无贡献记录</div>';if(state.bossHp<=0){$('feedback').innerHTML='<b>全班胜利！获得 Warisan Class Badge。</b>';$('submit').classList.add('hidden');$('next').classList.add('hidden')}else if(state.classHp<=0){$('feedback').innerHTML='<b>Class HP 已归零，Boss 获胜。重新开始挑战。</b>';$('submit').classList.add('hidden')}}function log(t){$('log').innerHTML=`<div>${new Date().toLocaleTimeString()} · ${t}</div>`+$('log').innerHTML}function join(){const n=$('name').value.trim(),c=$('classCode').value.trim().toUpperCase();if(!n||!c)return alert('请输入姓名和班级代码。');load();if(state.classCode&&state.classCode!==c){state={classCode:c,name:n,bossHp:1000,classHp:500,totalDamage:0,totalHeal:0,players:{},q:null,selected:null,answered:false}}state.classCode=c;state.name=n;if(!state.players[n])state.players[n]={name:n,damage:0,correct:0,wrong:0};save();$('game').classList.remove('hidden');$('status').textContent='班级 '+c+' · 本机共享';if(!state.q)pick();else renderQuestion();render();log(n+' 加入战斗')}$('joinBtn').onclick=join;$('submit').onclick=()=>{if(state.selected===null)return alert('请选择答案。');if(state.answered)return;state.answered=true;const q=state.q,ok=q.correct.includes(state.selected),pl=state.players[state.name];document.querySelectorAll('.choice').forEach(b=>{const i=+b.dataset.i;if(q.correct.includes(i))b.classList.add('correct');else if(i===state.selected)b.classList.add('wrong');b.disabled=true});if(ok){const base=18+q.marks*6,bonus=state.bossHp<=300?10:0,dmg=base+bonus;state.bossHp=Math.max(0,state.bossHp-dmg);state.totalDamage+=dmg;pl.damage+=dmg;pl.correct++;$('feedback').textContent=`答对！${state.name} 对 Boss 造成 ${dmg} 伤害。`;log(state.name+' 造成 '+dmg+' 伤害')}else{const heal=state.bossHp<=300?28:18,hit=state.bossHp<=300?24:15;state.bossHp=Math.min(1000,state.bossHp+heal);state.classHp=Math.max(0,state.classHp-hit);state.totalHeal+=heal;pl.wrong++;$('feedback').textContent=`答错。Boss 回血 ${heal}，Class HP -${hit}。`;log(state.name+' 答错，Boss 回血 '+heal)}save();render();$('submit').classList.add('hidden');if(state.bossHp>0&&state.classHp>0)$('next').classList.remove('hidden')};$('next').onclick=()=>{pick();render()};</script></body></html>
