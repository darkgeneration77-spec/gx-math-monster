<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Boss Battle</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#3b1621,#120d18 48%,#05070b);color:#fff;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#f0c766;font-weight:900;letter-spacing:.1em}.panel{margin-top:16px;background:#111b28e8;border:1px solid #ffffff1a;border-radius:22px;padding:20px}.arena{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:center}.unit{text-align:center}.avatar{font-size:110px;transition:.25s}.hit{animation:shake .35s}@keyframes shake{25%{transform:translateX(-10px)}50%{transform:translateX(10px)}75%{transform:translateX(-6px)}}.bar{height:16px;background:#0008;border-radius:999px;overflow:hidden;margin-top:10px}.bar i{display:block;height:100%;transition:.35s}.player i{background:#2fd083}.boss i{background:#ff5e70}.speech{margin-top:12px;background:#fff;color:#2a1821;border-radius:16px;padding:12px;font-weight:800}.question{margin-top:16px;background:#fff8e8;color:#17232b;border-radius:18px;padding:20px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.choice{border:2px solid #d8cfba;background:#fff;color:#17232b;border-radius:12px;padding:13px;text-align:left;font-weight:800;cursor:pointer}.choice.correct{border-color:#2fa56d;background:#e2f6eb}.choice.wrong{border-color:#d8515c;background:#fde6e8}.stats{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 11px;border-radius:999px;background:#ffffff0d;border:1px solid #ffffff17}.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:900;cursor:pointer}.primary{background:#f0c766;color:#251a00}.secondary{background:#26394a;color:#fff}.hidden{display:none!important}.result{text-align:center;padding:28px}.reward{font-size:64px}.phase{color:#f0c766;font-weight:900}@media(max-width:760px){.arena,.choices{grid-template-columns:1fr}.avatar{font-size:82px}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.0 PHASE D</div><h1>Boss Battle: Maharaja Lupa Sejarah</h1></div><div class="stats"><span class="chip">Combo <b id="combo">0</b></span><span class="chip">Damage <b id="damage">0</b></span><span class="chip">Phase <b id="phase">1</b>/3</span></div></div><section id="battle" class="panel"><div class="arena"><div class="unit player"><div id="hero" class="avatar">🛡️</div><h2>Pelajar</h2><div class="bar"><i id="playerBar" style="width:100%"></i></div><div id="playerHp">100 HP</div></div><div class="unit boss"><div id="boss" class="avatar">🐲</div><h2>Maharaja Lupa Sejarah</h2><div class="bar"><i id="bossBar" style="width:100%"></i></div><div id="bossHp">300 HP</div><div id="speech" class="speech">“Aku akan memadam semua fakta sejarah!”</div></div></div><div class="question"><div class="phase" id="phaseTitle">Phase 1 · Serangan Fakta</div><h2 id="questionText"></h2><div id="choices" class="choices"></div><div style="margin-top:14px"><button id="nextBtn" class="btn primary hidden">Serangan Seterusnya</button> <a class="btn secondary" href="portal.html" style="text-decoration:none">返回 Portal</a></div></div></section><section id="result" class="panel result hidden"><div class="reward">🏆</div><h1 id="resultTitle"></h1><p id="resultText"></p><button class="btn primary" onclick="location.reload()">Main Semula</button></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices&&q.correct&&q.correct.length===1);const $=id=>document.getElementById(id);let playerHp=100,bossHp=300,combo=0,totalDamage=0,index=0,current=null,answered=false;function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}const questions=shuffle(BANK).slice(0,15);function getPhase(){return bossHp>200?1:bossHp>100?2:3}function phaseName(p){return p===1?'Phase 1 · Serangan Fakta':p===2?'Phase 2 · Kabus Undang-undang':'Phase 3 · Amukan Kedaulatan'}function load(){if(playerHp<=0||bossHp<=0||index>=questions.length)return finish();answered=false;$('nextBtn').classList.add('hidden');current=questions[index];const p=getPhase();$('phase').textContent=p;$('phaseTitle').textContent=phaseName(p);$('questionText').textContent=current.question;const order=shuffle(current.choices.map((text,original)=>({text,original})));$('choices').innerHTML=order.map(x=>`<button class="choice" data-i="${x.original}">${x.text}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>answer(+b.dataset.i,b));$('speech').textContent=p===1?'“Fakta kamu masih lemah!”':p===2?'“Undang-undang Melaka akan hilang!”':'“Kedaulatan akan aku musnahkan!”'}function answer(i,button){if(answered)return;answered=true;const ok=current.correct.includes(i);document.querySelectorAll('.choice').forEach(b=>{const n=+b.dataset.i;if(current.correct.includes(n))b.classList.add('correct');else if(n===i)b.classList.add('wrong');b.disabled=true});if(ok){combo++;const dmg=20+Math.min(combo*5,30)+(getPhase()===3?10:0);bossHp=Math.max(0,bossHp-dmg);totalDamage+=dmg;hit('boss');$('speech').textContent=`“Tidak! ${dmg} damage!”`}else{combo=0;const heal=getPhase()===3?18:12;const hitDmg=getPhase()===3?22:15;bossHp=Math.min(300,bossHp+heal);playerHp=Math.max(0,playerHp-hitDmg);hit('hero');$('speech').textContent=`“Salah! Aku pulih ${heal} HP dan menyerang ${hitDmg} HP!”`}update();$('nextBtn').classList.remove('hidden')}function hit(id){const el=$(id);el.classList.add('hit');setTimeout(()=>el.classList.remove('hit'),380)}function update(){$('combo').textContent=combo;$('damage').textContent=totalDamage;$('playerHp').textContent=playerHp+' HP';$('bossHp').textContent=bossHp+' HP';$('playerBar').style.width=playerHp+'%';$('bossBar').style.width=(bossHp/3)+'%'}function next(){index++;load()}function finish(){$('battle').classList.add('hidden');$('result').classList.remove('hidden');const win=bossHp<=0;$('resultTitle').textContent=win?'Boss 已击败':'挑战结束';$('resultText').textContent=win?`你造成 ${totalDamage} 点伤害，获得“Pedang Kedaulatan”与 500 XP。`:`Boss 剩余 ${bossHp} HP。回到 World 1 复习错题后再挑战。`;if(win){localStorage.setItem('gxSejarahBossReward',JSON.stringify({reward:'Pedang Kedaulatan',xp:500,time:new Date().toISOString()}))}}$('nextBtn').onclick=next;update();load();</script></body></html>
