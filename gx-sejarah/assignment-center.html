<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.9 Assignment Center</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315d72,#0a1b28 48%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:22px}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{background:#0d2231;border:1px solid #ffffff1d;border-radius:22px;padding:20px;margin-top:16px}label{display:block;margin:12px 0 5px;font-weight:800;color:#dce8ed}input,select{width:100%;padding:13px;border:0;border-radius:12px;font-size:16px}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer}.primary{background:#e8bd5d;color:#261900}.secondary{background:#29485c;color:#fff}.code{font-size:34px;font-weight:900;letter-spacing:.13em;color:#e8bd5d}.link{word-break:break-all;background:#07141e;border-radius:12px;padding:12px;margin:10px 0;color:#cce2ec}.history{display:grid;gap:9px}.item{background:#ffffff0a;border:1px solid #ffffff15;border-radius:14px;padding:13px}.small{color:#9eb4bf;font-size:13px}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="brand">GX SEJARAH · V2.9 TEACHER ASSIGNMENT</div><h1>教师任务中心</h1><p>设定练习模式、范围、题量、时间和截止日期，生成任务代码与学生入口链接。</p><section class="grid"><div class="panel"><label>任务名称<input id="title" value="World 1 Revision"></label><label>学习模式<select id="mode"><option value="main">World 1 主游戏</option><option value="paper1">Paper 1 模拟考</option><option value="paper2">Paper 2 模拟考</option><option value="daily">每日挑战</option><option value="boss">Boss Battle</option><option value="free">自由作答阅卷官</option></select></label><label>指定范围<select id="route"><option value="all">Bab 1.1–1.4 综合</option><option value="1.1">Bab 1.1</option><option value="1.2">Bab 1.2</option><option value="1.3">Bab 1.3</option><option value="1.4">Bab 1.4</option><option value="BOSS">Final Boss</option></select></label><label>题量<input id="count" type="number" min="1" max="40" value="10"></label><label>时间（分钟）<input id="minutes" type="number" min="5" max="180" value="30"></label><label>截止日期<input id="deadline" type="datetime-local"></label><button id="generate" class="btn primary">生成任务</button></div><div class="panel"><div class="small">任务代码</div><div id="code" class="code">------</div><div id="summary">尚未生成任务。</div><div id="link" class="link"></div><button id="copy" class="btn secondary">复制学生链接</button></div></section><section class="panel"><h2>本机任务记录</h2><div id="history" class="history"></div><p><a href="assignment-join.html" style="color:#fff">学生输入任务代码</a> · <a href="portal.html" style="color:#fff">返回 Portal</a></p></section></main><script>const KEY='gxSejarahAssignmentsV29';const $=id=>document.getElementById(id);function all(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}function save(a){localStorage.setItem(KEY,JSON.stringify(a))}function makeCode(){return Math.random().toString(36).slice(2,8).toUpperCase()}function base(){return location.href.replace(/assignment-center\.html.*$/,'assignment-join.html')}function render(){const a=all();$('history').innerHTML=a.length?a.map(x=>`<div class="item"><b>${x.title}</b> · <span>${x.code}</span><div class="small">${x.mode} · ${x.route} · ${x.count}题 · ${x.minutes}分钟 · 截止 ${x.deadline||'未设定'}</div></div>`).join(''):'<div class="item">尚未建立任务。</div>'}$('generate').onclick=()=>{const x={code:makeCode(),title:$('title').value.trim()||'Sejarah Assignment',mode:$('mode').value,route:$('route').value,count:+$('count').value||10,minutes:+$('minutes').value||30,deadline:$('deadline').value,createdAt:new Date().toISOString()};const a=all();a.unshift(x);save(a.slice(0,30));const payload=btoa(unescape(encodeURIComponent(JSON.stringify(x))));const url=base()+'?task='+encodeURIComponent(payload);$('code').textContent=x.code;$('summary').textContent=`${x.title} · ${x.count}题 · ${x.minutes}分钟`;$('link').textContent=url;$('link').dataset.url=url;render()};$('copy').onclick=async()=>{const t=$('link').dataset.url||$('link').textContent;if(!t)return alert('请先生成任务。');try{await navigator.clipboard.writeText(t);alert('学生链接已复制。')}catch(e){prompt('复制这个链接：',t)}};render();</script></body></html>
