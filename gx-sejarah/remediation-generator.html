<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V3.1 Remediation Generator</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315d72,#0a1c28 48%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:22px}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.panel{margin-top:16px;background:#0e2433;border:1px solid #ffffff1c;border-radius:22px;padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{display:block;color:#c9d8df;font-weight:700}input,select,textarea{width:100%;margin-top:7px;padding:13px;border:0;border-radius:12px;font-size:16px}textarea{min-height:110px}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer}.primary{background:#e8bd5d;color:#251900}.secondary{background:#284356;color:#fff}.result{background:#fff;color:#17252d;border-radius:16px;padding:16px;margin-top:14px}.tag{display:inline-block;background:#fff0b9;color:#654a00;border-radius:999px;padding:6px 10px;margin:4px;font-weight:800}.hidden{display:none}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="brand">GX SEJARAH · V3.1</div><h1>个性化补救练习生成器</h1><p>输入学生错题编号，系统自动判断最弱 Bab，并生成学生专属补救练习链接。</p><section class="panel"><div class="grid"><label>学生姓名<input id="name" placeholder="Nama pelajar"></label><label>练习题量<select id="count"><option>5</option><option selected>10</option><option>15</option></select></label></div><label style="margin-top:12px">错题编号（逗号或换行分隔）<textarea id="wrong" placeholder="例如：W1-1.3-010, W1-1.3-018, W1-1.4-006"></textarea></label><div style="margin-top:14px"><button id="local" class="btn secondary">读取本机最新错题</button> <button id="generate" class="btn primary">生成补救练习</button></div><div id="out" class="result hidden"></div></section><p><a href="v3-assignment-launcher.html" style="color:#fff">返回 V3.0 作业系统</a></p></main><script>const $=id=>document.getElementById(id);function parse(v){return [...new Set((v||'').split(/[\s,;]+/).map(x=>x.trim().toUpperCase()).filter(x=>/^W1-(1\.[1-4]|FINAL|BOSS)/.test(x)))]}function weakest(ids){const c={'1.1':0,'1.2':0,'1.3':0,'1.4':0,'BOSS':0};ids.forEach(id=>{const m=id.match(/W1-(1\.[1-4])/);if(m)c[m[1]]++;else c.BOSS++});return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0]}$('local').onclick=()=>{let ids=[];try{const r=JSON.parse(localStorage.getItem('gxSejarahRecords')||'[]')[0]||{};ids=[...(r.wrong_topics||[]),...(r.wrongIds||[]),...(r.wrong||[])].filter(x=>typeof x==='string')}catch(e){}try{const m=JSON.parse(localStorage.getItem('gxSejarahMockExamLatest')||'{}');ids.push(...(m.wrong_ids||m.wrongIds||[]))}catch(e){}$('wrong').value=[...new Set(ids)].join(', ');if(!ids.length)alert('本机暂时没有可读取的错题编号。')} ;$('generate').onclick=()=>{const ids=parse($('wrong').value),name=$('name').value.trim()||'Pelajar',count=+$('count').value;if(!ids.length)return alert('请输入至少一个有效错题编号。');const route=weakest(ids);const payload={name,ids,route,count,createdAt:new Date().toISOString()};const code=btoa(unescape(encodeURIComponent(JSON.stringify(payload)))).replace(/=+$/,'');const url=new URL('remediation-practice.html',location.href);url.searchParams.set('data',code);$('out').classList.remove('hidden');$('out').innerHTML=`<h2>${name} 的补救方案</h2><p>最弱范围：<b>Bab ${route}</b></p><p>${ids.map(x=>`<span class="tag">${x}</span>`).join('')}</p><p><input id="link" value="${url.href}" readonly></p><button class="btn primary" onclick="navigator.clipboard.writeText(document.getElementById('link').value)">复制学生链接</button> <a class="btn secondary" style="text-decoration:none" href="${url.href}">立即打开</a>`};</script></body></html>
