<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GX Sejarah Online V0.5</title>
<style>
:root{--gold:#e8bd5d;--ok:#2bb673;--bad:#e45c5c}*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#2a5368,#0a1b28 42%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:1280px;margin:auto;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:var(--gold);font-weight:900;letter-spacing:.08em}.status{padding:8px 12px;border:1px solid #ffffff25;border-radius:999px;background:#ffffff0d}.panel{margin-top:16px;background:#0b1d2bdd;border:1px solid #ffffff1d;border-radius:20px;padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end}label{font-size:14px;color:#c9d9e1}input{display:block;width:100%;margin-top:7px;padding:13px;border:0;border-radius:12px;font-size:16px}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#f1d27e,#bd8525);color:#251900}.note{color:#b8cbd5;line-height:1.55}.gamebox{margin-top:16px;border-radius:20px;overflow:hidden;border:1px solid #ffffff20;background:#07131d}.gamebox iframe{display:block;width:100%;height:930px;border:0}.hidden{display:none}.ok{color:#71e3a8}.bad{color:#ff9999}.session{margin-top:12px;padding:12px;border-radius:12px;background:#ffffff0b;color:#c9d9e1}@media(max-width:760px){.grid{grid-template-columns:1fr}.gamebox iframe{height:1100px}}
</style>
</head>
<body>
<main class="wrap">
<div class="top"><div class="brand">GX SEJARAH · ONLINE MODE V0.5</div><div id="syncStatus" class="status">Semak sambungan...</div></div>
<section id="login" class="panel">
<h2>Masuk Kelas</h2>
<p class="note">学生输入姓名和班级代码。完成 World 1 后，成绩会自动上传教师后台；若尚未连接 Supabase，成绩会保存在当前设备，稍后可以重新上传。</p>
<div class="grid">
<label>Nama pelajar<input id="studentName" maxlength="40" placeholder="Contoh: Alison"></label>
<label>Kod kelas<input id="classCode" maxlength="12" placeholder="Contoh: GX4A01"></label>
<button id="enterBtn" class="btn" type="button">进入游戏</button>
</div>
<div id="sessionInfo" class="session hidden"></div>
</section>
<section id="gameSection" class="gamebox hidden"><iframe id="gameFrame" src="index.html" title="GX Sejarah World 1"></iframe></section>
</main>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const $=id=>document.getElementById(id);let client=null,lastSignature='',studentName='',classCode='',poller=null;
function configured(){const c=window.GX_SEJARAH_CONFIG||{};return c.supabaseUrl&&c.supabaseAnonKey&&!c.supabaseUrl.includes('YOUR-PROJECT')&&!c.supabaseAnonKey.includes('YOUR-ANON')}
function setStatus(text,ok=false){$('syncStatus').textContent=text;$('syncStatus').className='status '+(ok?'ok':'bad')}
function makeSessionId(){return 'gx-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
async function init(){if(!configured()){setStatus('本地模式 · Supabase 未连接');return}try{const c=window.GX_SEJARAH_CONFIG;client=window.supabase.createClient(c.supabaseUrl,c.supabaseAnonKey);const{error}=await client.from('gx_sejarah_scores').select('id').limit(1);if(error)throw error;setStatus('在线后台已连接',true);retryPending()}catch(e){console.error(e);client=null;setStatus('连接失败 · 使用本地模式')}}
function enter(){studentName=$('studentName').value.trim();classCode=$('classCode').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');if(!studentName||classCode.length<3){alert('请输入学生姓名和至少3个字符的班级代码。');return}localStorage.setItem('gxSejarahOnlineStudent',studentName);localStorage.setItem('gxSejarahOnlineClass',classCode);$('login').classList.add('hidden');$('gameSection').classList.remove('hidden');const frame=$('gameFrame');frame.addEventListener('load',()=>{try{const doc=frame.contentDocument;const nameInput=doc.getElementById('name');if(nameInput)nameInput.value=studentName}catch(e){console.warn(e)}} ,{once:true});poller=setInterval(checkForResult,1200)}
async function checkForResult(){let records=[];try{records=JSON.parse(localStorage.getItem('gxSejarahRecords')||'[]')}catch(e){return}const r=records.find(x=>x.name===studentName);if(!r)return;const sig=[r.name,r.score,r.correct,r.wrong,r.hints,r.time].join('|');if(sig===lastSignature)return;lastSignature=sig;const maxScore=QMAX();const wrongTopics=[];const payload={student_name:studentName,class_code:classCode,world_id:'world-1',score:Number(r.score)||0,max_score:maxScore,correct_count:Number(r.correct)||0,wrong_count:Number(r.wrong)||0,hint_count:Number(r.hints)||0,progress_percent:100,wrong_topics:wrongTopics,status:'completed',session_id:makeSessionId(),created_at:new Date().toISOString()};localStorage.setItem('gxSejarahPendingUpload',JSON.stringify(payload));await upload(payload)}
function QMAX(){return 27}
async function upload(payload){if(!client){setStatus('成绩已保存在本机 · 等待上线');return}setStatus('正在上传成绩...');const{error}=await client.from('gx_sejarah_scores').insert(payload);if(error){console.error(error);setStatus('上传失败 · 已保存在本机')}else{localStorage.removeItem('gxSejarahPendingUpload');setStatus('成绩已上传教师后台',true);if(poller)clearInterval(poller)}}
async function retryPending(){const raw=localStorage.getItem('gxSejarahPendingUpload');if(!raw||!client)return;try{await upload(JSON.parse(raw))}catch(e){console.error(e)}}
$('enterBtn').addEventListener('click',enter);['studentName','classCode'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')enter()}));
$('studentName').value=localStorage.getItem('gxSejarahOnlineStudent')||'';$('classCode').value=localStorage.getItem('gxSejarahOnlineClass')||'';init();
</script>
</body>
</html>
