<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Paper 2 V2</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#315f76,#091823 48%,#040a10);color:#fff;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900}.hero h1{font-size:clamp(36px,6vw,64px);margin:12px 0}.hero p{color:#c7d7df;line-height:1.6}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.btn,.mode{border:0;border-radius:12px;padding:11px 15px;font-weight:900;cursor:pointer}.btn{background:#e8bd5d;color:#241900}.dark{background:#294356;color:#fff}.mode{background:#183143;color:#fff;border:1px solid #ffffff22}.mode.on{background:#e8bd5d;color:#241900}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card,.panel{background:#0d2231;border:1px solid #ffffff1c;border-radius:20px;padding:18px}.card{cursor:pointer}.card:hover{border-color:#e8bd5d}.tag{font-size:12px;color:#e8bd5d;font-weight:900}.hidden{display:none}.question{font-size:22px;line-height:1.55}.answer{width:100%;min-height:190px;padding:14px;border-radius:14px;font-size:16px;line-height:1.55}.feedback{margin-top:14px;padding:14px;border-radius:14px;background:#ffffff0c;line-height:1.65}.point{padding:9px 11px;border-radius:10px;background:#ffffff0a;margin:8px 0}.hit{border-left:4px solid #3ddc97}.miss{border-left:4px solid #ff8d85}.warn{border-left:4px solid #e8bd5d}.stats{display:flex;gap:8px;flex-wrap:wrap}.stat{background:#ffffff10;border-radius:999px;padding:8px 12px}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><header class="top"><div class="brand">GX SEJARAH · PAPER 2 KEYWORD MARKING V2</div><div class="stats"><div class="stat">题库 <b id="bankCount">0</b></div><div class="stat">分数 <b id="scoreView">0/0</b></div></div></header><section id="menu"><div class="hero"><h1>Paper 2 高频题库</h1><p>学生先作答，提交后才批改。每个得分点只要写中一个有效关键词或同义词即可得分，不要求和参考答案完全一样。</p></div><div class="toolbar"><button class="mode on" data-count="10">10题</button><button class="mode" data-count="20">20题</button><button class="mode" data-count="50">50题</button><button class="mode" data-count="100">100题</button></div><div id="babGrid" class="grid"></div><div class="toolbar"><button class="btn" onclick="startMixed()">混合练习</button><button class="btn dark" onclick="location.href='app.html?v=markerfix2'">返回主页</button></div></section><section id="practice" class="hidden"><div class="panel"><div class="tag" id="meta"></div><h2 id="title"></h2><div class="question" id="question"></div><textarea id="answer" class="answer" placeholder="请输入马来文答案。写到正确关键词或同义词即可得分。"></textarea><div class="toolbar"><button id="submitBtn" class="btn" onclick="submitAnswer()">提交并批改</button><button id="nextBtn" class="btn dark hidden" onclick="nextQuestion()">下一题</button><button class="btn dark" onclick="backMenu()">返回题库</button></div><div id="feedback"></div></div></section><section id="result" class="hidden"><div class="panel"><h2>练习完成</h2><p id="finalScore"></p><div id="review"></div><button class="btn" onclick="backMenu()">返回题库</button></div></section></main><script src="questions/paper2-high-frequency.js?v=markerfix2"></script><script>const BANK=Array.isArray(window.GX_PAPER2_HIGH_FREQUENCY)?window.GX_PAPER2_HIGH_FREQUENCY:[];let selectedCount=10,list=[],idx=0,totalScore=0,totalMarks=0,records=[];const STOP=new Set(['dan','yang','untuk','dengan','kepada','daripada','oleh','dalam','ialah','adalah','serta','akan','telah','juga','dapat','boleh','sebagai','pada','ini','itu','agar','supaya','kerana','mereka','rakyat','negara']);const SYN=[['raja','sultan','pemerintah','baginda'],['taat setia','kesetiaan','setia'],['wilayah pengaruh','kawasan pemerintahan','jajahan'],['undang-undang','hukum','peraturan'],['nasionalisme','semangat kebangsaan','cinta negara'],['akhbar','media cetak','surat khabar','majalah'],['pendidikan','sekolah','madrasah','ilmu'],['persatuan','pertubuhan','organisasi'],['inflasi','harga meningkat','kenaikan harga'],['kekurangan makanan','bekalan makanan kurang','makanan tidak cukup'],['komunis','pkm','pengganas komunis'],['perpaduan','bersatu','kerjasama kaum'],['kedaulatan','berdaulat','bebas penjajahan'],['kemerdekaan','merdeka','bebas daripada penjajahan'],['pilihan raya','mengundi','wakil rakyat'],['perlembagaan','undang-undang tertinggi','constitution']];function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s-]/g,' ').replace(/\s+/g,' ').trim()}function words(s){return norm(s).split(' ').filter(w=>w.length>=4&&!STOP.has(w))}function aliases(term){let t=norm(term),set=new Set([t]);for(const group of SYN){if(group.some(x=>t.includes(norm(x))||norm(x).includes(t)))group.forEach(x=>set.add(norm(x)))}return [...set]}function scorePoint(answer,point){const a=norm(answer),p=norm(point);if(a.includes(p))return{hit:true,matched:p};const pWords=words(point);for(const w of pWords){for(const al of aliases(w)){if(al.length>=4&&a.includes(al))return{hit:true,matched:al}}}for(const group of SYN){const pointHas=group.some(x=>p.includes(norm(x)));if(pointHas){const found=group.find(x=>a.includes(norm(x)));if(found)return{hit:true,matched:found}}}return{hit:false,matched:''}}function renderMenu(){bankCount.textContent=BANK.length;babGrid.innerHTML='';for(let b=1;b<=10;b++){const arr=BANK.filter(q=>q.bab===b),d=document.createElement('article');d.className='card';d.innerHTML=`<div class="tag">BAB ${b} · ${arr.length}题</div><h2>${arr[0]?.title||'高频题库'}</h2><p>点击进入本章练习。</p>`;d.onclick=()=>start(arr);babGrid.appendChild(d)}}document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));b.classList.add('on');selectedCount=Number(b.dataset.count)});function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function startMixed(){start(BANK)}function start(source){list=shuffle(source).slice(0,Math.min(selectedCount,source.length));idx=0;totalScore=0;totalMarks=0;records=[];scoreView.textContent='0/0';menu.classList.add('hidden');result.classList.add('hidden');practice.classList.remove('hidden');showQ()}function showQ(){const q=list[idx];meta.textContent=`Bab ${q.bab} · 第 ${idx+1}/${list.length}题 · ${q.marks}分`;title.textContent=q.title;question.textContent=q.question;answer.value='';answer.disabled=false;feedback.innerHTML='';submitBtn.classList.remove('hidden');nextBtn.classList.add('hidden')}function submitAnswer(){const text=answer.value.trim();if(text.length<2){alert('请先输入答案。');return}const q=list[idx],hits=[],miss=[];q.points.forEach(p=>{const r=scorePoint(text,p);(r.hit?hits:miss).push({point:p,matched:r.matched})});const marks=Math.min(q.marks,hits.length);totalScore+=marks;totalMarks+=q.marks;records.push({q,marks,hits,miss,answer:text});scoreView.textContent=`${totalScore}/${totalMarks}`;answer.disabled=true;submitBtn.classList.add('hidden');nextBtn.classList.remove('hidden');feedback.innerHTML=`<div class="feedback"><h3>估计得分：${marks}/${q.marks}</h3><div class="point warn">评分规则：一个得分点命中一个有效关键词或同义词即可得分。</div><h4>已得分</h4>${hits.length?hits.map(x=>`<div class="point hit">✓ ${x.point}<br><small>命中：${x.matched}</small></div>`).join(''):'<div class="point miss">没有识别到得分关键词</div>'}<h4>遗漏点</h4>${miss.map(x=>`<div class="point miss">✗ ${x.point}</div>`).join('')}<h4>参考答案</h4><p>${q.reference}</p><h4>华语解释</h4><p>${q.chinese}</p></div>`}function nextQuestion(){idx++;if(idx>=list.length)finish();else showQ()}function finish(){practice.classList.add('hidden');result.classList.remove('hidden');finalScore.innerHTML=`总分：<b>${totalScore}/${totalMarks}</b>（${totalMarks?Math.round(totalScore/totalMarks*100):0}%）`;review.innerHTML=records.map((r,i)=>`<div class="feedback"><b>${i+1}. ${r.q.question}</b><br>得分：${r.marks}/${r.q.marks}<br>命中：${r.hits.map(x=>x.matched).join('、')||'无'}</div>`).join('')}function backMenu(){practice.classList.add('hidden');result.classList.add('hidden');menu.classList.remove('hidden')}renderMenu();</script></body></html>
