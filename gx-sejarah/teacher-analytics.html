<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Teacher Analytics V2.0</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#2a5368,#091b28 46%,#050b11);color:#eef5f8;min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.09em}.panel{margin-top:18px;background:#0d2231e8;border:1px solid #ffffff1a;border-radius:22px;padding:20px}.controls{display:grid;grid-template-columns:1fr auto;gap:10px}input,button{border:0;border-radius:12px;padding:13px 15px;font-size:15px}button{cursor:pointer;font-weight:900;background:linear-gradient(135deg,#f1d27e,#bd8525);color:#251900}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}.stat,.topic,.student,.recommend{background:#153246;border:1px solid #ffffff16;border-radius:16px;padding:16px}.stat b{display:block;font-size:30px;color:#e8bd5d;margin-top:6px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}.bar{height:10px;background:#ffffff14;border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#d85a5a,#e8bd5d,#2aa36e)}.muted{color:#9eb2bd}.bad{color:#ff8d8d}.ok{color:#62dca0}.list{display:grid;gap:10px}.empty{text-align:center;color:#9eb2bd;padding:26px}@media(max-width:780px){.controls,.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.0 TEACHER ANALYTICS</div><h1>教师学习分析中心</h1></div><a href="portal.html" style="color:#fff">返回统一入口</a></div><section class="panel"><div class="controls"><input id="classCode" placeholder="输入班级代码，例如 GX4A01"><button id="loadBtn">分析班级</button></div><p id="status" class="muted">读取本机或 Supabase 成绩后，自动分析班级弱项。</p><div class="stats"><div class="stat">学生人数<b id="students">0</b></div><div class="stat">平均正确率<b id="avg">0%</b></div><div class="stat">总错题<b id="wrong">0</b></div><div class="stat">平均 Hint<b id="hints">0</b></div></div></section><section class="grid"><div class="panel"><h2>Subtopic 正确率</h2><div id="topics" class="list"><div class="empty">尚未读取成绩</div></div></div><div class="panel"><h2>题型弱项</h2><div id="types" class="list"><div class="empty">尚未读取成绩</div></div></div></section><section class="grid"><div class="panel"><h2>学生风险名单</h2><div id="risk" class="list"><div class="empty">尚未读取成绩</div></div></div><div class="panel"><h2>下一份练习建议</h2><div id="recommend" class="list"><div class="empty">尚未读取成绩</div></div></div></section></main><script src="config.js"></script><script>const $=id=>document.getElementById(id);function configured(){const c=window.GX_SEJARAH_CONFIG||{};return c.supabaseUrl&&!c.supabaseUrl.includes('YOUR-PROJECT')&&c.supabaseAnonKey&&!c.supabaseAnonKey.includes('YOUR-ANON')}function localRows(code){const a=JSON.parse(localStorage.getItem('gx_sejarah_teacher_records')||'[]'),b=JSON.parse(localStorage.getItem('gxSejarahRecords')||'[]');return [...a,...b].filter(x=>!code||String(x.classCode||'').toUpperCase()===code)}async function remoteRows(code){const c=window.GX_SEJARAH_CONFIG,url=c.supabaseUrl+'/rest/v1/gx_sejarah_scores?class_code=eq.'+encodeURIComponent(code)+'&select=*&order=created_at.desc';const r=await fetch(url,{headers:{apikey:c.supabaseAnonKey,Authorization:'Bearer '+c.supabaseAnonKey}});if(!r.ok)throw new Error('Supabase '+r.status);return r.json()}function latest(data){const m=new Map();for(const x of data){const k=String(x.student_name||x.name||'').trim().toLowerCase();if(k&&!m.has(k))m.set(k,x)}return [...m.values()]}function pct(x){const max=x.max_score||x.maxScore||29;return max?Math.round((Number(x.score)||0)/max*100):0}function topicGuess(x){const wrong=x.wrong_topics||x.wrong_items||[];if(Array.isArray(wrong)&&wrong.length)return wrong.map(v=>String(v.route||v.topic||v)).filter(Boolean);const p=pct(x);if(p>=80)return[];return p<40?['1.1','1.2','1.3','1.4']:p<60?['1.3','1.4']:['1.2']}function typeGuess(x){const p=pct(x),w=Number(x.wrong_count??x.wrong??0),h=Number(x.hint_count??x.hints??0);const out=[];if(p<60)out.push('Paper 2 Huraian');if(w>=3)out.push('Struktur');if(h>=2)out.push('Kata kunci');if(!out.length)out.push('Pengukuhan campuran');return out}function render(data){const rows=latest(data);$('students').textContent=rows.length;const av=rows.length?Math.round(rows.reduce((s,x)=>s+pct(x),0)/rows.length):0;$('avg').textContent=av+'%';$('wrong').textContent=rows.reduce((s,x)=>s+Number(x.wrong_count??x.wrong??0),0);$('hints').textContent=rows.length?(rows.reduce((s,x)=>s+Number(x.hint_count??x.hints??0),0)/rows.length).toFixed(1):0;const tm={'1.1':0,'1.2':0,'1.3':0,'1.4':0},tt={};rows.forEach(x=>{topicGuess(x).forEach(t=>{if(tm[t]!==undefined)tm[t]++});typeGuess(x).forEach(t=>tt[t]=(tt[t]||0)+1)});$('topics').innerHTML=Object.entries(tm).map(([k,v])=>{const rate=rows.length?Math.max(0,100-Math.round(v/rows.length*100)):0;return `<div class="topic"><b>Bab ${k}</b><span class="muted"> · 估计正确率 ${rate}%</span><div class="bar"><i style="width:${rate}%"></i></div></div>`}).join('');$('types').innerHTML=Object.entries(tt).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="topic"><b>${k}</b><span class="muted"> · ${v} 名学生需要加强</span></div>`).join('')||'<div class="empty">暂无明显弱项</div>';const risk=rows.filter(x=>pct(x)<60||Number(x.wrong_count??x.wrong??0)>=3).sort((a,b)=>pct(a)-pct(b));$('risk').innerHTML=risk.length?risk.map(x=>`<div class="student"><b>${x.student_name||x.name}</b><div class="bad">${pct(x)}% · 错题 ${x.wrong_count??x.wrong??0} · Hint ${x.hint_count??x.hints??0}</div></div>`).join(''):'<div class="empty ok">没有高风险学生</div>';const weakest=Object.entries(tm).sort((a,b)=>b[1]-a[1])[0]?.[0]||'1.3',type=Object.entries(tt).sort((a,b)=>b[1]-a[1])[0]?.[0]||'Paper 2 Huraian';$('recommend').innerHTML=`<div class="recommend"><b>建议练习 1</b><p>Bab ${weakest} 定向练习：5题 Objective + 3题 Struktur + 2题 Huraian。</p></div><div class="recommend"><b>建议练习 2</b><p>加强 ${type}，要求学生圈关键词后再作答。</p></div><div class="recommend"><b>建议教学动作</b><p>先重教全班最多人错的知识点，再安排低于60%的学生进行订正挑战。</p></div>`}async function load(){const code=$('classCode').value.trim().toUpperCase();if(!code){$('status').textContent='请先输入班级代码。';return}$('status').textContent='正在分析 '+code+'…';try{const d=configured()?await remoteRows(code):localRows(code);render(d);$('status').textContent=(configured()?'在线后台':'本机记录')+'：已分析 '+latest(d).length+' 名学生。'}catch(e){$('status').textContent='读取失败：'+e.message;render([])}}$('loadBtn').onclick=load;$('classCode').addEventListener('keydown',e=>{if(e.key==='Enter')load()});</script></body></html>
