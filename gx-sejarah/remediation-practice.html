<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V3.1 Remediation Practice</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#2d5d72,#0a1c28 48%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:980px;margin:auto;padding:20px}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.panel{margin-top:16px;background:#0d2231;border:1px solid #ffffff1b;border-radius:22px;padding:20px}.paper{background:#fff8e8;color:#17252d;border-radius:18px;padding:20px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.choice{border:2px solid #d7cfba;background:#fff;border-radius:12px;padding:13px;text-align:left;font-weight:800;cursor:pointer}.choice.selected{border-color:#267da3;background:#e5f5fb}.choice.correct{border-color:#2e9c67;background:#e2f6eb}.choice.wrong{border-color:#d5535c;background:#fde6e8}.btn{border:0;border-radius:12px;padding:13px 17px;font-weight:900;cursor:pointer}.primary{background:#e8bd5d;color:#251900}.secondary{background:#294356;color:#fff}.progress{height:10px;background:#ffffff18;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:#e8bd5d}.review{background:#fff;color:#17252d;border-radius:15px;padding:15px;margin-top:12px}.hidden{display:none!important}@media(max-width:720px){.choices{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="brand">GX SEJARAH · V3.1 REMEDIATION</div><h1 id="title">个性化补救练习</h1><div class="progress"><i id="bar" style="width:0"></i></div><section id="practice" class="panel"><div class="paper"><div id="meta"></div><h2 id="question"></h2><div id="choices" class="choices"></div><p id="feedback"></p><button id="check" class="btn primary">检查答案</button> <button id="next" class="btn secondary hidden">下一题</button></div></section><section id="result" class="panel hidden"><h2>补救练习完成</h2><p id="score"></p><div id="reviews"></div><p><a href="student-profile.html" style="color:#fff">查看成长档案</a></p></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script src="profile-system.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices&&q.correct&&q.correct.length===1);const $=id=>document.getElementById(id);function decode(){try{let s=new URLSearchParams(location.search).get('data')||'';while(s.length%4)s+='=';return JSON.parse(decodeURIComponent(escape(atob(s))))}catch(e){return {name:'Pelajar',ids:[],route:'1.1',count:10}}}function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}const cfg=decode(),original=BANK.filter(q=>cfg.ids.includes(q.id)),same=BANK.filter(q=>q.route===cfg.route&&!cfg.ids.includes(q.id));const questions=[...original,...shuffle(same)].slice(0,Math.max(cfg.count||10,original.length));let i=0,selected=null,correct=0,wrong=[];$('title').textContent=`${cfg.name} · Bab ${cfg.route} 补救练习`;function load(){if(i>=questions.length)return finish();selected=null;$('feedback').textContent='';$('check').disabled=false;$('next').classList.add('hidden');const q=questions[i];$('meta').textContent=`${i+1}/${questions.length} · ${q.id} · ${q.paper}`;$('question').textContent=q.question;const order=shuffle(q.choices.map((text,index)=>({text,index})));$('choices').innerHTML=order.map(x=>`<button class="choice" data-i="${x.index}">${x.text}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{document.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selected=+b.dataset.i});$('bar').style.width=`${i/questions.length*100}%`}function check(){if(selected===null)return alert('请选择答案。');const q=questions[i],ok=q.correct.includes(selected);document.querySelectorAll('.choice').forEach(b=>{const n=+b.dataset.i;if(q.correct.includes(n))b.classList.add('correct');else if(n===selected)b.classList.add('wrong');b.disabled=true});if(ok){correct++;$('feedback').textContent='正确。继续保持。'}else{wrong.push(q);$('feedback').textContent=`错误。${q.chinese||''}`}$('check').disabled=true;$('next').classList.remove('hidden')}function finish(){$('practice').classList.add('hidden');$('result').classList.remove('hidden');$('bar').style.width='100%';const pct=questions.length?Math.round(correct/questions.length*100):0;$('score').innerHTML=`得分：<b>${correct}/${questions.length}</b>（${pct}%）`;if(window.GX_PROFILE)GX_PROFILE.addXP(40+correct*15,'remediation');$('reviews').innerHTML=wrong.length?wrong.map(q=>`<article class="review"><b>${q.id}</b><h3>${q.question}</h3><p><b>正确答案：</b>${q.choices[q.correct[0]]}</p><p><b>华语解释：</b>${q.chinese||'-'}</p><p><b>关键词：</b>${(q.keywords||[]).join(' · ')}</p><p><b>订正提醒：</b>${q.correction||'-'}</p></article>`).join(''):'<div class="review"><b>全部答对，补救完成。</b></div>';localStorage.setItem('gxSejarahRemediationLatest',JSON.stringify({name:cfg.name,route:cfg.route,score:correct,total:questions.length,wrongIds:wrong.map(q=>q.id),completedAt:new Date().toISOString()}))}$('check').onclick=check;$('next').onclick=()=>{i++;load()};load();</script></body></html>
