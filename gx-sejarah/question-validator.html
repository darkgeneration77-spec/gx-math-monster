<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah Question Validator</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:#07131d;color:#eef5f8}.app{max-width:1100px;margin:auto;padding:20px}.panel{background:#102737;border:1px solid #ffffff1d;border-radius:18px;padding:18px;margin-top:16px}.ok{color:#63dda0}.bad{color:#ff8585}.warn{color:#f1ca67}table{width:100%;border-collapse:collapse;margin-top:14px}th,td{padding:10px;border-bottom:1px solid #ffffff16;text-align:left}code{color:#f1ca67}.stat{font-size:28px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}@media(max-width:700px){.grid{grid-template-columns:1fr 1fr}}</style></head><body><main class="app"><h1>GX Sejarah V1.0 题库自动检测</h1><p>检查105题的编号、路线、分数、答案、解释与得分卡结构。</p><section class="panel"><div class="grid"><div>总题数<div id="total" class="stat">0</div></div><div>错误<div id="errors" class="stat bad">0</div></div><div>警告<div id="warnings" class="stat warn">0</div></div><div>状态<div id="status" class="stat">检查中</div></div></div></section><section class="panel"><h2>检测结果</h2><table><thead><tr><th>等级</th><th>题号</th><th>问题</th></tr></thead><tbody id="rows"></tbody></table></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script>const bank=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])],issues=[],ids=new Set(),routes=new Set(['1.1','1.2','1.3','1.4','BOSS']);function add(level,q,msg){issues.push({level,id:q?.id||'-',msg})}for(const q of bank){if(!q.id)add('error',q,'缺少题号');else if(ids.has(q.id))add('error',q,'题号重复');else ids.add(q.id);if(!routes.has(q.route))add('error',q,'route无效');if(!q.title||!q.question)add('error',q,'缺少标题或题目');if(!Number.isInteger(q.marks)||q.marks<1)add('error',q,'分数无效');if(!Array.isArray(q.correct)||!q.correct.length)add('error',q,'缺少正确答案');if(q.choices){if(q.choices.length<4)add('warning',q,'选择题少于4个选项');if(q.correct.some(i=>!Number.isInteger(i)||i<0||i>=q.choices.length))add('error',q,'正确答案索引超出范围')}else if(q.cards){const cardIds=new Set(q.cards.map(c=>c.id));if(q.correct.some(id=>!cardIds.has(id)))add('error',q,'正确答案卡不存在');if(!Array.isArray(q.slots)||q.slots.length!==q.correct.length)add('error',q,'slots数量与正确答案数量不一致')}else add('error',q,'缺少choices或cards');if(q.marks!==q.correct.length)add('warning',q,`分数${q.marks}与得分点${q.correct.length}不一致`);for(const f of ['keywords','chinese','hint','correction'])if(!q[f]||(Array.isArray(q[f])&&!q[f].length))add('warning',q,`缺少${f}`)}document.getElementById('total').textContent=bank.length;const errors=issues.filter(x=>x.level==='error').length,warnings=issues.filter(x=>x.level==='warning').length;document.getElementById('errors').textContent=errors;document.getElementById('warnings').textContent=warnings;const status=document.getElementById('status');status.textContent=!errors&&bank.length===105?'PASS':'需检查';status.className='stat '+(!errors&&bank.length===105?'ok':'bad');document.getElementById('rows').innerHTML=issues.length?issues.map(x=>`<tr><td class="${x.level==='error'?'bad':'warn'}">${x.level.toUpperCase()}</td><td><code>${x.id}</code></td><td>${x.msg}</td></tr>`).join(''):'<tr><td colspan="3" class="ok">全部检测通过。</td></tr>';</script></body></html>
