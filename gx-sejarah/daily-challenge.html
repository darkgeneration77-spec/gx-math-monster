<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.3 Daily Challenge</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#274e66,#0b1d29 45%,#050b10);color:#fff;min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.stats{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 12px;border-radius:999px;background:#ffffff0d;border:1px solid #ffffff1d}.panel{margin-top:16px;background:#0d2231e8;border:1px solid #ffffff1b;border-radius:22px;padding:20px}.question{background:#fff8e8;color:#17232b;border-radius:18px;padding:20px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.choice{border:2px solid #d8cfba;background:#fff;color:#17232b;border-radius:12px;padding:13px;text-align:left;font-weight:800;cursor:pointer}.choice.correct{border-color:#2fa56d;background:#e2f6eb}.choice.wrong{border-color:#d8515c;background:#fde6e8}.btn{border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer}.primary{background:#e8bd5d;color:#241900}.secondary{background:#27465a;color:#fff}.hidden{display:none!important}.progress{height:12px;background:#0007;border-radius:999px;overflow:hidden}.progress i{display:block;height:100%;background:#e8bd5d;transition:.3s}.review{background:#fff;color:#17232b;border-radius:14px;padding:14px;margin-top:10px}.rank{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #ffffff16}@media(max-width:700px){.choices{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.3</div><h1>每日挑战 Cabaran Harian</h1></div><div class="stats"><span class="chip">连续 <b id="streak">0</b> 天</span><span class="chip">今日 <b id="score">0</b>/5</span><span class="chip">奖励 <b id="reward">0</b> XP</span></div></div><section class="panel"><div class="progress"><i id="bar" style="width:0%"></i></div><p id="date"></p><div id="play"><div class="question"><div id="meta"></div><h2 id="q"></h2><div id="choices" class="choices"></div><div style="margin-top:14px"><button id="next" class="btn primary hidden">下一题</button> <a href="portal.html" class="btn secondary" style="text-decoration:none">返回 Portal</a></div></div></div><div id="done" class="hidden"><h2>今日挑战完成</h2><p id="summary"></p><div id="reviews"></div><button class="btn secondary" onclick="location.reload()">重新查看</button></div></section><section class="panel"><h2>本机排行榜</h2><div id="leaderboard"></div></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script src="profile-system.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices&&q.correct&&q.correct.length===1);const KEY='gxSejarahDailyV23',RANK='gxSejarahDailyRankV23',$=id=>document.getElementById(id);const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kuala_Lumpur'});$('date').textContent='日期：'+today;function hash(s){let h=2166136261;for(const c of s){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}function seeded(seed){return()=>((seed=Math.imul(seed,1664525)+1013904223>>>0)/4294967296)}function dailySet(){const rnd=seeded(hash(today));const a=[...BANK];for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a.slice(0,5)}let data=JSON.parse(localStorage.getItem(KEY)||'{}'),questions=dailySet(),i=0,score=0,wrong=[],answered=false;if(data.date===today&&data.completed){showDone(data);renderRank()}else{load();updateStreakDisplay()}function load(){answered=false;$('next').classList.add('hidden');const q=questions[i];$('meta').textContent=`${q.route==='BOSS'?'Final Boss':'Bab '+q.route} · ${i+1}/5`;$('q').textContent=q.question;const order=q.choices.map((text,idx)=>({text,idx})).sort(()=>Math.random()-.5);$('choices').innerHTML=order.map(x=>`<button class="choice" data-i="${x.idx}">${x.text}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>answer(+b.dataset.i));$('bar').style.width=(i/5*100)+'%'}function answer(n){if(answered)return;answered=true;const q=questions[i],ok=q.correct.includes(n);if(ok)score++;else wrong.push(q.id);document.querySelectorAll('.choice').forEach(b=>{const x=+b.dataset.i;if(q.correct.includes(x))b.classList.add('correct');else if(x===n)b.classList.add('wrong');b.disabled=true});$('score').textContent=score;$('next').classList.remove('hidden')}$('next').onclick=()=>{i++;if(i<5)load();else finish()};function yesterdayOf(d){const x=new Date(d+'T00:00:00+08:00');x.setDate(x.getDate()-1);return x.toLocaleDateString('en-CA',{timeZone:'Asia/Kuala_Lumpur'})}function finish(){const prev=JSON.parse(localStorage.getItem(KEY)||'{}'),streak=prev.date===yesterdayOf(today)?(prev.streak||0)+1:1,reward=50+score*20+Math.min(streak,7)*10;const out={date:today,completed:true,score,wrong,streak,reward,name:(window.GX_PROFILE?.read()?.name)||'Pelajar'};localStorage.setItem(KEY,JSON.stringify(out));window.GX_PROFILE?.addXP(reward,'Daily Challenge');const rank=JSON.parse(localStorage.getItem(RANK)||'[]').filter(x=>!(x.date===today&&x.name===out.name));rank.push({name:out.name,date:today,score,reward});rank.sort((a,b)=>b.score-a.score||b.reward-a.reward);localStorage.setItem(RANK,JSON.stringify(rank.slice(0,20)));showDone(out);renderRank()}function showDone(d){$('play').classList.add('hidden');$('done').classList.remove('hidden');$('score').textContent=d.score;$('streak').textContent=d.streak;$('reward').textContent=d.reward;$('bar').style.width='100%';$('summary').textContent=`答对 ${d.score}/5 · 连续 ${d.streak} 天 · 获得 ${d.reward} XP。`;$('reviews').innerHTML=d.wrong.length?d.wrong.map(id=>{const q=BANK.find(x=>x.id===id);return `<div class="review"><b>${q.id}</b><br>${q.question}<p><b>华语解释：</b>${q.chinese}</p><p><b>正确答案：</b>${q.choices[q.correct[0]]}</p></div>`}).join(''):'<div class="review">今日全对，没有错题。</div>'}function updateStreakDisplay(){const prev=JSON.parse(localStorage.getItem(KEY)||'{}');$('streak').textContent=prev.date===yesterdayOf(today)?prev.streak||0:0}function renderRank(){const rank=JSON.parse(localStorage.getItem(RANK)||'[]');$('leaderboard').innerHTML=rank.length?rank.map((x,n)=>`<div class="rank"><span>${n+1}. ${x.name}<small> · ${x.date}</small></span><b>${x.score}/5 · ${x.reward} XP</b></div>`).join(''):'暂无记录'}</script></body></html>
