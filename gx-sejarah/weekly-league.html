<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.4 Weekly League</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#243f66,#0a1727 48%,#05080e);color:#fff;min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{color:#f1ca68;font-weight:900;letter-spacing:.1em}.panel{margin-top:16px;background:#102033e8;border:1px solid #ffffff1a;border-radius:22px;padding:20px}.stats{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 11px;border-radius:999px;background:#ffffff0d;border:1px solid #ffffff17}.question{background:#fff8e8;color:#17232b;border-radius:18px;padding:20px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.choice{border:2px solid #d8cfba;background:#fff;color:#17232b;border-radius:12px;padding:13px;text-align:left;font-weight:800;cursor:pointer}.choice.correct{border-color:#2fa56d;background:#e2f6eb}.choice.wrong{border-color:#d8515c;background:#fde6e8}.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:900;cursor:pointer}.primary{background:#f1ca68;color:#251a00}.secondary{background:#26394a;color:#fff}.hidden{display:none!important}.board{display:grid;gap:9px}.row{display:grid;grid-template-columns:55px 1fr auto;gap:10px;align-items:center;background:#ffffff0b;border-radius:12px;padding:11px}.medal{font-size:24px}.review{background:#fff;color:#17232b;border-radius:14px;padding:14px;margin-top:10px}.reward{text-align:center;font-size:18px}.big{font-size:46px;font-weight:900;color:#f1ca68}input{width:100%;padding:13px;border:0;border-radius:12px;font-size:17px;margin:8px 0 12px}@media(max-width:760px){.choices{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><div class="brand">GX SEJARAH · V2.4 WEEKLY LEAGUE</div><h1>每周历史联赛</h1></div><div class="stats"><span class="chip">Week <b id="week"></b></span><span class="chip">题目 <b id="progress">0/10</b></span><span class="chip">分数 <b id="score">0</b></span></div></div><section id="start" class="panel"><h2>加入本周联赛</h2><p>每周固定10题。完成后获得XP、查看本机排行榜，并复盘错题。</p><input id="name" maxlength="26" placeholder="输入学生姓名"><button id="startBtn" class="btn primary">开始联赛</button> <a class="btn secondary" href="portal.html" style="text-decoration:none">返回 Portal</a></section><section id="game" class="panel hidden"><div class="question"><div id="route"></div><h2 id="qtext"></h2><div id="choices" class="choices"></div><button id="next" class="btn primary hidden" style="margin-top:14px">下一题</button></div></section><section id="result" class="panel hidden"><div class="reward"><div class="big" id="final"></div><h2 id="rankTitle"></h2><p id="rewardText"></p></div><h2>本周排行榜</h2><div id="board" class="board"></div><h2>错题复盘</h2><div id="reviews"></div><p><a href="student-profile.html" style="color:#fff">查看成长档案</a></p></section></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script src="profile-system.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])].filter(q=>q.choices&&q.correct&&q.correct.length===1);const $=id=>document.getElementById(id);function weekKey(){const d=new Date(),one=new Date(d.getFullYear(),0,1),n=Math.ceil((((d-one)/86400000)+one.getDay()+1)/7);return d.getFullYear()+'-W'+String(n).padStart(2,'0')}const WEEK=weekKey();$('week').textContent=WEEK;function seeded(seed){let h=2166136261;for(const c of seed)h=Math.imul(h^c.charCodeAt(0),16777619);return()=>((h=Math.imul(h^h>>>15,2246822507),h^=Math.imul(h^h>>>13,3266489909),(h^=h>>>16)>>>0)/4294967296)}function pick(){const r=seeded(WEEK),a=[...BANK];for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a.slice(0,10)}const QS=pick(),KEY='gxWeeklyLeagueV24',BOARD='gxWeeklyLeagueBoardV24';let idx=0,score=0,wrong=[],name='',answered=false;function load(){answered=false;$('next').classList.add('hidden');const q=QS[idx];$('progress').textContent=`${idx+1}/10`;$('route').textContent=`Bab ${q.route} · ${q.id}`;$('qtext').textContent=q.question;const order=q.choices.map((text,i)=>({text,i})).sort(()=>Math.random()-.5);$('choices').innerHTML=order.map(x=>`<button class="choice" data-i="${x.i}">${x.text}</button>`).join('');document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>answer(+b.dataset.i,b))}function answer(i,b){if(answered)return;answered=true;const q=QS[idx],ok=q.correct.includes(i);document.querySelectorAll('.choice').forEach(x=>{const n=+x.dataset.i;if(q.correct.includes(n))x.classList.add('correct');else if(n===i)x.classList.add('wrong');x.disabled=true});if(ok)score++;else wrong.push(q.id);$('score').textContent=score;$('next').classList.remove('hidden')}$('next').onclick=()=>{idx++;idx<10?load():finish()};$('startBtn').onclick=()=>{name=$('name').value.trim()||'Pelajar';$('start').classList.add('hidden');$('game').classList.remove('hidden');load()};function finish(){$('game').classList.add('hidden');$('result').classList.remove('hidden');let board=JSON.parse(localStorage.getItem(BOARD)||'[]').filter(x=>x.week===WEEK&&x.name.toLowerCase()!==name.toLowerCase());board.push({week:WEEK,name,score,time:new Date().toISOString()});board.sort((a,b)=>b.score-a.score||a.time.localeCompare(b.time));localStorage.setItem(BOARD,JSON.stringify(board.slice(0,50)));const rank=board.findIndex(x=>x.name===name&&x.score===score)+1;const medal=rank===1?'冠军':rank===2?'亚军':rank===3?'季军':'完成者';const xp=100+score*20+(rank===1?150:rank===2?100:rank===3?60:0);if(window.GX_PROFILE){GX_PROFILE.setName(name);GX_PROFILE.addXP(xp,'Weekly League '+WEEK)}localStorage.setItem(KEY,JSON.stringify({week:WEEK,name,score,rank,xp,wrong,completedAt:new Date().toISOString()}));$('final').textContent=`${score}/10`;$('rankTitle').textContent=`第 ${rank} 名 · ${medal}`;$('rewardText').textContent=`获得 ${xp} XP。前三名分别获得额外150、100、60 XP。`;$('board').innerHTML=board.map((x,i)=>`<div class="row"><div class="medal">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div><b>${x.name}</b><span>${x.score}/10</span></div>`).join('');$('reviews').innerHTML=wrong.length?wrong.map(id=>{const q=BANK.find(x=>x.id===id);return `<article class="review"><b>${q.id}</b><p>${q.question}</p><p><b>正确答案：</b>${q.choices[q.correct[0]]}</p><p><b>华语解释：</b>${q.chinese}</p></article>`}).join(''):'<article class="review">本周全对，没有错题。</article>'}const done=JSON.parse(localStorage.getItem(KEY)||'null');if(done&&done.week===WEEK){$('name').value=done.name||'';$('start').insertAdjacentHTML('beforeend',`<p>本周已完成：${done.score}/10，第 ${done.rank} 名，已领取 ${done.xp} XP。</p>`)}</script></body></html>
