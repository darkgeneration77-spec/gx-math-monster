<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GX Sejarah V2.0 Free Text Examiner</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans SC",sans-serif;background:radial-gradient(circle at top,#2a5368,#091a27 46%,#050b11);color:#fff;min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:22px}.brand{color:#e8bd5d;font-weight:900;letter-spacing:.1em}.panel{margin-top:16px;background:#0d2231e8;border:1px solid #ffffff1b;border-radius:22px;padding:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}select,textarea,button{width:100%;border:0;border-radius:13px;padding:13px;font-size:16px}textarea{min-height:190px;resize:vertical;margin-top:10px}button{cursor:pointer;font-weight:900;background:linear-gradient(135deg,#f1d27e,#bd8525);color:#241900}.question{background:#faf1dc;color:#14232c;border-radius:16px;padding:18px;line-height:1.6}.meta{color:#65727a;font-size:13px}.score{font-size:48px;color:#e8bd5d;font-family:Georgia,serif}.marks{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.mark{background:#fff;color:#15232b;border-radius:12px;padding:12px;border-left:5px solid #d65050}.mark.ok{border-left-color:#249d68}.answer{background:#fff;color:#15232b;border-left:5px solid #249d68;border-radius:12px;padding:14px;line-height:1.65}.muted{color:#aec1cb}.links a{color:#fff}@media(max-width:760px){.grid,.marks{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="brand">GX SEJARAH · V2.0 PHASE A</div><h1>自由作答阅卷官</h1><p class="muted">学生直接输入 Paper 2 答案。系统根据题库得分点、关键词与句子结构进行本机评分，不需要外部 API。</p><section class="panel"><div class="grid"><label>Bab / 路线<select id="route"><option value="1.1">Bab 1.1</option><option value="1.2">Bab 1.2</option><option value="1.3">Bab 1.3</option><option value="1.4">Bab 1.4</option><option value="BOSS">Final Boss</option></select></label><label>题目<select id="questionSelect"></select></label></div><div id="questionBox" class="question" style="margin-top:14px"></div><textarea id="answer" placeholder="Taip jawapan lengkap dalam Bahasa Melayu..."></textarea><button id="check">Semak Jawapan / 检查答案</button></section><section id="result" class="panel" style="display:none"><div class="score" id="score"></div><p id="summary"></p><div id="marks" class="marks"></div><h3>完整参考答案</h3><div id="reference" class="answer"></div><h3>改进建议</h3><div id="advice" class="answer"></div></section><p class="links"><a href="portal.html">返回统一入口</a></p></main><script src="questions/world1-1.1.js"></script><script src="questions/world1-1.2.js"></script><script src="questions/world1-1.3.js"></script><script src="questions/world1-1.4.js"></script><script src="questions/world1-final-boss.js"></script><script>const BANK=[...(window.GX_SEJARAH_WORLD1_1_1||[]),...(window.GX_SEJARAH_WORLD1_1_2||[]),...(window.GX_SEJARAH_WORLD1_1_3||[]),...(window.GX_SEJARAH_WORLD1_1_4||[]),...(window.GX_SEJARAH_WORLD1_FINAL_BOSS||[])];const $=id=>document.getElementById(id);let current=null;function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}function points(q){if(q.cards)return q.correct.map(id=>q.cards.find(c=>c.id===id)).filter(Boolean).map(c=>({tag:c.tag,text:c.text,terms:extractTerms(c.text)}));return q.correct.map(i=>({tag:'Fakta',text:q.choices[i],terms:extractTerms(q.choices[i])}))}function extractTerms(text){const stop=new Set(['yang','dan','untuk','dengan','dalam','kepada','daripada','akan','oleh','serta','ini','itu','dapat','menjadi','secara','lebih','supaya','kerana','ialah','adalah']);return [...new Set(norm(text).split(' ').filter(w=>w.length>3&&!stop.has(w)))].slice(0,7)}function loadQuestions(){const r=$('route').value;const qs=BANK.filter(q=>q.route===r&&q.mode!=='PAPER 1');$('questionSelect').innerHTML=qs.map(q=>`<option value="${q.id}">${q.id} · ${q.mode} · ${q.marks} markah · ${q.title}</option>`).join('');loadCurrent()}function loadCurrent(){current=BANK.find(q=>q.id===$('questionSelect').value);if(!current)return;$('questionBox').innerHTML=`<div class="meta">${current.paper} · ${current.mode} · ${current.marks} markah</div><b>${current.question}</b><p class="meta">Kata kunci: ${(current.keywords||[]).join(' · ')}</p>`;$('answer').value='';$('result').style.display='none'}function evaluate(){if(!current)return;const raw=$('answer').value.trim();if(raw.length<8)return alert('请先输入完整答案。');const text=norm(raw),ps=points(current);let earned=0;const detail=ps.map((p,i)=>{const hits=p.terms.filter(t=>text.includes(t));const needed=Math.max(1,Math.ceil(p.terms.length*.35));const ok=hits.length>=needed;if(ok)earned++;return {...p,ok,hits,index:i+1}});const max=current.marks||ps.length;earned=Math.min(earned,max);const pct=Math.round(earned/max*100);$('score').textContent=`${earned}/${max}`;$('summary').innerHTML=`估计得分：<b>${pct}%</b>。本机规则评分适合作为即时练习反馈，不替代教师最终阅卷。`;$('marks').innerHTML=detail.map(x=>`<div class="mark ${x.ok?'ok':''}"><b>${x.ok?'✓':'×'} 得分点 ${x.index} · ${x.tag}</b><br>${x.text}<br><small>${x.ok?'找到关键词：'+x.hits.join(', '):'答案中未充分表达此意思'}</small></div>`).join('');$('reference').textContent=ps.map(x=>x.text).join(' ');const missing=detail.filter(x=>!x.ok);const hasConnector=/(oleh itu|kesannya|hal ini|justeru|dengan ini|supaya|kerana)/i.test(raw);let advice=[];if(missing.length)advice.push(`补充 ${missing.length} 个得分点：`+missing.map(x=>x.tag).join('、'));if(!hasConnector&&current.marks>=4)advice.push('加入连接词，例如 Hal ini demikian kerana、Kesannya 或 Oleh itu。');if(raw.split(/\s+/).length<current.marks*5)advice.push('答案偏短，每个得分点应写成完整句子。');if(!advice.length)advice.push('答案已经覆盖主要得分点，可进一步检查语法和重复表达。');$('advice').innerHTML=advice.map(x=>'• '+x).join('<br>');$('result').style.display='block';$('result').scrollIntoView({behavior:'smooth'})}$('route').onchange=loadQuestions;$('questionSelect').onchange=loadCurrent;$('check').onclick=evaluate;loadQuestions();</script></body></html>
